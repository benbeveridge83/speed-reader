midst of Nature and has his senses still. There was never yet such a storm but it was \nAEolian music to a healthy and innocent ear. Nothing can rightly compel a simple and \nbrave man to a vulgar sadness. While I enjoy the friendship of the seasons I trust that \nnothing can make life a burden to me. The gentle rain which waters my beans and keeps \nme in the house today is not drear and melancholy, but good for me too. Though it \nprevents my hoeing them, it is of far more worth than my hoeing. If it should continue \nso long as to cause the seeds to rot in the ground and destroy the potatoes in the low \nlands, it would still be good for the grass on the uplands, and, being good for the grass, it \nwould be good for me. Sometimes, when I compare myself with other men, it seems as if \nI were more favored by the gods than they, beyond any deserts that I am conscious of; \nas if I had a warrant and surety at their hands which my fellows have not, and were \nespecially guided and guarded. I do not flatter myself, but if it be possible they flatter \nme. I have never felt lonesome, or in the least oppressed by a sense of solitude, but once, \nand that was a few weeks after I came to the woods, when, for an hour, I doubted if the \nnear neighborhood of man was not essential to a serene and healthy life. To be alone \nwas something unpleasant. But I was at the same time conscious of a slight insanity in \nmy mood, and seemed to foresee my recovery. In the midst of a gentle rain while these \nthoughts prevailed, I was suddenly sensible of such sweet and beneficent society in \nNature, in the very pattering of the drops, and in every sound and sight around my \nhouse, an infinite and unaccountable friendliness all at once like an atmosphere \nsustaining me, as made the fancied advantages of human neighborhood insignificant, \nand I have never thought of them since. Every little pine needle expanded and swelled \nwith sympathy and befriended me. I was so distinctly made aware of the presence of \nsomething kindred to me, even in scenes which we are accustomed to call wild and \ndreary, and also that the nearest of blood to me and humanest was not a person nor a \nvillager, that I thought no place could ever be strange to me again. \n“Mourning untimely consumes the sad; \nFew are their days in the land of the living, \nBeautiful daughter of Toscar.” \nSome of my pleasantest hours were during the long rain-storms in the spring or fall, \nwhich confined me to the house for the afternoon as well as the forenoon, soothed by \ntheir ceaseless roar and pelting; when an early twilight ushered in a long evening in \nwhich many thoughts had time to take root and unfold themselves. In those driving \nnortheast rains which tried the village houses so, when the maids stood ready with mop \nand pail in front entries to keep the deluge out, I sat behind my door in my little house, \nwhich was all entry, and thoroughly enjoyed its protection. In one heavy thunder-\nshower the lightning struck a large pitch pine across the pond, making a very \nconspicuous and perfectly regular spiral groove from top to bottom, an inch or more \ndeep, and four or five inches wide, as you would groove a walking-stick. I passed it again \nthe other day, and was struck with awe on looking up and beholding that mark, now \nmore distinct than ever, where a terrific and resistless bolt came down out of the \nharmless sky eight years ago. Men frequently say to me, “I should think you would feel \nlonesome down there, and want to be nearer to folks, rainy and snowy days and nights \nespecially.” I am tempted to reply to such — This whole earth which we inhabit is but a \npoint in space. How far apart, think you, dwell the two most distant inhabitants of "}, {"pdfPage": 69, "text": "yonder star, the breadth of whose disk cannot be appreciated by our instruments? Why \nshould I feel lonely? is not our planet in the Milky Way? This which you put seems to me \nnot to be the most important question. What sort of space is that which separates a man \nfrom his fellows and makes him solitary? I have found that no exertion of the legs can \nbring two minds much nearer to one another. What do we want most to dwell near to? \nNot to many men surely, the depot, the post-office, the bar-room, the meeting-house, the \nschool-house, the grocery, Beacon Hill, or the Five Points, where men most congregate, \nbut to the perennial source of our life, whence in all our experience we have found that \nto issue, as the willow stands near the water and sends out its roots in that direction. \nThis will vary with different natures, but this is the place where a wise man will dig his \ncellar. . . . I one evening overtook one of my townsmen, who has accumulated what is \ncalled “a handsome property” — though I never got a fair view of it — on the Walden \nroad, driving a pair of cattle to market, who inquired of me how I could bring my mind \nto give up so many of the comforts of life. I answered that I was very sure I liked it \npassably well; I was not joking. And so I went home to my bed, and left him to pick his \nway through the darkness and the mud to Brighton — or Bright-town — which place he \nwould reach some time in the morning. \nAny prospect of awakening or coming to life to a dead man makes indifferent all times \nand places. The place where that may occur is always the same, and indescribably \npleasant to all our senses. For the most part we allow only outlying and transient \ncircumstances to make our occasions. They are, in fact, the cause of our distraction. \nNearest to all things is that power which fashions their being. Next to us the grandest \nlaws are continually being executed. Next to us is not the workman whom we have \nhired, with whom we love so well to talk, but the workman whose work we are. \n“How vast and profound is the influence of the subtile powers of Heaven and of Earth!” \n“We seek to perceive them, and we do not see them; we seek to hear them, and we do \nnot hear them; identified with the substance of things, they cannot be separated from \nthem.” \n“They cause that in all the universe men purify and sanctify their hearts, and clothe \nthemselves in their holiday garments to offer sacrifices and oblations to their ancestors. \nIt is an ocean of subtile intelligences. They are everywhere, above us, on our left, on our \nright; they environ us on all sides.” \nWe are the subjects of an experiment which is not a little interesting to me. Can we not \ndo without the society of our gossips a little while under these circumstances — have \nour own thoughts to cheer us? Confucius says truly, “Virtue does not remain as an \nabandoned orphan; it must of necessity have neighbors.” \nWith thinking we may be beside ourselves in a sane sense. By a conscious effort of the \nmind we can stand aloof from actions and their consequences; and all things, good and \nbad, go by us like a torrent. We are not wholly involved in Nature. I may be either the \ndriftwood in the stream, or Indra in the sky looking down on it. I may be affected by a \ntheatrical exhibition; on the other hand, I may not be affected by an actual event which \nappears to concern me much more. I only know myself as a human entity; the scene, so \nto speak, of thoughts and affections; and am sensible of a certain doubleness by which I \ncan stand as remote from myself as from another. However intense my experience, I am \nconscious of the presence and criticism of a part of me, which, as it were, is not a part of \nme, but spectator, sharing no experience, but taking note of it, and that is no more I than \nit is you. When the play, it may be the tragedy, of life is over, the spectator goes his way. "}, {"pdfPage": 70, "text": "It was a kind of fiction, a work of the imagination only, so far as he was concerned. This \ndoubleness may easily make us poor neighbors and friends sometimes. \nI find it wholesome to be alone the greater part of the time. To be in company, even with \nthe best, is soon wearisome and dissipating. I love to be alone. I never found the \ncompanion that was so companionable as solitude. We are for the most part more lonely \nwhen we go abroad among men than when we stay in our chambers. A man thinking or \nworking is always alone, let him be where he will. Solitude is not measured by the miles \nof space that intervene between a man and his fellows. The really diligent student in one \nof the crowded hives of Cambridge College is as solitary as a dervish in the desert. The \nfarmer can work alone in the field or the woods all day, hoeing or chopping, and not feel \nlonesome, because he is employed; but when he comes home at night he cannot sit \ndown in a room alone, at the mercy of his thoughts, but must be where he can “see the \nfolks,” and recreate, and, as he thinks, remunerate himself for his day’s solitude; and \nhence he wonders how the student can sit alone in the house all night and most of the \nday without ennui and “the blues”; but he does not realize that the student, though in \nthe house, is still at work in his field, and chopping in his woods, as the farmer in his, \nand in turn seeks the same recreation and society that the latter does, though it may be \na more condensed form of it. \nSociety is commonly too cheap. We meet at very short intervals, not having had time to \nacquire any new value for each other. We meet at meals three times a day, and give each \nother a new taste of that old musty cheese that we are. We have had to agree on a \ncertain set of rules, called etiquette and politeness, to make this frequent meeting \ntolerable and that we need not come to open war. We meet at the post-office, and at the \nsociable, and about the fireside every night; we live thick and are in each other’s way, \nand stumble over one another, and I think that we thus lose some respect for one \nanother. Certainly less frequency would suffice for all important and hearty \ncommunications. Consider the girls in a factory — never alone, hardly in their dreams. It \nwould be better if there were but one inhabitant to a square mile, as where I live. The \nvalue of a man is not in his skin, that we should touch him. \nI have heard of a man lost in the woods and dying of famine and exhaustion at the foot \nof a tree, whose loneliness was relieved by the grotesque visions with which, owing to \nbodily weakness, his diseased imagination surrounded him, and which he believed to be \nreal. So also, owing to bodily and mental health and strength, we may be continually \ncheered by a like but more normal and natural society, and come to know that we are \nnever alone. \nI have a great deal of company in my house; especially in the morning, when nobody \ncalls. Let me suggest a few comparisons, that some one may convey an idea of my \nsituation. I am no more lonely than the loon in the pond that laughs so loud, or than \nWalden Pond itself. What company has that lonely lake, I pray? And yet it has not the \nblue devils, but the blue angels in it, in the azure tint of its waters. The sun is alone, \nexcept in thick weather, when there sometimes appear to be two, but one is a mock sun. \nGod is alone — but the devil, he is far from being alone; he sees a great deal of company; \nhe is legion. I am no more lonely than a single mullein or dandelion in a pasture, or a \nbean leaf, or sorrel, or a horse-fly, or a bumblebee. I am no more lonely than the Mill \nBrook, or a weathercock, or the north star, or the south wind, or an April shower, or a \nJanuary thaw, or the first spider in a new house. "}, {"pdfPage": 71, "text": "I have occasional visits in the long winter evenings, when the snow falls fast and the \nwind howls in the wood, from an old settler and original proprietor, who is reported to \nhave dug Walden Pond, and stoned it, and fringed it with pine woods; who tells me \nstories of old time and of new eternity; and between us we manage to pass a cheerful \nevening with social mirth and pleasant views of things, even without apples or cider — \na most wise and humorous friend, whom I love much, who keeps himself more secret \nthan ever did Goffe or Whalley; and though he is thought to be dead, none can show \nwhere he is buried. An elderly dame, too, dwells in my neighborhood, invisible to most \npersons, in whose odorous herb garden I love to stroll sometimes, gathering simples \nand listening to her fables; for she has a genius of unequalled fertility, and her memory \nruns back farther than mythology, and she can tell me the original of every fable, and on \nwhat fact every one is founded, for the incidents occurred when she was young. A ruddy \nand lusty old dame, who delights in all weathers and seasons, and is likely to outlive all \nher children yet. \nThe indescribable innocence and beneficence of Nature — of sun and wind and rain, of \nsummer and winter — such health, such cheer, they afford forever! and such sympathy \nhave they ever with our race, that all Nature would be affected, and the sun’s brightness \nfade, and the winds would sigh humanely, and the clouds rain tears, and the woods shed \ntheir leaves and put on mourning in midsummer, if any man should ever for a just cause \ngrieve. Shall I not have intelligence with the earth? Am I not partly leaves and vegetable \nmould myself? \nWhat is the pill which will keep us well, serene, contented? Not my or thy great-\ngrandfather’s, but our great-grandmother Nature’s universal, vegetable, botanic \nmedicines, by which she has kept herself young always, outlived so many old Parrs in \nher day, and fed her health with their decaying fatness. For my panacea, instead of one \nof those quack vials of a mixture dipped from Acheron and the Dead Sea, which come \nout of those long shallow black-schooner looking wagons which we sometimes see \nmade to carry bottles, let me have a draught of undiluted morning air. Morning air! If \nmen will not drink of this at the fountainhead of the day, why, then, we must even bottle \nup some and sell it in the shops, for the benefit of those who have lost their subscription \nticket to morning time in this world. But remember, it will not keep quite till noonday \neven in the coolest cellar, but drive out the stopples long ere that and follow westward \nthe steps of Aurora. I am no worshipper of Hygeia, who was the daughter of that old \nherb-doctor AEsculapius, and who is represented on monuments holding a serpent in \none hand, and in the other a cup out of which the serpent sometimes drinks; but rather \nof Hebe, cup-bearer to Jupiter, who was the daughter of Juno and wild lettuce, and who \nhad the power of restoring gods and men to the vigor of youth. She was probably the \nonly thoroughly sound-conditioned, healthy, and robust young lady that ever walked \nthe globe, and wherever she came it was spring. "}, {"pdfPage": 72, "text": "Visitors \n \nI think that I love society as much as most, and am ready enough to fasten myself like a \nbloodsucker for the time to any full-blooded man that comes in my way. I am naturally \nno hermit, but might possibly sit out the sturdiest frequenter of the bar-room, if my \nbusiness called me thither. \nI had three chairs in my house; one for solitude, two for friendship, three for society. \nWhen visitors came in larger and unexpected numbers there was but the third chair for \nthem all, but they generally economized the room by standing up. It is surprising how \nmany great men and women a small house will contain. I have had twenty-five or thirty \nsouls, with their bodies, at once under my roof, and yet we often parted without being \naware that we had come very near to one another. Many of our houses, both public and \nprivate, with their almost innumerable apartments, their huge halls and their cellars for \nthe storage of wines and other munitions of peace, appear to be extravagantly large for \ntheir inhabitants. They are so vast and magnificent that the latter seem to be only \nvermin which infest them. I am surprised when the herald blows his summons before \nsome Tremont or Astor or Middlesex House, to see come creeping out over the piazza \nfor all inhabitants a ridiculous mouse, which soon again slinks into some hole in the \npavement. \nOne inconvenience I sometimes experienced in so small a house, the difficulty of getting \nto a sufficient distance from my guest when we began to utter the big thoughts in big \nwords. You want room for your thoughts to get into sailing trim and run a course or two \nbefore they make their port. The bullet of your thought must have overcome its lateral \nand ricochet motion and fallen into its last and steady course before it reaches the ear of \nthe hearer, else it may plow out again through the side of his head. Also, our sentences \nwanted room to unfold and form their columns in the interval. Individuals, like nations, \nmust have suitable broad and natural boundaries, even a considerable neutral ground, \nbetween them. I have found it a singular luxury to talk across the pond to a companion \non the opposite side. In my house we were so near that we could not begin to hear — \nwe could not speak low enough to be heard; as when you throw two stones into calm \nwater so near that they break each other’s undulations. If we are merely loquacious and \nloud talkers, then we can afford to stand very near together, cheek by jowl, and feel each \nother’s breath; but if we speak reservedly and thoughtfully, we want to be farther apart, \nthat all animal heat and moisture may have a chance to evaporate. If we would enjoy the \nmost intimate society with that in each of us which is without, or above, being spoken \nto, we must not only be silent, but commonly so far apart bodily that we cannot possibly \nhear each other’s voice in any case. Referred to this standard, speech is for the \nconvenience of those who are hard of hearing; but there are many fine things which we \ncannot say if we have to shout. As the conversation began to assume a loftier and \ngrander tone, we gradually shoved our chairs farther apart till they touched the wall in \nopposite corners, and then commonly there was not room enough. \nMy “best” room, however, my withdrawing room, always ready for company, on whose \ncarpet the sun rarely fell, was the pine wood behind my house. Thither in summer days, \nwhen distinguished guests came, I took them, and a priceless domestic swept the floor \nand dusted the furniture and kept the things in order. "}, {"pdfPage": 73, "text": "If one guest came he sometimes partook of my frugal meal, and it was no interruption to \nconversation to be stirring a hasty-pudding, or watching the rising and maturing of a \nloaf of bread in the ashes, in the meanwhile. But if twenty came and sat in my house \nthere was nothing said about dinner, though there might be bread enough for two, more \nthan if eating were a forsaken habit; but we naturally practised abstinence; and this was \nnever felt to be an offence against hospitality, but the most proper and considerate \ncourse. The waste and decay of physical life, which so often needs repair, seemed \nmiraculously retarded in such a case, and the vital vigor stood its ground. I could \nentertain thus a thousand as well as twenty; and if any ever went away disappointed or \nhungry from my house when they found me at home, they may depend upon it that I \nsympathized with them at least. So easy is it, though many housekeepers doubt it, to \nestablish new and better customs in the place of the old. You need not rest your \nreputation on the dinners you give. For my own part, I was never so effectually deterred \nfrom frequenting a man’s house, by any kind of Cerberus whatever, as by the parade one \nmade about dining me, which I took to be a very polite and roundabout hint never to \ntrouble him so again. I think I shall never revisit those scenes. I should be proud to have \nfor the motto of my cabin those lines of Spenser which one of my visitors inscribed on a \nyellow walnut leaf for a card:— \n“Arrived there, the little house they fill, \nNe looke for entertainment where none was; \nRest is their feast, and all things at their will: \nThe noblest mind the best contentment has.” \nWhen Winslow, afterward governor of the Plymouth Colony, went with a companion on \na visit of ceremony to Massasoit on foot through the woods, and arrived tired and \nhungry at his lodge, they were well received by the king, but nothing was said about \neating that day. When the night arrived, to quote their own words — “He laid us on the \nbed with himself and his wife, they at the one end and we at the other, it being only \nplanks laid a foot from the ground and a thin mat upon them. Two more of his chief \nmen, for want of room, pressed by and upon us; so that we were worse weary of our \nlodging than of our journey.” At one o’clock the next day Massasoit “brought two fishes \nthat he had shot,” about thrice as big as a bream. “These being boiled, there were at least \nforty looked for a share in them; the most eat of them. This meal only we had in two \nnights and a day; and had not one of us bought a partridge, we had taken our journey \nfasting.” Fearing that they would be light-headed for want of food and also sleep, owing \nto “the savages’ barbarous singing, (for they use to sing themselves asleep,)” and that \nthey might get home while they had strength to travel, they departed. As for lodging, it \nis true they were but poorly entertained, though what they found an inconvenience was \nno doubt intended for an honor; but as far as eating was concerned, I do not see how the \nIndians could have done better. They had nothing to eat themselves, and they were \nwiser than to think that apologies could supply the place of food to their guests; so they \ndrew their belts tighter and said nothing about it. Another time when Winslow visited \nthem, it being a season of plenty with them, there was no deficiency in this respect. \nAs for men, they will hardly fail one anywhere. I had more visitors while I lived in the \nwoods than at any other period in my life; I mean that I had some. I met several there \nunder more favorable circumstances than I could anywhere else. But fewer came to see \nme on trivial business. In this respect, my company was winnowed by my mere distance \nfrom town. I had withdrawn so far within the great ocean of solitude, into which the \nrivers of society empty, that for the most part, so far as my needs were concerned, only "}, {"pdfPage": 74, "text": "the finest sediment was deposited around me. Beside, there were wafted to me \nevidences of unexplored and uncultivated continents on the other side. \nWho should come to my lodge this morning but a true Homeric or Paphlagonian man — \nhe had so suitable and poetic a name that I am sorry I cannot print it here — a Canadian, \na woodchopper and post-maker, who can hole fifty posts in a day, who made his last \nsupper on a woodchuck which his dog caught. He, too, has heard of Homer, and, “if it \nwere not for books,” would “not know what to do rainy days,” though perhaps he has \nnot read one wholly through for many rainy seasons. Some priest who could pronounce \nthe Greek itself taught him to read his verse in the Testament in his native parish far \naway; and now I must translate to him, while he holds the book, Achilles’ reproof to \nPatroclus for his sad countenance. — \n“Why are you in tears, Patroclus, like a young girl?” \n“Or have you alone heard some news from Phthia? \nThey say that Menoetius lives yet, son of Actor, \nAnd Peleus lives, son of AEacus, among the Myrmidons, \nEither of whom having died, we should greatly grieve.” \nHe says, “That’s good.” He has a great bundle of white oak bark under his arm for a sick \nman, gathered this Sunday morning. “I suppose there’s no harm in going after such a \nthing to-day,” says he. To him Homer was a great writer, though what his writing was \nabout he did not know. A more simple and natural man it would be hard to find. Vice \nand disease, which cast such a sombre moral hue over the world, seemed to have hardly \nany existance for him. He was about twenty-eight years old, and had left Canada and his \nfather’s house a dozen years before to work in the States, and earn money to buy a farm \nwith at last, perhaps in his native country. He was cast in the coarsest mould; a stout but \nsluggish body, yet gracefully carried, with a thick sunburnt neck, dark bushy hair, and \ndull sleepy blue eyes, which were occasionally lit up with expression. He wore a flat \ngray cloth cap, a dingy wool-colored greatcoat, and cowhide boots. He was a great \nconsumer of meat, usually carrying his dinner to his work a couple of miles past my \nhouse — for he chopped all summer — in a tin pail; cold meats, often cold woodchucks, \nand coffee in a stone bottle which dangled by a string from his belt; and sometimes he \noffered me a drink. He came along early, crossing my bean-field, though without anxiety \nor haste to get to his work, such as Yankees exhibit. He wasn’t a-going to hurt himself. \nHe didn’t care if he only earned his board. Frequently he would leave his dinner in the \nbushes, when his dog had caught a woodchuck by the way, and go back a mile and a half \nto dress it and leave it in the cellar of the house where he boarded, after deliberating \nfirst for half an hour whether he could not sink it in the pond safely till nightfall — \nloving to dwell long upon these themes. He would say, as he went by in the morning, \n“How thick the pigeons are! If working every day were not my trade, I could get all the \nmeat I should want by hunting-pigeons, woodchucks, rabbits, partridges — by gosh! I \ncould get all I should want for a week in one day.” \nHe was a skilful chopper, and indulged in some flourishes and ornaments in his art. He \ncut his trees level and close to the ground, that the sprouts which came up afterward \nmight be more vigorous and a sled might slide over the stumps; and instead of leaving a \nwhole tree to support his corded wood, he would pare it away to a slender stake or \nsplinter which you could break off with your hand at last. \nHe interested me because he was so quiet and solitary and so happy withal; a well of \ngood humor and contentment which overflowed at his eyes. His mirth was without "}, {"pdfPage": 75, "text": "alloy. Sometimes I saw him at his work in the woods, felling trees, and he would greet \nme with a laugh of inexpressible satisfaction, and a salutation in Canadian French, \nthough he spoke English as well. When I approached him he would suspend his work, \nand with half-suppressed mirth lie along the trunk of a pine which he had felled, and, \npeeling off the inner bark, roll it up into a ball and chew it while he laughed and talked. \nSuch an exuberance of animal spirits had he that he sometimes tumbled down and \nrolled on the ground with laughter at anything which made him think and tickled him. \nLooking round upon the trees he would exclaim — “By George! I can enjoy myself well \nenough here chopping; I want no better sport.” Sometimes, when at leisure, he amused \nhimself all day in the woods with a pocket pistol, firing salutes to himself at regular \nintervals as he walked. In the winter he had a fire by which at noon he warmed his \ncoffee in a kettle; and as he sat on a log to eat his dinner the chickadees would \nsometimes come round and alight on his arm and peck at the potato in his fingers; and \nhe said that he “liked to have the little fellers about him.” \nIn him the animal man chiefly was developed. In physical endurance and contentment \nhe was cousin to the pine and the rock. I asked him once if he was not sometimes tired \nat night, after working all day; and he answered, with a sincere and serious look, \n“Gorrappit, I never was tired in my life.” But the intellectual and what is called spiritual \nman in him were slumbering as in an infant. He had been instructed only in that \ninnocent and ineffectual way in which the Catholic priests teach the aborigines, by \nwhich the pupil is never educated to the degree of consciousness, but only to the degree \nof trust and reverence, and a child is not made a man, but kept a child. When Nature \nmade him, she gave him a strong body and contentment for his portion, and propped \nhim on every side with reverence and reliance, that he might live out his threescore \nyears and ten a child. He was so genuine and unsophisticated that no introduction \nwould serve to introduce him, more than if you introduced a woodchuck to your \nneighbor. He had got to find him out as you did. He would not play any part. Men paid \nhim wages for work, and so helped to feed and clothe him; but he never exchanged \nopinions with them. He was so simply and naturally humble — if he can be called \nhumble who never aspires — that humility was no distinct quality in him, nor could he \nconceive of it. Wiser men were demigods to him. If you told him that such a one was \ncoming, he did as if he thought that anything so grand would expect nothing of himself, \nbut take all the responsibility on itself, and let him be forgotten still. He never heard the \nsound of praise. He particularly reverenced the writer and the preacher. Their \nperformances were miracles. When I told him that I wrote considerably, he thought for \na long time that it was merely the handwriting which I meant, for he could write a \nremarkably good hand himself. I sometimes found the name of his native parish \nhandsomely written in the snow by the highway, with the proper French accent, and \nknew that he had passed. I asked him if he ever wished to write his thoughts. He said \nthat he had read and written letters for those who could not, but he never tried to write \nthoughts — no, he could not, he could not tell what to put first, it would kill him, and \nthen there was spelling to be attended to at the same time! \nI heard that a distinguished wise man and reformer asked him if he did not want the \nworld to be changed; but he answered with a chuckle of surprise in his Canadian accent, \nnot knowing that the question had ever been entertained before, “No, I like it well \nenough.” It would have suggested many things to a philosopher to have dealings with \nhim. To a stranger he appeared to know nothing of things in general; yet I sometimes \nsaw in him a man whom I had not seen before, and I did not know whether he was as "}, {"pdfPage": 76, "text": "wise as Shakespeare or as simply ignorant as a child, whether to suspect him of a fine \npoetic consciousness or of stupidity. A townsman told me that when he met him \nsauntering through the village in his small close-fitting cap, and whistling to himself, he \nreminded him of a prince in disguise. \nHis only books were an almanac and an arithmetic, in which last he was considerably \nexpert. The former was a sort of cyclopaedia to him, which he supposed to contain an \nabstract of human knowledge, as indeed it does to a considerable extent. I loved to \nsound him on the various reforms of the day, and he never failed to look at them in the \nmost simple and practical light. He had never heard of such things before. Could he do \nwithout factories? I asked. He had worn the home-made Vermont gray, he said, and that \nwas good. Could he dispense with tea and coffee? Did this country afford any beverage \nbeside water? He had soaked hemlock leaves in water and drank it, and thought that \nwas better than water in warm weather. When I asked him if he could do without \nmoney, he showed the convenience of money in such a way as to suggest and coincide \nwith the most philosophical accounts of the origin of this institution, and the very \nderivation of the word pecunia. If an ox were his property, and he wished to get needles \nand thread at the store, he thought it would be inconvenient and impossible soon to go \non mortgaging some portion of the creature each time to that amount. He could defend \nmany institutions better than any philosopher, because, in describing them as they \nconcerned him, he gave the true reason for their prevalence, and speculation had not \nsuggested to him any other. At another time, hearing Plato’s definition of a man — a \nbiped without feathers — and that one exhibited a cock plucked and called it Plato’s \nman, he thought it an important difference that the knees bent the wrong way. He would \nsometimes exclaim, “How I love to talk! By George, I could talk all day!” I asked him \nonce, when I had not seen him for many months, if he had got a new idea this summer. \n“Good Lord” — said he, “a man that has to work as I do, if he does not forget the ideas he \nhas had, he will do well. May be the man you hoe with is inclined to race; then, by gorry, \nyour mind must be there; you think of weeds.” He would sometimes ask me first on such \noccasions, if I had made any improvement. One winter day I asked him if he was always \nsatisfied with himself, wishing to suggest a substitute within him for the priest without, \nand some higher motive for living. “Satisfied!” said he; “some men are satisfied with one \nthing, and some with another. One man, perhaps, if he has got enough, will be satisfied \nto sit all day with his back to the fire and his belly to the table, by George!” Yet I never, \nby any manoeuvring, could get him to take the spiritual view of things; the highest that \nhe appeared to conceive of was a simple expediency, such as you might expect an \nanimal to appreciate; and this, practically, is true of most men. If I suggested any \nimprovement in his mode of life, he merely answered, without expressing any regret, \nthat it was too late. Yet he thoroughly believed in honesty and the like virtues. \nThere was a certain positive originality, however slight, to be detected in him, and I \noccasionally observed that he was thinking for himself and expressing his own opinion, \na phenomenon so rare that I would any day walk ten miles to observe it, and it \namounted to the re-origination of many of the institutions of society. Though he \nhesitated, and perhaps failed to express himself distinctly, he always had a presentable \nthought behind. Yet his thinking was so primitive and immersed in his animal life, that, \nthough more promising than a merely learned man’s, it rarely ripened to anything \nwhich can be reported. He suggested that there might be men of genius in the lowest \ngrades of life, however permanently humble and illiterate, who take their own view "}, {"pdfPage": 77, "text": "always, or do not pretend to see at all; who are as bottomless even as Walden Pond was \nthought to be, though they may be dark and muddy. \nMany a traveller came out of his way to see me and the inside of my house, and, as an \nexcuse for calling, asked for a glass of water. I told them that I drank at the pond, and \npointed thither, offering to lend them a dipper. Far off as I lived, I was not exempted \nfrom the annual visitation which occurs, methinks, about the first of April, when \neverybody is on the move; and I had my share of good luck, though there were some \ncurious specimens among my visitors. Half-witted men from the almshouse and \nelsewhere came to see me; but I endeavored to make them exercise all the wit they had, \nand make their confessions to me; in such cases making wit the theme of our \nconversation; and so was compensated. Indeed, I found some of them to be wiser than \nthe so-called overseers of the poor and selectmen of the town, and thought it was time \nthat the tables were turned. With respect to wit, I learned that there was not much \ndifference between the half and the whole. One day, in particular, an inoffensive, simple-\nminded pauper, whom with others I had often seen used as fencing stuff, standing or \nsitting on a bushel in the fields to keep cattle and himself from straying, visited me, and \nexpressed a wish to live as I did. He told me, with the utmost simplicity and truth, quite \nsuperior, or rather inferior, to anything that is called humility, that he was “deficient in \nintellect.” These were his words. The Lord had made him so, yet he supposed the Lord \ncared as much for him as for another. “I have always been so,” said he, “from my \nchildhood; I never had much mind; I was not like other children; I am weak in the head. \nIt was the Lord’s will, I suppose.” And there he was to prove the truth of his words. He \nwas a metaphysical puzzle to me. I have rarely met a fellowman on such promising \nground — it was so simple and sincere and so true all that he said. And, true enough, in \nproportion as he appeared to humble himself was he exalted. I did not know at first but \nit was the result of a wise policy. It seemed that from such a basis of truth and frankness \nas the poor weak-headed pauper had laid, our intercourse might go forward to \nsomething better than the intercourse of sages. \nI had some guests from those not reckoned commonly among the town’s poor, but who \nshould be; who are among the world’s poor, at any rate; guests who appeal, not to your \nhospitality, but to your hospitalality; who earnestly wish to be helped, and preface their \nappeal with the information that they are resolved, for one thing, never to help \nthemselves. I require of a visitor that he be not actually starving, though he may have \nthe very best appetite in the world, however he got it. Objects of charity are not guests. \nMen who did not know when their visit had terminated, though I went about my \nbusiness again, answering them from greater and greater remoteness. Men of almost \nevery degree of wit called on me in the migrating season. Some who had more wits than \nthey knew what to do with; runaway slaves with plantation manners, who listened from \ntime to time, like the fox in the fable, as if they heard the hounds a-baying on their track, \nand looked at me beseechingly, as much as to say, — \n“O Christian, will you send me back? \nOne real runaway slave, among the rest, whom I helped to forward toward the north \nstar. Men of one idea, like a hen with one chicken, and that a duckling; men of a \nthousand ideas, and unkempt heads, like those hens which are made to take charge of a \nhundred chickens, all in pursuit of one bug, a score of them lost in every morning’s dew \n— and become frizzled and mangy in consequence; men of ideas instead of legs, a sort of \nintellectual centipede that made you crawl all over. One man proposed a book in which "}, {"pdfPage": 78, "text": "visitors should write their names, as at the White Mountains; but, alas! I have too good a \nmemory to make that necessary. \nI could not but notice some of the peculiarities of my visitors. Girls and boys and young \nwomen generally seemed glad to be in the woods. They looked in the pond and at the \nflowers, and improved their time. Men of business, even farmers, thought only of \nsolitude and employment, and of the great distance at which I dwelt from something or \nother; and though they said that they loved a ramble in the woods occasionally, it was \nobvious that they did not. Restless committed men, whose time was an taken up in \ngetting a living or keeping it; ministers who spoke of God as if they enjoyed a monopoly \nof the subject, who could not bear all kinds of opinions; doctors, lawyers, uneasy \nhousekeepers who pried into my cupboard and bed when I was out — how came Mrs. \n— to know that my sheets were not as clean as hers? — young men who had ceased to \nbe young, and had concluded that it was safest to follow the beaten track of the \nprofessions — all these generally said that it was not possible to do so much good in my \nposition. Ay! there was the rub. The old and infirm and the timid, of whatever age or sex, \nthought most of sickness, and sudden accident and death; to them life seemed full of \ndanger — what danger is there if you don’t think of any? — and they thought that a \nprudent man would carefully select the safest position, where Dr. B. might be on hand at \na moment’s warning. To them the village was literally a community, a league for mutual \ndefence, and you would suppose that they would not go a-huckleberrying without a \nmedicine chest. The amount of it is, if a man is alive, there is always danger that he may \ndie, though the danger must be allowed to be less in proportion as he is dead-and-alive \nto begin with. A man sits as many risks as he runs. Finally, there were the self-styled \nreformers, the greatest bores of all, who thought that I was forever singing — \nThis is the house that I built; \nThis is the man that lives in the house that I built; \nbut they did not know that the third line was, \nThese are the folks that worry the man \nThat lives in the house that I built. \nI did not fear the hen-harriers, for I kept no chickens; but I feared the men-harriers \nrather. \nI had more cheering visitors than the last. Children come a-berrying, railroad men \ntaking a Sunday morning walk in clean shirts, fishermen and hunters, poets and \nphilosophers; in short, all honest pilgrims, who came out to the woods for freedom’s \nsake, and really left the village behind, I was ready to greet with — “Welcome, \nEnglishmen! welcome, Englishmen!” for I had had communication with that race. "}, {"pdfPage": 79, "text": "The Bean–Field \n \nMeanwhile my beans, the length of whose rows, added together, was seven miles \nalready planted, were impatient to be hoed, for the earliest had grown considerably \nbefore the latest were in the ground; indeed they were not easily to be put off. What was \nthe meaning of this so steady and self-respecting, this small Herculean labor, I knew not. \nI came to love my rows, my beans, though so many more than I wanted. They attached \nme to the earth, and so I got strength like Antaeus. But why should I raise them? Only \nHeaven knows. This was my curious labor all summer — to make this portion of the \nearth’s surface, which had yielded only cinquefoil, blackberries, johnswort, and the like, \nbefore, sweet wild fruits and pleasant flowers, produce instead this pulse. What shall I \nlearn of beans or beans of me? I cherish them, I hoe them, early and late I have an eye to \nthem; and this is my day’s work. It is a fine broad leaf to look on. My auxiliaries are the \ndews and rains which water this dry soil, and what fertility is in the soil itself, which for \nthe most part is lean and effete. My enemies are worms, cool days, and most of all \nwoodchucks. The last have nibbled for me a quarter of an acre clean. But what right had \nI to oust johnswort and the rest, and break up their ancient herb garden? Soon, \nhowever, the remaining beans will be too tough for them, and go forward to meet new \nfoes. \nWhen I was four years old, as I well remember, I was brought from Boston to this my \nnative town, through these very woods and this field, to the pond. It is one of the oldest \nscenes stamped on my memory. And now to-night my flute has waked the echoes over \nthat very water. The pines still stand here older than I; or, if some have fallen, I have \ncooked my supper with their stumps, and a new growth is rising all around, preparing \nanother aspect for new infant eyes. Almost the same johnswort springs from the same \nperennial root in this pasture, and even I have at length helped to clothe that fabulous \nlandscape of my infant dreams, and one of the results of my presence and influence is \nseen in these bean leaves, corn blades, and potato vines. \nI planted about two acres and a half of upland; and as it was only about fifteen years \nsince the land was cleared, and I myself had got out two or three cords of stumps, I did \nnot give it any manure; but in the course of the summer it appeared by the arrowheads \nwhich I turned up in hoeing, that an extinct nation had anciently dwelt here and planted \ncorn and beans ere white men came to clear the land, and so, to some extent, had \nexhausted the soil for this very crop. \nBefore yet any woodchuck or squirrel had run across the road, or the sun had got above \nthe shrub oaks, while all the dew was on, though the farmers warned me against it — I \nwould advise you to do all your work if possible while the dew is on — I began to level \nthe ranks of haughty weeds in my bean-field and throw dust upon their heads. Early in \nthe morning I worked barefooted, dabbling like a plastic artist in the dewy and \ncrumbling sand, but later in the day the sun blistered my feet. There the sun lighted me \nto hoe beans, pacing slowly backward and forward over that yellow gravelly upland, \nbetween the long green rows, fifteen rods, the one end terminating in a shrub oak copse \nwhere I could rest in the shade, the other in a blackberry field where the green berries \ndeepened their tints by the time I had made another bout. Removing the weeds, putting \nfresh soil about the bean stems, and encouraging this weed which I had sown, making "}, {"pdfPage": 80, "text": "the yellow soil express its summer thought in bean leaves and blossoms rather than in \nwormwood and piper and millet grass, making the earth say beans instead of grass — \nthis was my daily work. As I had little aid from horses or cattle, or hired men or boys, or \nimproved implements of husbandry, I was much slower, and became much more \nintimate with my beans than usual. But labor of the hands, even when pursued to the \nverge of drudgery, is perhaps never the worst form of idleness. It has a constant and \nimperishable moral, and to the scholar it yields a classic result. A very agricola \nlaboriosus was I to travellers bound westward through Lincoln and Wayland to nobody \nknows where; they sitting at their ease in gigs, with elbows on knees, and reins loosely \nhanging in festoons; I the home-staying, laborious native of the soil. But soon my \nhomestead was out of their sight and thought. It was the only open and cultivated field \nfor a great distance on either side of the road, so they made the most of it; and \nsometimes the man in the field heard more of travellers’ gossip and comment than was \nmeant for his ear: “Beans so late! peas so late!” — for I continued to plant when others \nhad begun to hoe — the ministerial husbandman had not suspected it. “Corn, my boy, \nfor fodder; corn for fodder.” “Does he live there?” asks the black bonnet of the gray coat; \nand the hard-featured farmer reins up his grateful dobbin to inquire what you are doing \nwhere he sees no manure in the furrow, and recommends a little chip dirt, or any little \nwaste stuff, or it may be ashes or plaster. But here were two acres and a half of furrows, \nand only a hoe for cart and two hands to draw it — there being an aversion to other \ncarts and horses — and chip dirt far away. Fellow-travellers as they rattled by \ncompared it aloud with the fields which they had passed, so that I came to know how I \nstood in the agricultural world. This was one field not in Mr. Coleman’s report. And, by \nthe way, who estimates the value of the crop which nature yields in the still wilder fields \nunimproved by man? The crop of English hay is carefully weighed, the moisture \ncalculated, the silicates and the potash; but in all dells and pond-holes in the woods and \npastures and swamps grows a rich and various crop only unreaped by man. Mine was, \nas it were, the connecting link between wild and cultivated fields; as some states are \ncivilized, and others half-civilized, and others savage or barbarous, so my field was, \nthough not in a bad sense, a half-cultivated field. They were beans cheerfully returning \nto their wild and primitive state that I cultivated, and my hoe played the Rans des \nVaches for them. \nNear at hand, upon the topmost spray of a birch, sings the brown thrasher — or red \nmavis, as some love to call him — all the morning, glad of your society, that would find \nout another farmer’s field if yours were not here. While you are planting the seed, he \ncries — “Drop it, drop it — cover it up, cover it up — pull it up, pull it up, pull it up.” But \nthis was not corn, and so it was safe from such enemies as he. You may wonder what his \nrigmarole, his amateur Paganini performances on one string or on twenty, have to do \nwith your planting, and yet prefer it to leached ashes or plaster. It was a cheap sort of \ntop dressing in which I had entire faith. \nAs I drew a still fresher soil about the rows with my hoe, I disturbed the ashes of \nunchronicled nations who in primeval years lived under these heavens, and their small \nimplements of war and hunting were brought to the light of this modern day. They lay \nmingled with other natural stones, some of which bore the marks of having been burned \nby Indian fires, and some by the sun, and also bits of pottery and glass brought hither by \nthe recent cultivators of the soil. When my hoe tinkled against the stones, that music \nechoed to the woods and the sky, and was an accompaniment to my labor which yielded \nan instant and immeasurable crop. It was no longer beans that I hoed, nor I that hoed "}, {"pdfPage": 81, "text": "beans; and I remembered with as much pity as pride, if I remembered at all, my \nacquaintances who had gone to the city to attend the oratorios. The nighthawk circled \noverhead in the sunny afternoons — for I sometimes made a day of it — like a mote in \nthe eye, or in heaven’s eye, falling from time to time with a swoop and a sound as if the \nheavens were rent, torn at last to very rags and tatters, and yet a seamless cope \nremained; small imps that fill the air and lay their eggs on the ground on bare sand or \nrocks on the tops of hills, where few have found them; graceful and slender like ripples \ncaught up from the pond, as leaves are raised by the wind to float in the heavens; such \nkindredship is in nature. The hawk is aerial brother of the wave which he sails over and \nsurveys, those his perfect air-inflated wings answering to the elemental unfledged \npinions of the sea. Or sometimes I watched a pair of hen-hawks circling high in the sky, \nalternately soaring and descending, approaching, and leaving one another, as if they \nwere the embodiment of my own thoughts. Or I was attracted by the passage of wild \npigeons from this wood to that, with a slight quivering winnowing sound and carrier \nhaste; or from under a rotten stump my hoe turned up a sluggish portentous and \noutlandish spotted salamander, a trace of Egypt and the Nile, yet our contemporary. \nWhen I paused to lean on my hoe, these sounds and sights I heard and saw anywhere in \nthe row, a part of the inexhaustible entertainment which the country offers. \nOn gala days the town fires its great guns, which echo like popguns to these woods, and \nsome waifs of martial music occasionally penetrate thus far. To me, away there in my \nbean-field at the other end of the town, the big guns sounded as if a puffball had burst; \nand when there was a military turnout of which I was ignorant, I have sometimes had a \nvague sense all the day of some sort of itching and disease in the horizon, as if some \neruption would break out there soon, either scarlatina or canker-rash, until at length \nsome more favorable puff of wind, making haste over the fields and up the Wayland \nroad, brought me information of the “trainers.” It seemed by the distant hum as if \nsomebody’s bees had swarmed, and that the neighbors, according to Virgil’s advice, by a \nfaint tintinnabulum upon the most sonorous of their domestic utensils, were \nendeavoring to call them down into the hive again. And when the sound died quite \naway, and the hum had ceased, and the most favorable breezes told no tale, I knew that \nthey had got the last drone of them all safely into the Middlesex hive, and that now their \nminds were bent on the honey with which it was smeared. \nI felt proud to know that the liberties of Massachusetts and of our fatherland were in \nsuch safe keeping; and as I turned to my hoeing again I was filled with an inexpressible \nconfidence, and pursued my labor cheerfully with a calm trust in the future. \nWhen there were several bands of musicians, it sounded as if all the village was a vast \nbellows and all the buildings expanded and collapsed alternately with a din. But \nsometimes it was a really noble and inspiring strain that reached these woods, and the \ntrumpet that sings of fame, and I felt as if I could spit a Mexican with a good relish — for \nwhy should we always stand for trifles? — and looked round for a woodchuck or a \nskunk to exercise my chivalry upon. These martial strains seemed as far away as \nPalestine, and reminded me of a march of crusaders in the horizon, with a slight tantivy \nand tremulous motion of the elm tree tops which overhang the village. This was one of \nthe great days; though the sky had from my clearing only the same everlastingly great \nlook that it wears daily, and I saw no difference in it. \nIt was a singular experience that long acquaintance which I cultivated with beans, what \nwith planting, and hoeing, and harvesting, and threshing, and picking over and selling "}, {"pdfPage": 82, "text": "them — the last was the hardest of all — I might add eating, for I did taste. I was \ndetermined to know beans. When they were growing, I used to hoe from five o’clock in \nthe morning till noon, and commonly spent the rest of the day about other affairs. \nConsider the intimate and curious acquaintance one makes with various kinds of weeds \n— it will bear some iteration in the account, for there was no little iteration in the labor \n— disturbing their delicate organizations so ruthlessly, and making such invidious \ndistinctions with his hoe, levelling whole ranks of one species, and sedulously \ncultivating another. That’s Roman wormwood — that’s pigweed — that’s sorrel — \nthat’s piper-grass — have at him, chop him up, turn his roots upward to the sun, don’t \nlet him have a fibre in the shade, if you do he’ll turn himself t’ other side up and be as \ngreen as a leek in two days. A long war, not with cranes, but with weeds, those Trojans \nwho had sun and rain and dews on their side. Daily the beans saw me come to their \nrescue armed with a hoe, and thin the ranks of their enemies, filling up the trenches \nwith weedy dead. Many a lusty crest — waving Hector, that towered a whole foot above \nhis crowding comrades, fell before my weapon and rolled in the dust. \nThose summer days which some of my contemporaries devoted to the fine arts in \nBoston or Rome, and others to contemplation in India, and others to trade in London or \nNew York, I thus, with the other farmers of New England, devoted to husbandry. Not \nthat I wanted beans to eat, for I am by nature a Pythagorean, so far as beans are \nconcerned, whether they mean porridge or voting, and exchanged them for rice; but, \nperchance, as some must work in fields if only for the sake of tropes and expression, to \nserve a parable-maker one day. It was on the whole a rare amusement, which, continued \ntoo long, might have become a dissipation. Though I gave them no manure, and did not \nhoe them all once, I hoed them unusualy well as far as I went, and was paid for it in the \nend, “there being in truth,” as Evelyn says, “no compost or laetation whatsoever \ncomparable to this continual motion, repastination, and turning of the mould with the \nspade.” “The earth,” he adds elsewhere, “especially if fresh, has a certain magnetism in \nit, by which it attracts the salt, power, or virtue (call it either) which gives it life, and is \nthe logic of all the labor and stir we keep about it, to sustain us; all dungings and other \nsordid temperings being but the vicars succedaneous to this improvement.” Moreover, \nthis being one of those “worn-out and exhausted lay fields which enjoy their sabbath,” \nhad perchance, as Sir Kenelm Digby thinks likely, attracted “vital spirits” from the air. I \nharvested twelve bushels of beans. \nBut to be more particular, for it is complained that Mr. Coleman has reported chiefly the \nexpensive experiments of gentlemen farmers, my outgoes were — \nFor a hoe . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .. . .$ 0.54 \nPlowing, harrowing, and furrowing . . . . . . . . . . . . 7.50Too much. \nBeans for seed . . . . . . . . . . . . . . . . . . . . . . . . . . . .. . . 3.12+ \nPotatoes for seed . . . . . . . . . . . . . . . . . . . . . . . . . . . . 1.33 \nPeas for seed . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . 0.40 \nTurnip seed . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . ..0.06 \nWhite line for crow fence . . . . . . . . . . . . . . . . . . . . 0.02 \nHorse cultivator and boy three hours . . . . . . . . .1.00 \nHorse and cart to get crop . . . . . . . . . . . . . . . .. . . 0.75 "}, {"pdfPage": 83, "text": "-------- \nIn all . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .. $14.72+ \n \nMy income was (patrem familias vendacem, non emacem esse oportet), from \nNine bushels and twelve quarts of beans sold .. $16.94 \nFive\"large potatoes . . . . . . . . . . . . . . . . . . . . . 2.50 \nNine\"small . . . . . . . . . . . . . . . . . . . . . . . . . . . . .. 2.25 \nGrass . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .. . .1.00 \nStalks . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .. 0.75 \n ------- \nIn all . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . .$23.44 \nLeaving a pecuniary profit, \nas I have elsewhere said, of . . . . . . . . . . . . .. $ 8.71+ \n \nThis is the result of my experience in raising beans: Plant the common small white bush \nbean about the first of June, in rows three feet by eighteen inches apart, being careful to \nselect fresh round and unmixed seed. First look out for worms, and supply vacancies by \nplanting anew. Then look out for woodchucks, if it is an exposed place, for they will \nnibble off the earliest tender leaves almost clean as they go; and again, when the young \ntendrils make their appearance, they have notice of it, and will shear them off with both \nbuds and young pods, sitting erect like a squirrel. But above all harvest as early as \npossible, if you would escape frosts and have a fair and salable crop; you may save much \nloss by this means. \nThis further experience also I gained: I said to myself, I will not plant beans and corn \nwith so much industry another summer, but such seeds, if the seed is not lost, as \nsincerity, truth, simplicity, faith, innocence, and the like, and see if they will not grow in \nthis soil, even with less toil and manurance, and sustain me, for surely it has not been \nexhausted for these crops. Alas! I said this to myself; but now another summer is gone, \nand another, and another, and I am obliged to say to you, Reader, that the seeds which I \nplanted, if indeed they were the seeds of those virtues, were wormeaten or had lost \ntheir vitality, and so did not come up. Commonly men will only be brave as their fathers \nwere brave, or timid. This generation is very sure to plant corn and beans each new year \nprecisely as the Indians did centuries ago and taught the first settlers to do, as if there \nwere a fate in it. I saw an old man the other day, to my astonishment, making the holes \nwith a hoe for the seventieth time at least, and not for himself to lie down in! But why \nshould not the New Englander try new adventures, and not lay so much stress on his \ngrain, his potato and grass crop, and his orchards — raise other crops than these? Why \nconcern ourselves so much about our beans for seed, and not be concerned at all about \na new generation of men? We should really be fed and cheered if when we met a man \nwe were sure to see that some of the qualities which I have named, which we all prize \nmore than those other productions, but which are for the most part broadcast and \nfloating in the air, had taken root and grown in him. Here comes such a subtile and \nineffable quality, for instance, as truth or justice, though the slightest amount or new "}, {"pdfPage": 84, "text": "variety of it, along the road. Our ambassadors should be instructed to send home such \nseeds as these, and Congress help to distribute them over all the land. We should never \nstand upon ceremony with sincerity. We should never cheat and insult and banish one \nanother by our meanness, if there were present the kernel of worth and friendliness. We \nshould not meet thus in haste. Most men I do not meet at all, for they seem not to have \ntime; they are busy about their beans. We would not deal with a man thus plodding \never, leaning on a hoe or a spade as a staff between his work, not as a mushroom, but \npartially risen out of the earth, something more than erect, like swallows alighted and \nwalking on the ground:— \n“And as he spake, his wings would now and then \nSpread, as he meant to fly, then close again —” \nso that we should suspect that we might be conversing with an angel. Bread may not \nalways nourish us; but it always does us good, it even takes stiffness out of our joints, \nand makes us supple and buoyant, when we knew not what ailed us, to recognize any \ngenerosity in man or Nature, to share any unmixed and heroic joy. \nAncient poetry and mythology suggest, at least, that husbandry was once a sacred art; \nbut it is pursued with irreverent haste and heedlessness by us, our object being to have \nlarge farms and large crops merely. We have no festival, nor procession, nor ceremony, \nnot excepting our cattle-shows and so-called Thanksgivings, by which the farmer \nexpresses a sense of the sacredness of his calling, or is reminded of its sacred origin. It is \nthe premium and the feast which tempt him. He sacrifices not to Ceres and the \nTerrestrial Jove, but to the infernal Plutus rather. By avarice and selfishness, and a \ngrovelling habit, from which none of us is free, of regarding the soil as property, or the \nmeans of acquiring property chiefly, the landscape is deformed, husbandry is degraded \nwith us, and the farmer leads the meanest of lives. He knows Nature but as a robber. \nCato says that the profits of agriculture are particularly pious or just (maximeque pius \nquaestus), and according to Varro the old Romans “called the same earth Mother and \nCeres, and thought that they who cultivated it led a pious and useful life, and that they \nalone were left of the race of King Saturn.” \nWe are wont to forget that the sun looks on our cultivated fields and on the prairies and \nforests without distinction. They all reflect and absorb his rays alike, and the former \nmake but a small part of the glorious picture which he beholds in his daily course. In his \nview the earth is all equally cultivated like a garden. Therefore we should receive the \nbenefit of his light and heat with a corresponding trust and magnanimity. What though I \nvalue the seed of these beans, and harvest that in the fall of the year? This broad field \nwhich I have looked at so long looks not to me as the principal cultivator, but away from \nme to influences more genial to it, which water and make it green. These beans have \nresults which are not harvested by me. Do they not grow for woodchucks partly? The \near of wheat (in Latin spica, obsoletely speca, from spe, hope) should not be the only \nhope of the husbandman; its kernel or grain (granum from gerendo, bearing) is not all \nthat it bears. How, then, can our harvest fail? Shall I not rejoice also at the abundance of \nthe weeds whose seeds are the granary of the birds? It matters little comparatively \nwhether the fields fill the farmer’s barns. The true husbandman will cease from anxiety, \nas the squirrels manifest no concern whether the woods will bear chestnuts this year or \nnot, and finish his labor with every day, relinquishing all claim to the produce of his \nfields, and sacrificing in his mind not only his first but his last fruits also. "}, {"pdfPage": 85, "text": "The Village \n \nAfter hoeing, or perhaps reading and writing, in the forenoon, I usually bathed again in \nthe pond, swimming across one of its coves for a stint, and washed the dust of labor \nfrom my person, or smoothed out the last wrinkle which study had made, and for the \nafternoon was absolutely free. Every day or two I strolled to the village to hear some of \nthe gossip which is incessantly going on there, circulating either from mouth to mouth, \nor from newspaper to newspaper, and which, taken in homoeopathic doses, was really \nas refreshing in its way as the rustle of leaves and the peeping of frogs. As I walked in \nthe woods to see the birds and squirrels, so I walked in the village to see the men and \nboys; instead of the wind among the pines I heard the carts rattle. In one direction from \nmy house there was a colony of muskrats in the river meadows; under the grove of elms \nand buttonwoods in the other horizon was a village of busy men, as curious to me as if \nthey had been prairie-dogs, each sitting at the mouth of its burrow, or running over to a \nneighbor’s to gossip. I went there frequently to observe their habits. The village \nappeared to me a great news room; and on one side, to support it, as once at Redding & \nCompany’s on State Street, they kept nuts and raisins, or salt and meal and other \ngroceries. Some have such a vast appetite for the former commodity, that is, the news, \nand such sound digestive organs, that they can sit forever in public avenues without \nstirring, and let it simmer and whisper through them like the Etesian winds, or as if \ninhaling ether, it only producing numbness and insensibility to pain — otherwise it \nwould often be painful to bear — without affecting the consciousness. I hardly ever \nfailed, when I rambled through the village, to see a row of such worthies, either sitting \non a ladder sunning themselves, with their bodies inclined forward and their eyes \nglancing along the line this way and that, from time to time, with a voluptuous \nexpression, or else leaning against a barn with their hands in their pockets, like \ncaryatides, as if to prop it up. They, being commonly out of doors, heard whatever was \nin the wind. These are the coarsest mills, in which all gossip is first rudely digested or \ncracked up before it is emptied into finer and more delicate hoppers within doors. I \nobserved that the vitals of the village were the grocery, the bar-room, the post-office, \nand the bank; and, as a necessary part of the machinery, they kept a bell, a big gun, and a \nfire-engine, at convenient places; and the houses were so arranged as to make the most \nof mankind, in lanes and fronting one another, so that every traveller had to run the \ngauntlet, and every man, woman, and child might get a lick at him. Of course, those who \nwere stationed nearest to the head of the line, where they could most see and be seen, \nand have the first blow at him, paid the highest prices for their places; and the few \nstraggling inhabitants in the outskirts, where long gaps in the line began to occur, and \nthe traveller could get over walls or turn aside into cow-paths, and so escape, paid a \nvery slight ground or window tax. Signs were hung out on all sides to allure him; some \nto catch him by the appetite, as the tavern and victualling cellar; some by the fancy, as \nthe dry goods store and the jeweller’s; and others by the hair or the feet or the skirts, as \nthe barber, the shoemaker, or the tailor. Besides, there was a still more terrible standing \ninvitation to call at every one of these houses, and company expected about these times. \nFor the most part I escaped wonderfully from these dangers, either by proceeding at \nonce boldly and without deliberation to the goal, as is recommended to those who run \nthe gauntlet, or by keeping my thoughts on high things, like Orpheus, who, “loudly \nsinging the praises of the gods to his lyre, drowned the voices of the Sirens, and kept out "}, {"pdfPage": 86, "text": "of danger.” Sometimes I bolted suddenly, and nobody could tell my whereabouts, for I \ndid not stand much about gracefulness, and never hesitated at a gap in a fence. I was \neven accustomed to make an irruption into some houses, where I was well entertained, \nand after learning the kernels and very last sieveful of news — what had subsided, the \nprospects of war and peace, and whether the world was likely to hold together much \nlonger — I was let out through the rear avenues, and so escaped to the woods again. \nIt was very pleasant, when I stayed late in town, to launch myself into the night, \nespecially if it was dark and tempestuous, and set sail from some bright village parlor or \nlecture room, with a bag of rye or Indian meal upon my shoulder, for my snug harbor in \nthe woods, having made all tight without and withdrawn under hatches with a merry \ncrew of thoughts, leaving only my outer man at the helm, or even tying up the helm \nwhen it was plain sailing. I had many a genial thought by the cabin fire “as I sailed.” I \nwas never cast away nor distressed in any weather, though I encountered some severe \nstorms. It is darker in the woods, even in common nights, than most suppose. I \nfrequently had to look up at the opening between the trees above the path in order to \nlearn my route, and, where there was no cart-path, to feel with my feet the faint track \nwhich I had worn, or steer by the known relation of particular trees which I felt with my \nhands, passing between two pines for instance, not more than eighteen inches apart, in \nthe midst of the woods, invariably, in the darkest night. Sometimes, after coming home \nthus late in a dark and muggy night, when my feet felt the path which my eyes could not \nsee, dreaming and absent-minded all the way, until I was aroused by having to raise my \nhand to lift the latch, I have not been able to recall a single step of my walk, and I have \nthought that perhaps my body would find its way home if its master should forsake it, as \nthe hand finds its way to the mouth without assistance. Several times, when a visitor \nchanced to stay into evening, and it proved a dark night, I was obliged to conduct him to \nthe cart-path in the rear of the house, and then point out to him the direction he was to \npursue, and in keeping which he was to be guided rather by his feet than his eyes. One \nvery dark night I directed thus on their way two young men who had been fishing in the \npond. They lived about a mile off through the woods, and were quite used to the route. A \nday or two after one of them told me that they wandered about the greater part of the \nnight, close by their own premises, and did not get home till toward morning, by which \ntime, as there had been several heavy showers in the meanwhile, and the leaves were \nvery wet, they were drenched to their skins. I have heard of many going astray even in \nthe village streets, when the darkness was so thick that you could cut it with a knife, as \nthe saying is. Some who live in the outskirts, having come to town a-shopping in their \nwagons, have been obliged to put up for the night; and gentlemen and ladies making a \ncall have gone half a mile out of their way, feeling the sidewalk only with their feet, and \nnot knowing when they turned. It is a surprising and memorable, as well as valuable \nexperience, to be lost in the woods any time. Often in a snow-storm, even by day, one \nwill come out upon a well-known road and yet find it impossible to tell which way leads \nto the village. Though he knows that he has travelled it a thousand times, he cannot \nrecognize a feature in it, but it is as strange to him as if it were a road in Siberia. By \nnight, of course, the perplexity is infinitely greater. In our most trivial walks, we are \nconstantly, though unconsciously, steering like pilots by certain well-known beacons \nand headlands, and if we go beyond our usual course we still carry in our minds the \nbearing of some neighboring cape; and not till we are completely lost, or turned round \n— for a man needs only to be turned round once with his eyes shut in this world to be \nlost — do we appreciate the vastness and strangeness of nature. Every man has to learn \nthe points of compass again as often as be awakes, whether from sleep or any "}, {"pdfPage": 87, "text": "abstraction. Not till we are lost, in other words not till we have lost the world, do we \nbegin to find ourselves, and realize where we are and the infinite extent of our relations. \nOne afternoon, near the end of the first summer, when I went to the village to get a shoe \nfrom the cobbler’s, I was seized and put into jail, because, as I have elsewhere related, I \ndid not pay a tax to, or recognize the authority of, the State which buys and sells men, \nwomen, and children, like cattle, at the door of its senate-house. I had gone down to the \nwoods for other purposes. But, wherever a man goes, men will pursue and paw him \nwith their dirty institutions, and, if they can, constrain him to belong to their desperate \nodd-fellow society. It is true, I might have resisted forcibly with more or less effect, \nmight have run “amok” against society; but I preferred that society should run “amok” \nagainst me, it being the desperate party. However, I was released the next day, obtained \nmy mended shoe, and returned to the woods in season to get my dinner of \nhuckleberries on Fair Haven Hill. I was never molested by any person but those who \nrepresented the State. I had no lock nor bolt but for the desk which held my papers, not \neven a nail to put over my latch or windows. I never fastened my door night or day, \nthough I was to be absent several days; not even when the next fall I spent a fortnight in \nthe woods of Maine. And yet my house was more respected than if it had been \nsurrounded by a file of soldiers. The tired rambler could rest and warm himself by my \nfire, the literary amuse himself with the few books on my table, or the curious, by \nopening my closet door, see what was left of my dinner, and what prospect I had of a \nsupper. Yet, though many people of every class came this way to the pond, I suffered no \nserious inconvenience from these sources, and I never missed anything but one small \nbook, a volume of Homer, which perhaps was improperly gilded, and this I trust a \nsoldier of our camp has found by this time. I am convinced, that if all men were to live as \nsimply as I then did, thieving and robbery would be unknown. These take place only in \ncommunities where some have got more than is sufficient while others have not \nenough. The Pope’s Homers would soon get properly distributed. \n“Nec bella fuerunt, \nFaginus astabat dum scyphus ante dapes.” \n“Nor wars did men molest, \nWhen only beechen bowls were in request.” \n“You who govern public affairs, what need have you to employ punishments? Love \nvirtue, and the people will be virtuous. The virtues of a superior man are like the wind; \nthe virtues of a common man are like the grass — I the grass, when the wind passes \nover it, bends.” "}, {"pdfPage": 88, "text": "The Ponds \n \nSometimes, having had a surfeit of human society and gossip, and worn out all my \nvillage friends, I rambled still farther westward than I habitually dwell, into yet more \nunfrequented parts of the town, “to fresh woods and pastures new,” or, while the sun \nwas setting, made my supper of huckleberries and blueberries on Fair Haven Hill, and \nlaid up a store for several days. The fruits do not yield their true flavor to the purchaser \nof them, nor to him who raises them for the market. There is but one way to obtain it, \nyet few take that way. If you would know the flavor of huckleberries, ask the cowboy or \nthe partridge. It is a vulgar error to suppose that you have tasted huckleberries who \nnever plucked them. A huckleberry never reaches Boston; they have not been known \nthere since they grew on her three hills. The ambrosial and essential part of the fruit is \nlost with the bloom which is rubbed off in the market cart, and they become mere \nprovender. As long as Eternal Justice reigns, not one innocent huckleberry can be \ntransported thither from the country’s hills. \nOccasionally, after my hoeing was done for the day, I joined some impatient companion \nwho had been fishing on the pond since morning, as silent and motionless as a duck or a \nfloating leaf, and, after practising various kinds of philosophy, had concluded commonly, \nby the time I arrived, that he belonged to the ancient sect of Coenobites. There was one \nolder man, an excellent fisher and skilled in all kinds of woodcraft, who was pleased to \nlook upon my house as a building erected for the convenience of fishermen; and I was \nequally pleased when he sat in my doorway to arrange his lines. Once in a while we sat \ntogether on the pond, he at one end of the boat, and I at the other; but not many words \npassed between us, for he had grown deaf in his later years, but he occasionally \nhummed a psalm, which harmonized well enough with my philosophy. Our intercourse \nwas thus altogether one of unbroken harmony, far more pleasing to remember than if it \nhad been carried on by speech. When, as was commonly the case, I had none to \ncommune with, I used to raise the echoes by striking with a paddle on the side of my \nboat, filling the surrounding woods with circling and dilating sound, stirring them up as \nthe keeper of a menagerie his wild beasts, until I elicited a growl from every wooded \nvale and hillside. \nIn warm evenings I frequently sat in the boat playing the flute, and saw the perch, which \nI seem to have charmed, hovering around me, and the moon travelling over the ribbed \nbottom, which was strewed with the wrecks of the forest. Formerly I had come to this \npond adventurously, from time to time, in dark summer nights, with a companion, and, \nmaking a fire close to the water’s edge, which we thought attracted the fishes, we caught \npouts with a bunch of worms strung on a thread, and when we had done, far in the \nnight, threw the burning brands high into the air like skyrockets, which, coming down \ninto the pond, were quenched with a loud hissing, and we were suddenly groping in \ntotal darkness. Through this, whistling a tune, we took our way to the haunts of men \nagain. But now I had made my home by the shore. \nSometimes, after staying in a village parlor till the family had all retired, I have returned \nto the woods, and, partly with a view to the next day’s dinner, spent the hours of \nmidnight fishing from a boat by moonlight, serenaded by owls and foxes, and hearing, \nfrom time to time, the creaking note of some unknown bird close at hand. These "}, {"pdfPage": 89, "text": "experiences were very memorable and valuable to me — anchored in forty feet of \nwater, and twenty or thirty rods from the shore, surrounded sometimes by thousands of \nsmall perch and shiners, dimpling the surface with their tails in the moonlight, and \ncommunicating by a long flaxen line with mysterious nocturnal fishes which had their \ndwelling forty feet below, or sometimes dragging sixty feet of line about the pond as I \ndrifted in the gentle night breeze, now and then feeling a slight vibration along it, \nindicative of some life prowling about its extremity, of dull uncertain blundering \npurpose there, and slow to make up its mind. At length you slowly raise, pulling hand \nover hand, some horned pout
