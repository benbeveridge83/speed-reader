squeaking and squirming to the upper air. It was very \nqueer, especially in dark nights, when your thoughts had wandered to vast and \ncosmogonal themes in other spheres, to feel this faint jerk, which came to interrupt your \ndreams and link you to Nature again. It seemed as if I might next cast my line upward \ninto the air, as well as downward into this element, which was scarcely more dense. \nThus I caught two fishes as it were with one hook. \nThe scenery of Walden is on a humble scale, and, though very beautiful, does not \napproach to grandeur, nor can it much concern one who has not long frequented it or \nlived by its shore; yet this pond is so remarkable for its depth and purity as to merit a \nparticular description. It is a clear and deep green well, half a mile long and a mile and \nthree quarters in circumference, and contains about sixty-one and a half acres; a \nperennial spring in the midst of pine and oak woods, without any visible inlet or outlet \nexcept by the clouds and evaporation. The surrounding hills rise abruptly from the \nwater to the height of forty to eighty feet, though on the southeast and east they attain \nto about one hundred and one hundred and fifty feet respectively, within a quarter and \na third of a mile. They are exclusively woodland. All our Concord waters have two colors \nat least; one when viewed at a distance, and another, more proper, close at hand. The \nfirst depends more on the light, and follows the sky. In clear weather, in summer, they \nappear blue at a little distance, especially if agitated, and at a great distance all appear \nalike. In stormy weather they are sometimes of a dark slate-color. The sea, however, is \nsaid to be blue one day and green another without any perceptible change in the \natmosphere. I have seen our river, when, the landscape being covered with snow, both \nwater and ice were almost as green as grass. Some consider blue “to be the color of pure \nwater, whether liquid or solid.” But, looking directly down into our waters from a boat, \nthey are seen to be of very different colors. Walden is blue at one time and green at \nanother, even from the same point of view. Lying between the earth and the heavens, it \npartakes of the color of both. Viewed from a hilltop it reflects the color of the sky; but \nnear at hand it is of a yellowish tint next the shore where you can see the sand, then a \nlight green, which gradually deepens to a uniform dark green in the body of the pond. In \nsome lights, viewed even from a hilltop, it is of a vivid green next the shore. Some have \nreferred this to the reflection of the verdure; but it is equally green there against the \nrailroad sandbank, and in the spring, before the leaves are expanded, and it may be \nsimply the result of the prevailing blue mixed with the yellow of the sand. Such is the \ncolor of its iris. This is that portion, also, where in the spring, the ice being warmed by \nthe heat of the sun reflected from the bottom, and also transmitted through the earth, \nmelts first and forms a narrow canal about the still frozen middle. Like the rest of our \nwaters, when much agitated, in clear weather, so that the surface of the waves may \nreflect the sky at the right angle, or because there is more light mixed with it, it appears \nat a little distance of a darker blue than the sky itself; and at such a time, being on its \nsurface, and looking with divided vision, so as to see the reflection, I have discerned a \nmatchless and indescribable light blue, such as watered or changeable silks and sword "}, {"pdfPage": 90, "text": "blades suggest, more cerulean than the sky itself, alternating with the original dark \ngreen on the opposite sides of the waves, which last appeared but muddy in \ncomparison. It is a vitreous greenish blue, as I remember it, like those patches of the \nwinter sky seen through cloud vistas in the west before sundown. Yet a single glass of \nits water held up to the light is as colorless as an equal quantity of air. It is well known \nthat a large plate of glass will have a green tint, owing, as the makers say, to its “body,” \nbut a small piece of the same will be colorless. How large a body of Walden water would \nbe required to reflect a green tint I have never proved. The water of our river is black or \na very dark brown to one looking directly down on it, and, like that of most ponds, \nimparts to the body of one bathing in it a yellowish tinge; but this water is of such \ncrystalline purity that the body of the bather appears of an alabaster whiteness, still \nmore unnatural, which, as the limbs are magnified and distorted withal, produces a \nmonstrous effect, making fit studies for a Michael Angelo. \nThe water is so transparent that the bottom can easily be discerned at the depth of \ntwenty-five or thirty feet. Paddling over it, you may see, many feet beneath the surface, \nthe schools of perch and shiners, perhaps only an inch long, yet the former easily \ndistinguished by their transverse bars, and you think that they must be ascetic fish that \nfind a subsistence there. Once, in the winter, many years ago, when I had been cutting \nholes through the ice in order to catch pickerel, as I stepped ashore I tossed my axe back \non to the ice, but, as if some evil genius had directed it, it slid four or five rods directly \ninto one of the holes, where the water was twenty-five feet deep. Out of curiosity, I lay \ndown on the ice and looked through the hole, until I saw the axe a little on one side, \nstanding on its head, with its helve erect and gently swaying to and fro with the pulse of \nthe pond; and there it might have stood erect and swaying till in the course of time the \nhandle rotted off, if I had not disturbed it. Making another hole directly over it with an \nice chisel which I had, and cutting down the longest birch which I could find in the \nneighborhood with my knife, I made a slip-noose, which I attached to its end, and, \nletting it down carefully, passed it over the knob of the handle, and drew it by a line \nalong the birch, and so pulled the axe out again. \nThe shore is composed of a belt of smooth rounded white stones like paving-stones, \nexcepting one or two short sand beaches, and is so steep that in many places a single \nleap will carry you into water over your head; and were it not for its remarkable \ntransparency, that would be the last to be seen of its bottom till it rose on the opposite \nside. Some think it is bottomless. It is nowhere muddy, and a casual observer would say \nthat there were no weeds at all in it; and of noticeable plants, except in the little \nmeadows recently overflowed, which do not properly belong to it, a closer scrutiny does \nnot detect a flag nor a bulrush, nor even a lily, yellow or white, but only a few small \nheart-leaves and potamogetons, and perhaps a water-target or two; all which however a \nbather might not perceive; and these plants are clean and bright like the element they \ngrow in. The stones extend a rod or two into the water, and then the bottom is pure \nsand, except in the deepest parts, where there is usually a little sediment, probably from \nthe decay of the leaves which have been wafted on to it so many successive falls, and a \nbright green weed is brought up on anchors even in midwinter. \nWe have one other pond just like this, White Pond, in Nine Acre Corner, about two and a \nhalf miles westerly; but, though I am acquainted with most of the ponds within a dozen \nmiles of this centre I do not know a third of this pure and well-like character. Successive \nnations perchance have drank at, admired, and fathomed it, and passed away, and still \nits water is green and pellucid as ever. Not an intermitting spring! Perhaps on that "}, {"pdfPage": 91, "text": "spring morning when Adam and Eve were driven out of Eden Walden Pond was already \nin existence, and even then breaking up in a gentle spring rain accompanied with mist \nand a southerly wind, and covered with myriads of ducks and geese, which had not \nheard of the fall, when still such pure lakes sufficed them. Even then it had commenced \nto rise and fall, and had clarified its waters and colored them of the hue they now wear, \nand obtained a patent of Heaven to be the only Walden Pond in the world and distiller of \ncelestial dews. Who knows in how many unremembered nations’ literatures this has \nbeen the Castalian Fountain? or what nymphs presided over it in the Golden Age? It is a \ngem of the first water which Concord wears in her coronet. \nYet perchance the first who came to this well have left some trace of their footsteps. I \nhave been surprised to detect encircling the pond, even where a thick wood has just \nbeen cut down on the shore, a narrow shelf-like path in the steep hillside, alternately \nrising and falling, approaching and receding from the water’s edge, as old probably as \nthe race of man here, worn by the feet of aboriginal hunters, and still from time to time \nunwittingly trodden by the present occupants of the land. This is particularly distinct to \none standing on the middle of the pond in winter, just after a light snow has fallen, \nappearing as a clear undulating white line, unobscured by weeds and twigs, and very \nobvious a quarter of a mile off in many places where in summer it is hardly \ndistinguishable close at hand. The snow reprints it, as it were, in clear white type alto-\nrelievo. The ornamented grounds of villas which will one day be built here may still \npreserve some trace of this. \nThe pond rises and falls, but whether regularly or not, and within what period, nobody \nknows, though, as usual, many pretend to know. It is commonly higher in the winter and \nlower in the summer, though not corresponding to the general wet and dryness. I can \nremember when it was a foot or two lower, and also when it was at least five feet \nhigher, than when I lived by it. There is a narrow sand-bar running into it, with very \ndeep water on one side, on which I helped boil a kettle of chowder, some six rods from \nthe main shore, about the year 1824, which it has not been possible to do for twenty-\nfive years; and, on the other hand, my friends used to listen with incredulity when I told \nthem, that a few years later I was accustomed to fish from a boat in a secluded cove in \nthe woods, fifteen rods from the only shore they knew, which place was long since \nconverted into a meadow. But the pond has risen steadily for two years, and now, in the \nsummer of ‘52, is just five feet higher than when I lived there, or as high as it was thirty \nyears ago, and fishing goes on again in the meadow. This makes a difference of level, at \nthe outside, of six or seven feet; and yet the water shed by the surrounding hills is \ninsignificant in amount, and this overflow must be referred to causes which affect the \ndeep springs. This same summer the pond has begun to fall again. It is remarkable that \nthis fluctuation, whether periodical or not, appears thus to require many years for its \naccomplishment. I have observed one rise and a part of two falls, and I expect that a \ndozen or fifteen years hence the water will again be as low as I have ever known it. \nFlint’s Pond, a mile eastward, allowing for the disturbance occasioned by its inlets and \noutlets, and the smaller intermediate ponds also, sympathize with Walden, and recently \nattained their greatest height at the same time with the latter. The same is true, as far as \nmy observation goes, of White Pond. \nThis rise and fall of Walden at long intervals serves this use at least; the water standing \nat this great height for a year or more, though it makes it difficult to walk round it, kills \nthe shrubs and trees which have sprung up about its edge since the last rise — pitch \npines, birches, alders, aspens, and others — and, falling again, leaves an unobstructed "}, {"pdfPage": 92, "text": "shore; for, unlike many ponds and all waters which are subject to a daily tide, its shore \nis cleanest when the water is lowest. On the side of the pond next my house a row of \npitch pines, fifteen feet high, has been killed and tipped over as if by a lever, and thus a \nstop put to their encroachments; and their size indicates how many years have elapsed \nsince the last rise to this height. By this fluctuation the pond asserts its title to a shore, \nand thus the shore is shorn, and the trees cannot hold it by right of possession. These \nare the lips of the lake, on which no beard grows. It licks its chaps from time to time. \nWhen the water is at its height, the alders, willows, and maples send forth a mass of \nfibrous red roots several feet long from all sides of their stems in the water, and to the \nheight of three or four feet from the ground, in the effort to maintain themselves; and I \nhave known the high blueberry bushes about the shore, which commonly produce no \nfruit, bear an abundant crop under these circumstances. \nSome have been puzzled to tell how the shore became so regularly paved. My townsmen \nhave all heard the tradition — the oldest people tell me that they heard it in their youth \n— that anciently the Indians were holding a pow-wow upon a hill here, which rose as \nhigh into the heavens as the pond now sinks deep into the earth, and they used much \nprofanity, as the story goes, though this vice is one of which the Indians were never \nguilty, and while they were thus engaged the hill shook and suddenly sank, and only one \nold squaw, named Walden, escaped, and from her the pond was named. It has been \nconjectured that when the hill shook these stones rolled down its side and became the \npresent shore. It is very certain, at any rate, that once there was no pond here, and now \nthere is one; and this Indian fable does not in any respect conflict with the account of \nthat ancient settler whom I have mentioned, who remembers so well when he first came \nhere with his divining-rod, saw a thin vapor rising from the sward, and the hazel \npointed steadily downward, and he concluded to dig a well here. As for the stones, many \nstill think that they are hardly to be accounted for by the action of the waves on these \nhills; but I observe that the surrounding hills are remarkably full of the same kind of \nstones, so that they have been obliged to pile them up in walls on both sides of the \nrailroad cut nearest the pond; and, moreover, there are most stones where the shore is \nmost abrupt; so that, unfortunately, it is no longer a mystery to me. I detect the paver. If \nthe name was not derived from that of some English locality — Saffron Walden, for \ninstance — one might suppose that it was called originally Walled-in Pond. \nThe pond was my well ready dug. For four months in the year its water is as cold as it is \npure at all times; and I think that it is then as good as any, if not the best, in the town. In \nthe winter, all water which is exposed to the air is colder than springs and wells which \nare protected from it. The temperature of the pond water which had stood in the room \nwhere I sat from five o’clock in the afternoon till noon the next day, the sixth of March, \n1846, the thermometer having been up to 65x or 70x some of the time, owing partly to \nthe sun on the roof, was 42x, or one degree colder than the water of one of the coldest \nwells in the village just drawn. The temperature of the Boiling Spring the same day was \n45x, or the warmest of any water tried, though it is the coldest that I know of in \nsummer, when, beside, shallow and stagnant surface water is not mingled with it. \nMoreover, in summer, Walden never becomes so warm as most water which is exposed \nto the sun, on account of its depth. In the warmest weather I usually placed a pailful in \nmy cellar, where it became cool in the night, and remained so during the day; though I \nalso resorted to a spring in the neighborhood. It was as good when a week old as the day \nit was dipped, and had no taste of the pump. Whoever camps for a week in summer by "}, {"pdfPage": 93, "text": "the shore of a pond, needs only bury a pail of water a few feet deep in the shade of his \ncamp to be independent of the luxury of ice. \nThere have been caught in Walden pickerel, one weighing seven pounds — to say \nnothing of another which carried off a reel with great velocity, which the fisherman \nsafely set down at eight pounds because he did not see him — perch and pouts, some of \neach weighing over two pounds, shiners, chivins or roach (Leuciscus pulchellus), a very \nfew breams, and a couple of eels, one weighing four pounds — I am thus particular \nbecause the weight of a fish is commonly its only title to fame, and these are the only \neels I have heard of here; — also, I have a faint recollection of a little fish some five \ninches long, with silvery sides and a greenish back, somewhat dace-like in its character, \nwhich I mention here chiefly to link my facts to fable. Nevertheless, this pond is not very \nfertile in fish. Its pickerel, though not abundant, are its chief boast. I have seen at one \ntime lying on the ice pickerel of at least three different kinds: a long and shallow one, \nsteel-colored, most like those caught in the river; a bright golden kind, with greenish \nreflections and remarkably deep, which is the most common here; and another, golden-\ncolored, and shaped like the last, but peppered on the sides with small dark brown or \nblack spots, intermixed with a few faint blood-red ones, very much like a trout. The \nspecific name reticulatus would not apply to this; it should be guttatus rather. These are \nall very firm fish, and weigh more than their size promises. The shiners, pouts, and \nperch also, and indeed all the fishes which inhabit this pond, are much cleaner, \nhandsomer, and firmer-fleshed than those in the river and most other ponds, as the \nwater is purer, and they can easily be distinguished from them. Probably many \nichthyologists would make new varieties of some of them. There are also a clean race of \nfrogs and tortoises, and a few mussels in it; muskrats and minks leave their traces about \nit, and occasionally a travelling mud-turtle visits it. Sometimes, when I pushed off my \nboat in the morning, I disturbed a great mud-turtle which had secreted himself under \nthe boat in the night. Ducks and geese frequent it in the spring and fall, the white-bellied \nswallows (Hirundo bicolor) skim over it, and the peetweets (Totanus macularius) \n“teeter” along its stony shores all summer. I have sometimes disturbed a fish hawk \nsitting on a white pine over the water; but I doubt if it is ever profaned by the wind of a \ngull, like Fair Haven. At most, it tolerates one annual loon. These are all the animals of \nconsequence which frequent it now. \nYou may see from a boat, in calm weather, near the sandy eastern shore, where the \nwater is eight or ten feet deep, and also in some other parts of the pond, some circular \nheaps half a dozen feet in diameter by a foot in height, consisting of small stones less \nthan a hen’s egg in size, where all around is bare sand. At first you wonder if the Indians \ncould have formed them on the ice for any purpose, and so, when the ice melted, they \nsank to the bottom; but they are too regular and some of them plainly too fresh for that. \nThey are similar to those found in rivers; but as there are no suckers nor lampreys here, \nI know not by what fish they could be made. Perhaps they are the nests of the chivin. \nThese lend a pleasing mystery to the bottom. \nThe shore is irregular enough not to be monotonous. I have in my mind’s eye the \nwestern, indented with deep bays, the bolder northern, and the beautifully scalloped \nsouthern shore, where successive capes overlap each other and suggest unexplored \ncoves between. The forest has never so good a setting, nor is so distinctly beautiful, as \nwhen seen from the middle of a small lake amid hills which rise from the water’s edge; \nfor the water in which it is reflected not only makes the best foreground in such a case, \nbut, with its winding shore, the most natural and agreeable boundary to it. There is no "}, {"pdfPage": 94, "text": "rawness nor imperfection in its edge there, as where the axe has cleared a part, or a \ncultivated field abuts on it. The trees have ample room to expand on the water side, and \neach sends forth its most vigorous branch in that direction. There Nature has woven a \nnatural selvage, and the eye rises by just gradations from the low shrubs of the shore to \nthe highest trees. There are few traces of man’s hand to be seen. The water laves the \nshore as it did a thousand years ago. \nA lake is the landscape’s most beautiful and expressive feature. It is earth’s eye; looking \ninto which the beholder measures the depth of his own nature. The fluviatile trees next \nthe shore are the slender eyelashes which fringe it, and the wooded hills and cliffs \naround are its overhanging brows. \nStanding on the smooth sandy beach at the east end of the pond, in a calm September \nafternoon, when a slight haze makes the opposite shore-line indistinct, I have seen \nwhence came the expression, “the glassy surface of a lake.” When you invert your head, \nit looks like a thread of finest gossamer stretched across the valley, and gleaming \nagainst the distant pine woods, separating one stratum of the atmosphere from another. \nYou would think that you could walk dry under it to the opposite hills, and that the \nswallows which skim over might perch on it. Indeed, they sometimes dive below this \nline, as it were by mistake, and are undeceived. As you look over the pond westward \nyou are obliged to employ both your hands to defend your eyes against the reflected as \nwell as the true sun, for they are equally bright; and if, between the two, you survey its \nsurface critically, it is literally as smooth as glass, except where the skater insects, at \nequal intervals scattered over its whole extent, by their motions in the sun produce the \nfinest imaginable sparkle on it, or, perchance, a duck plumes itself, or, as I have said, a \nswallow skims so low as to touch it. It may be that in the distance a fish describes an arc \nof three or four feet in the air, and there is one bright flash where it emerges, and \nanother where it strikes the water; sometimes the whole silvery arc is revealed; or here \nand there, perhaps, is a thistle-down floating on its surface, which the fishes dart at and \nso dimple it again. It is like molten glass cooled but not congealed, and the few motes in \nit are pure and beautiful like the imperfections in glass. You may often detect a yet \nsmoother and darker water, separated from the rest as if by an invisible cobweb, boom \nof the water nymphs, resting on it. From a hilltop you can see a fish leap in almost any \npart; for not a pickerel or shiner picks an insect from this smooth surface but it \nmanifestly disturbs the equilibrium of the whole lake. It is wonderful with what \nelaborateness this simple fact is advertised — this piscine murder will out — and from \nmy distant perch I distinguish the circling undulations when they are half a dozen rods \nin diameter. You can even detect a water-bug (Gyrinus) ceaselessly progressing over the \nsmooth surface a quarter of a mile off; for they furrow the water slightly, making a \nconspicuous ripple bounded by two diverging lines, but the skaters glide over it without \nrippling it perceptibly. When the surface is considerably agitated there are no skaters \nnor water-bugs on it, but apparently, in calm days, they leave their havens and \nadventurously glide forth from the shore by short impulses till they completely cover it. \nIt is a soothing employment, on one of those fine days in the fall when all the warmth of \nthe sun is fully appreciated, to sit on a stump on such a height as this, overlooking the \npond, and study the dimpling circles which are incessantly inscribed on its otherwise \ninvisible surface amid the reflected skies and trees. Over this great expanse there is no \ndisturbance but it is thus at once gently smoothed away and assuaged, as, when a vase \nof water is jarred, the trembling circles seek the shore and all is smooth again. Not a fish \ncan leap or an insect fall on the pond but it is thus reported in circling dimples, in lines "}, {"pdfPage": 95, "text": "of beauty, as it were the constant welling up of its fountain, the gentle pulsing of its life, \nthe heaving of its breast. The thrills of joy and thrills of pain are undistinguishable. How \npeaceful the phenomena of the lake! Again the works of man shine as in the spring. Ay, \nevery leaf and twig and stone and cobweb sparkles now at mid-afternoon as when \ncovered with dew in a spring morning. Every motion of an oar or an insect produces a \nflash of light; and if an oar falls, how sweet the echo! \nIn such a day, in September or October, Walden is a perfect forest mirror, set round with \nstones as precious to my eye as if fewer or rarer. Nothing so fair, so pure, and at the \nsame time so large, as a lake, perchance, lies on the surface of the earth. Sky water. It \nneeds no fence. Nations come and go without defiling it. It is a mirror which no stone \ncan crack, whose quicksilver will never wear off, whose gilding Nature continually \nrepairs; no storms, no dust, can dim its surface ever fresh; — a mirror in which all \nimpurity presented to it sinks, swept and dusted by the sun’s hazy brush — this the \nlight dust-cloth — which retains no breath that is breathed on it, but sends its own to \nfloat as clouds high above its surface, and be reflected in its bosom still. \nA field of water betrays the spirit that is in the air. It is continually receiving new life and \nmotion from above. It is intermediate in its nature between land and sky. On land only \nthe grass and trees wave, but the water itself is rippled by the wind. I see where the \nbreeze dashes across it by the streaks or flakes of light. It is remarkable that we can look \ndown on its surface. We shall, perhaps, look down thus on the surface of air at length, \nand mark where a still subtler spirit sweeps over it. \nThe skaters and water-bugs finally disappear in the latter part of October, when the \nsevere frosts have come; and then and in November, usually, in a calm day, there is \nabsolutely nothing to ripple the surface. One November afternoon, in the calm at the end \nof a rain-storm of several days’ duration, when the sky was still completely overcast and \nthe air was full of mist, I observed that the pond was remarkably smooth, so that it was \ndifficult to distinguish its surface; though it no longer reflected the bright tints of \nOctober, but the sombre November colors of the surrounding hills. Though I passed \nover it as gently as possible, the slight undulations produced by my boat extended \nalmost as far as I could see, and gave a ribbed appearance to the reflections. But, as I \nwas looking over the surface, I saw here and there at a distance a faint glimmer, as if \nsome skater insects which had escaped the frosts might be collected there, or, \nperchance, the surface, being so smooth, betrayed where a spring welled up from the \nbottom. Paddling gently to one of these places, I was surprised to find myself \nsurrounded by myriads of small perch, about five inches long, of a rich bronze color in \nthe green water, sporting there, and constantly rising to the surface and dimpling it, \nsometimes leaving bubbles on it. In such transparent and seemingly bottomless water, \nreflecting the clouds, I seemed to be floating through the air as in a balloon, and their \nswimming impressed me as a kind of flight or hovering, as if they were a compact flock \nof birds passing just beneath my level on the right or left, their fins, like sails, set all \naround them. There were many such schools in the pond, apparently improving the \nshort season before winter would draw an icy shutter over their broad skylight, \nsometimes giving to the surface an appearance as if a slight breeze struck it, or a few \nrain-drops fell there. When I approached carelessly and alarmed them, they made a \nsudden splash and rippling with their tails, as if one had struck the water with a brushy \nbough, and instantly took refuge in the depths. At length the wind rose, the mist \nincreased, and the waves began to run, and the perch leaped much higher than before, \nhalf out of water, a hundred black points, three inches long, at once above the surface. "}, {"pdfPage": 96, "text": "Even as late as the fifth of December, one year, I saw some dimples on the surface, and \nthinking it was going to rain hard immediately, the air being fun of mist, I made haste to \ntake my place at the oars and row homeward; already the rain seemed rapidly \nincreasing, though I felt none on my cheek, and I anticipated a thorough soaking. But \nsuddenly the dimples ceased, for they were produced by the perch, which the noise of \nmy oars had seared into the depths, and I saw their schools dimly disappearing; so I \nspent a dry afternoon after all. \nAn old man who used to frequent this pond nearly sixty years ago, when it was dark \nwith surrounding forests, tells me that in those days he sometimes saw it all alive with \nducks and other water-fowl, and that there were many eagles about it. He came here a-\nfishing, and used an old log canoe which he found on the shore. It was made of two \nwhite pine logs dug out and pinned together, and was cut off square at the ends. It was \nvery clumsy, but lasted a great many years before it became water-logged and perhaps \nsank to the bottom. He did not know whose it was; it belonged to the pond. He used to \nmake a cable for his anchor of strips of hickory bark tied together. An old man, a potter, \nwho lived by the pond before the Revolution, told him once that there was an iron chest \nat the bottom, and that he had seen it. Sometimes it would come floating up to the shore; \nbut when you went toward it, it would go back into deep water and disappear. I was \npleased to hear of the old log canoe, which took the place of an Indian one of the same \nmaterial but more graceful construction, which perchance had first been a tree on the \nbank, and then, as it were, fell into the water, to float there for a generation, the most \nproper vessel for the lake. I remember that when I first looked into these depths there \nwere many large trunks to be seen indistinctly lying on the bottom, which had either \nbeen blown over formerly, or left on the ice at the last cutting, when wood was cheaper; \nbut now they have mostly disappeared. \nWhen I first paddled a boat on Walden, it was completely surrounded by thick and lofty \npine and oak woods, and in some of its coves grape-vines had run over the trees next \nthe water and formed bowers under which a boat could pass. The hills which form its \nshores are so steep, and the woods on them were then so high, that, as you looked down \nfrom the west end, it had the appearance of an amphitheatre for some land of sylvan \nspectacle. I have spent many an hour, when I was younger, floating over its surface as \nthe zephyr willed, having paddled my boat to the middle, and lying on my back across \nthe seats, in a summer forenoon, dreaming awake, until I was aroused by the boat \ntouching the sand, and I arose to see what shore my fates had impelled me to; days \nwhen idleness was the most attractive and productive industry. Many a forenoon have I \nstolen away, preferring to spend thus the most valued part of the day; for I was rich, if \nnot in money, in sunny hours and summer days, and spent them lavishly; nor do I regret \nthat I did not waste more of them in the workshop or the teacher’s desk. But since I left \nthose shores the woodchoppers have still further laid them waste, and now for many a \nyear there will be no more rambling through the aisles of the wood, with occasional \nvistas through which you see the water. My Muse may be excused if she is silent \nhenceforth. How can you expect the birds to sing when their groves are cut down? \nNow the trunks of trees on the bottom, and the old log canoe, and the dark surrounding \nwoods, are gone, and the villagers, who scarcely know where it lies, instead of going to \nthe pond to bathe or drink, are thinking to bring its water, which should be as sacred as \nthe Ganges at least, to the village in a pipe, to wash their dishes with! — to earn their \nWalden by the turning of a cock or drawing of a plug! That devilish Iron Horse, whose \near-rending neigh is heard throughout the town, has muddied the Boiling Spring with "}, {"pdfPage": 97, "text": "his foot, and he it is that has browsed off all the woods on Walden shore, that Trojan \nhorse, with a thousand men in his belly, introduced by mercenary Greeks! Where is the \ncountry’s champion, the Moore of Moore Hill, to meet him at the Deep Cut and thrust an \navenging lance between the ribs of the bloated pest? \nNevertheless, of all the characters I have known, perhaps Walden wears best, and best \npreserves its purity. Many men have been likened to it, but few deserve that honor. \nThough the woodchoppers have laid bare first this shore and then that, and the Irish \nhave built their sties by it, and the railroad has infringed on its border, and the ice-men \nhave skimmed it once, it is itself unchanged, the same water which my youthful eyes fell \non; all the change is in me. It has not acquired one permanent wrinkle after all its \nripples. It is perennially young, and I may stand and see a swallow dip apparently to \npick an insect from its surface as of yore. It struck me again tonight, as if I had not seen \nit almost daily for more than twenty years — Why, here is Walden, the same woodland \nlake that I discovered so many years ago; where a forest was cut down last winter \nanother is springing up by its shore as lustily as ever; the same thought is welling up to \nits surface that was then; it is the same liquid joy and happiness to itself and its Maker, \nay, and it may be to me. It is the work of a brave man surely, in whom there was no \nguile! He rounded this water with his hand, deepened and clarified it in his thought, and \nin his will bequeathed it to Concord. I see by its face that it is visited by the same \nreflection; and I can almost say, Walden, is it you? \nIt is no dream of mine, \nTo ornament a line; \nI cannot come nearer to God and Heaven \nThan I live to Walden even. \nI am its stony shore, \nAnd the breeze that passes o’er; \nIn the hollow of my hand \nAre its water and its sand, \nAnd its deepest resort \nLies high in my thought. \nThe cars never pause to look at it; yet I fancy that the engineers and firemen and \nbrakemen, and those passengers who have a season ticket and see it often, are better \nmen for the sight. The engineer does not forget at night, or his nature does not, that he \nhas beheld this vision of serenity and purity once at least during the day. Though seen \nbut once, it helps to wash out State Street and the engine’s soot. One proposes that it be \ncalled “God’s Drop.” \nI have said that Walden has no visible inlet nor outlet, but it is on the one hand distantly \nand indirectly related to Flint’s Pond, which is more elevated, by a chain of small ponds \ncoming from that quarter, and on the other directly and manifestly to Concord River, \nwhich is lower, by a similar chain of ponds through which in some other geological \nperiod it may have flowed, and by a little digging, which God forbid, it can be made to \nflow thither again. If by living thus reserved and austere, like a hermit in the woods, so \nlong, it has acquired such wonderful purity, who would not regret that the \ncomparatively impure waters of Flint’s Pond should be mingled with it, or itself should \never go to waste its sweetness in the ocean wave? \nFlint’s, or Sandy Pond, in Lincoln, our greatest lake and inland sea, lies about a mile east \nof Walden. It is much larger, being said to contain one hundred and ninety-seven acres, "}, {"pdfPage": 98, "text": "and is more fertile in fish; but it is comparatively shallow, and not remarkably pure. A \nwalk through the woods thither was often my recreation. It was worth the while, if only \nto feel the wind blow on your cheek freely, and see the waves run, and remember the \nlife of mariners. I went a-chestnutting there in the fall, on windy days, when the nuts \nwere dropping into the water and were washed to my feet; and one day, as I crept along \nits sedgy shore, the fresh spray blowing in my face, I came upon the mouldering wreck \nof a boat, the sides gone, and hardly more than the impression of its flat bottom left \namid the rushes; yet its model was sharply defined, as if it were a large decayed pad, \nwith its veins. It was as impressive a wreck as one could imagine on the seashore, and \nhad as good a moral. It is by this time mere vegetable mould and undistinguishable \npond shore, through which rushes and flags have pushed up. I used to admire the ripple \nmarks on the sandy bottom, at the north end of this pond, made firm and hard to the \nfeet of the wader by the pressure of the water, and the rushes which grew in Indian file, \nin waving lines, corresponding to these marks, rank behind rank, as if the waves had \nplanted them. There also I have found, in considerable quantities, curious balls, \ncomposed apparently of fine grass or roots, of pipewort perhaps, from half an inch to \nfour inches in diameter, and perfectly spherical. These wash back and forth in shallow \nwater on a sandy bottom, and are sometimes cast on the shore. They are either solid \ngrass, or have a little sand in the middle. At first you would say that they were formed \nby the action of the waves, like a pebble; yet the smallest are made of equally coarse \nmaterials, half an inch long, and they are produced only at one season of the year. \nMoreover, the waves, I suspect, do not so much construct as wear down a material \nwhich has already acquired consistency. They preserve their form when dry for an \nindefinite period. \nFlint’s Pond! Such is the poverty of our nomenclature. What right had the unclean and \nstupid farmer, whose farm abutted on this sky water, whose shores he has ruthlessly \nlaid bare, to give his name to it? Some skin-flint, who loved better the reflecting surface \nof a dollar, or a bright cent, in which he could see his own brazen face; who regarded \neven the wild ducks which settled in it as trespassers; his fingers grown into crooked \nand bony talons from the long habit of grasping harpy-like; — so it is not named for me. \nI go not there to see him nor to hear of him; who never saw it, who never bathed in it, \nwho never loved it, who never protected it, who never spoke a good word for it, nor \nthanked God that He had made it. Rather let it be named from the fishes that swim in it, \nthe wild fowl or quadrupeds which frequent it, the wild flowers which grow by its \nshores, or some wild man or child the thread of whose history is interwoven with its \nown; not from him who could show no title to it but the deed which a like-minded \nneighbor or legislature gave him — him who thought only of its money value; whose \npresence perchance cursed all the shores; who exhausted the land around it, and would \nfain have exhausted the waters within it; who regretted only that it was not English hay \nor cranberry meadow — there was nothing to redeem it, forsooth, in his eyes — and \nwould have drained and sold it for the mud at its bottom. It did not turn his mill, and it \nwas no privilege to him to behold it. I respect not his labors, his farm where everything \nhas its price, who would carry the landscape, who would carry his God, to market, if he \ncould get anything for him; who goes to market for his god as it is; on whose farm \nnothing grows free, whose fields bear no crops, whose meadows no flowers, whose \ntrees no fruits, but dollars; who loves not the beauty of his fruits, whose fruits are not \nripe for him till they are turned to dollars. Give me the poverty that enjoys true wealth. \nFarmers are respectable and interesting to me in proportion as they are poor — poor \nfarmers. A model farm! where the house stands like a fungus in a muckheap, chambers "}, {"pdfPage": 99, "text": "for men horses, oxen, and swine, cleansed and uncleansed, all contiguous to one \nanother! Stocked with men! A great grease-spot, redolent of manures and buttermilk! \nUnder a high state of cultivation, being manured with the hearts and brains of men! As if \nyou were to raise your potatoes in the churchyard! Such is a model farm. \nNo, no; if the fairest features of the landscape are to be named after men, let them be the \nnoblest and worthiest men alone. Let our lakes receive as true names at least as the \nIcarian Sea, where “still the shore” a “brave attempt resounds.” \nGoose Pond, of small extent, is on my way to Flint’s; Fair Haven, an expansion of \nConcord River, said to contain some seventy acres, is a mile southwest; and White Pond, \nof about forty acres, is a mile and a half beyond Fair Haven. This is my lake country. \nThese, with Concord River, are my water privileges; and night and day, year in year out, \nthey grind such grist as I carry to them. \nSince the wood-cutters, and the railroad, and I myself have profaned Walden, perhaps \nthe most attractive, if not the most beautiful, of all our lakes, the gem of the woods, is \nWhite Pond; — a poor name from its commonness, whether derived from the \nremarkable purity of its waters or the color of its sands. In these as in other respects, \nhowever, it is a lesser twin of Walden. They are so much alike that you would say they \nmust be connected under ground. It has the same stony shore, and its waters are of the \nsame hue. As at Walden, in sultry dog-day weather, looking down through the woods on \nsome of its bays which are not so deep but that the reflection from the bottom tinges \nthem, its waters are of a misty bluish-green or glaucous color. Many years since I used \nto go there to collect the sand by cartloads, to make sandpaper with, and I have \ncontinued to visit it ever since. One who frequents it proposes to call it Virid Lake. \nPerhaps it might be called Yellow Pine Lake, from the following circumstance. About \nfifteen years ago you could see the top of a pitch pine, of the kind called yellow pine \nhereabouts, though it is not a distinct species, projecting above the surface in deep \nwater, many rods from the shore. It was even supposed by some that the pond had sunk, \nand this was one of the primitive forest that formerly stood there. I find that even so \nlong ago as 1792, in a “Topographical Description of the Town of Concord,” by one of its \ncitizens, in the Collections of the Massachusetts Historical Society, the author, after \nspeaking of Walden and White Ponds, adds, “In the middle of the latter may be seen, \nwhen the water is very low, a tree which appears as if it grew in the place where it now \nstands, although the roots are fifty feet below the surface of the water; the top of this \ntree is broken off, and at that place measures fourteen inches in diameter.” In the spring \nof ‘49 I talked with the man who lives nearest the pond in Sudbury, who told me that it \nwas he who got out this tree ten or fifteen years before. As near as he could remember, \nit stood twelve or fifteen rods from the shore, where the water was thirty or forty feet \ndeep. It was in the winter, and he had been getting out ice in the forenoon, and had \nresolved that in the afternoon, with the aid of his neighbors, he would take out the old \nyellow pine. He sawed a channel in the ice toward the shore, and hauled it over and \nalong and out on to the ice with oxen; but, before he had gone far in his work, he was \nsurprised to find that it was wrong end upward, with the stumps of the branches \npointing down, and the small end firmly fastened in the sandy bottom. It was about a \nfoot in diameter at the big end, and he had expected to get a good saw-log, but it was so \nrotten as to be fit only for fuel, if for that. He had some of it in his shed then. There were \nmarks of an axe and of woodpeckers on the butt. He thought that it might have been a \ndead tree on the shore, but was finally blown over into the pond, and after the top had \nbecome water-logged, while the butt-end was still dry and light, had drifted out and "}, {"pdfPage": 100, "text": "sunk wrong end up. His father, eighty years old, could not remember when it was not \nthere. Several pretty large logs may still be seen lying on the bottom, where, owing to \nthe undulation of the surface, they look like huge water snakes in motion. \nThis pond has rarely been profaned by a boat, for there is little in it to tempt a \nfisherman. Instead of the white lily, which requires mud, or the common sweet flag, the \nblue flag (Iris versicolor) grows thinly in the pure water, rising from the stony bottom \nall around the shore, where it is visited by hummingbirds in June; and the color both of \nits bluish blades and its flowers and especially their reflections, is in singular harmony \nwith the glaucous water. \nWhite Pond and Walden are great crystals on the surface of the earth, Lakes of Light. If \nthey were permanently congealed, and small enough to be clutched, they would, \nperchance, be carried off by slaves, like precious stones, to adorn the heads of \nemperors; but being liquid, and ample, and secured to us and our successors forever, we \ndisregard them, and run after the diamond of Kohinoor. They are too pure to have a \nmarket value; they contain no muck. How much more beautiful than our lives, how \nmuch more transparent than our characters, are they! We never learned meanness of \nthem. How much fairer than the pool before the farmers door, in which his ducks swim! \nHither the clean wild ducks come. Nature has no human inhabitant who appreciates her. \nThe birds with their plumage and their notes are in harmony with the flowers, but what \nyouth or maiden conspires with the wild luxuriant beauty of Nature? She flourishes \nmost alone, far from the towns where they reside. Talk of heaven! ye disgrace earth. "}, {"pdfPage": 101, "text": "Baker Farm \n \nSometimes I rambled to pine groves, standing like temples, or like fleets at sea, full-\nrigged, with wavy boughs, and rippling with light, so soft and green and shady that the \nDruids would have forsaken their oaks to worship in them; or to the cedar wood beyond \nFlint’s Pond, where the trees, covered with hoary blue berries, spiring higher and \nhigher, are fit to stand before Valhalla, and the creeping juniper covers the ground with \nwreaths full of fruit; or to swamps where the usnea lichen hangs in festoons from the \nwhite spruce trees, and toadstools, round tables of the swamp gods, cover the ground, \nand more beautiful fungi adorn the stumps, like butterflies or shells, vegetable winkles; \nwhere the swamp-pink and dogwood grow, the red alderberry glows like eyes of imps, \nthe waxwork grooves and crushes the hardest woods in its folds, and the wild holly \nberries make the beholder forget his home with their beauty, and he is dazzled and \ntempted by nameless other wild forbidden fruits, too fair for mortal taste. Instead of \ncalling on some scholar, I paid many a visit to particular trees, of kinds which are rare in \nthis neighborhood, standing far away in the middle of some pasture, or in the depths of \na wood or swamp, or on a hilltop; such as the black birch, of which we have some \nhandsome specimens two feet in diameter; its cousin, the yellow birch, with its loose \ngolden vest, perfumed like the first; the beech, which has so neat a bole and beautifully \nlichen-painted, perfect in all its details, of which, excepting scattered specimens, I know \nbut one small grove of sizable trees left in the township, supposed by some to have been \nplanted by the pigeons that were once baited with beechnuts near by; it is worth the \nwhile to see the silver grain sparkle when you split this wood; the bass; the hornbeam; \nthe Celtis occidentalis, or false elm, of which we have but one well-grown; some taller \nmast of a pine, a shingle tree, or a more perfect hemlock than usual, standing like a \npagoda in the midst of the woods; and many others I could mention. These were the \nshrines I visited both summer and winter. \nOnce it chanced that I stood in the very abutment of a rainbow’s arch, which filled the \nlower stratum of the atmosphere, tinging the grass and leaves around, and dazzling me \nas if I looked through colored crystal. It was a lake of rainbow light, in which, for a short \nwhile, I lived like a dolphin. If it had lasted longer it might have tinged my employments \nand life. As I walked on the railroad causeway, I used to wonder at the halo of light \naround my shadow, and would fain fancy myself one of the elect. One who visited me \ndeclared that the shadows of some Irishmen before him had no halo about them, that it \nwas only natives that were so distinguished. Benvenuto Cellini tells us in his memoirs, \nthat, after a certain terrible dream or vision which he had during his confinement in the \ncastle of St. Angelo a resplendent light appeared over the shadow of his head at morning \nand evening, whether he was in Italy or France, and it was particularly conspicuous \nwhen the grass was moist with dew. This was probably the same phenomenon to which \nI have referred, which is especially observed in the morning, but also at other times, and \neven by moonlight. Though a constant one, it is not commonly noticed, and, in the case \nof an excitable imagination like Cellini’s, it would be basis enough for superstition. \nBeside, he tells us that he showed it to very few. But are they not indeed distinguished \nwho are conscious that they are regarded at all? "}, {"pdfPage": 102, "text": "I set out one afternoon to go a-fishing to Fair Haven, through the woods, to eke out my \nscanty fare of vegetables. My way led through Pleasant Meadow, an adjunct of the Baker \nFarm, that retreat of which a poet has since sung, beginning — \n“Thy entry is a pleasant field, \nWhich some mossy fruit trees yield \nPartly to a ruddy brook, \nBy gliding musquash undertook, \nAnd mercurial trout, \nDarting about.” \nI thought of living there before I went to Walden. I “hooked” the apples, leaped the \nbrook, and scared the musquash and the trout. It was one of those afternoons which \nseem indefinitely long before one, in which many events may happen, a large portion of \nour natural life, though it was already half spent when I started. By the way there came \nup a shower, which compelled me to stand half an hour under a pine, piling boughs over \nmy head, and wearing my handkerchief for a shed; and when at length I had made one \ncast over the pickerelweed, standing up to my middle in water, I found myself suddenly \nin the shadow of a cloud, and the thunder began to rumble with such emphasis that I \ncould do no more than listen to it. The gods must be proud, thought I, with such forked \nflashes to rout a poor unarmed fisherman. So I made haste for shelter to the nearest hut, \nwhich stood half a mile from any road, but so much the nearer to the pond, and had long \nbeen uninhabited:— \n“And here a poet builded, \nIn the completed years, \nFor behold a trivial cabin \nThat to destruction steers.” \nSo the Muse fables. But therein, as I found, dwelt now John Field, an Irishman, and his \nwife, and several children, from the broad-faced boy who assisted his father at his work, \nand now came running by his side from the bog to escape the rain, to the wrinkled, \nsibyl-like, cone-headed infant that sat upon its father’s knee as in the palaces of nobles, \nand looked out from its home in the midst of wet and hunger inquisitively upon the \nstranger, with the privilege of infancy, not knowing but it was the last of a noble line, \nand the hope and cynosure of the world, instead of John Field’s poor starveling brat. \nThere we sat together under that part of the roof which leaked the least, while it \nshowered and thundered without. I had sat there many times of old before the ship was \nbuilt that floated his family to America. An honest, hard-working, but shiftless man \nplainly was John Field; and his wife, she too was brave to cook so many successive \ndinners in the recesses of that lofty stove; with round greasy face and bare breast, still \nthinking to improve her condition one day; with the never absent mop in one hand, and \nyet no effects of it visible anywhere. The chickens, which had also taken shelter here \nfrom the rain, stalked about the room like members of the family, too humanized, \nmethought, to roast well. They stood and looked in my eye or pecked at my shoe \nsignificantly. Meanwhile my host told me his story, how hard he worked “bogging” for a \nneighboring farmer, turning up a meadow with a spade or bog hoe at the rate of ten \ndollars an acre and the use of the land with manure for one year, and his little broad-\nfaced son worked cheerfully at his father’s side the while, not knowing how poor a \nbargain the latter had made. I tried to help him with my experience, telling him that he \nwas one of my nearest neighbors, and that I too, who came a-fishing here, and looked "}, {"pdfPage": 103, "text": "like a loafer, was getting my living like himself; that I lived in a tight, light, and clean \nhouse, which hardly cost more than the annual rent of such a ruin as his commonly \namounts to; and how, if he chose, he might in a month or two build himself a palace of \nhis own; that I did not use tea, nor coffee, nor butter, nor milk, nor fresh meat, and so \ndid not have to work to get them; again, as I did not work hard, I did not have to eat \nhard, and it cost me but a trifle for my food; but as he began with tea, and coffee, and \nbutter, and milk, and beef, he had to work hard to pay for them, and when he had \nworked hard he had to eat hard again to repair the waste of his system — and so it was \nas broad as it was long, indeed it was broader than it was long, for he was discontented \nand wasted his life into the bargain; and yet he had rated it as a gain in coming to \nAmerica, that here you could get tea, and coffee, and meat every day. But the only true \nAmerica is that country where you are at liberty to pursue such a mode of life as may \nenable you to do without these, and where the state does not endeavor to compel you to \nsustain the slavery and war and other superfluous expenses which directly or indirectly \nresult from the use of such things. For I purposely talked to him as if he were a \nphilosopher, or desired to be one. I should be glad if all the meadows on the earth were \nleft in a wild state, if that were the consequence of men’s beginning to redeem \nthemselves. A man will not need to study history to find out what is best for his own \nculture. But alas! the culture of an Irishman is an enterprise to be undertaken with a \nsort of moral bog hoe. I told him, that as he worked so hard at bogging, he required thick \nboots and stout clothing, which yet were soon soiled and worn out, but I wore light \nshoes and thin clothing, which cost not half so much, though he might think that I was \ndressed like a gentleman (which, however, was not the case), and in an hour or two, \nwithout labor, but as a recreation, I could, if I wished, catch as many fish as I should \nwant for two days, or earn enough money to support me a week. If he and his family \nwould live simply, they might all go a-huckleberrying in the summer for their \namusement. John heaved a sigh at this, and his wife stared with arms a-kimbo, and both \nappeared to be wondering if they had capital enough to begin such a course with, or \narithmetic enough to carry it through. It was sailing by dead reckoning to them, and \nthey saw not clearly how to make their port so; therefore I suppose they still take life \nbravely, after their fashion, face to face, giving it tooth and nail, not having skill to split \nits massive columns with any fine entering wedge, and rout it in detail; — thinking to \ndeal with it roughly, as one should handle a thistle. But they fight at an overwhelming \ndisadvantage — living, John Field, alas! without arithmetic, and failing so. \n“Do you ever fish?” I asked. “Oh yes, I catch a mess now and then when I am lying by; \ngood perch I catch. — “What’s your bait?” “I catch shiners with fishworms, and bait the \nperch with them.” “You’d better go now, John,” said his wife, with glistening and hopeful \nface; but John demurred. \nThe shower was now over, and a rainbow above the eastern woods promised a fair \nevening; so I took my departure. When I had got without I asked for a drink, hoping to \nget a sight of the well bottom, to complete my survey of the premises; but there, alas! \nare shallows and quicksands, and rope broken withal, and bucket irrecoverable. \nMeanwhile the right culinary vessel was selected, water was seemingly distilled, and \nafter consultation and long delay passed out to the thirsty one — not yet suffered to \ncool, not yet to settle. Such gruel sustains life here, I thought; so, shutting my eyes, and \nexcluding the motes by a skilfully directed undercurrent, I drank to genuine hospitality \nthe heartiest draught I could. I am not squeamish in such cases when manners are \nconcerned. "}, {"pdfPage": 104, "text": "As I was leaving the Irishman’s roof after the rain, bending my steps again to the pond, \nmy haste to catch pickerel, wading in retired meadows, in sloughs and bog-holes, in \nforlorn and savage places, appeared for an instant trivial to me who had been sent to \nschool and college; but as I ran down the hill toward the reddening west, with the \nrainbow over my shoulder, and some faint tinkling sounds borne to my ear through the \ncleansed air, from I know not what quarter, my Good Genius seemed to say — Go fish \nand hunt far and wide day by day — farther and wider — and rest thee by many brooks \nand hearth-sides without misgiving.  \nRemember thy Creator in the days of thy youth. Rise free from care before the dawn, \nand seek adventures. Let the noon find thee by other lakes, and the night overtake thee \neverywhere at home. There are no larger fields than these, no worthier games than may \nhere be played. Grow wild according to thy nature, like these sedges and brakes, which \nwill never become English bay. Let the thunder rumble; what if it threaten ruin to \nfarmers’ crops? That is not its errand to thee. Take shelter under the cloud, while they \nflee to carts and sheds. Let not to get a living be thy trade, but thy sport. Enjoy the land, \nbut own it not. Through want of enterprise and faith men are where they are, buying \nand selling, and spending their lives like serfs. \nO Baker Farm! \n“Landscape where the richest element \nIs a little sunshine innocent.” . . . \n“No one runs to revel \nOn thy rail-fenced lea.” . . . \n“Debate with no man hast thou, \nWith questions art never perplexed, \nAs tame at the first sight as now, \nIn thy plain russet gabardine dressed.” . . . \n“Come ye who love, \nAnd ye who hate, \nChildren of the Holy Dove, \nAnd Guy Faux of the state, \nAnd hang conspiracies \nFrom the tough rafters of the trees!” \nMen come tamely home at night only from the next field or street, where their \nhousehold echoes haunt, and their life pines because it breathes its own breath over \nagain; their shadows, morning and evening, reach farther than their daily steps. We \nshould come home from far, from adventures, and perils, and discoveries every day, \nwith new experience and character. \nBefore I had reached the pond some fresh impulse had brought out John Field, with \naltered mind, letting go “bogging” ere this sunset. But he, poor man, disturbed only a \ncouple of fins while I was catching a fair string, and he said it was his luck; but when we \nchanged seats in the boat luck changed seats too.  \nPoor John Field! — I trust he does not read this, unless he will improve by it — thinking \nto live by some derivative old-country mode in this primitive new country — to catch \nperch with shiners.  \nIt is good bait sometimes, I allow. With his horizon all his own, yet he a poor man, born \nto be poor, with his inherited Irish poverty or poor life, his Adam’s grandmother and "}, {"pdfPage": 105, "text": "boggy ways, not to rise in this world, he nor his posterity, till their wading webbed bog-\ntrotting feet get talaria to their heels. "}, {"pdfPage": 106, "text": "Higher Laws \n \nAs I came home through the woods with my string of fish, trailing my pole, it being now \nquite dark, I caught a glimpse of a woodchuck stealing across my path, and felt a strange \nthrill of savage delight, and was strongly tempted to seize and devour him raw; not that \nI was hungry then, except for that wildness which he represented. Once or twice, \nhowever, while I lived at the pond, I found myself ranging the woods, like a half-starved \nhound, with a strange abandonment, seeking some kind of venison which I might \ndevour, and no morsel could have been too savage for me. The wildest scenes had \nbecome unaccountably familiar. I found in myself, and still find, an instinct toward a \nhigher, or, as it is named, spiritual life, as do most men, and another toward a primitive \nrank and savage one, and I reverence them both. I love the wild not less than the good. \nThe wildness and adventure that are in fishing still recommended it to me. I like \nsometimes to take rank hold on life and spend my day more as the animals do. Perhaps I \nhave owed to this employment and to hunting, when quite young, my closest \nacquaintance with Nature. They early introduce us to and detain us in scenery with \nwhich otherwise, at that age, we should have little acquaintance. Fishermen, hunters, \nwoodchoppers, and others, spending their lives in the fields and woods, in a peculiar \nsense a part of Nature themselves, are often in a more favorable mood for observing \nher, in the intervals of their pursuits, than philosophers or poets even, who approach \nher with expectation. She is not afraid to exhibit herself to them. The traveller on the \nprairie is naturally a hunter, on the head waters of the Missouri and Columbia a trapper, \nand at the Falls of St. Mary a fisherman. He who is only a traveller learns things at \nsecond-hand and by the halves, and is poor authority. We are most interested when \nscience reports what those men already know practically or instinctively, for that alone \nis a true humanity, or account of human experience. \nThey mistake who assert that the Yankee has few amusements, because he has not so \nmany public holidays, and men and boys do not play so many games as they do in \nEngland, for here the more primitive but solitary amusements of hunting, fishing, and \nthe like have not yet given place to the former. Almost every New England boy among \nmy contemporaries shouldered a fowling-piece between the ages of ten and fourteen; \nand his hunting and fishing grounds were not limited, like the preserves of an English \nnobleman, but were more boundless even than those of a savage. No wonder, then, that \nhe did not oftener stay to play on the common. But already a change is taking place, \nowing, not to an increased humanity, but to an increased scarcity of game, for perhaps \nthe hunter is the greatest friend of the animals hunted, not excepting the Humane \nSociety. \nMoreover, when at the pond, I wished sometimes to add fish to my fare for variety. I \nhave actually fished from the same kind of necessity that the first fishers did. Whatever \nhumanity I might conjure up against it was all factitious, and concerned my philosophy \nmore than my feelings. I speak of fishing only now, for I had long felt differently about \nfowling, and sold my gun before I went to the woods. Not that I am less humane than \nothers, but I did not perceive that my feelings were much affected. I did not pity the \nfishes nor the worms. This was habit. As for fowling, during the last years that I carried \na gun my excuse was that I was studying ornithology, and sought only new or rare birds. \nBut I confess that I am now inclined to think that there is a finer way of studying "}, {"pdfPage": 107, "text": "ornithology than this. It requires so much closer attention to the habits of the birds, that, \nif for that reason only, I have been willing to omit the gun. Yet notwithstanding the \nobjection on the score of humanity, I am compelled to doubt if equally valuable sports \nare ever substituted for these; and when some of my friends have asked me anxiously \nabout their boys, whether they should let them hunt, I have answered, yes — \nremembering that it was one of the best parts of my education — make them hunters, \nthough sportsmen only at first, if possible, mighty hunters at last, so that they shall not \nfind game large enough for them in this or any vegetable wilderness — hunters as well \nas fishers of men. Thus far I am of the opinion of Chaucer’s nun, who \n“yave not of the text a pulled hen \nThat saith that hunters ben not holy men.” \nThere is a period in the history of the individual, as of the race, when the hunters are the \n“best men,” as the Algonquins called them. We cannot but pity the boy who has never \nfired a gun; he is no more humane, while his education has been sadly neglected. This \nwas my answer with respect to those youths who were bent on this pursuit, trusting \nthat they would soon outgrow it. No humane being, past the thoughtless age of boyhood, \nwill wantonly murder any creature which holds its life by the same tenure that he does. \nThe hare in its extremity cries like a child. I warn you, mothers, that my sympathies do \nnot always make the usual philanthropic distinctions. \nSuch is oftenest the young man’s introduction to the forest, and the most original part of \nhimself. He goes thither at first as a hunter and fisher, until at last, if he has the seeds of \na better life in him, he distinguishes his proper objects, as a poet or naturalist it may be, \nand leaves the gun and fish-pole behind. The mass of men are still and always young in \nthis respect. In some countries a hunting parson is no uncommon sight. Such a one \nmight make a good shepherd’s dog, but is far from being the Good Shepherd. I have been \nsurprised to consider that the only obvious employment, except wood-chopping, ice-\ncutting, or the like business, which ever to my knowledge detained at Walden Pond for a \nwhole half-day any of my fellow-citizens, whether fathers or children of the town, with \njust one exception, was fishing. Commonly they did not think that they were lucky, or \nwell paid for their time, unless they got a long string of fish, though they had the \nopportunity of seeing the pond all the while. They might go there a thousand times \nbefore the sediment of fishing would sink to the bottom and leave their purpose pure; \nbut no doubt such a clarifying process would be going on all the while. The Governor \nand his Council faintly remember the pond, for they went a-fishing there when they \nwere boys; but now they are too old and dignified to go a-fishing, and so they know it no \nmore forever. Yet even they expect to go to heaven at last. If the legislature regards it, it \nis chiefly to regulate the number of hooks to be used there; but they know nothing about \nthe hook of hooks with which to angle for the pond itself, impaling the legislature for a \nbait. Thus, even in civilized communities, the embryo man passes through the hunter \nstage of development. \nI have found repeatedly, of late years, that I cannot fish without falling a little in self-\nrespect. I have tried it again and again. I have skill at it, and, like many of my fellows, a \ncertain instinct for it, which revives from time to time, but always when I have done I \nfeel that it would have been better if I had not fished. I think that I do not mistake. It is a \nfaint intimation, yet so are the first streaks of morning. There is unquestionably this \ninstinct in me which belongs to the lower orders of creation; yet with every year I am \nless a fisherman, though without more humanity or even wisdom; at present I am no "}, {"pdfPage": 108, "text": "fisherman at all. But I see that if I were to live in a wilderness I should again be tempted \nto become a fisher and hunter in earnest. Beside, there is something essentially unclean \nabout this diet and all flesh, and I began to see where housework commences, and \nwhence the endeavor, which costs so much, to wear a tidy and respectable appearance \neach day, to keep the house sweet and free from all ill odors and sights. Having been my \nown butcher and scullion and cook, as well as the gentleman for whom the dishes were \nserved up, I can speak from an unusually complete experience. The practical objection \nto animal food in my case was its uncleanness; and besides, when I had caught and \ncleaned and cooked and eaten my fish, they seemed not to have fed me essentially. It \nwas insignificant and unnecessary, and cost more than it came to. A little bread or a few \npotatoes would have done as well, with less trouble and filth. Like many of my \ncontemporaries, I had rarely for many years used animal food, or tea, or coffee, etc.; not \nso much because of any ill effects which I had traced to them, as because they were not \nagreeable to my imagination. The repugnance to animal food is not the effect of \nexperience, but is an instinct. It appeared more beautiful to live low and fare hard in \nmany respects; and though I never did so, I went far enough to please my imagination. I \nbelieve that every man who has ever been earnest to preserve his higher or poetic \nfaculties in the best condition has been particularly inclined to abstain from animal \nfood, and from much food of any kind. It is a significant fact, stated by entomologists — I \nfind it in Kirby and Spence — that “some insects in their perfect state, though furnished \nwith organs of feeding, make no use of them”; and they lay it down as “a general rule, \nthat almost all insects in this state eat much less than in that of larvae. The voracious \ncaterpillar when transformed into a butterfly . . . and the gluttonous maggot when \nbecome a fly” content themselves with a drop or two of honey or some other sweet \nliquid. The abdomen under the wings of the butterfly still represents the larva. This is \nthe tidbit which tempts his insectivorous fate. The gross feeder is a man in the larva \nstate; and there are whole nations in that condition, nations without fancy or \nimagination, whose vast abdomens betray them. \nIt is hard to provide and cook so simple and clean a diet as will not offend the \nimagination; but this, I think, is to be fed when we feed the body; they should both sit \ndown at the same table. Yet perhaps this may be done. The fruits eaten temperately \nneed not make us ashamed of our appetites, nor interrupt the worthiest pursuits. But \nput an extra condiment into your dish, and it will poison you. It is not worth the while to \nlive by rich cookery. Most men would feel shame if caught preparing with their own \nhands precisely such a dinner, whether of animal or vegetable food, as is every day \nprepared for them by others. Yet till this is otherwise we are not civilized, and, if \ngentlemen and ladies, are not true men and women. This certainly suggests what \nchange is to be made. It may be vain to ask why the imagination will not be reconciled to \nflesh and fat. I am satisfied that it is not. Is it not a reproach that man is a carnivorous \nanimal? True, he can and does live, in a great measure, by preying on other animals; but \nthis is a miserable way — as any one who will go to snaring rabbits, or slaughtering \nlambs, may learn — and he will be regarded as a benefactor of his race who shall teach \nman to confine himself to a more innocent and wholesome diet. Whatever my own \npractice may be, I have no doubt that it is a part of the destiny of the human race, in its \ngradual improvement, to leave off eating animals, as surely as the savage tribes have left \noff eating each other when they came in contact with the more civilized. \nIf one listens to the faintest but constant suggestions of his genius, which are certainly \ntrue, he sees not to what extremes, or even insanity, it may lead him; and yet that way, "}, {"pdfPage": 109, "text": "as he grows more resolute and faithful, his road lies. The faintest assured objection \nwhich one healthy man feels will at length prevail over the arguments and customs of \nmankind. No man ever followed his genius till it misled him. Though the result were \nbodily weakness, yet perhaps no one can say that the consequences were to be \nregretted, for these were a life in conformity to higher principles. If the day and the \nnight are such that you greet them with joy, and life emits a fragrance like flowers and \nsweet-scented herbs, is more elastic, more starry, more immortal — that is your \nsuccess. All nature is your congratulation, and you have cause momentarily to bless \nyourself. The greatest gains and values are farthest from being appreciated. We easily \ncome to doubt if they exist. We soon forget them. They are the highest reality. Perhaps \nthe facts most astounding and most real are never communicated by man to man. The \ntrue harvest of my daily life is somewhat as intangible and indescribable as the tints of \nmorning or evening. It is a little star-dust caught, a segment of the rainbow which I have \nclutched. \nYet, for my part, I was never unusually squeamish; I could sometimes eat a fried rat with \na good relish, if it were necessary. I am glad to have drunk water so long, for the same \nreason that I prefer the natural sky to an opium-eater’s heaven. I would fain keep sober \nalways; and there are infinite degrees of drunkenness. I believe that water is the only \ndrink for a wise man; wine is not so noble a liquor; and think of dashing the hopes of a \nmorning with a cup of warm coffee, or of an evening with a dish of tea! Ah, how low I fall \nwhen I am tempted by them! Even music may be intoxicating. Such apparently slight \ncauses destroyed Greece and Rome, and will destroy England and America. Of all \nebriosity, who does not prefer to be intoxicated by the air he breathes? I have found it to \nbe the most serious objection to coarse labors long continued, that they compelled me \nto eat and drink coarsely also. But to tell the truth, I find myself at present somewhat \nless particular in these respects. I carry less religion to the table, ask no blessing; not \nbecause I am wiser than I was, but, I am obliged to confess, because, however much it is \nto be regretted, with years I have grown more coarse and indifferent. Perhaps these \nquestions are entertained only in youth, as most believe of poetry. My practice is \n“nowhere,” my opinion is here. Nevertheless I am far from regarding myself as one of \nthose privileged ones to whom the Ved refers when it says, that “he who has true faith \nin the Omnipresent Supreme Being may eat all that exists,” that is, is not bound to \ninquire what is his food, or who prepares it; and even in their case it is to be observed, \nas a Hindoo commentator has remarked, that the Vedant limits this privilege to “the \ntime of distress.” \nWho has not sometimes derived an inexpressible satisfaction from his food in which \nappetite had no share? I have been thrilled to think that I owed a mental perception to \nthe commonly gross sense of taste, that I have been inspired through the palate, that \nsome berries which I had eaten on a hillside had fed my genius. “The soul not being \nmistress of herself,” says Thseng-tseu, “one looks, and one does not see; one listens, and \none does not hear; one eats, and one does not know the savor of food.” He who \ndistinguishes the true savor of his food can never be a glutton; he who does not cannot \nbe otherwise. A puritan may go to his brown-bread crust with as gross an appetite as \never an alderman to his turtle. Not that food which entereth into the mouth defileth a \nman, but the appetite with which it is eaten. It is neither the quality nor the quantity, but \nthe devotion to sensual savors; when that which is eaten is not a viand to sustain our \nanimal, or inspire our spiritual life, but food for the worms that possess us. If the hunter \nhas a taste for mud-turtles, muskrats, and other such savage tidbits, the fine lady "}, {"pdfPage": 110, "text": "indulges a taste for jelly made of a calf’s foot, or for sardines from over the sea, and they \nare even. He goes to the mill-pond, she to her preserve-pot. The wonder is how they, \nhow you and I, can live this slimy, beastly life, eating and drinking. \nOur whole life is startlingly moral. There is never an instant’s truce between virtue and \nvice. Goodness is the only investment that never fails. In the music of the harp which \ntrembles round the world it is the insisting on this which thrills us. The harp is the \ntravelling patterer for the Universe’s Insurance Company, recommending its laws, and \nour little goodness is all the assessment that we pay. Though the youth at last grows \nindifferent, the laws of the universe are not indifferent, but are forever on the side of the \nmost sensitive. Listen to every zephyr for some reproof, for it is surely there, and he is \nunfortunate who does not hear it. We cannot touch a string or move a stop but the \ncharming moral transfixes us. Many an irksome noise, go a long way off, is heard as \nmusic, a proud, sweet satire on the meanness of our lives. \nWe are conscious of an animal in us, which awakens in proportion as our higher nature \nslumbers. It is reptile and sensual, and perhaps cannot be wholly expelled; like the \nworms which, even in life and health, occupy our bodies. Possibly we may withdraw \nfrom it, but never change its nature. I fear that it may enjoy a certain health of its own; \nthat we may be well, yet not pure. The other day I picked up the lower jaw of a hog, with \nwhite and sound teeth and tusks, which suggested that there was an animal health and \nvigor distinct from the spiritual. This creature succeeded by other means than \ntemperance and purity. “That in which men differ from brute beasts,” says Mencius, “is a \nthing very inconsiderable; the common herd lose it very soon; superior men preserve it \ncarefully.” Who knows what sort of life would result if we had attained to purity? If I \nknew so wise a man as could teach me purity I would go to seek him forthwith. “A \ncommand over our passions, and over the external senses of the body, and good acts, \nare declared by the Ved to be indispensable in the mind’s approximation to God.” Yet \nthe spirit can for the time pervade and control every member and function of the body, \nand transmute what in form is the grossest sensuality into purity and devotion. The \ngenerative energy, which, when we are loose, dissipates and makes us unclean, when \nwe are continent invigorates and inspires us. Chastity is the flowering of man; and what \nare called Genius, Heroism, Holiness, and the like, are but various fruits which succeed \nit. Man flows at once to God when the channel of purity
