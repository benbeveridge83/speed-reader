om, have the same relation to types already in the mind of man that \nastronomy has. It is an antique style, older than Greek or Egyptian. Many of the "}, {"pdfPage": 154, "text": "phenomena of Winter are suggestive of an inexpressible tenderness and fragile delicacy. \nWe are accustomed to hear this king described as a rude and boisterous tyrant; but with \nthe gentleness of a lover he adorns the tresses of Summer. \nAt the approach of spring the red squirrels got under my house, two at a time, directly \nunder my feet as I sat reading or writing, and kept up the queerest chuckling and \nchirruping and vocal pirouetting and gurgling sounds that ever were heard; and when I \nstamped they only chirruped the louder, as if past all fear and respect in their mad \npranks, defying humanity to stop them. No, you don’t — chickaree — chickaree. They \nwere wholly deaf to my arguments, or failed to perceive their force, and fell into a strain \nof invective that was irresistible. \nThe first sparrow of spring! The year beginning with younger hope than ever! The faint \nsilvery warblings heard over the partially bare and moist fields from the bluebird, the \nsong sparrow, and the red-wing, as if the last flakes of winter tinkled as they fell! What \nat such a time are histories, chronologies, traditions, and all written revelations? The \nbrooks sing carols and glees to the spring. The marsh hawk, sailing low over the \nmeadow, is already seeking the first slimy life that awakes. The sinking sound of melting \nsnow is heard in all dells, and the ice dissolves apace in the ponds. The grass flames up \non the hillsides like a spring fire — “et primitus oritur herba imbribus primoribus \nevocata” — as if the earth sent forth an inward heat to greet the returning sun; not \nyellow but green is the color of its flame; — the symbol of perpetual youth, the grass-\nblade, like a long green ribbon, streams from the sod into the summer, checked indeed \nby the frost, but anon pushing on again, lifting its spear of last year’s hay with the fresh \nlife below. It grows as steadily as the rill oozes out of the ground. It is almost identical \nwith that, for in the growing days of June, when the rills are dry, the grass-blades are \ntheir channels, and from year to year the herds drink at this perennial green stream, and \nthe mower draws from it betimes their winter supply. So our human life but dies down \nto its root, and still puts forth its green blade to eternity. \nWalden is melting apace. There is a canal two rods wide along the northerly and \nwesterly sides, and wider still at the east end. A great field of ice has cracked off from \nthe main body. I hear a song sparrow singing from the bushes on the shore — olit, olit, \nolit — chip, chip, chip, che char — che wiss, wiss, wiss. He too is helping to crack it. How \nhandsome the great sweeping curves in the edge of the ice, answering somewhat to \nthose of the shore, but more regular! It is unusually hard, owing to the recent severe but \ntransient cold, and all watered or waved like a palace floor. But the wind slides \neastward over its opaque surface in vain, till it reaches the living surface beyond. It is \nglorious to behold this ribbon of water sparkling in the sun, the bare face of the pond \nfull of glee and youth, as if it spoke the joy of the fishes within it, and of the sands on its \nshore — a silvery sheen as from the scales of a leuciscus, as it were all one active fish. \nSuch is the contrast between winter and spring. Walden was dead and is alive again. But \nthis spring it broke up more steadily, as I have said. \nThe change from storm and winter to serene and mild weather, from dark and sluggish \nhours to bright and elastic ones, is a memorable crisis which all things proclaim. It is \nseemingly instantaneous at last. Suddenly an influx of light filled my house, though the \nevening was at hand, and the clouds of winter still overhung it, and the eaves were \ndripping with sleety rain. I looked out the window, and lo! where yesterday was cold \ngray ice there lay the transparent pond already calm and full of hope as in a summer \nevening, reflecting a summer evening sky in its bosom, though none was visible "}, {"pdfPage": 155, "text": "overhead, as if it had intelligence with some remote horizon. I heard a robin in the \ndistance, the first I had heard for many a thousand years, methought, whose note I shall \nnot forget for many a thousand more — the same sweet and powerful song as of yore. O \nthe evening robin, at the end of a New England summer day! If I could ever find the twig \nhe sits upon! I mean he; I mean the twig. This at least is not the Turdus migratorius. The \npitch pines and shrub oaks about my house, which had so long drooped, suddenly \nresumed their several characters, looked brighter, greener, and more erect and alive, as \nif effectually cleansed and restored by the rain. I knew that it would not rain any more. \nYou may tell by looking at any twig of the forest, ay, at your very wood-pile, whether its \nwinter is past or not. As it grew darker, I was startled by the honking of geese flying low \nover the woods, like weary travellers getting in late from Southern lakes, and indulging \nat last in unrestrained complaint and mutual consolation. Standing at my door, I could \nbear the rush of their wings; when, driving toward my house, they suddenly spied my \nlight, and with hushed clamor wheeled and settled in the pond. So I came in, and shut \nthe door, and passed my first spring night in the woods. \nIn the morning I watched the geese from the door through the mist, sailing in the middle \nof the pond, fifty rods off, so large and tumultuous that Walden appeared like an \nartificial pond for their amusement. But when I stood on the shore they at once rose up \nwith a great flapping of wings at the signal of their commander, and when they had got \ninto rank circled about over my head, twenty-nine of them, and then steered straight to \nCanada, with a regular honk from the leader at intervals, trusting to break their fast in \nmuddier pools. A “plump” of ducks rose at the same time and took the route to the north \nin the wake of their noisier cousins. \nFor a week I heard the circling, groping clangor of some solitary goose in the foggy \nmornings, seeking its companion, and still peopling the woods with the sound of a \nlarger life than they could sustain. In April the pigeons were seen again flying express in \nsmall flocks, and in due time I heard the martins twittering over my clearing, though it \nhad not seemed that the township contained so many that it could afford me any, and I \nfancied that they were peculiarly of the ancient race that dwelt in hollow trees ere white \nmen came. In almost all climes the tortoise and the frog are among the precursors and \nheralds of this season, and birds fly with song and glancing plumage, and plants spring \nand bloom, and winds blow, to correct this slight oscillation of the poles and preserve \nthe equilibrium of nature. \nAs every season seems best to us in its turn, so the coming in of spring is like the \ncreation of Cosmos out of Chaos and the realization of the Golden Age. — \n“Eurus ad Auroram Nabathaeaque regna recessit, \nPersidaque, et radiis juga subdita matutinis.” \n“The East–Wind withdrew to Aurora and the Nabathean kingdom, \nAnd the Persian, and the ridges placed under the morning rays. \n. . .. . . . \nMan was born. Whether that Artificer of things, \nThe origin of a better world, made him from the divine seed; \nOr the earth, being recent and lately sundered from the high \nEther, retained some seeds of cognate heaven.” \nA single gentle rain makes the grass many shades greener. So our prospects brighten on \nthe influx of better thoughts. We should be blessed if we lived in the present always, and "}, {"pdfPage": 156, "text": "took advantage of every accident that befell us, like the grass which confesses the \ninfluence of the slightest dew that falls on it; and did not spend our time in atoning for \nthe neglect of past opportunities, which we call doing our duty. We loiter in winter \nwhile it is already spring. In a pleasant spring morning all men’s sins are forgiven. Such \na day is a truce to vice. While such a sun holds out to burn, the vilest sinner may return. \nThrough our own recovered innocence we discern the innocence of our neighbors. You \nmay have known your neighbor yesterday for a thief, a drunkard, or a sensualist, and \nmerely pitied or despised him, and despaired of the world; but the sun shines bright and \nwarm this first spring morning, recreating the world, and you meet him at some serene \nwork, and see how it is exhausted and debauched veins expand with still joy and bless \nthe new day, feel the spring influence with the innocence of infancy, and all his faults are \nforgotten. There is not only an atmosphere of good will about him, but even a savor of \nholiness groping for expression, blindly and ineffectually perhaps, like a new-born \ninstinct, and for a short hour the south hill-side echoes to no vulgar jest. You see some \ninnocent fair shoots preparing to burst from his gnarled rind and try another year’s life, \ntender and fresh as the youngest plant. Even he has entered into the joy of his Lord. \nWhy the jailer does not leave open his prison doors — why the judge does not dismis \nhis case — why the preacher does not dismiss his congregation! It is because they do \nnot obey the hint which God gives them, nor accept the pardon which he freely offers to \nall. \n“A return to goodness produced each day in the tranquil and beneficent breath of the \nmorning, causes that in respect to the love of virtue and the hatred of vice, one \napproaches a little the primitive nature of man, as the sprouts of the forest which has \nbeen felled. In like manner the evil which one does in the interval of a day prevents the \ngerms of virtues which began to spring up again from developing themselves and \ndestroys them. \n“After the germs of virtue have thus been prevented many times from developing \nthemselves, then the beneficent breath of evening does not suffice to preserve them. As \nsoon as the breath of evening does not suffice longer to preserve them, then the nature \nof man does not differ much from that of the brute. Men seeing the nature of this man \nlike that of the brute, think that he has never possessed the innate faculty of reason. Are \nthose the true and natural sentiments of man?” \n“The Golden Age was first created, which without any avenger \nSpontaneously without law cherished fidelity and rectitude. \nPunishment and fear were not; nor were threatening words read \nOn suspended brass; nor did the suppliant crowd fear \nThe words of their judge; but were safe without an avenger. \nNot yet the pine felled on its mountains had descended \nTo the liquid waves that it might see a foreign world, \nAnd mortals knew no shores but their own. \n. . .. . . . \nThere was eternal spring, and placid zephyrs with warm \nBlasts soothed the flowers born without seed.” "}, {"pdfPage": 157, "text": "On the 29th of April, as I was fishing from the bank of the river near the Nine–Acre-\nCorner bridge, standing on the quaking grass and willow roots, where the muskrats \nlurk, I heard a singular rattling sound, somewhat like that of the sticks which boys play \nwith their fingers, when, looking up, I observed a very slight and graceful hawk, like a \nnighthawk, alternately soaring like a ripple and tumbling a rod or two over and over, \nshowing the under side of its wings, which gleamed like a satin ribbon in the sun, or like \nthe pearly inside of a shell. This sight reminded me of falconry and what nobleness and \npoetry are associated with that sport. The Merlin it seemed to me it might be called: but \nI care not for its name. It was the most ethereal flight I had ever witnessed. It did not \nsimply flutter like a butterfly, nor soar like the larger hawks, but it sported with proud \nreliance in the fields of air; mounting again and again with its strange chuckle, it \nrepeated its free and beautiful fall, turning over and over like a kite, and then recovering \nfrom its lofty tumbling, as if it had never set its foot on terra firma. It appeared to have \nno companion in the universe — sporting there alone — and to need none but the \nmorning and the ether with which it played. It was not lonely, but made all the earth \nlonely beneath it. Where was the parent which hatched it, its kindred, and its father in \nthe heavens? The tenant of the air, it seemed related to the earth but by an egg hatched \nsome time in the crevice of a crag; — or was its native nest made in the angle of a cloud, \nwoven of the rainbow’s trimmings and the sunset sky, and lined with some soft \nmidsummer haze caught up from earth? Its eyry now some cliffy cloud. \nBeside this I got a rare mess of golden and silver and bright cupreous fishes, which \nlooked like a string of jewels. Ah! I have penetrated to those meadows on the morning of \nmany a first spring day, jumping from hummock to hummock, from willow root to \nwillow root, when the wild river valley and the woods were bathed in so pure and \nbright a light as would have waked the dead, if they had been slumbering in their \ngraves, as some suppose. There needs no stronger proof of immortality. All things must \nlive in such a light. O Death, where was thy sting? O Grave, where was thy victory, then? \nOur village life would stagnate if it were not for the unexplored forests and meadows \nwhich surround it. We need the tonic of wildness — to wade sometimes in marshes \nwhere the bittern and the meadow-hen lurk, and hear the booming of the snipe; to smell \nthe whispering sedge where only some wilder and more solitary fowl builds her nest, \nand the mink crawls with its belly close to the ground. At the same time that we are \nearnest to explore and learn all things, we require that all things be mysterious and \nunexplorable, that land and sea be infinitely wild, unsurveyed and unfathomed by us \nbecause unfathomable. We can never have enough of nature. We must be refreshed by \nthe sight of inexhaustible vigor, vast and titanic features, the sea-coast with its wrecks, \nthe wilderness with its living and its decaying trees, the thunder-cloud, and the rain \nwhich lasts three weeks and produces freshets. We need to witness our own limits \ntransgressed, and some life pasturing freely where we never wander. We are cheered \nwhen we observe the vulture feeding on the carrion which disgusts and disheartens us, \nand deriving health and strength from the repast. There was a dead horse in the hollow \nby the path to my house, which compelled me sometimes to go out of my way, especially \nin the night when the air was heavy, but the assurance it gave me of the strong appetite \nand inviolable health of Nature was my compensation for this. I love to see that Nature \nis so rife with life that myriads can be afforded to be sacrificed and suffered to prey on \none another; that tender organizations can be so serenely squashed out of existence like \npulp — tadpoles which herons gobble up, and tortoises and toads run over in the road; \nand that sometimes it has rained flesh and blood! With the liability to accident, we must "}, {"pdfPage": 158, "text": "see how little account is to be made of it. The impression made on a wise man is that of \nuniversal innocence. Poison is not poisonous after all, nor are any wounds fatal. \nCompassion is a very untenable ground. It must be expeditious. Its pleadings will not \nbear to be stereotyped. \nEarly in May, the oaks, hickories, maples, and other trees, just putting out amidst the \npine woods around the pond, imparted a brightness like sunshine to the landscape, \nespecially in cloudy days, as if the sun were breaking through mists and shining faintly \non the hillsides here and there. On the third or fourth of May I saw a loon in the pond, \nand during the first week of the month I heard the whip-poor-will, the brown thrasher, \nthe veery, the wood pewee, the chewink, and other birds. I had heard the wood thrush \nlong before. The phoebe had already come once more and looked in at my door and \nwindow, to see if my house was cavern-like enough for her, sustaining herself on \nhumming wings with clinched talons, as if she held by the air, while she surveyed the \npremises. The sulphur-like pollen of the pitch pine soon covered the pond and the \nstones and rotten wood along the shore, so that you could have collected a barrelful. \nThis is the “sulphur showers” we bear of. Even in Calidas’ drama of Sacontala, we read of \n“rills dyed yellow with the golden dust of the lotus.” And so the seasons went rolling on \ninto summer, as one rambles into higher and higher grass. \nThus was my first year’s life in the woods completed; and the second year was similar to \nit. I finally left Walden September 6th, 1847. "}, {"pdfPage": 159, "text": "Conclusion \n \nTo the sick the doctors wisely recommend a change of air and scenery. Thank Heaven, \nhere is not all the world. The buckeye does not grow in New England, and the \nmockingbird is rarely heard here. The wild goose is more of a cosmopolite than we; he \nbreaks his fast in Canada, takes a luncheon in the Ohio, and plumes himself for the night \nin a southern bayou. Even the bison, to some extent, keeps pace with the seasons \ncropping the pastures of the Colorado only till a greener and sweeter grass awaits him \nby the Yellowstone. Yet we think that if rail fences are pulled down, and stone walls \npiled up on our farms, bounds are henceforth set to our lives and our fates decided. If \nyou are chosen town clerk, forsooth, you cannot go to Tierra del Fuego this summer: but \nyou may go to the land of infernal fire nevertheless. The universe is wider than our \nviews of it. \nYet we should oftener look over the tafferel of our craft, like curious passengers, and not \nmake the voyage like stupid sailors picking oakum. The other side of the globe is but the \nhome of our correspondent. Our voyaging is only great-circle sailing, and the doctors \nprescribe for diseases of the skin merely. One hastens to southern Africa to chase the \ngiraffe; but surely that is not the game he would be after. How long, pray, would a man \nhunt giraffes if he could? Snipes and woodcocks also may afford rare sport; but I trust it \nwould be nobler game to shoot one’s self. — \n“Direct your eye right inward, and you’ll find \nA thousand regions in your mind \nYet undiscovered. Travel them, and be \nExpert in home-cosmography.” \nWhat does Africa — what does the West stand for? Is not our own interior white on the \nchart? black though it may prove, like the coast, when discovered. Is it the source of the \nNile, or the Niger, or the Mississippi, or a Northwest Passage around this continent, that \nwe would find? Are these the problems which most concern mankind? Is Franklin the \nonly man who is lost, that his wife should be so earnest to find him? Does Mr. Grinnell \nknow where he himself is? Be rather the Mungo Park, the Lewis and Clark and \nFrobisher, of your own streams and oceans; explore your own higher latitudes — with \nshiploads of preserved meats to support you, if they be necessary; and pile the empty \ncans sky-high for a sign. Were preserved meats invented to preserve meat merely? Nay, \nbe a Columbus to whole new continents and worlds within you, opening new channels, \nnot of trade, but of thought. Every man is the lord of a realm beside which the earthly \nempire of the Czar is but a petty state, a hummock left by the ice. Yet some can be \npatriotic who have no self-respect, and sacrifice the greater to the less. They love the \nsoil which makes their graves, but have no sympathy with the spirit which may still \nanimate their clay. Patriotism is a maggot in their heads. What was the meaning of that \nSouth–Sea Exploring Expedition, with all its parade and expense, but an indirect \nrecognition of the fact that there are continents and seas in the moral world to which \nevery man is an isthmus or an inlet, yet unexplored by him, but that it is easier to sail \nmany thousand miles through cold and storm and cannibals, in a government ship, with \nfive hundred men and boys to assist one, than it is to explore the private sea, the \nAtlantic and Pacific Ocean of one’s being alone. "}, {"pdfPage": 160, "text": "“Erret, et extremos alter scrutetur Iberos. \nPlus habet hic vitae, plus habet ille viae.” \nLet them wander and scrutinize the outlandish Australians. \nI have more of God, they more of the road. \nIt is not worth the while to go round the world to count the cats in Zanzibar. Yet do this \neven till you can do better, and you may perhaps find some “Symmes’ Hole” by which to \nget at the inside at last. England and France, Spain and Portugal, Gold Coast and Slave \nCoast, all front on this private sea; but no bark from them has ventured out of sight of \nland, though it is without doubt the direct way to India. If you would learn to speak all \ntongues and conform to the customs of all nations, if you would travel farther than all \ntravellers, be naturalized in all climes, and cause the Sphinx to dash her head against a \nstone, even obey the precept of the old philosopher, and Explore thyself. Herein are \ndemanded the eye and the nerve. Only the defeated and deserters go to the wars, \ncowards that run away and enlist. Start now on that farthest western way, which does \nnot pause at the Mississippi or the Pacific, nor conduct toward a wornout China or \nJapan, but leads on direct, a tangent to this sphere, summer and winter, day and night, \nsun down, moon down, and at last earth down too. \nIt is said that Mirabeau took to highway robbery “to ascertain what degree of resolution \nwas necessary in order to place one’s self in formal opposition to the most sacred laws \nof society.” He declared that “a soldier who fights in the ranks does not require half so \nmuch courage as a footpad” — “that honor and religion have never stood in the way of a \nwell-considered and a firm resolve.” This was manly, as the world goes; and yet it was \nidle, if not desperate. A saner man would have found himself often enough “in formal \nopposition” to what are deemed “the most sacred laws of society,” through obedience to \nyet more sacred laws, and so have tested his resolution without going out of his way. It \nis not for a man to put himself in such an attitude to society, but to maintain himself in \nwhatever attitude he find himself through obedience to the laws of his being, which will \nnever be one of opposition to a just government, if he should chance to meet with such. \nI left the woods for as good a reason as I went there. Perhaps it seemed to me that I had \nseveral more lives to live, and could not spare any more time for that one. It is \nremarkable how easily and insensibly we fall into a particular route, and make a beaten \ntrack for ourselves. I had not lived there a week before my feet wore a path from my \ndoor to the pond-side; and though it is five or six years since I trod it, it is still quite \ndistinct. It is true, I fear, that others may have fallen into it, and so helped to keep it \nopen. The surface of the earth is soft and impressible by the feet of men; and so with the \npaths which the mind travels. How worn and dusty, then, must be the highways of the \nworld, how deep the ruts of tradition and conformity! I did not wish to take a cabin \npassage, but rather to go before the mast and on the deck of the world, for there I could \nbest see the moonlight amid the mountains. I do not wish to go below now. \nI learned this, at least, by my experiment: that if one advances confidently in the \ndirection of his dreams, and endeavors to live the life which he has imagined, he will \nmeet with a success unexpected in common hours. He will put some things behind, will \npass an invisible boundary; new, universal, and more liberal laws will begin to establish \nthemselves around and within him; or the old laws be expanded, and interpreted in his \nfavor in a more liberal sense, and he will live with the license of a higher order of beings. \nIn proportion as he simplifies his life, the laws of the universe will appear less complex, \nand solitude will not be solitude, nor poverty poverty, nor weakness weakness. If you "}, {"pdfPage": 161, "text": "have built castles in the air, your work need not be lost; that is where they should be. \nNow put the foundations under them. \nIt is a ridiculous demand which England and America make, that you shall speak so that \nthey can understand you. Neither men nor toadstools grow so. As if that were \nimportant, and there were not enough to understand you without them. As if Nature \ncould support but one order of understandings, could not sustain birds as well as \nquadrupeds, flying as well as creeping things, and hush and whoa, which Bright can \nunderstand, were the best English. As if there were safety in stupidity alone. I fear \nchiefly lest my expression may not be extravagant enough, may not wander far enough \nbeyond the narrow limits of my daily experience, so as to be adequate to the truth of \nwhich I have been convinced. Extra vagance! it depends on how you are yarded. The \nmigrating buffalo, which seeks new pastures in another latitude, is not extravagant like \nthe cow which kicks over the pail, leaps the cowyard fence, and runs after her calf, in \nmilking time. I desire to speak somewhere without bounds; like a man in a waking \nmoment, to men in their waking moments; for I am convinced that I cannot exaggerate \nenough even to lay the foundation of a true expression. Who that has heard a strain of \nmusic feared then lest he should speak extravagantly any more forever? In view of the \nfuture or possible, we should live quite laxly and undefined in front, our outlines dim \nand misty on that side; as our shadows reveal an insensible perspiration toward the \nsun. The volatile truth of our words should continually betray the inadequacy of the \nresidual statement. Their truth is instantly translated; its literal monument alone \nremains. The words which express our faith and piety are not definite; yet they are \nsignificant and fragrant like frankincense to superior natures. \nWhy level downward to our dullest perception always, and praise that as common \nsense? The commonest sense is the sense of men asleep, which they express by snoring. \nSometimes we are inclined to class those who are once-and-a-half-witted with the half-\nwitted, because we appreciate only a third part of their wit. Some would find fault with \nthe morning red, if they ever got up early enough. “They pretend,” as I hear, “that the \nverses of Kabir have four different senses; illusion, spirit, intellect, and the exoteric \ndoctrine of the Vedas”; but in this part of the world it is considered a ground for \ncomplaint if a man’s writings admit of more than one interpretation. While England \nendeavors to cure the potato-rot, will not any endeavor to cure the brain-rot, which \nprevails so much more widely and fatally? \nI do not suppose that I have attained to obscurity, but I should be proud if no more fatal \nfault were found with my pages on this score than was found with the Walden ice. \nSouthern customers objected to its blue color, which is the evidence of its purity, as if it \nwere muddy, and preferred the Cambridge ice, which is white, but tastes of weeds. The \npurity men love is like the mists which envelop the earth, and not like the azure ether \nbeyond. \nSome are dinning in our ears that we Americans, and moderns generally, are intellectual \ndwarfs compared with the ancients, or even the Elizabethan men. But what is that to the \npurpose? A living dog is better than a dead lion. Shall a man go and hang himself \nbecause he belongs to the race of pygmies, and not be the biggest pygmy that he can? \nLet every one mind his own business, and endeavor to be what he was made. \nWhy should we be in such desperate haste to succeed and in such desperate \nenterprises? If a man does not keep pace with his companions, perhaps it is because he \nhears a different drummer. Let him step to the music which he hears, however "}, {"pdfPage": 162, "text": "measured or far away. It is not important that he should mature as soon as an apple tree \nor an oak. Shall he turn his spring into summer? If the condition of things which we \nwere made for is not yet, what were any reality which we can substitute? We will not be \nshipwrecked on a vain reality. Shall we with pains erect a heaven of blue glass over \nourselves, though when it is done we shall be sure to gaze still at the true ethereal \nheaven far above, as if the former were not? \nThere was an artist in the city of Kouroo who was disposed to strive after perfection. \nOne day it came into his mind to make a staff. Having considered that in an imperfect \nwork time is an ingredient, but into a perfect work time does not enter, he said to \nhimself, It shall be perfect in all respects, though I should do nothing else in my life. He \nproceeded instantly to the forest for wood, being resolved that it should not be made of \nunsuitable material; and as he searched for and rejected stick after stick, his friends \ngradually deserted him, for they grew old in their works and died, but he grew not older \nby a moment. His singleness of purpose and resolution, and his elevated piety, endowed \nhim, without his knowledge, with perennial youth. As he made no compromise with \nTime, Time kept out of his way, and only sighed at a distance because he could not \novercome him. Before he had found a stock in all respects suitable the city of Kouroo \nwas a hoary ruin, and he sat on one of its mounds to peel the stick. Before he had given \nit the proper shape the dynasty of the Candahars was at an end, and with the point of \nthe stick he wrote the name of the last of that race in the sand, and then resumed his \nwork. By the time he had smoothed and polished the staff Kalpa was no longer the pole-\nstar; and ere he had put on the ferule and the head adorned with precious stones, \nBrahma had awoke and slumbered many times. But why do I stay to mention these \nthings? When the finishing stroke was put to his work, it suddenly expanded before the \neyes of the astonished artist into the fairest of all the creations of Brahma. He had made \na new system in making a staff, a world with full and fair proportions; in which, though \nthe old cities and dynasties had passed away, fairer and more glorious ones had taken \ntheir places. And now he saw by the heap of shavings still fresh at his feet, that, for him \nand his work, the former lapse of time had been an illusion, and that no more time had \nelapsed than is required for a single scintillation from the brain of Brahma to fall on and \ninflame the tinder of a mortal brain. The material was pure, and his art was pure; how \ncould the result be other than wonderful? \nNo face which we can give to a matter will stead us so well at last as the truth. This alone \nwears well. For the most part, we are not where we are, but in a false position. Through \nan infinity of our natures, we suppose a case, and put ourselves into it, and hence are in \ntwo cases at the same time, and it is doubly difficult to get out. In sane moments we \nregard only the facts, the case that is. Say what you have to say, not what you ought. Any \ntruth is better than make-believe. Tom Hyde, the tinker, standing on the gallows, was \nasked if he had anything to say. “Tell the tailors,” said he, “to remember to make a knot \nin their thread before they take the first stitch.” His companion’s prayer is forgotten. \nHowever mean your life is, meet it and live it; do not shun it and call it hard names. It is \nnot so bad as you are. It looks poorest when you are richest. The fault-finder will find \nfaults even in paradise. Love your life, poor as it is. You may perhaps have some \npleasant, thrilling, glorious hours, even in a poorhouse. The setting sun is reflected from \nthe windows of the almshouse as brightly as from the rich man’s abode; the snow melts \nbefore its door as early in the spring. I do not see but a quiet mind may live as \ncontentedly there, and have as cheering thoughts, as in a palace. The town’s poor seem \nto me often to live the most independent lives of any. Maybe they are simply great "}, {"pdfPage": 163, "text": "enough to receive without misgiving. Most think that they are above being supported by \nthe town; but it oftener happens that they are not above supporting themselves by \ndishonest means, which should be more disreputable. Cultivate poverty like a garden \nherb, like sage. Do not trouble yourself much to get new things, whether clothes or \nfriends. Turn the old; return to them. Things do not change; we change. Sell your clothes \nand keep your thoughts. God will see that you do not want society. If I were confined to \na corner of a garret all my days, like a spider, the world would be just as large to me \nwhile I had my thoughts about me. The philosopher said: “From an army of three \ndivisions one can take away its general, and put it in disorder; from the man the most \nabject and vulgar one cannot take away his thought.” Do not seek so anxiously to be \ndeveloped, to subject yourself to many influences to be played on; it is all dissipation. \nHumility like darkness reveals the heavenly lights. The shadows of poverty and \nmeanness gather around us, “and lo! creation widens to our view.” We are often \nreminded that if there were bestowed on us the wealth of Croesus, our aims must still \nbe the same, and our means essentially the same. Moreover, if you are restricted in your \nrange by poverty, if you cannot buy books and newspapers, for instance, you are but \nconfined to the most significant and vital experiences; you are compelled to deal with \nthe material which yields the most sugar and the most starch. It is life near the bone \nwhere it is sweetest. You are defended from being a trifler. No man loses ever on a \nlower level by magnanimity on a higher. Superfluous wealth can buy superfluities only. \nMoney is not required to buy one necessary of the soul. \nI live in the angle of a leaden wall, into whose composition was poured a little alloy of \nbell-metal. Often, in the repose of my mid-day, there reaches my ears a confused \ntintinnabulum from without. It is the noise of my contemporaries. My neighbors tell me \nof their adventures with famous gentlemen and ladies, what notabilities they met at the \ndinner-table; but I am no more interested in such things than in the contents of the \nDaily Times. The interest and the conversation are about costume and manners chiefly; \nbut a goose is a goose still, dress it as you will. They tell me of California and Texas, of \nEngland and the Indies, of the Hon. Mr. —— of Georgia or of Massachusetts, all transient \nand fleeting phenomena, till I am ready to leap from their court-yard like the Mameluke \nbey. I delight to come to my bearings — not walk in procession with pomp and parade, \nin a conspicuous place, but to walk even with the Builder of the universe, if I may — not \nto live in this restless, nervous, bustling, trivial Nineteenth Century, but stand or sit \nthoughtfully while it goes by. What are men celebrating? They are all on a committee of \narrangements, and hourly expect a speech from somebody. God is only the president of \nthe day, and Webster is his orator. I love to weigh, to settle, to gravitate toward that \nwhich most strongly and rightfully attracts me — not hang by the beam of the scale and \ntry to weigh less — not suppose a case, but take the case that is; to travel the only path I \ncan, and that on which no power can resist me. It affords me no satisfaction to \ncommerce to spring an arch before I have got a solid foundation. Let us not play at \nkittly-benders. There is a solid bottom everywhere. We read that the traveller asked the \nboy if the swamp before him had a hard bottom. The boy replied that it had. But \npresently the traveller’s horse sank in up to the girths, and he observed to the boy, “I \nthought you said that this bog had a hard bottom.” “So it has,” answered the latter, “but \nyou have not got half way to it yet.” So it is with the bogs and quicksands of society; but \nhe is an old boy that knows it. Only what is thought, said, or done at a certain rare \ncoincidence is good. I would not be one of those who will foolishly drive a nail into mere \nlath and plastering; such a deed would keep me awake nights. Give me a hammer, and \nlet me feel for the furring. Do not depend on the putty. Drive a nail home and clinch it so "}, {"pdfPage": 164, "text": "faithfully that you can wake up in the night and think of your work with satisfaction — a \nwork at which you would not be ashamed to invoke the Muse. So will help you God, and \nso only. Every nail driven should be as another rivet in the machine of the universe, you \ncarrying on the work. \nRather than love, than money, than fame, give me truth. I sat at a table where were rich \nfood and wine in abundance, and obsequious attendance, but sincerity and truth were \nnot; and I went away hungry from the inhospitable board. The hospitality was as cold as \nthe ices. I thought that there was no need of ice to freeze them. They talked to me of the \nage of the wine and the fame of the vintage; but I thought of an older, a newer, and purer \nwine, of a more glorious vintage, which they had not got, and could not buy. The style, \nthe house and grounds and “entertainment” pass for nothing with me. I called on the \nking, but he made me wait in his hall, and conducted like a man incapacitated for \nhospitality. There was a man in my neighborhood who lived in a hollow tree. His \nmanners were truly regal. I should have done better had I called on him. \nHow long shall we sit in our porticoes practising idle and musty virtues, which any work \nwould make impertinent? As if one were to begin the day with long-suffering, and hire a \nman to hoe his potatoes; and in the afternoon go forth to practise Christian meekness \nand charity with goodness aforethought! Consider the China pride and stagnant self-\ncomplacency of mankind. This generation inclines a little to congratulate itself on being \nthe last of an illustrious line; and in Boston and London and Paris and Rome, thinking of \nits long descent, it speaks of its progress in art and science and literature with \nsatisfaction. There are the Records of the Philosophical Societies, and the public \nEulogies of Great Men! It is the good Adam contemplating his own virtue. “Yes, we have \ndone great deeds, and sung divine songs, which shall never die” — that is, as long as we \ncan remember them. The learned societies and great men of Assyria — where are they? \nWhat youthful philosophers and experimentalists we are! There is not one of my \nreaders who has yet lived a whole human life. These may be but the spring months in \nthe life of the race. If we have had the seven-years’ itch, we have not seen the seventeen-\nyear locust yet in Concord. We are acquainted with a mere pellicle of the globe on which \nwe live. Most have not delved six feet beneath the surface, nor leaped as many above it. \nWe know not where we are. Beside, we are sound asleep nearly half our time. Yet we \nesteem ourselves wise, and have an established order on the surface. Truly, we are deep \nthinkers, we are ambitious spirits! As I stand over the insect crawling amid the pine \nneedles on the forest floor, and endeavoring to conceal itself from my sight, and ask \nmyself why it will cherish those humble thoughts, and bide its head from me who might, \nperhaps, be its benefactor, and impart to its race some cheering information, I am \nreminded of the greater Benefactor and Intelligence that stands over me the human \ninsect. \nThere is an incessant influx of novelty into the world, and yet we tolerate incredible \ndulness. I need only suggest what kind of sermons are still listened to in the most \nenlightened countries. There are such words as joy and sorrow, but they are only the \nburden of a psalm, sung with a nasal twang, while we believe in the ordinary and mean. \nWe think that we can change our clothes only. It is said that the British Empire is very \nlarge and respectable, and that the United States are a first-rate power. We do not \nbelieve that a tide rises and falls behind every man which can float the British Empire \nlike a chip, if he should ever harbor it in his mind. Who knows what sort of seventeen-\nyear locust will next come out of the ground? The government of the world I live in was \nnot framed, like that of Britain, in after-dinner conversations over the wine. "}, {"pdfPage": 165, "text": "The life in us is like the water in the river. It may rise this year higher than man has ever \nknown it, and flood the parched uplands; even this may be the eventful year, which will \ndrown out all our muskrats. It was not always dry land where we dwell. I see far inland \nthe banks which the stream anciently washed, before science began to record its \nfreshets. Every one has heard the story which has gone the rounds of New England, of a \nstrong and beautiful bug which came out of the dry leaf of an old table of apple-tree \nwood, which had stood in a farmer’s kitchen for sixty years, first in Connecticut, and \nafterward in Massachusetts — from an egg deposited in the living tree many years \nearlier still, as appeared by counting the annual layers beyond it; which was heard \ngnawing out for several weeks, hatched perchance by the heat of an urn. Who does not \nfeel his faith in a resurrection and immortality strengthened by hearing of this? Who \nknows what beautiful and winged life, whose egg has been buried for ages under many \nconcentric layers of woodenness in the dead dry life of society, deposited at first in the \nalburnum of the green and living tree, which has been gradually converted into the \nsemblance of its well-seasoned tomb — heard perchance gnawing out now for years by \nthe astonished family of man, as they sat round the festive board — may unexpectedly \ncome forth from amidst society’s most trivial and handselled furniture, to enjoy its \nperfect summer life at last! \nI do not say that John or Jonathan will realize all this; but such is the character of that \nmorrow which mere lapse of time can never make to dawn. The light which puts out our \neyes is darkness to us. Only that day dawns to which we are awake. There is more day to \ndawn. The sun is but a morning star. "}], "chapters": [{"title": "Economy", "pdfPage": 5}, {"title": "Where I Lived, And What I Lived For", "pdfPage": 43}, {"title": "Reading", "pdfPage": 52}, {"title": "Sounds", "pdfPage": 58}, {"title": "Solitude", "pdfPage": 67}, {"title": "Visitors", "pdfPage": 72}, {"title": "The Bean-Field", "pdfPage": 79}, {"title": "The Village", "pdfPage": 85}, {"title": "The Ponds", "pdfPage": 88}, {"title": "Baker Farm", "pdfPage": 101}, {"title": "Higher Laws", "pdfPage": 106}, {"title": "Brute Neighbors", "pdfPage": 113}, {"title": "House-Warming", "pdfPage": 120}, {"title": "Former Inhabitants And Winter Visitors", "pdfPage": 129}, {"title": "Winter Animals", "pdfPage": 136}, {"title": "The Pond In Winter", "pdfPage": 141}, {"title": "Spring", "pdfPage": 149}, {"title": "Conclusion", "pdfPage": 159}]};

const state={playing:false,timer:null,raf:null,index:0,lines:[],sessionStart:null};
const pages=BOOK.pages;
const fullText=pages.map(p => `[PDF page ${p.pdfPage}]\n${p.text}`).join('\n\n');
const words=fullText.trim().split(/\s+/).filter(Boolean);
const wordPage=[]; let count=0;
for(const p of pages){ const n=(`[PDF page ${p.pdfPage}]\n${p.text}`).trim().split(/\s+/).filter(Boolean).length; for(let i=0;i<n;i++) wordPage[count++]=p.pdfPage; }
for(const ch of BOOK.chapters){ ch.wordIndex = wordPage.findIndex(pg=>pg>=ch.pdfPage); if(ch.wordIndex<0) ch.wordIndex=0; }
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'{}')}catch{return {}}}
function save(extra={}){ const safeIndex=Math.max(0,Math.min(words.length,Math.round(Number(state.index)||0))); state.index=safeIndex; const d={...load(), index:safeIndex, updatedAt:new Date().toISOString(), ...extra}; localStorage.setItem(KEY,JSON.stringify(d)); }
function addLog(reason='pause'){ const d=load(); const log=d.log||[]; const ch=currentChapter(); log.unshift({time:new Date().toISOString(), index:state.index, page:currentPage(), chapter:ch.title, reason}); d.log=log.slice(0,60); d.index=state.index; d.updatedAt=new Date().toISOString(); localStorage.setItem(KEY,JSON.stringify(d)); renderLog(); }
function currentPage(){ return wordPage[Math.min(state.index,wordPage.length-1)]||1; }
function currentChapter(){ let cur=BOOK.chapters[0]; for(const ch of BOOK.chapters) if(state.index>=ch.wordIndex) cur=ch; return cur; }
function clamp(){ els.wpm.value=Math.max(50,Math.min(3000,+els.wpm.value||350)); els.chunk.value=Math.max(1,Math.min(20,+els.chunk.value||3)); }
function wordDelay(){clamp(); return 60000/+els.wpm.value;}
function chunkDelay(){return wordDelay()*+els.chunk.value;}
function update(){ const pct=Math.min(100,state.index/words.length*100); els.fill.style.width=pct+'%'; const ch=currentChapter(); els.chapterBadge.textContent=ch.title; els.meta.textContent=`PDF page ${currentPage()} / 165 · word ${state.index.toLocaleString()} / ${words.length.toLocaleString()} · ${Math.round(pct)}%`; highlightChapter(); }
function renderChapters(){ els.chapters.innerHTML=''; BOOK.chapters.forEach(ch=>{ const b=document.createElement('button'); b.className='chapter'; b.textContent=`${ch.title} · p. ${ch.pdfPage}`; b.onclick=()=>{pause(false); state.index=ch.wordIndex; save(); render();}; els.chapters.appendChild(b); }); }
function highlightChapter(){ const ch=currentChapter(); [...els.chapters.children].forEach((b,i)=>b.classList.toggle('active',BOOK.chapters[i]===ch)); }
function renderLog(){ const log=(load().log||[]); els.log.innerHTML=log.length?'':'<div class="muted">No sessions yet.</div>'; log.forEach(item=>{ const div=document.createElement('div'); div.className='log-item'; const date=new Date(item.time).toLocaleString(); div.innerHTML=`<strong>${date}</strong><br><span class="muted">${item.chapter} · page ${item.page} · word ${item.index.toLocaleString()}</span><button>Resume here</button>`; div.querySelector('button').onclick=()=>{pause(false); state.index=item.index; save(); render();}; els.log.appendChild(div); }); }
function clearTimers(){ if(state.timer) clearTimeout(state.timer); if(state.raf) cancelAnimationFrame(state.raf); state.timer=null; state.raf=null; const cover=els.reader.querySelector('.cover'); if(cover)cover.remove(); const win=els.reader.querySelector('.line-window'); if(win)win.remove(); const page=$('page'); if(page){page.classList.remove('window-mode'); page.querySelectorAll('.current-line,.current-word').forEach(s=>s.classList.remove('current-line','current-word'));} }
function render(){ clearTimers(); update(); if(els.mode.value==='rsvp') renderRsvp(); else renderPage(); }
function renderRsvp(){ const n=+els.chunk.value; els.reader.innerHTML='<div class="rsvp"></div>'; els.reader.querySelector('.rsvp').textContent=words.slice(state.index,state.index+n).join(' ')||'Done'; update(); }
function buildPage(startIndex=state.index){
  const page=document.createElement('div');
  page.id='page';
  page.className='page';
  page.style.fontSize=els.font.value+'px';
  page.style.lineHeight=els.lh.value;
  const start=Math.max(0,Math.min(words.length-1,Math.round(Number(startIndex)||0)));
  let lastPage=null;
  for(let i=start;i<words.length;i++){
    const pg=wordPage[i]||lastPage||1;
    if(pg!==lastPage){
      const marker=document.createElement('div');
      marker.className='page-marker';
      marker.textContent='PDF page '+pg;
      page.appendChild(marker);
      lastPage=pg;
    }
    const span=document.createElement('span');
    span.textContent=words[i];
    span.dataset.wordIndex=i;
    if(i===start) span.classList.add('current-word');
    page.appendChild(span);
    page.appendChild(document.createTextNode(' '));
  }
  return page;
}
function renderPage(){
  els.reader.innerHTML='';
  els.reader.scrollTop=0;
  els.reader.appendChild(buildPage(state.index));
  update();
}
function scrollToWord(){
  const page=$('page');
  if(!page)return;
  const targetIndex=Math.max(0,Math.min(words.length-1,state.index));
  let target=page.querySelector(`span[data-word-index="${targetIndex}"]`)||page.querySelector('span[data-word-index]');
  if(!target)return;
  page.querySelectorAll('.current-word').forEach(s=>s.classList.remove('current-word'));
  target.classList.add('current-word');
  els.reader.scrollTop=0;
}
function play(){ if(state.playing) return; const d=load(); if(Number.isFinite(+d.index)) state.index=Math.max(0,Math.min(words.length,+d.index)); update(); state.playing=true; state.sessionStart=state.sessionStart||new Date().toISOString(); if(els.mode.value==='rsvp') playRsvp(); if(els.mode.value==='cover') playCover(); if(els.mode.value==='window') playWindow(); }
function pause(log=true){ const was=state.playing; state.playing=false; save(); clearTimers(); if(log && was) addLog('pause'); update(); }
function playRsvp(){ if(!state.playing)return; if(state.index>=words.length) return pause(); renderRsvp(); state.index=Math.min(words.length,state.index+(+els.chunk.value)); save(); state.timer=setTimeout(playRsvp,chunkDelay()); }
function visibleWords(){
  const page=$('page');
  if(!page) return 80;
  const spans=[...page.querySelectorAll('span[data-word-index]')];
  const rr=els.reader.getBoundingClientRect();
  const visible=spans.filter(s=>{const r=s.getBoundingClientRect(); return r.top<rr.bottom && r.bottom>rr.top;}).length;
  return Math.max(20, visible || 80);
}
function playCover(){
  const startIndex=Math.max(0,Math.min(words.length,state.index));
  renderPage();
  state.index=startIndex;
  setTimeout(()=>{
    if(!state.playing)return;
    state.index=startIndex;
    scrollToWord();
    const cover=document.createElement('div');
    cover.className='cover';
    cover.style.position='sticky';
    cover.style.top='0';
    cover.style.zIndex='3';
    els.reader.prepend(cover);
    const start=startIndex, vw=visibleWords(), dur=Math.max(250,vw*wordDelay()), st=performance.now(), max=els.reader.clientHeight;
    function frame(now){
      if(!state.playing)return;
      const prog=Math.min(1,(now-st)/dur);
      cover.style.height=(prog*max)+'px';
      state.index=Math.min(words.length,Math.round(start+vw*prog));
      update();
      save();
      if(prog<1) state.raf=requestAnimationFrame(frame);
      else {
        save();
        if(state.index>=words.length) pause();
        else playCover();
      }
    }
    state.raf=requestAnimationFrame(frame);
  },40);
}
function collectLines(){ const page=$('page'); const spans=[...page.querySelectorAll('span[data-word-index]')]; const lines=[]; for(const s of spans){ const r=s.getBoundingClientRect(), rr=els.reader.getBoundingClientRect(); const y=r.top-rr.top+els.reader.scrollTop; let line=lines.find(l=>Math.abs(l.y-y)<8); if(!line){line={y,start:+s.dataset.wordIndex,end:+s.dataset.wordIndex+1,height:r.height,spans:[]}; lines.push(line);} line.end=+s.dataset.wordIndex+1; line.height=Math.max(line.height,r.height); line.spans.push(s); } return lines; }
function playWindow(){ const startIndex=state.index; renderPage(); state.index=startIndex; setTimeout(()=>{ if(!state.playing)return; state.index=startIndex; scrollToWord(); const page=$('page'); const lines=collectLines(); page.classList.add('window-mode'); let li=lines.findIndex(l=>l.end>state.index); if(li<0)li=0; runLine(lines,li); },60); }
function runLine(lines,i){ if(!state.playing||i>=lines.length)return pause(); const line=lines[i], page=$('page'); page.querySelectorAll('.current-line').forEach(s=>s.classList.remove('current-line')); line.spans.forEach(s=>s.classList.add('current-line')); els.reader.scrollTop=Math.max(0,line.y-els.reader.clientHeight*.25); let win=els.reader.querySelector('.line-window'); if(!win){win=document.createElement('div');win.className='line-window';els.reader.appendChild(win);} win.style.top=(line.y-els.reader.scrollTop-4)+'px'; win.style.height=(line.height+10)+'px'; const start=line.start, n=Math.max(1,line.end-line.start), dur=n*wordDelay(), st=performance.now(); function frame(now){ if(!state.playing)return; const prog=Math.min(1,(now-st)/dur); state.index=Math.min(words.length,Math.round(start+n*prog)); update(); save(); if(prog<1) state.raf=requestAnimationFrame(frame); else { state.index=line.end; save(); runLine(lines,i+1); } } state.raf=requestAnimationFrame(frame); }
$('play').onclick=play; $('pause').onclick=()=>pause(true); $('back').onclick=()=>{pause(false); state.index=Math.max(0,state.index-Math.max(20,Math.round(+els.wpm.value/5))); save(); render();}; $('forward').onclick=()=>{pause(false); state.index=Math.min(words.length,state.index+Math.max(20,Math.round(+els.wpm.value/5))); save(); render();};
els.mode.onchange=()=>{pause(false); render();}; els.font.oninput=()=>render(); els.lh.oninput=()=>render(); els.wpm.onchange=clamp; els.chunk.onchange=clamp;
$('reset').onclick=()=>{pause(false); state.index=0; save(); render();};
$('goPage').onclick=()=>{pause(false); const input=$('pageJump'); const p=input ? +input.value : 1; const idx=wordPage.findIndex(pg=>pg>=p); if(idx>=0)state.index=idx; save(); render();};
$('goWord').onclick=()=>{pause(false); const input=$('wordJump'); state.index=Math.max(0,Math.min(words.length,+(input ? input.value : 0)||0)); save(); render();};
$('useView').onclick=()=>{ const page=$('page'); if(!page)return; const rr=els.reader.getBoundingClientRect(); let best=null, bestDist=Infinity; page.querySelectorAll('span[data-word-index]').forEach(s=>{ const r=s.getBoundingClientRect(); const d=Math.abs(r.top-(rr.top+els.reader.clientHeight*.25)); if(d<bestDist){bestDist=d;best=s;} }); if(best){pause(false); state.index=+best.dataset.wordIndex; save(); render();} };
window.addEventListener('beforeunload',()=>{addLog('closed');});
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') save(); });
(function init(){ const d=load(); if(Number.isFinite(+d.index)) state.index=Math.max(0,Math.min(words.length,+d.index)); renderChapters(); renderLog(); render(); })();
</script>
</body>
</html>
