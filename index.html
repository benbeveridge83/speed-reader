 is open. By turns our purity \ninspires and our impurity casts us down. He is blessed who is assured that the animal is \ndying out in him day by day, and the divine being established. Perhaps there is none but \nhas cause for shame on account of the inferior and brutish nature to which he is allied. I \nfear that we are such gods or demigods only as fauns and satyrs, the divine allied to \nbeasts, the creatures of appetite, and that, to some extent, our very life is our \ndisgrace. — \n“How happy’s he who hath due place assigned \nTo his beasts and disafforested his mind! \n. . .. . . . \nCan use this horse, goat, wolf, and ev’ry beast, \nAnd is not ass himself to all the rest! \nElse man not only is the herd of swine, \nBut he’s those devils too which did incline \nThem to a headlong rage, and made them worse.” "}, {"pdfPage": 111, "text": "All sensuality is one, though it takes many forms; all purity is one. It is the same whether \na man eat, or drink, or cohabit, or sleep sensually. They are but one appetite, and we \nonly need to see a person do any one of these things to know how great a sensualist he \nis. The impure can neither stand nor sit with purity. When the reptile is attacked at one \nmouth of his burrow, he shows himself at another. If you would be chaste, you must be \ntemperate. What is chastity? How shall a man know if he is chaste? He shall not know it. \nWe have heard of this virtue, but we know not what it is. We speak conformably to the \nrumor which we have heard. From exertion come wisdom and purity; from sloth \nignorance and sensuality. In the student sensuality is a sluggish habit of mind. An \nunclean person is universally a slothful one, one who sits by a stove, whom the sun \nshines on prostrate, who reposes without being fatigued. If you would avoid \nuncleanness, and all the sins, work earnestly, though it be at cleaning a stable. Nature is \nhard to be overcome, but she must be overcome. What avails it that you are Christian, if \nyou are not purer than the heathen, if you deny yourself no more, if you are not more \nreligious? I know of many systems of religion esteemed heathenish whose precepts fill \nthe reader with shame, and provoke him to new endeavors, though it be to the \nperformance of rites merely. \nI hesitate to say these things, but it is not because of the subject — I care not how \nobscene my words are — but because I cannot speak of them without betraying my \nimpurity. We discourse freely without shame of one form of sensuality, and are silent \nabout another. We are so degraded that we cannot speak simply of the necessary \nfunctions of human nature. In earlier ages, in some countries, every function was \nreverently spoken of and regulated by law. Nothing was too trivial for the Hindoo \nlawgiver, however offensive it may be to modern taste. He teaches how to eat, drink, \ncohabit, void excrement and urine, and the like, elevating what is mean, and does not \nfalsely excuse himself by calling these things trifles. \nEvery man is the builder of a temple, called his body, to the god he worships, after a \nstyle purely his own, nor can he get off by hammering marble instead. We are all \nsculptors and painters, and our material is our own flesh and blood and bones. Any \nnobleness begins at once to refine a man’s features, any meanness or sensuality to \nimbrute them. \nJohn Farmer sat at his door one September evening, after a hard day’s work, his mind \nstill running on his labor more or less. Having bathed, he sat down to re-create his \nintellectual man. It was a rather cool evening, and some of his neighbors were \napprehending a frost.  \nHe had not attended to the train of his thoughts long when he heard some one playing \non a flute, and that sound harmonized with his mood. Still he thought of his work; but \nthe burden of his thought was, that though this kept running in his head, and he found \nhimself planning and contriving it against his will, yet it concerned him very little. It was \nno more than the scurf of his skin, which was constantly shuffled off. But the notes of \nthe flute came home to his ears out of a different sphere from that he worked in, and \nsuggested work for certain faculties which slumbered in him.  \nThey gently did away with the street, and the village, and the state in which he lived. A \nvoice said to him — Why do you stay here and live this mean moiling life, when a \nglorious existence is possible for you? Those same stars twinkle over other fields than \nthese. — But how to come out of this condition and actually migrate thither? All that he "}, {"pdfPage": 112, "text": "could think of was to practise some new austerity, to let his mind descend into his body \nand redeem it, and treat himself with ever increasing respect. "}, {"pdfPage": 113, "text": "Brute Neighbors \n \nSometimes I had a companion in my fishing, who came through the village to my house \nfrom the other side of the town, and the catching of the dinner was as much a social \nexercise as the eating of it. \nHermit. I wonder what the world is doing now. I have not heard so much as a locust \nover the sweet-fern these three hours. The pigeons are all asleep upon their roosts — \nno flutter from them. Was that a farmer’s noon horn which sounded from beyond the \nwoods just now? The hands are coming in to boiled salt beef and cider and Indian bread. \nWhy will men worry themselves so? He that does not eat need not work. I wonder how \nmuch they have reaped. Who would live there where a body can never think for the \nbarking of Bose? And oh, the housekeeping! to keep bright the devil’s door-knobs, and \nscour his tubs this bright day! Better not keep a house. Say, some hollow tree; and then \nfor morning calls and dinner-parties! Only a woodpecker tapping. Oh, they swarm; the \nsun is too warm there; they are born too far into life for me. I have water from the \nspring, and a loaf of brown bread on the shelf. — Hark! I hear a rustling of the leaves. Is \nit some ill-fed village hound yielding to the instinct of the chase? or the lost pig which is \nsaid to be in these woods, whose tracks I saw after the rain? It comes on apace; my \nsumachs and sweetbriers tremble. — Eh, Mr. Poet, is it you? How do you like the world \nto-day? \nPoet. See those clouds; how they hang! That’s the greatest thing I have seen to-day. \nThere’s nothing like it in old paintings, nothing like it in foreign lands — unless when \nwe were off the coast of Spain. That’s a true Mediterranean sky. I thought, as I have my \nliving to get, and have not eaten to-day, that I might go a-fishing. That’s the true industry \nfor poets. It is the only trade I have learned. Come, let’s along. \nHermit. I cannot resist. My brown bread will soon be gone. I will go with you gladly \nsoon, but I am just concluding a serious meditation. I think that I am near the end of it. \nLeave me alone, then, for a while. But that we may not be delayed, you shall be digging \nthe bait meanwhile. Angleworms are rarely to be met with in these parts, where the soil \nwas never fattened with manure; the race is nearly extinct. The sport of digging the bait \nis nearly equal to that of catching the fish, when one’s appetite is not too keen; and this \nyou may have all to yourself today. I would advise you to set in the spade down yonder \namong the ground-nuts, where you see the johnswort waving. I think that I may warrant \nyou one worm to every three sods you turn up, if you look well in among the roots of the \ngrass, as if you were weeding. Or, if you choose to go farther, it will not be unwise, for I \nhave found the increase of fair bait to be very nearly as the squares of the distances. \nHermit alone. Let me see; where was I? Methinks I was nearly in this frame of mind; the \nworld lay about at this angle. Shall I go to heaven or a-fishing? If I should soon bring this \nmeditation to an end, would another so sweet occasion be likely to offer? I was as near \nbeing resolved into the essence of things as ever I was in my life. I fear my thoughts will \nnot come back to me. If it would do any good, I would whistle for them. When they make \nus an offer, is it wise to say, We will think of it? My thoughts have left no track, and I \ncannot find the path again. What was it that I was thinking of? It was a very hazy day. I \nwill just try these three sentences of Confutsee; they may fetch that state about again. I "}, {"pdfPage": 114, "text": "know not whether it was the dumps or a budding ecstasy. Mem. There never is but one \nopportunity of a kind. \nPoet. How now, Hermit, is it too soon? I have got just thirteen whole ones, beside several \nwhich are imperfect or undersized; but they will do for the smaller fry; they do not \ncover up the hook so much. Those village worms are quite too large; a shiner may make \na meal off one without finding the skewer. \nHermit. Well, then, let’s be off. Shall we to the Concord? There’s good sport there if the \nwater be not too high. \nWhy do precisely these objects which we behold make a world? Why has man just these \nspecies of animals for his neighbors; as if nothing but a mouse could have filled this \ncrevice? I suspect that Pilpay & Co. have put animals to their best use, for they are all \nbeasts of burden, in a sense, made to carry some portion of our thoughts. \nThe mice which haunted my house were not the common ones, which are said to have \nbeen introduced into the country, but a wild native kind not found in the village. I sent \none to a distinguished naturalist, and it interested him much. When I was building, one \nof these had its nest underneath the house, and before I had laid the second floor, and \nswept out the shavings, would come out regularly at lunch time and pick up the crumbs \nat my feet. It probably had never seen a man before; and it soon became quite familiar, \nand would run over my shoes and up my clothes. It could readily ascend the sides of the \nroom by short impulses, like a squirrel, which it resembled in its motions. At length, as I \nleaned with my elbow on the bench one day, it ran up my clothes, and along my sleeve, \nand round and round the paper which held my dinner, while I kept the latter close, and \ndodged and played at bopeep with it; and when at last I held still a piece of cheese \nbetween my thumb and finger, it came and nibbled it, sitting in my hand, and afterward \ncleaned its face and paws, like a fly, and walked away. \nA phoebe soon built in my shed, and a robin for protection in a pine which grew against \nthe house. In June the partridge (Tetrao umbellus), which is so shy a bird, led her brood \npast my windows, from the woods in the rear to the front of my house, clucking and \ncalling to them like a hen, and in all her behavior proving herself the hen of the woods. \nThe young suddenly disperse on your approach, at a signal from the mother, as if a \nwhirlwind had swept them away, and they so exactly resemble the dried leaves and \ntwigs that many a traveler has placed his foot in the midst of a brood, and heard the \nwhir of the old bird as she flew off, and her anxious calls and mewing, or seen her trail \nher wings to attract his attention, without suspecting their neighborhood. The parent \nwill sometimes roll and spin round before you in such a dishabille, that you cannot, for a \nfew moments, detect what kind of creature it is. The young squat still and flat, often \nrunning their heads under a leaf, and mind only their mother’s directions given from a \ndistance, nor will your approach make them run again and betray themselves. You may \neven tread on them, or have your eyes on them for a minute, without discovering them. I \nhave held them in my open hand at such a time, and still their only care, obedient to \ntheir mother and their instinct, was to squat there without fear or trembling. So perfect \nis this instinct, that once, when I had laid them on the leaves again, and one accidentally \nfell on its side, it was found with the rest in exactly the same position ten minutes \nafterward. They are not callow like the young of most birds, but more perfectly \ndeveloped and precocious even than chickens. The remarkably adult yet innocent \nexpression of their open and serene eyes is very memorable. All intelligence seems \nreflected in them. They suggest not merely the purity of infancy, but a wisdom clarified "}, {"pdfPage": 115, "text": "by experience. Such an eye was not born when the bird was, but is coeval with the sky it \nreflects. The woods do not yield another such a gem. The traveller does not often look \ninto such a limpid well. The ignorant or reckless sportsman often shoots the parent at \nsuch a time, and leaves these innocents to fall a prey to some prowling beast or bird, or \ngradually mingle with the decaying leaves which they so much resemble. It is said that \nwhen hatched by a hen they will directly disperse on some alarm, and so are lost, for \nthey never hear the mother’s call which gathers them again. These were my hens and \nchickens. \nIt is remarkable how many creatures live wild and free though secret in the woods, and \nstill sustain themselves in the neighborhood of towns, suspected by hunters only. How \nretired the otter manages to live here! He grows to be four feet long, as big as a small \nboy, perhaps without any human being getting a glimpse of him. I formerly saw the \nraccoon in the woods behind where my house is built, and probably still heard their \nwhinnering at night. Commonly I rested an hour or two in the shade at noon, after \nplanting, and ate my lunch, and read a little by a spring which was the source of a \nswamp and of a brook, oozing from under Brister’s Hill, half a mile from my field. The \napproach to this was through a succession of descending grassy hollows, full of young \npitch pines, into a larger wood about the swamp. There, in a very secluded and shaded \nspot, under a spreading white pine, there was yet a clean, firm sward to sit on. I had dug \nout the spring and made a well of clear gray water, where I could dip up a pailful \nwithout roiling it, and thither I went for this purpose almost every day in midsummer, \nwhen the pond was warmest. Thither, too, the woodcock led her brood, to probe the \nmud for worms, flying but a foot above them down the bank, while they ran in a troop \nbeneath; but at last, spying me, she would leave her young and circle round and round \nme, nearer and nearer till within four or five feet, pretending broken wings and legs, to \nattract my attention, and get off her young, who would already have taken up their \nmarch, with faint, wiry peep, single file through the swamp, as she directed. Or I heard \nthe peep of the young when I could not see the parent bird. There too the turtle doves \nsat over the spring, or fluttered from bough to bough of the soft white pines over my \nhead; or the red squirrel, coursing down the nearest bough, was particularly familiar \nand inquisitive. You only need sit still long enough in some attractive spot in the woods \nthat all its inhabitants may exhibit themselves to you by turns. \nI was witness to events of a less peaceful character. One day when I went out to my \nwood-pile, or rather my pile of stumps, I observed two large ants, the one red, the other \nmuch larger, nearly half an inch long, and black, fiercely contending with one another. \nHaving once got hold they never let go, but struggled and wrestled and rolled on the \nchips incessantly. Looking farther, I was surprised to find that the chips were covered \nwith such combatants, that it was not a duellum, but a bellum, a war between two races \nof ants, the red always pitted against the black, and frequently two red ones to one \nblack. The legions of these Myrmidons covered all the hills and vales in my wood-yard, \nand the ground was already strewn with the dead and dying, both red and black. It was \nthe only battle which I have ever witnessed, the only battle-field I ever trod while the \nbattle was raging; internecine war; the red republicans on the one hand, and the black \nimperialists on the other. On every side they were engaged in deadly combat, yet \nwithout any noise that I could hear, and human soldiers never fought so resolutely. I \nwatched a couple that were fast locked in each other’s embraces, in a little sunny valley \namid the chips, now at noonday prepared to fight till the sun went down, or life went \nout. The smaller red champion had fastened himself like a vice to his adversary’s front, "}, {"pdfPage": 116, "text": "and through all the tumblings on that field never for an instant ceased to gnaw at one of \nhis feelers near the root, having already caused the other to go by the board; while the \nstronger black one dashed him from side to side, and, as I saw on looking nearer, had \nalready divested him of several of his members. They fought with more pertinacity than \nbulldogs. Neither manifested the least disposition to retreat. It was evident that their \nbattle-cry was “Conquer or die.” In the meanwhile there came along a single red ant on \nthe hillside of this valley, evidently full of excitement, who either had despatched his foe, \nor had not yet taken part in the battle; probably the latter, for he had lost none of his \nlimbs; whose mother had charged him to return with his shield or upon it. Or perchance \nhe was some Achilles, who had nourished his wrath apart, and had now come to avenge \nor rescue his Patroclus. He saw this unequal combat from afar — for the blacks were \nnearly twice the size of the red — he drew near with rapid pace till be stood on his \nguard within half an inch of the combatants; then, watching his opportunity, he sprang \nupon the black warrior, and commenced his operations near the root of his right fore \nleg, leaving the foe to select among his own members; and so there were three united \nfor life, as if a new kind of attraction had been invented which put all other locks and \ncements to shame. I should not have wondered by this time to find that they had their \nrespective musical bands stationed on some eminent chip, and playing their national \nairs the while, to excite the slow and cheer the dying combatants. I was myself excited \nsomewhat even as if they had been men. The more you think of it, the less the \ndifference. And certainly there is not the fight recorded in Concord history, at least, if in \nthe history of America, that will bear a moment’s comparison with this, whether for the \nnumbers engaged in it, or for the patriotism and heroism displayed. For numbers and \nfor carnage it was an Austerlitz or Dresden. Concord Fight! Two killed on the patriots’ \nside, and Luther Blanchard wounded! Why here every ant was a Buttrick — “Fire! for \nGod’s sake fire!” — and thousands shared the fate of Davis and Hosmer. There was not \none hireling there. I have no doubt that it was a principle they fought for, as much as our \nancestors, and not to avoid a three-penny tax on their tea; and the results of this battle \nwill be as important and memorable to those whom it concerns as those of the battle of \nBunker Hill, at least. \nI took up the chip on which the three I have particularly described were struggling, \ncarried it into my house, and placed it under a tumbler on my window-sill, in order to \nsee the issue. Holding a microscope to the first-mentioned red ant, I saw that, though he \nwas assiduously gnawing at the near fore leg of his enemy, having severed his \nremaining feeler, his own breast was all torn away, exposing what vitals he had there to \nthe jaws of the black warrior, whose breastplate was apparently too thick for him to \npierce; and the dark carbuncles of the sufferer’s eyes shone with ferocity such as war \nonly could excite. They struggled half an hour longer under the tumbler, and when I \nlooked again the black soldier had severed the heads of his foes from their bodies, and \nthe still living heads were hanging on either side of him like ghastly trophies at his \nsaddle-bow, still apparently as firmly fastened as ever, and he was endeavoring with \nfeeble struggles, being without feelers and with only the remnant of a leg, and I know \nnot how many other wounds, to divest himself of them; which at length, after half an \nhour more, he accomplished. I raised the glass, and he went off over the window-sill in \nthat crippled state. Whether he finally survived that combat, and spent the remainder of \nhis days in some Hotel des Invalides, I do not know; but I thought that his industry \nwould not be worth much thereafter. I never learned which party was victorious, nor \nthe cause of the war; but I felt for the rest of that day as if I had had my feelings excited "}, {"pdfPage": 117, "text": "and harrowed by witnessing the struggle, the ferocity and carnage, of a human battle \nbefore my door. \nKirby and Spence tell us that the battles of ants have long been celebrated and the date \nof them recorded, though they say that Huber is the only modern author who appears to \nhave witnessed them. “AEneas Sylvius,” say they, “after giving a very circumstantial \naccount of one contested with great obstinacy by a great and small species on the trunk \nof a pear tree,” adds that “this action was fought in the pontificate of Eugenius the \nFourth, in the presence of Nicholas Pistoriensis, an eminent lawyer, who related the \nwhole, history of the battle with the greatest fidelity.” A similar engagement between \ngreat and small ants is recorded by Olaus Magnus, in which the small ones, being \nvictorious, are said to have buried the bodies of their own soldiers, but left those of their \ngiant enemies a prey to the birds. This event happened previous to the expulsion of the \ntyrant Christiern the Second from Sweden.” The battle which I witnessed took place in \nthe Presidency of Polk, five years before the passage of Webster’s Fugitive–Slave Bill. \nMany a village Bose, fit only to course a mud-turtle in a victualling cellar, sported his \nheavy quarters in the woods, without the knowledge of his master, and ineffectually \nsmelled at old fox burrows and woodchucks’ holes; led perchance by some slight cur \nwhich nimbly threaded the wood, and might still inspire a natural terror in its denizens; \n— now far behind his guide, barking like a canine bull toward some small squirrel \nwhich had treed itself for scrutiny, then, cantering off, bending the bushes with his \nweight, imagining that he is on the track of some stray member of the jerbilla family. \nOnce I was surprised to see a cat walking along the stony shore of the pond, for they \nrarely wander so far from home. The surprise was mutual. Nevertheless the most \ndomestic cat, which has lain on a rug all her days, appears quite at home in the woods, \nand, by her sly and stealthy behavior, proves herself more native there than the regular \ninhabitants. Once, when berrying, I met with a cat with young kittens in the woods, \nquite wild, and they all, like their mother, had their backs up and were fiercely spitting \nat me. A few years before I lived in the woods there was what was called a “winged cat” \nin one of the farm-houses in Lincoln nearest the pond, Mr. Gilian Baker’s. When I called \nto see her in June, 1842, she was gone a-hunting in the woods, as was her wont (I am \nnot sure whether it was a male or female, and so use the more common pronoun), but \nher mistress told me that she came into the neighborhood a little more than a year \nbefore, in April, and was finally taken into their house; that she was of a dark brownish-\ngray color, with a white spot on her throat, and white feet, and had a large bushy tail like \na fox; that in the winter the fur grew thick and flatted out along her sides, forming \nstripes ten or twelve inches long by two and a half wide, and under her chin like a muff, \nthe upper side loose, the under matted like felt, and in the spring these appendages \ndropped off. They gave me a pair of her “wings,” which I keep still. There is no \nappearance of a membrane about them. Some thought it was part flying squirrel or \nsome other wild animal, which is not impossible, for, according to naturalists, prolific \nhybrids have been produced by the union of the marten and domestic cat. This would \nhave been the right kind of cat for me to keep, if I had kept any; for why should not a \npoet’s cat be winged as well as his horse? \nIn the fall the loon (Colymbus glacialis) came, as usual, to moult and bathe in the pond, \nmaking the woods ring with his wild laughter before I had risen. At rumor of his arrival \nall the Mill-dam sportsmen are on the alert, in gigs and on foot, two by two and three by \nthree, with patent rifles and conical balls and spy-glasses. They come rustling through \nthe woods like autumn leaves, at least ten men to one loon. Some station themselves on "}, {"pdfPage": 118, "text": "this side of the pond, some on that, for the poor bird cannot be omnipresent; if he dive \nhere he must come up there. But now the kind October wind rises, rustling the leaves \nand rippling the surface of the water, so that no loon can be heard or seen, though his \nfoes sweep the pond with spy-glasses, and make the woods resound with their \ndischarges. The waves generously rise and dash angrily, taking sides with all water-\nfowl, and our sportsmen must beat a retreat to town and shop and unfinished jobs. But \nthey were too often successful. When I went to get a pail of water early in the morning I \nfrequently saw this stately bird sailing out of my cove within a few rods. If I endeavored \nto overtake him in a boat, in order to see how he would manoeuvre, he would dive and \nbe completely lost, so that I did not discover him again, sometimes, till the latter part of \nthe day. But I was more than a match for him on the surface. He commonly went off in a \nrain. \nAs I was paddling along the north shore one very calm October afternoon, for such days \nespecially they settle on to the lakes, like the milkweed down, having looked in vain \nover the pond for a loon, suddenly one, sailing out from the shore toward the middle a \nfew rods in front of me, set up his wild laugh and betrayed himself. I pursued with a \npaddle and he dived, but when he came up I was nearer than before. He dived again, but \nI miscalculated the direction he would take, and we were fifty rods apart when he came \nto the surface this time, for I had helped to widen the interval; and again he laughed \nlong and loud, and with more reason than before. He manoeuvred so cunningly that I \ncould not get within half a dozen rods of him. Each time, when he came to the surface, \nturning his head this way and that, he cooly surveyed the water and the land, and \napparently chose his course so that he might come up where there was the widest \nexpanse of water and at the greatest distance from the boat. It was surprising how \nquickly he made up his mind and put his resolve into execution. He led me at once to the \nwidest part of the pond, and could not be driven from it. While he was thinking one \nthing in his brain, I was endeavoring to divine his thought in mine. It was a pretty game, \nplayed on the smooth surface of the pond, a man against a loon. Suddenly your \nadversary’s checker disappears beneath the board, and the problem is to place yours \nnearest to where his will appear again. Sometimes he would come up unexpectedly on \nthe opposite side of me, having apparently passed directly under the boat. So long-\nwinded was he and so unweariable, that when he had swum farthest he would \nimmediately plunge again, nevertheless; and then no wit could divine where in the deep \npond, beneath the smooth surface, he might be speeding his way like a fish, for he had \ntime and ability to visit the bottom of the pond in its deepest part. It is said that loons \nhave been caught in the New York lakes eighty feet beneath the surface, with hooks set \nfor trout — though Walden is deeper than that. How surprised must the fishes be to see \nthis ungainly visitor from another sphere speeding his way amid their schools! Yet he \nappeared to know his course as surely under water as on the surface, and swam much \nfaster there. Once or twice I saw a ripple where he approached the surface, just put his \nhead out to reconnoitre, and instantly dived again. I found that it was as well for me to \nrest on my oars and wait his reappearing as to endeavor to calculate where he would \nrise; for again and again, when I was straining my eyes over the surface one way, I \nwould suddenly be startled by his unearthly laugh behind me. But why, after displaying \nso much cunning, did he invariably betray himself the moment he came up by that loud \nlaugh? Did not his white breast enough betray him? He was indeed a silly loon, I \nthought. I could commonly hear the splash of the water when he came up, and so also \ndetected him. But after an hour he seemed as fresh as ever, dived as willingly, and swam \nyet farther than at first. It was surprising to see how serenely he sailed off with "}, {"pdfPage": 119, "text": "unruffled breast when he came to the surface, doing all the work with his webbed feet \nbeneath. His usual note was this demoniac laughter, yet somewhat like that of a water-\nfowl; but occasionally, when he had balked me most successfully and come up a long \nway off, he uttered a long-drawn unearthly howl, probably more like that of a wolf than \nany bird; as when a beast puts his muzzle to the ground and deliberately howls. This \nwas his looning — perhaps the wildest sound that is ever heard here, making the woods \nring far and wide. I concluded that he laughed in derision of my efforts, confident of his \nown resources. Though the sky was by this time overcast, the pond was so smooth that I \ncould see where he broke the surface when I did not hear him. His white breast, the \nstillness of the air, and the smoothness of the water were all against him. At length \nhaving come up fifty rods off, he uttered one of those prolonged howls, as if calling on \nthe god of loons to aid him, and immediately there came a wind from the east and \nrippled the surface, and filled the whole air with misty rain, and I was impressed as if it \nwere the prayer of the loon answered, and his god was angry with me; and so I left him \ndisappearing far away on the tumultuous surface. \nFor hours, in fall days, I watched the ducks cunningly tack and veer and hold the middle \nof the pond, far from the sportsman; tricks which they will have less need to practise in \nLouisiana bayous. When compelled to rise they would sometimes circle round and \nround and over the pond at a considerable height, from which they could easily see to \nother ponds and the river, like black motes in the sky; and, when I thought they had \ngone off thither long since, they would settle down by a slanting flight of a quarter of a \nmile on to a distant part which was left free; but what beside safety they got by sailing in \nthe middle of Walden I do not know, unless they love its water for the same reason that \nI do. "}, {"pdfPage": 120, "text": "House–Warming \n \nIn October I went a-graping to the river meadows, and loaded myself with clusters more \nprecious for their beauty and fragrance than for food. There, too, I admired, though I did \nnot gather, the cranberries, small waxen gems, pendants of the meadow grass, pearly \nand red, which the farmer plucks with an ugly rake, leaving the smooth meadow in a \nsnarl, heedlessly measuring them by the bushel and the dollar only, and sells the spoils \nof the meads to Boston and New York; destined to be jammed, to satisfy the tastes of \nlovers of Nature there. So butchers rake the tongues of bison out of the prairie grass, \nregardless of the torn and drooping plant. The barberry’s brilliant fruit was likewise \nfood for my eyes merely; but I collected a small store of wild apples for coddling, which \nthe proprietor and travellers had overlooked. When chestnuts were ripe I laid up half a \nbushel for winter. It was very exciting at that season to roam the then boundless \nchestnut woods of Lincoln — they now sleep their long sleep under the railroad — with \na bag on my shoulder, and a stick to open burs with in my hand, for I did not always wait \nfor the frost, amid the rustling of leaves and the loud reproofs of the red squirrels and \nthe jays, whose half-consumed nuts I sometimes stole, for the burs which they had \nselected were sure to contain sound ones. Occasionally I climbed and shook the trees. \nThey grew also behind my house, and one large tree, which almost overshadowed it, \nwas, when in flower, a bouquet which scented the whole neighborhood, but the \nsquirrels and the jays got most of its fruit; the last coming in flocks early in the morning \nand picking the nuts out of the burs before they fell, I relinquished these trees to them \nand visited the more distant woods composed wholly of chestnut. These nuts, as far as \nthey went, were a good substitute for bread. Many other substitutes might, perhaps, be \nfound. Digging one day for fishworms, I discovered the ground-nut (Apios tuberosa) on \nits string, the potato of the aborigines, a sort of fabulous fruit, which I had begun to \ndoubt if I had ever dug and eaten in childhood, as I had told, and had not dreamed it. I \nhad often since seen its crumpled red velvety blossom supported by the stems of other \nplants without knowing it to be the same. Cultivation has well-nigh exterminated it. It \nhas a sweetish taste, much like that of a frost-bitten potato, and I found it better boiled \nthan roasted. This tuber seemed like a faint promise of Nature to rear her own children \nand feed them simply here at some future period. In these days of fatted cattle and \nwaving grain-fields this humble root, which was once the totem of an Indian tribe, is \nquite forgotten, or known only by its flowering vine; but let wild Nature reign here once \nmore, and the tender and luxurious English grains will probably disappear before a \nmyriad of foes, and without the care of man the crow may carry back even the last seed \nof corn to the great cornfield of the Indian’s God in the southwest, whence he is said to \nhave brought it; but the now almost exterminated ground-nut will perhaps revive and \nflourish in spite of frosts and wildness, prove itself indigenous, and resume its ancient \nimportance and dignity as the diet of the hunter tribe. Some Indian Ceres or Minerva \nmust have been the inventor and bestower of it; and when the reign of poetry \ncommences here, its leaves and string of nuts may be represented on our works of art. \nAlready, by the first of September, I had seen two or three small maples turned scarlet \nacross the pond, beneath where the white stems of three aspens diverged, at the point \nof a promontory, next the water. Ah, many a tale their color told! And gradually from \nweek to week the character of each tree came out, and it admired itself reflected in the "}, {"pdfPage": 121, "text": "smooth mirror of the lake. Each morning the manager of this gallery substituted some \nnew picture, distinguished by more brilliant or harmonious coloring, for the old upon \nthe walls. \nThe wasps came by thousands to my lodge in October, as to winter quarters, and settled \non my windows within and on the walls overhead, sometimes deterring visitors from \nentering. Each morning, when they were numbed with cold, I swept some of them out, \nbut I did not trouble myself much to get rid of them; I even felt complimented by their \nregarding my house as a desirable shelter. They never molested me seriously, though \nthey bedded with me; and they gradually disappeared, into what crevices I do not know, \navoiding winter and unspeakable cold. \nLike the wasps, before I finally went into winter quarters in November, I used to resort \nto the northeast side of Walden, which the sun, reflected from the pitch pine woods and \nthe stony shore, made the fireside of the pond; it is so much pleasanter and wholesomer \nto be warmed by the sun while you can be, than by an artificial fire. I thus warmed \nmyself by the still glowing embers which the summer, like a departed hunter, had left. \nWhen I came to build my chimney I studied masonry. My bricks, being second-hand \nones, required to be cleaned with a trowel, so that I learned more than usual of the \nqualities of bricks and trowels. The mortar on them was fifty years old, and was said to \nbe still growing harder; but this is one of those sayings which men love to repeat \nwhether they are true or not. Such sayings themselves grow harder and adhere more \nfirmly with age, and it would take many blows with a trowel to clean an old wiseacre of \nthem. Many of the villages of Mesopotamia are built of second-hand bricks of a very \ngood quality, obtained from the ruins of Babylon, and the cement on them is older and \nprobably harder still. However that may be, I was struck by the peculiar toughness of \nthe steel which bore so many violent blows without being worn out. As my bricks had \nbeen in a chimney before, though I did not read the name of Nebuchadnezzar on them, I \npicked out its many fireplace bricks as I could find, to save work and waste, and I filled \nthe spaces between the bricks about the fireplace with stones from the pond shore, and \nalso made my mortar with the white sand from the same place. I lingered most about \nthe fireplace, as the most vital part of the house. Indeed, I worked so deliberately, that \nthough I commenced at the ground in the morning, a course of bricks raised a few \ninches above the floor served for my pillow at night; yet I did not get a stiff neck for it \nthat I remember; my stiff neck is of older date. I took a poet to board for a fortnight \nabout those times, which caused me to be put to it for room. He brought his own knife, \nthough I had two, and we used to scour them by thrusting them into the earth. He \nshared with me the labors of cooking. I was pleased to see my work rising so square and \nsolid by degrees, and reflected, that, if it proceeded slowly, it was calculated to endure a \nlong time. The chimney is to some extent an independent structure, standing on the \nground, and rising through the house to the heavens; even after the house is burned it \nstill stands sometimes, and its importance and independence are apparent. This was \ntoward the end of summer. It was now November. \nThe north wind had already begun to cool the pond, though it took many weeks of \nsteady blowing to accomplish it, it is so deep. When I began to have a fire at evening, \nbefore I plastered my house, the chimney carried smoke particularly well, because of \nthe numerous chinks between the boards. Yet I passed some cheerful evenings in that \ncool and airy apartment, surrounded by the rough brown boards full of knots, and \nrafters with the bark on high overhead. My house never pleased my eye so much after it "}, {"pdfPage": 122, "text": "was plastered, though I was obliged to confess that it was more comfortable. Should not \nevery apartment in which man dwells be lofty enough to create some obscurity \noverhead, where flickering shadows may play at evening about the rafters? These forms \nare more agreeable to the fancy and imagination than fresco paintings or other the most \nexpensive furniture. I now first began to inhabit my house, I may say, when I began to \nuse it for warmth as well as shelter. I had got a couple of old fire-dogs to keep the wood \nfrom the hearth, and it did me good to see the soot form on the back of the chimney \nwhich I had built, and I poked the fire with more right and more satisfaction than usual. \nMy dwelling was small, and I could hardly entertain an echo in it; but it seemed larger \nfor being a single apartment and remote from neighbors. All the attractions of a house \nwere concentrated in one room; it was kitchen, chamber, parlor, and keeping-room; and \nwhatever satisfaction parent or child, master or servant, derive from living in a house, I \nenjoyed it all. Cato says, the master of a family (patremfamilias) must have in his rustic \nvilla “cellam oleariam, vinariam, dolia multa, uti lubeat caritatem expectare, et rei, et \nvirtuti, et gloriae erit,” that is, “an oil and wine cellar, many casks, so that it may be \npleasant to expect hard times; it will be for his advantage, and virtue, and glory.” I had in \nmy cellar a firkin of potatoes, about two quarts of peas with the weevil in them, and on \nmy shelf a little rice, a jug of molasses, and of rye and Indian meal a peck each. \nI sometimes dream of a larger and more populous house, standing in a golden age, of \nenduring materials, and without gingerbread work, which shall still consist of only one \nroom, a vast, rude, substantial, primitive hall, without ceiling or plastering, with bare \nrafters and purlins supporting a sort of lower heaven over one’s head — useful to keep \noff rain and snow, where the king and queen posts stand out to receive your homage, \nwhen you have done reverence to the prostrate Saturn of an older dynasty on stepping \nover the sill; a cavernous house, wherein you must reach up a torch upon a pole to see \nthe roof; where some may live in the fireplace, some in the recess of a window, and \nsome on settles, some at one end of the hall, some at another, and some aloft on rafters \nwith the spiders, if they choose; a house which you have got into when you have opened \nthe outside door, and the ceremony is over; where the weary traveller may wash, and \neat, and converse, and sleep, without further journey; such a shelter as you would be \nglad to reach in a tempestuous night, containing all the essentials of a house, and \nnothing for house-keeping; where you can see all the treasures of the house at one view, \nand everything hangs upon its peg, that a man should use; at once kitchen, pantry, \nparlor, chamber, storehouse, and garret; where you can see so necessary a thing, as a \nbarrel or a ladder, so convenient a thing as a cupboard, and hear the pot boil, and pay \nyour respects to the fire that cooks your dinner, and the oven that bakes your bread, \nand the necessary furniture and utensils are the chief ornaments; where the washing is \nnot put out, nor the fire, nor the mistress, and perhaps you are sometimes requested to \nmove from off the trap-door, when the cook would descend into the cellar, and so learn \nwhether the ground is solid or hollow beneath you without stamping. A house whose \ninside is as open and manifest as a bird’s nest, and you cannot go in at the front door \nand out at the back without seeing some of its inhabitants; where to be a guest is to be \npresented with the freedom of the house, and not to be carefully excluded from seven \neighths of it, shut up in a particular cell, and told to make yourself at home there — in \nsolitary confinement. Nowadays the host does not admit you to his hearth, but has got \nthe mason to build one for yourself somewhere in his alley, and hospitality is the art of \nkeeping you at the greatest distance. There is as much secrecy about the cooking as if he \nhad a design to poison you. I am aware that I have been on many a man’s premises, and \nmight have been legally ordered off, but I am not aware that I have been in many men’s "}, {"pdfPage": 123, "text": "houses. I might visit in my old clothes a king and queen who lived simply in such a \nhouse as I have described, if I were going their way; but backing out of a modern palace \nwill be all that I shall desire to learn, if ever I am caught in one. \nIt would seem as if the very language of our parlors would lose all its nerve and \ndegenerate into palaver wholly, our lives pass at such remoteness from its symbols, and \nits metaphors and tropes are necessarily so far fetched, through slides and dumb-\nwaiters, as it were; in other words, the parlor is so far from the kitchen and workshop. \nThe dinner even is only the parable of a dinner, commonly. As if only the savage dwelt \nnear enough to Nature and Truth to borrow a trope from them. How can the scholar, \nwho dwells away in the North West Territory or the Isle of Man, tell what is \nparliamentary in the kitchen? \nHowever, only one or two of my guests were ever bold enough to stay and eat a hasty-\npudding with me; but when they saw that crisis approaching they beat a hasty retreat \nrather, as if it would shake the house to its foundations. Nevertheless, it stood through a \ngreat many hasty-puddings. \nI did not plaster till it was freezing weather. I brought over some whiter and cleaner \nsand for this purpose from the opposite shore of the pond in a boat, a sort of conveyance \nwhich would have tempted me to go much farther if necessary. My house had in the \nmeanwhile been shingled down to the ground on every side. In lathing I was pleased to \nbe able to send home each nail with a single blow of the hammer, and it was my \nambition to transfer the plaster from the board to the wall neatly and rapidly. I \nremembered the story of a conceited fellow, who, in fine clothes, was wont to lounge \nabout the village once, giving advice to workmen. Venturing one day to substitute deeds \nfor words, he turned up his cuffs, seized a plasterer’s board, and having loaded his \ntrowel without mishap, with a complacent look toward the lathing overhead, made a \nbold gesture thitherward; and straightway, to his complete discomfiture, received the \nwhole contents in his ruffled bosom. I admired anew the economy and convenience of \nplastering, which so effectually shuts out the cold and takes a handsome finish, and I \nlearned the various casualties to which the plasterer is liable. I was surprised to see how \nthirsty the bricks were which drank up all the moisture in my plaster before I had \nsmoothed it, and how many pailfuls of water it takes to christen a new hearth. I had the \nprevious winter made a small quantity of lime by burning the shells of the Unio \nfluviatilis, which our river affords, for the sake of the experiment; so that I knew where \nmy materials came from. I might have got good limestone within a mile or two and \nburned it myself, if I had cared to do so. \nThe pond had in the meanwhile skimmed over in the shadiest and shallowest coves, \nsome days or even weeks before the general freezing. The first ice is especially \ninteresting and perfect, being hard, dark, and transparent, and affords the best \nopportunity that ever offers for examining the bottom where it is shallow; for you can \nlie at your length on ice only an inch thick, like a skater insect on the surface of the \nwater, and study the bottom at your leisure, only two or three inches distant, like a \npicture behind a glass, and the water is necessarily always smooth then. There are many \nfurrows in the sand where some creature has travelled about and doubled on its tracks; \nand, for wrecks, it is strewn with the cases of caddis-worms made of minute grains of \nwhite quartz. Perhaps these have creased it, for you find some of their cases in the \nfurrows, though they are deep and broad for them to make. But the ice itself is the \nobject of most interest, though you must improve the earliest opportunity to study it. If "}, {"pdfPage": 124, "text": "you examine it closely the morning after it freezes, you find that the greater part of the \nbubbles, which at first appeared to be within it, are against its under surface, and that \nmore are continually rising from the bottom; while the ice is as yet comparatively solid \nand dark, that is, you see the water through it. These bubbles are from an eightieth to an \neighth of an inch in diameter, very clear and beautiful, and you see your face reflected in \nthem through the ice. There may be thirty or forty of them to a square inch. There are \nalso already within the ice narrow oblong perpendicular bubbles about half an inch \nlong, sharp cones with the apex upward; or oftener, if the ice is quite fresh, minute \nspherical bubbles one directly above another, like a string of beads. But these within the \nice are not so numerous nor obvious as those beneath. I sometimes used to cast on \nstones to try the strength of the ice, and those which broke through carried in air with \nthem, which formed very large and conspicuous white bubbles beneath. One day when I \ncame to the same place forty-eight hours afterward, I found that those large bubbles \nwere still perfect, though an inch more of ice had formed, as I could see distinctly by the \nseam in the edge of a cake. But as the last two days had been very warm, like an Indian \nsummer, the ice was not now transparent, showing the dark green color of the water, \nand the bottom, but opaque and whitish or gray, and though twice as thick was hardly \nstronger than before, for the air bubbles had greatly expanded under this heat and run \ntogether, and lost their regularity; they were no longer one directly over another, but \noften like silvery coins poured from a bag, one overlapping another, or in thin flakes, as \nif occupying slight cleavages. The beauty of the ice was gone, and it was too late to study \nthe bottom. Being curious to know what position my great bubbles occupied with \nregard to the new ice, I broke out a cake containing a middling sized one, and turned it \nbottom upward. The new ice had formed around and under the bubble, so that it was \nincluded between the two ices. It was wholly in the lower ice, but close against the \nupper, and was flattish, or perhaps slightly lenticular, with a rounded edge, a quarter of \nan inch deep by four inches in diameter; and I was surprised to find that directly under \nthe bubble the ice was melted with great regularity in the form of a saucer reversed, to \nthe height of five eighths of an inch in the middle, leaving a thin partition there between \nthe water and the bubble, hardly an eighth of an inch thick; and in many places the small \nbubbles in this partition had burst out downward, and probably there was no ice at all \nunder the largest bubbles, which were a foot in diameter. I inferred that the infinite \nnumber of minute bubbles which I had first seen against the under surface of the ice \nwere now frozen in likewise, and that each, in its degree, had operated like a burning-\nglass on the ice beneath to melt and rot it. These are the little air-guns which contribute \nto make the ice crack and whoop. \nAt length the winter set in good earnest, just as I had finished plastering, and the wind \nbegan to howl around the house as if it had not had permission to do so till then. Night \nafter night the geese came lumbering in the dark with a clangor and a whistling of \nwings, even after the ground was covered with snow, some to alight in Walden, and \nsome flying low over the woods toward Fair Haven, bound for Mexico. Several times, \nwhen returning from the village at ten or eleven o’clock at night, I heard the tread of a \nflock of geese, or else ducks, on the dry leaves in the woods by a pond-hole behind my \ndwelling, where they had come up to feed, and the faint honk or quack of their leader as \nthey hurried off. In 1845 Walden froze entirely over for the first time on the night of the \n22d of December, Flint’s and other shallower ponds and the river having been frozen \nten days or more; in ‘46, the 16th; in ‘49, about the 31st; and in ‘50, about the 27th of \nDecember; in ‘52, the 5th of January; in ‘53, the 31st of December. The snow had already \ncovered the ground since the 25th of November, and surrounded me suddenly with the "}, {"pdfPage": 125, "text": "scenery of winter. I withdrew yet farther into my shell, and endeavored to keep a bright \nfire both within my house and within my breast. My employment out of doors now was \nto collect the dead wood in the forest, bringing it in my hands or on my shoulders, or \nsometimes trailing a dead pine tree under each arm to my shed. An old forest fence \nwhich had seen its best days was a great haul for me. I sacrificed it to Vulcan, for it was \npast serving the god Terminus. How much more interesting an event is that man’s \nsupper who has just been forth in the snow to hunt, nay, you might say, steal, the fuel to \ncook it with! His bread and meat are sweet. There are enough fagots and waste wood of \nall kinds in the forests of most of our towns to support many fires, but which at present \nwarm none, and, some think, hinder the growth of the young wood. There was also the \ndriftwood of the pond. In the course of the summer I had discovered a raft of pitch pine \nlogs with the bark on, pinned together by the Irish when the railroad was built. This I \nhauled up partly on the shore. After soaking two years and then lying high six months it \nwas perfectly sound, though waterlogged past drying. I amused myself one winter day \nwith sliding this piecemeal across the pond, nearly half a mile, skating behind with one \nend of a log fifteen feet long on my shoulder, and the other on the ice; or I tied several \nlogs together with a birch withe, and then, with a longer birch or alder which had a book \nat the end, dragged them across. Though completely waterlogged and almost as heavy \nas lead, they not only burned long, but made a very hot fire; nay, I thought that they \nburned better for the soaking, as if the pitch, being confined by the water, burned \nlonger, as in a lamp. \nGilpin, in his account of the forest borderers of England, says that “the encroachments of \ntrespassers, and the houses and fences thus raised on the borders of the forest,” were \n“considered as great nuisances by the old forest law, and were severely punished under \nthe name of purprestures, as tending ad terrorem ferarum — ad nocumentum forestae, \netc.,” to the frightening of the game and the detriment of the forest. But I was interested \nin the preservation of the venison and the vert more than the hunters or woodchoppers, \nand as much as though I had been the Lord Warden himself; and if any part was burned, \nthough I burned it myself by accident, I grieved with a grief that lasted longer and was \nmore inconsolable than that of the proprietors; nay, I grieved when it was cut down by \nthe proprietors themselves. I would that our farmers when they cut down a forest felt \nsome of that awe which the old Romans did when they came to thin, or let in the light to, \na consecrated grove (lucum conlucare), that is, would believe that it is sacred to some \ngod. The Roman made an expiatory offering, and prayed, Whatever god or goddess thou \nart to whom this grove is sacred, be propitious to me, my family, and children, etc. \nIt is remarkable what a value is still put upon wood even in this age and in this new \ncountry, a value more permanent and universal than that of gold. After all our \ndiscoveries and inventions no man will go by a pile of wood. It is as precious to us as it \nwas to our Saxon and Norman ancestors. If they made their bows of it, we make our \ngun-stocks of it. Michaux, more than thirty years ago, says that the price of wood for fuel \nin New York and Philadelphia “nearly equals, and sometimes exceeds, that of the best \nwood in Paris, though this immense capital annually requires more than three hundred \nthousand cords, and is surrounded to the distance of three hundred miles by cultivated \nplains.” In this town the price of wood rises almost steadily, and the only question is, \nhow much higher it is to be this year than it was the last. Mechanics and tradesmen who \ncome in person to the forest on no other errand, are sure to attend the wood auction, \nand even pay a high price for the privilege of gleaning after the woodchopper. It is now \nmany years that men have resorted to the forest for fuel and the materials of the arts: "}, {"pdfPage": 126, "text": "the New Englander and the New Hollander, the Parisian and the Celt, the farmer and \nRobin Hood, Goody Blake and Harry Gill; in most parts of the world the prince and the \npeasant, the scholar and the savage, equally require still a few sticks from the forest to \nwarm them and cook their food. Neither could I do without them. \nEvery man looks at his wood-pile with a kind of affection. I love to have mine before my \nwindow, and the more chips the better to remind me of my pleasing work. I had an old \naxe which nobody claimed, with which by spells in winter days, on the sunny side of the \nhouse, I played about the stumps which I had got out of my bean-field. As my driver \nprophesied when I was plowing, they warmed me twice — once while I was splitting \nthem, and again when they were on the fire, so that no fuel could give out more heat. As \nfor the axe, I was advised to get the village blacksmith to “jump” it; but I jumped him, \nand, putting a hickory helve from the woods into it, made it do. If it was dull, it was at \nleast hung true. \nA few pieces of fat pine were a great treasure. It is interesting to remember how much \nof this food for fire is still concealed in the bowels of the earth. In previous years I had \noften gone prospecting over some bare hillside, where a pitch pine wood had formerly \nstood, and got out the fat pine roots. They are almost indestructible. Stumps thirty or \nforty years old, at least, will still be sound at the core, though the sapwood has all \nbecome vegetable mould, as appears by the scales of the thick bark forming a ring level \nwith the earth four or five inches distant from the heart. With axe and shovel you \nexplore this mine, and follow the marrowy store, yellow as beef tallow, or as if you had \nstruck on a vein of gold, deep into the earth. But commonly I kindled my fire with the \ndry leaves of the forest, which I had stored up in my shed before the snow came. Green \nhickory finely split makes the woodchopper’s kindlings, when he has a camp in the \nwoods. Once in a while I got a little of this. When the villagers were lighting their fires \nbeyond the horizon, I too gave notice to the various wild inhabitants of Walden vale, by \na smoky streamer from my chimney, that I was awake. — \nLight-winged Smoke, Icarian bird, \nMelting thy pinions in thy upward flight, \nLark without song, and messenger of dawn, \nCircling above the hamlets as thy nest; \nOr else, departing dream, and shadowy form \nOf midnight vision, gathering up thy skirts; \nBy night star-veiling, and by day \nDarkening the light and blotting out the sun; \nGo thou my incense upward from this hearth, \nAnd ask the gods to pardon this clear flame. \nHard green wood just cut, though I used but little of that, answered my purpose better \nthan any other. I sometimes left a good fire when I went to take a walk in a winter \nafternoon; and when I returned, three or four hours afterward, it would be still alive and \nglowing. My house was not empty though I was gone. It was as if I had left a cheerful \nhousekeeper behind. It was I and Fire that lived there; and commonly my housekeeper \nproved trustworthy. One day, however, as I was splitting wood, I thought that I would \njust look in at the window and see if the house was not on fire; it was the only time I \nremember to have been particularly anxious on this score; so I looked and saw that a \nspark had caught my bed, and I went in and extinguished it when it had burned a place \nas big as my hand. But my house occupied so sunny and sheltered a position, and its "}, {"pdfPage": 127, "text": "roof was so low, that I could afford to let the fire go out in the middle of almost any \nwinter day. \nThe moles nested in my cellar, nibbling every third potato, and making a snug bed even \nthere of some hair left after plastering and of brown paper; for even the wildest animals \nlove comfort and warmth as well as man, and they survive the winter only because they \nare so careful to secure them. Some of my friends spoke as if I was coming to the woods \non purpose to freeze myself. The animal merely makes a bed, which he warms with his \nbody, in a sheltered place; but man, having discovered fire, boxes up some air in a \nspacious apartment, and warms that, instead of robbing himself, makes that his bed, in \nwhich he can move about divested of more cumbrous clothing, maintain a kind of \nsummer in the midst of winter, and by means of windows even admit the light, and with \na lamp lengthen out the day.  \nThus he goes a step or two beyond instinct, and saves a little time for the fine arts. \nThough, when I had been exposed to the rudest blasts a long time, my whole body began \nto grow torpid, when I reached the genial atmosphere of my house I soon recovered my \nfaculties and prolonged my life. But the most luxuriously housed has little to boast of in \nthis respect, nor need we trouble ourselves to speculate how the human race may be at \nlast destroyed. It would be easy to cut their threads any time with a little sharper blast \nfrom the north. We go on dating from Cold Fridays and Great Snows; but a little colder \nFriday, or greater snow would put a period to man’s existence on the globe. \nThe next winter I used a small cooking-stove for economy, since I did not own the \nforest; but it did not keep fire so well as the open fireplace. Cooking was then, for the \nmost part, no longer a poetic, but merely a chemic process. It will soon be forgotten, in \nthese days of stoves, that we used to roast potatoes in the ashes, after the Indian \nfashion.  \nThe stove not only took up room and scented the house, but it concealed the fire, and I \nfelt as if I had lost a companion. You can always see a face in the fire. The laborer, \nlooking into it at evening, purifies his thoughts of the dross and earthiness which they \nhave accumulated during the day. But I could no longer sit and look into the fire, and the \npertinent words of a poet recurred to me with new force. — \n“Never, bright flame, may be denied to me \nThy dear, life imaging, close sympathy. \nWhat but my hopes shot upward e’er so bright? \nWhat but my fortunes sunk so low in night? \nWhy art thou banished from our hearth and hall, \nThou who art welcomed and beloved by all? \nWas thy existence then too fanciful \nFor our life’s common light, who are so dull? \nDid thy bright gleam mysterious converse hold \nWith our congenial souls? secrets too bold? \nWell, we are safe and strong, for now we sit \nBeside a hearth where no dim shadows flit, \nWhere nothing cheers nor saddens, but a fire \nWarms feet and hands — nor does to more aspire; \nBy whose compact utilitarian heap \nThe present may sit down and go to sleep, "}, {"pdfPage": 128, "text": "Nor fear the ghosts who from the dim past walked, \nAnd with us by the unequal light of the old wood fire talked.” "}, {"pdfPage": 129, "text": "Former Inhabitants And Winter \nVisitors \n \nI weathered some merry snow-storms, and spent some cheerful winter evenings by my \nfireside, while the snow whirled wildly without, and even the hooting of the owl was \nhushed. For many weeks I met no one in my walks but those who came occasionally to \ncut wood and sled it to the village. The elements, however, abetted me in making a path \nthrough the deepest snow in the woods, for when I had once gone through the wind \nblew the oak leaves into my tracks, where they lodged, and by absorbing the rays of the \nsun melted the snow, and so not only made a my bed for my feet, but in the night their \ndark line was my guide. For human society I was obliged to conjure up the former \noccupants of these woods. Within the memory of many of my townsmen the road near \nwhich my house stands resounded with the laugh and gossip of inhabitants, and the \nwoods which border it were notched and dotted here and there with their little gardens \nand dwellings, though it was then much more shut in by the forest than now. In some \nplaces, within my own remembrance, the pines would scrape both sides of a chaise at \nonce, and women and children who were compelled to go this way to Lincoln alone and \non foot did it with fear, and often ran a good part of the distance. Though mainly but a \nhumble route to neighboring villages, or for the woodman’s team, it once amused the \ntraveller more than now by its variety, and lingered longer in his memory. Where now \nfirm open fields stretch from the village to the woods, it then ran through a maple \nswamp on a foundation of logs, the remnants of which, doubtless, still underlie the \npresent dusty highway, from the Stratton, now the Alms–House Farm, to Brister’s Hill. \nEast of my bean-field, across the road, lived Cato Ingraham, slave of Duncan Ingraham, \nEsquire, gentleman, of Concord village, who built his slave a house, and gave him \npermission to live in Walden Woods; — Cato, not Uticensis, but Concordiensis. Some say \nthat he was a Guinea Negro. There are a few who remember his little patch among the \nwalnuts, which he let grow up till he should be old and need them; but a younger and \nwhiter speculator got them at last. He too, however, occupies an equally narrow house \nat present. Cato’s half-obliterated cellar-hole still remains, though known to few, being \nconcealed from the traveller by a fringe of pines. It is now filled with the smooth sumach \n(Rhus glabra), and one of the earliest species of goldenrod (Solidago stricta) grows \nthere luxuriantly. \nHere, by the very corner of my field, still nearer to town, Zilpha, a colored woman, had \nher little house, where she spun linen for the townsfolk, making the Walden Woods ring \nwith her shrill singing, for she had a loud and notable voice. At length, in the war of \n1812, her dwelling was set on fire by English soldiers, prisoners on parole, when she \nwas away, and her cat and dog and hens were all burned up together. She led a hard life, \nand somewhat inhumane. One old frequenter of these woods remembers, that as he \npassed her house one noon he heard her muttering to herself over her gurgling pot — \n“Ye are all bones, bones!” I have seen bricks amid the oak copse there. \nDown the road, on the right hand, on Brister’s Hill, lived Brister Freeman, “a handy \nNegro,” slave of Squire Cummings once — there where grow still the apple trees which \nBrister planted and tended; large old trees now, but their fruit still wild and ciderish to "}, {"pdfPage": 130, "text": "my taste. Not long since I read his epitaph in the old Lincoln burying-ground, a little on \none side, near the unmarked graves of some British grenadiers who fell in the retreat \nfrom Concord — where he is styled “Sippio Brister” — Scipio Africanus he had some \ntitle to be called — “a man of color,” as if he were discolored. It also told me, with staring \nemphasis, when he died; which was but an indirect way of informing me that he ever \nlived. With him dwelt Fenda, his hospitable wife, who told fortunes, yet pleasantly — \nlarge, round, and black, blacker than any of the children of night, such a dusky orb as \nnever rose on Concord before or since. \nFarther down the hill, on the left, on the old road in the woods, are marks of some \nhomestead of the Stratton family; whose orchard once covered all the slope of Brister’s \nHill, but was long since killed out by pitch pines, excepting a few stumps, whose old \nroots furnish still the wild stocks of many a thrifty village tree. \nNearer yet to town, you come to Breed’s location, on the other side of the way, just on \nthe edge of the wood; ground famous for the pranks of a demon not distinctly named in \nold mythology, who has acted a prominent and astounding part in our New England life, \nand deserves, as much as any mythological character, to have his biography written one \nday; who first comes in the guise of a friend or hired man, and then robs and murders \nthe whole family — New–England Rum. But history must not yet tell the tragedies \nenacted here; let time intervene in some measure to assuage and lend an azure tint to \nthem. Here the most indistinct and dubious tradition says that once a tavern stood; the \nwell the same, which tempered the traveller’s beverage and refreshed his steed. Here \nthen men saluted one another, and heard and told the news, and went their ways again. \nBreed’s hut was standing only a dozen years ago, though it had long been unoccupied. It \nwas about the size of mine. It was set on fire by mischievous boys, one Election night, if I \ndo not mistake. I lived on the edge of the village then, and had just lost myself over \nDavenant’s “Gondibert,” that winter that I labored with a lethargy — which, by the way, \nI never knew whether to regard as a family complaint, having an uncle who goes to \nsleep shaving himself, and is obliged to sprout potatoes in a cellar Sundays, in order to \nkeep awake and keep the Sabbath, or as the consequence of my attempt to read \nChalmers’ collection of English poetry without skipping. It fairly overcame my Nervii. I \nhad just sunk my head on this when the bells rung fire, and in hot haste the engines \nrolled that way, led by a straggling troop of men and boys, and I among the foremost, for \nI had leaped the brook. We thought it was far south over the woods — we who had run \nto fires before — barn, shop, or dwelling-house, or all together. “It’s Baker’s barn,” cried \none. “It is the Codman place,” affirmed another. And then fresh sparks went up above \nthe wood, as if the roof fell in, and we all shouted “Concord to the rescue!” Wagons shot \npast with furious speed and crushing loads, bearing, perchance, among the rest, the \nagent of the Insurance Company, who was bound to go however far; and ever and anon \nthe engine bell tinkled behind, more slow and sure; and rearmost of all, as it was \nafterward whispered, came they who set the fire and gave the alarm. Thus we kept on \nlike true idealists, rejecting the evidence of our senses, until at a turn in the road we \nheard the crackling and actually felt the heat of the fire from over the wall, and realized, \nalas! that we were there. The very nearness of the fire but cooled our ardor. At first we \nthought to throw a frog-pond on to it; but concluded to let it burn, it was so far gone and \nso worthless. So we stood round our engine, jostled one another, expressed our \nsentiments through speaking-trumpets, or in lower tone referred to the great \nconflagrations which the world has witnessed, including Bascom’s shop, and, between \nourselves, we thought that, were we there in season with our “tub,” and a full frog-pond "}, {"pdfPage": 131, "text": "by, we could turn that threatened last and universal one into another flood. We finally \nretreated without doing any mischief — returned to sleep and “Gondibert.” But as for \n“Gondibert,” I would except that passage in the preface about wit being the soul’s \npowder — “but most of mankind are strangers to wit, as Indians are to powder.” \nIt chanced that I walked that way across the fields the following night, about the same \nhour, and hearing a low moaning at this spot, I drew near in the dark, and discovered \nthe only survivor of the family that I know, the heir of both its virtues and its vices, who \nalone was interested in this burning, lying on his stomach and looking over the cellar \nwall at the still smouldering cinders beneath, muttering to himself, as is his wont. He \nhad been working far off in the river meadows all day, and had improved the first \nmoments that he could call his own to visit the home of his fathers and his youth. He \ngazed into the cellar from all sides and points of view by turns, always lying down to it, \nas if there was some treasure, which he remembered, concealed between the stones, \nwhere there was absolutely nothing but a heap of bricks and ashes. The house being \ngone, he looked at what there was left. He was soothed by the sympathy which my mere \npresence, implied, and showed me, as well as the darkness permitted, where the well \nwas covered up; which, thank Heaven, could never be burned; and he groped long about \nthe wall to find the well-sweep which his father had cut and mounted, feeling for the \niron hook or staple by which a burden had been fastened to the heavy end — all that he \ncould now cling to — to convince me that it was no common “rider.” I felt it, and still \nremark it almost daily in my walks, for by it hangs the history of a family. \nOnce more, on the left, where are seen the well and lilac bushes by the wall, in the now \nopen field, lived Nutting and Le Grosse. But to return toward Lincoln. \nFarther in the woods than any of these, where the road approaches nearest to the pond, \nWyman the potter squatted, and furnished his townsmen with earthenware, and left \ndescendants to succeed him. Neither were they rich in worldly goods, holding the land \nby sufferance while they lived; and there often the sheriff came in vain to collect the \ntaxes, and “attached a chip,” for form’s sake, as I have read in his accounts, there being \nnothing else that he could lay his hands on. One day in midsummer, when I was hoeing, \na man who was carrying a load of pottery to market stopped his horse against my field \nand inquired concerning Wyman the younger. He had long ago bought a potter’s wheel \nof him, and wished to know what had become of him. I had read of the potter’s clay and \nwheel in Scripture, but it had never occurred to me that the pots we use were not such \nas had come down unbroken from those days, or grown on trees like gourds \nsomewhere, and I was pleased to hear that so fictile an art was ever practiced in my \nneighborhood. \nThe last inhabitant of these woods before me was an Irishman, Hugh Quoil (if I have \nspelt his name with coil enough), who occupied Wyman’s tenement — Col. Quoil, he was \ncalled. Rumor said that he had been a soldier at Waterloo. If he had lived I should have \nmade him fight his battles over again. His trade here was that of a ditcher. Napoleon \nwent to St. Helena; Quoil came to Walden Woods. All I know of him is tragic. He was a \nman of manners, like one who had seen the world, and was capable of more civil speech \nthan you could well attend to. He wore a greatcoat in midsummer, being affected with \nthe trembling delirium, and his face was the color of carmine. He died in the road at the \nfoot of Brister’s Hill shortly after I came to the woods, so that I have not remembered \nhim as a neighbor. Before his house was pulled down, when his comrades avoided it as \n“an unlucky castle,” I visited it. There lay his old clothes curled up by use, as if they were "}, {"pdfPage": 132, "text": "himself, upon his raised plank bed. His pipe lay broken on the hearth, instead of a bowl \nbroken at the fountain. The last could never have been the symbol of his death, for he \nconfessed to me that, though he had heard of Brister’s Spring, he had never seen it; and \nsoiled cards, kings of diamonds, spades, and hearts, were scattered over the floor. One \nblack chicken which the administrator could not catch, black as night and as silent, not \neven croaking, awaiting Reynard, still went to roost in the next apartment. In the rear \nthere was the dim outline of a garden, which had been planted but had never received \nits first hoeing, owing to those terrible shaking fits, though it was now harvest time. It \nwas overrun with Roman wormwood and beggar-ticks, which last stuck to my clothes \nfor all fruit. The skin of a woodchuck was freshly stretched upon the back of the house, a \ntrophy of his last Waterloo; but no warm cap or mittens would he want more. \nNow only a dent in the earth marks the site of these dwellings, with buried cellar stones, \nand strawberries, raspberries, thimble-berries, hazel-bushes, and sumachs growing in \nthe sunny sward there; some pitch pine or gnarled oak occupies what was the chimney \nnook, and a sweet-scented black birch, perhaps, waves where the door-stone was. \nSometimes the well dent is visible, where once a spring oozed; now dry and tearless \ngrass; or it was covered deep — not to be discovered till some late day — with a flat \nstone under the sod, when the last of the race departed. What a sorrowful act must that \nbe — the covering up of wells! coincident with the opening of wells of tears. These cellar \ndents, like deserted fox burrows, old holes, are all that is left where once were the stir \nand bustle of human life, and “fate, free will, foreknowledge absolute,” in some form and \ndialect or other were by turns discussed. But all I can learn of their conclusions amounts \nto just this, that “Cato and Brister pulled wool”; which is about as edifying as the history \nof more famous schools of philosophy. \nStill grows the vivacious lilac a generation after the door and lintel and the sill are gone, \nunfolding its sweet-scented flowers each spring, to be plucked by the musing traveller; \nplanted and tended once by children’s hands, in front-yard plots — now standing by \nwallsides in retired pastures, and giving place to new-rising forests; — the last of that \nstirp, sole survivor of that family. Little did the dusky children think that the puny slip \nwith its two eyes only, which they stuck in the ground in the shadow of the house and \ndaily watered, would root itself so, and outlive them, and house itself in the rear that \nshaded it, and grown man’s garden and orchard, and tell their story faintly to the lone \nwanderer a half-century after they had grown up and died — blossoming as fair, and \nsmelling as sweet, as in that first spring. I mark its still tender, civil, cheerful lilac colors. \nBut this small village, germ of something more, why did it fail while Concord keeps its \nground? Were there no natural advantages — no water privileges, forsooth? Ay, the \ndeep Walden Pond and cool Brister’s Spring — privilege to drink long and healthy \ndraughts at these, all unimproved by these men but to dilute their glass. They were \nuniversally a thirsty race. Might not the basket, stable-broom, mat-making, corn-\nparching, linen-spinning, and pottery business have thrived here, making the \nwilderness to blossom like the rose, and a numerous posterity have inherited the land of \ntheir fathers? The sterile soil would at least have been proof against a low-land \ndegeneracy. Alas! how little does the memory of these human inhabitants enhance the \nbeauty of the landscape! Again, perhaps, Nature will try, with me for a first settler, and \nmy house raised last spring to be the oldest in the hamlet. \nI am not aware that any man has ever built on the spot which I occupy. Deliver me from \na city built on the site of a more ancient city, whose materials are ruins, whose gardens "}, {"pdfPage": 133, "text": "cemeteries. The soil is blanched and accursed there, and before that becomes necessary \nthe earth itself will be destroyed. With such reminiscences I repeopled the woods and \nlulled myself asleep. \nAt this season I seldom had a visitor. When the snow lay deepest no wanderer ventured \nnear my house for a week or fortnight at a time, but there I lived as snug as a meadow \nmouse, or as cattle and poultry which are said to have survived for a long time buried in \ndrifts, even without food; or like that early settler’s family in the town of Sutton, in this \nState, whose cottage was completely covered by the great snow of 1717 when he was \nabsent, and an Indian found it only by the hole which the chimney’s breath made in the \ndrift, and so relieved the family. But no friendly Indian concerned himself about me; nor \nneeded he, for the mas
