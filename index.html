 set for woodchucks, and so \nbecame a dead cat at last. \nI took down this dwelling the same morning, drawing the nails, and removed it to the \npond-side by small cartloads, spreading the boards on the grass there to bleach and \nwarp back again in the sun. One early thrush gave me a note or two as I drove along the \nwoodland path. I was informed treacherously by a young Patrick that neighbor Seeley, \nan Irishman, in the intervals of the carting, transferred the still tolerable, straight, and \ndrivable nails, staples, and spikes to his pocket, and then stood when I came back to \npass the time of day, and look freshly up, unconcerned, with spring thoughts, at the \ndevastation; there being a dearth of work, as he said. He was there to represent \nspectatordom, and help make this seemingly insignificant event one with the removal of \nthe gods of Troy. \nI dug my cellar in the side of a hill sloping to the south, where a woodchuck had \nformerly dug his burrow, down through sumach and blackberry roots, and the lowest \nstain of vegetation, six feet square by seven deep, to a fine sand where potatoes would \nnot freeze in any winter. The sides were left shelving, and not stoned; but the sun having \nnever shone on them, the sand still keeps its place. It was but two hours’ work. I took \nparticular pleasure in this breaking of ground, for in almost all latitudes men dig into \nthe earth for an equable temperature. Under the most splendid house in the city is still \nto be found the cellar where they store their roots as of old, and long after the \nsuperstructure has disappeared posterity remark its dent in the earth. The house is still \nbut a sort of porch at the entrance of a burrow. \nAt length, in the beginning of May, with the help of some of my acquaintances, rather to \nimprove so good an occasion for neighborliness than from any necessity, I set up the \nframe of my house. No man was ever more honored in the character of his raisers than I. \nThey are destined, I trust, to assist at the raising of loftier structures one day. I began to \noccupy my house on the 4th of July, as soon as it was boarded and roofed, for the boards \nwere carefully feather-edged and lapped, so that it was perfectly impervious to rain, but \nbefore boarding I laid the foundation of a chimney at one end, bringing two cartloads of \nstones up the hill from the pond in my arms. I built the chimney after my hoeing in the \nfall, before a fire became necessary for warmth, doing my cooking in the meanwhile out \nof doors on the ground, early in the morning: which mode I still think is in some \nrespects more convenient and agreeable than the usual one. When it stormed before my \nbread was baked, I fixed a few boards over the fire, and sat under them to watch my \nloaf, and passed some pleasant hours in that way. In those days, when my hands were \nmuch employed, I read but little, but the least scraps of paper which lay on the ground, \nmy holder, or tablecloth, afforded me as much entertainment, in fact answered the same \npurpose as the Iliad. \nIt would be worth the while to build still more deliberately than I did, considering, for \ninstance, what foundation a door, a window, a cellar, a garret, have in the nature of man, "}, {"pdfPage": 25, "text": "and perchance never raising any superstructure until we found a better reason for it \nthan our temporal necessities even. There is some of the same fitness in a man’s \nbuilding his own house that there is in a bird’s building its own nest. Who knows but if \nmen constructed their dwellings with their own hands, and provided food for \nthemselves and families simply and honestly enough, the poetic faculty would be \nuniversally developed, as birds universally sing when they are so engaged? But alas! we \ndo like cowbirds and cuckoos, which lay their eggs in nests which other birds have built, \nand cheer no traveller with their chattering and unmusical notes. Shall we forever \nresign the pleasure of construction to the carpenter? What does architecture amount to \nin the experience of the mass of men? I never in all my walks came across a man \nengaged in so simple and natural an occupation as building his house. We belong to the \ncommunity. It is not the tailor alone who is the ninth part of a man; it is as much the \npreacher, and the merchant, and the farmer. Where is this division of labor to end? and \nwhat object does it finally serve? No doubt another may also think for me; but it is not \ntherefore desirable that he should do so to the exclusion of my thinking for myself. \nTrue, there are architects so called in this country, and I have heard of one at least \npossessed with the idea of making architectural ornaments have a core of truth, a \nnecessity, and hence a beauty, as if it were a revelation to him. All very well perhaps \nfrom his point of view, but only a little better than the common dilettantism. A \nsentimental reformer in architecture, he began at the cornice, not at the foundation. It \nwas only how to put a core of truth within the ornaments, that every sugarplum, in fact, \nmight have an almond or caraway seed in it — though I hold that almonds are most \nwholesome without the sugar — and not how the inhabitant, the indweller, might build \ntruly within and without, and let the ornaments take care of themselves. What \nreasonable man ever supposed that ornaments were something outward and in the skin \nmerely — that the tortoise got his spotted shell, or the shell-fish its mother-o’-pearl \ntints, by such a contract as the inhabitants of Broadway their Trinity Church? But a man \nhas no more to do with the style of architecture of his house than a tortoise with that of \nits shell: nor need the soldier be so idle as to try to paint the precise color of his virtue \non his standard. The enemy will find it out. He may turn pale when the trial comes. This \nman seemed to me to lean over the cornice, and timidly whisper his half truth to the \nrude occupants who really knew it better than he. What of architectural beauty I now \nsee, I know has gradually grown from within outward, out of the necessities and \ncharacter of the indweller, who is the only builder — out of some unconscious \ntruthfulness, and nobleness, without ever a thought for the appearance and whatever \nadditional beauty of this kind is destined to be produced will be preceded by a like \nunconscious beauty of life. The most interesting dwellings in this country, as the painter \nknows, are the most unpretending, humble log huts and cottages of the poor commonly; \nit is the life of the inhabitants whose shells they are, and not any peculiarity in their \nsurfaces merely, which makes them picturesque; and equally interesting will be the \ncitizen’s suburban box, when his life shall be as simple and as agreeable to the \nimagination, and there is as little straining after effect in the style of his dwelling. A \ngreat proportion of architectural ornaments are literally hollow, and a September gale \nwould strip them off, like borrowed plumes, without injury to the substantials. They can \ndo without architecture who have no olives nor wines in the cellar. What if an equal ado \nwere made about the ornaments of style in literature, and the architects of our bibles \nspent as much time about their cornices as the architects of our churches do? So are \nmade the belles-lettres and the beaux-arts and their professors. Much it concerns a man, \nforsooth, how a few sticks are slanted over him or under him, and what colors are "}, {"pdfPage": 26, "text": "daubed upon his box. It would signify somewhat, if, in any earnest sense, he slanted \nthem and daubed it; but the spirit having departed out of the tenant, it is of a piece with \nconstructing his own coffin — the architecture of the grave — and “carpenter” is but \nanother name for “coffin-maker.” One man says, in his despair or indifference to life, \ntake up a handful of the earth at your feet, and paint your house that color. Is he \nthinking of his last and narrow house? Toss up a copper for it as well. What an \nabundance of leisure be must have! Why do you take up a handful of dirt? Better paint \nyour house your own complexion; let it turn pale or blush for you. An enterprise to \nimprove the style of cottage architecture! When you have got my ornaments ready, I \nwill wear them. \nBefore winter I built a chimney, and shingled the sides of my house, which were already \nimpervious to rain, with imperfect and sappy shingles made of the first slice of the log, \nwhose edges I was obliged to straighten with a plane. \nI have thus a tight shingled and plastered house, ten feet wide by fifteen long, and eight-\nfeet posts, with a garret and a closet, a large window on each side, two trap doors, one \ndoor at the end, and a brick fireplace opposite. The exact cost of my house, paying the \nusual price for such materials as I used, but not counting the work, all of which was \ndone by myself, was as follows; and I give the details because very few are able to tell \nexactly what their houses cost, and fewer still, if any, the separate cost of the various \nmaterials which compose them:— \nBoards . . . . . . . . . . . . . . . . . . . . . . . . .. $ 8.03+, mostly shanty boards. \nRefuse shingles for roof sides. . . 4.00 \nLaths . . . . . . . . . . . . . . . . . . . . . . . . . . . . 1.25 \nTwo second-hand windows \n with glass . . . . . . . . . . . . . . . . . . . . 2.43 \nOne thousand old brick . . . . . . . .. . . 4.00 \nTwo casks of lime . . . . . . . . . . . . . . . . 2.40That was high. \nHair . . . . . . . . . . . . . . . . . . . . . . . . . . . . .0.31More than I needed. \nMantle-tree iron . . . . . . . . . . . . . . . . .0.15 \nNails . . . . . . . . . . . . . . . . . . . . . . . . . . . . 3.90 \nHinges and screws . . . . . . . . . . . . . . . . 0.14 \nLatch . . . . . . . . . . . . . . . . . . . . . . . . . . . . 0.10 \nChalk . . . . . . . . . . . . . . . . . . . . . . . . . . . . 0.01 \nTransportation . . . . . . . . . . . . . . . .. . . 1.40I carried a good part \n------- on my back. \nIn all . . . . . . . . . . . . . . . . . . . . .. $28.12+ \n \nThese are all the materials, excepting the timber, stones, and sand, which I claimed by \nsquatter’s right. I have also a small woodshed adjoining, made chiefly of the stuff which \nwas left after building the house. "}, {"pdfPage": 27, "text": "I intend to build me a house which will surpass any on the main street in Concord in \ngrandeur and luxury, as soon as it pleases me as much and will cost me no more than \nmy present one. \nI thus found that the student who wishes for a shelter can obtain one for a lifetime at an \nexpense not greater than the rent which he now pays annually. If I seem to boast more \nthan is becoming, my excuse is that I brag for humanity rather than for myself; and my \nshortcomings and inconsistencies do not affect the truth of my statement. \nNotwithstanding much cant and hypocrisy — chaff which I find it difficult to separate \nfrom my wheat, but for which I am as sorry as any man — I will breathe freely and \nstretch myself in this respect, it is such a relief to both the moral and physical system; \nand I am resolved that I will not through humility become the devil’s attorney. I will \nendeavor to speak a good word for the truth. At Cambridge College the mere rent of a \nstudent’s room, which is only a little larger than my own, is thirty dollars each year, \nthough the corporation had the advantage of building thirty-two side by side and under \none roof, and the occupant suffers the inconvenience of many and noisy neighbors, and \nperhaps a residence in the fourth story. I cannot but think that if we had more true \nwisdom in these respects, not only less education would be needed, because, forsooth, \nmore would already have been acquired, but the pecuniary expense of getting an \neducation would in a great measure vanish. Those conveniences which the student \nrequires at Cambridge or elsewhere cost him or somebody else ten times as great a \nsacrifice of life as they would with proper management on both sides. Those things for \nwhich the most money is demanded are never the things which the student most wants. \nTuition, for instance, is an important item in the term bill, while for the far more \nvaluable education which he gets by associating with the most cultivated of his \ncontemporaries no charge is made. The mode of founding a college is, commonly, to get \nup a subscription of dollars and cents, and then, following blindly the principles of a \ndivision of labor to its extreme — a principle which should never be followed but with \ncircumspection — to call in a contractor who makes this a subject of speculation, and he \nemploys Irishmen or other operatives actually to lay the foundations, while the students \nthat are to be are said to be fitting themselves for it; and for these oversights successive \ngenerations have to pay. I think that it would be better than this, for the students, or \nthose who desire to be benefited by it, even to lay the foundation themselves. The \nstudent who secures his coveted leisure and retirement by systematically shirking any \nlabor necessary to man obtains but an ignoble and unprofitable leisure, defrauding \nhimself of the experience which alone can make leisure fruitful. “But,” says one, “you do \nnot mean that the students should go to work with their hands instead of their heads?” I \ndo not mean that exactly, but I mean something which he might think a good deal like \nthat; I mean that they should not play life, or study it merely, while the community \nsupports them at this expensive game, but earnestly live it from beginning to end. How \ncould youths better learn to live than by at once trying the experiment of living? \nMethinks this would exercise their minds as much as mathematics. If I wished a boy to \nknow something about the arts and sciences, for instance, I would not pursue the \ncommon course, which is merely to send him into the neighborhood of some professor, \nwhere anything is professed and practised but the art of life; — to survey the world \nthrough a telescope or a microscope, and never with his natural eye; to study chemistry, \nand not learn how his bread is made, or mechanics, and not learn how it is earned; to \ndiscover new satellites to Neptune, and not detect the motes in his eyes, or to what \nvagabond he is a satellite himself; or to be devoured by the monsters that swarm all \naround him, while contemplating the monsters in a drop of vinegar. Which would have "}, {"pdfPage": 28, "text": "advanced the most at the end of a month — the boy who had made his own jackknife \nfrom the ore which he had dug and smelted, reading as much as would be necessary for \nthis — or the boy who had attended the lectures on metallurgy at the Institute in the \nmeanwhile, and had received a Rodgers’ penknife from his father? Which would be most \nlikely to cut his fingers? . . . To my astonishment I was informed on leaving college that I \nhad studied navigation! — why, if I had taken one turn down the harbor I should have \nknown more about it. Even the poor student studies and is taught only political \neconomy, while that economy of living which is synonymous with philosophy is not \neven sincerely professed in our colleges. The consequence is, that while he is reading \nAdam Smith, Ricardo, and Say, he runs his father in debt irretrievably. \nAs with our colleges, so with a hundred “modern improvements”; there is an illusion \nabout them; there is not always a positive advance. The devil goes on exacting \ncompound interest to the last for his early share and numerous succeeding investments \nin them. Our inventions are wont to be pretty toys, which distract our attention from \nserious things. They are but improved means to an unimproved end, an end which it \nwas already but too easy to arrive at; as railroads lead to Boston or New York. We are in \ngreat haste to construct a magnetic telegraph from Maine to Texas; but Maine and \nTexas, it may be, have nothing important to communicate. Either is in such a \npredicament as the man who was earnest to be introduced to a distinguished deaf \nwoman, but when he was presented, and one end of her ear trumpet was put into his \nhand, had nothing to say. As if the main object were to talk fast and not to talk sensibly. \nWe are eager to tunnel under the Atlantic and bring the Old World some weeks nearer \nto the New; but perchance the first news that will leak through into the broad, flapping \nAmerican ear will be that the Princess Adelaide has the whooping cough. After all, the \nman whose horse trots a mile in a minute does not carry the most important messages; \nhe is not an evangelist, nor does he come round eating locusts and wild honey. I doubt if \nFlying Childers ever carried a peck of corn to mill. \nOne says to me, “I wonder that you do not lay up money; you love to travel; you might \ntake the cars and go to Fitchburg today and see the country.” But I am wiser than that. I \nhave learned that the swiftest traveller is he that goes afoot. I say to my friend, Suppose \nwe try who will get there first. The distance is thirty miles; the fare ninety cents. That is \nalmost a day’s wages. I remember when wages were sixty cents a day for laborers on \nthis very road. Well, I start now on foot, and get there before night; I have travelled at \nthat rate by the week together. You will in the meanwhile have earned your fare, and \narrive there some time tomorrow, or possibly this evening, if you are lucky enough to \nget a job in season. Instead of going to Fitchburg, you will be working here the greater \npart of the day. And so, if the railroad reached round the world, I think that I should \nkeep ahead of you; and as for seeing the country and getting experience of that kind, I \nshould have to cut your acquaintance altogether. \nSuch is the universal law, which no man can ever outwit, and with regard to the railroad \neven we may say it is as broad as it is long. To make a railroad round the world available \nto all mankind is equivalent to grading the whole surface of the planet. Men have an \nindistinct notion that if they keep up this activity of joint stocks and spades long enough \nall will at length ride somewhere, in next to no time, and for nothing; but though a \ncrowd rushes to the depot, and the conductor shouts “All aboard!” when the smoke is \nblown away and the vapor condensed, it will be perceived that a few are riding, but the \nrest are run over — and it will be called, and will be, “A melancholy accident.” No doubt \nthey can ride at last who shall have earned their fare, that is, if they survive so long, but "}, {"pdfPage": 29, "text": "they will probably have lost their elasticity and desire to travel by that time. This \nspending of the best part of one’s life earning money in order to enjoy a questionable \nliberty during the least valuable part of it reminds me of the Englishman who went to \nIndia to make a fortune first, in order that he might return to England and live the life of \na poet. He should have gone up garret at once. “What!” exclaim a million Irishmen \nstarting up from all the shanties in the land, “is not this railroad which we have built a \ngood thing?” Yes, I answer, comparatively good, that is, you might have done worse; but \nI wish, as you are brothers of mine, that you could have spent your time better than \ndigging in this dirt. \nBefore I finished my house, wishing to earn ten or twelve dollars by some honest and \nagreeable method, in order to meet my unusual expenses, I planted about two acres and \na half of light and sandy soil near it chiefly with beans, but also a small part with \npotatoes, corn, peas, and turnips. The whole lot contains eleven acres, mostly growing \nup to pines and hickories, and was sold the preceding season for eight dollars and eight \ncents an acre. One farmer said that it was “good for nothing but to raise cheeping \nsquirrels on.” I put no manure whatever on this land, not being the owner, but merely a \nsquatter, and not expecting to cultivate so much again, and I did not quite hoe it all once. \nI got out several cords of stumps in plowing, which supplied me with fuel for a long \ntime, and left small circles of virgin mould, easily distinguishable through the summer \nby the greater luxuriance of the beans there. The dead and for the most part \nunmerchantable wood behind my house, and the driftwood from the pond, have \nsupplied the remainder of my fuel. I was obliged to hire a team and a man for the \nplowing, though I held the plow myself. My farm outgoes for the first season were, for \nimplements, seed, work, etc., $14.72+. The seed corn was given me. This never costs \nanything to speak of, unless you plant more than enough. I got twelve bushels of beans, \nand eighteen bushels of potatoes, beside some peas and sweet corn. The yellow corn \nand turnips were too late to come to anything. My whole income from the farm was \n$ 23.44 \nDeducting the outgoes . . . . . . . . . . . . 14.72+ \n------- \nThere are left . . . . . . . . . . . . . . . . .. $8.71+ \n \nbeside produce consumed and on hand at the time this estimate was made of the value \nof $4.50 — the amount on hand much more than balancing a little grass which I did not \nraise. All things considered, that is, considering the importance of a man’s soul and of \ntoday, notwithstanding the short time occupied by my experiment, nay, partly even \nbecause of its transient character, I believe that that was doing better than any farmer in \nConcord did that year. \nThe next year I did better still, for I spaded up all the land which I required, about a \nthird of an acre, and I learned from the experience of both years, not being in the least \nawed by many celebrated works on husbandry, Arthur Young among the rest, that if one \nwould live simply and eat only the crop which he raised, and raise no more than he ate, \nand not exchange it for an insufficient quantity of more luxurious and expensive things, \nhe would need to cultivate only a few rods of ground, and that it would be cheaper to \nspade up that than to use oxen to plow it, and to select a fresh spot from time to time \nthan to manure the old, and he could do all his necessary farm work as it were with his "}, {"pdfPage": 30, "text": "left hand at odd hours in the summer; and thus he would not be tied to an ox, or horse, \nor cow, or pig, as at present. I desire to speak impartially on this point, and as one not \ninterested in the success or failure of the present economical and social arrangements. I \nwas more independent than any farmer in Concord, for I was not anchored to a house or \nfarm, but could follow the bent of my genius, which is a very crooked one, every \nmoment. Beside being better off than they already, if my house had been burned or my \ncrops had failed, I should have been nearly as well off as before. \nI am wont to think that men are not so much the keepers of herds as herds are the \nkeepers of men, the former are so much the freer. Men and oxen exchange work; but if \nwe consider necessary work only, the oxen will be seen to have greatly the advantage, \ntheir farm is so much the larger. Man does some of his part of the exchange work in his \nsix weeks of haying, and it is no boy’s play. Certainly no nation that lived simply in all \nrespects, that is, no nation of philosophers, would commit so great a blunder as to use \nthe labor of animals. True, there never was and is not likely soon to be a nation of \nphilosophers, nor am I certain it is desirable that there should be. However, I should \nnever have broken a horse or bull and taken him to board for any work he might do for \nme, for fear I should become a horseman or a herdsman merely; and if society seems to \nbe the gainer by so doing, are we certain that what is one man’s gain is not another’s \nloss, and that the stable-boy has equal cause with his master to be satisfied? Granted \nthat some public works would not have been constructed without this aid, and let man \nshare the glory of such with the ox and horse; does it follow that he could not have \naccomplished works yet more worthy of himself in that case? When men begin to do, \nnot merely unnecessary or artistic, but luxurious and idle work, with their assistance, it \nis inevitable that a few do all the exchange work with the oxen, or, in other words, \nbecome the slaves of the strongest. Man thus not only works for the animal within him, \nbut, for a symbol of this, he works for the animal without him. Though we have many \nsubstantial houses of brick or stone, the prosperity of the farmer is still measured by the \ndegree to which the barn overshadows the house. This town is said to have the largest \nhouses for oxen, cows, and horses hereabouts, and it is not behindhand in its public \nbuildings; but there are very few halls for free worship or free speech in this county. It \nshould not be by their architecture, but why not even by their power of abstract \nthought, that nations should seek to commemorate themselves? How much more \nadmirable the Bhagvat–Geeta than all the ruins of the East! Towers and temples are the \nluxury of princes. A simple and independent mind does not toil at the bidding of any \nprince. Genius is not a retainer to any emperor, nor is its material silver, or gold, or \nmarble, except to a trifling extent. To what end, pray, is so much stone hammered? In \nArcadia, when I was there, I did not see any hammering stone. Nations are possessed \nwith an insane ambition to perpetuate the memory of themselves by the amount of \nhammered stone they leave. What if equal pains were taken to smooth and polish their \nmanners? One piece of good sense would be more memorable than a monument as high \nas the moon. I love better to see stones in place. The grandeur of Thebes was a vulgar \ngrandeur. More sensible is a rod of stone wall that bounds an honest man’s field than a \nhundred-gated Thebes that has wandered farther from the true end of life. The religion \nand civilization which are barbaric and heathenish build splendid temples; but what you \nmight call Christianity does not. Most of the stone a nation hammers goes toward its \ntomb only. It buries itself alive. As for the Pyramids, there is nothing to wonder at in \nthem so much as the fact that so many men could be found degraded enough to spend \ntheir lives constructing a tomb for some ambitious booby, whom it would have been \nwiser and manlier to have drowned in the Nile, and then given his body to the dogs. I "}, {"pdfPage": 31, "text": "might possibly invent some excuse for them and him, but I have no time for it. As for the \nreligion and love of art of the builders, it is much the same all the world over, whether \nthe building be an Egyptian temple or the United States Bank. It costs more than it \ncomes to. The mainspring is vanity, assisted by the love of garlic and bread and butter. \nMr. Balcom, a promising young architect, designs it on the back of his Vitruvius, with \nhard pencil and ruler, and the job is let out to Dobson & Sons, stonecutters. When the \nthirty centuries begin to look down on it, mankind begin to look up at it. As for your \nhigh towers and monuments, there was a crazy fellow once in this town who undertook \nto dig through to China, and he got so far that, as he said, he heard the Chinese pots and \nkettles rattle; but I think that I shall not go out of my way to admire the hole which he \nmade. Many are concerned about the monuments of the West and the East — to know \nwho built them. For my part, I should like to know who in those days did not build them \n— who were above such trifling. But to proceed with my statistics. \nBy surveying, carpentry, and day-labor of various other kinds in the village in the \nmeanwhile, for I have as many trades as fingers, I had earned $13.34. The expense of \nfood for eight months, namely, from July 4th to March 1st, the time when these \nestimates were made, though I lived there more than two years — not counting \npotatoes, a little green corn, and some peas, which I had raised, nor considering the \nvalue of what was on hand at the last date — was \nRice . . . . . . . . . . . . . . . . . . . .$ 1.73 1/2 \nMolasses . . . . . . . . . . . . . . . . .1.73 Cheapest form of the \n saccharine. \nRye meal . . . . . . . . . . . . . . . . .1.04 3/4 \nIndian meal . . . . . . . . . . . . ..0.99 3/4Cheaper than rye. \nPork . . . . . . . . . . . . . . . . . . . . .0.22 \nAll experiments which failed: \nFlour . . . . . . . . . . . . . . . . . . . . 0.88Costs more than Indian meal, \nboth money and trouble. \nSugar . . . . . . . . . . . . . . . . . . . . 0.80 \nLard . . . . . . . . . . . . . . . . . . . . .0.65 \nApples . . . . . . . . . . . . . . . .. . . 0.25 \nDried apple . . . . . . . . . . . . ..0.22 \nSweet potatoes . . . . . . . .. . . 0.10 \nOne pumpkin . . . . . . . . . . . . ..0.06 \nOne watermelon . . . . . . . .. . . 0.02 \nSalt . . . . . . . . . . . . . . . . . . . . .0.03 \n \n \nYes, I did eat $8.74, all told; but I should not thus unblushingly publish my guilt, if I did \nnot know that most of my readers were equally guilty with myself, and that their deeds "}, {"pdfPage": 32, "text": "would look no better in print. The next year I sometimes caught a mess of fish for my \ndinner, and once I went so far as to slaughter a woodchuck which ravaged my bean-field \n— effect his transmigration, as a Tartar would say — and devour him, partly for \nexperiment’s sake; but though it afforded me a momentary enjoyment, notwithstanding \na musky flavor, I saw that the longest use would not make that a good practice, however \nit might seem to have your woodchucks ready dressed by the village butcher. \nClothing and some incidental expenses within the same dates, though little can be \ninferred from this item, amounted to \n$ 8.40-3/4 \nOil and some household utensils . . . . . . . . 2.00 \n \nSo that all the pecuniary outgoes, excepting for washing and mending, which for the \nmost part were done out of the house, and their bills have not yet been received — and \nthese are all and more than all the ways by which money necessarily goes out in this \npart of the world — were \nHouse . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . . $ 28.12+ \nFarm one year . . . . . . . . . . . . . . . . . . . . . . . .. . .14.72+ \nFood eight months . . . . . . . . . . . . . . . . . . . .. . . 8.74 \nClothing, etc., eight months . . . . . . . . . . . . 8.40-3/4 \nOil, etc., eight months . . . . . . . . . . . . . . . . .2.00 \n----------- \nIn all . . . . . . . . . . . . . . . . . . . . . . . . . . . .$ 61.99-3/4 \n \nI address myself now to those of my readers who have a living to get. And to meet this I \nhave for farm produce sold \n$ 23.44 \nEarned by day-labor . . . . . . . . . . . . . . . . . . . . 13.34 \n------- \nIn all . . . . . . . . . . . . . . . . . . . . . . . . . . . .$ 36.78, \n \nwhich subtracted from the sum of the outgoes leaves a balance of $25.21 3/4 on the one \nside — this being very nearly the means with which I started, and the measure of \nexpenses to be incurred — and on the other, beside the leisure and independence and \nhealth thus secured, a comfortable house for me as long as I choose to occupy it. \nThese statistics, however accidental and therefore uninstructive they may appear, as \nthey have a certain completeness, have a certain value also. Nothing was given me of \nwhich I have not rendered some account. It appears from the above estimate, that my \nfood alone cost me in money about twenty-seven cents a week. It was, for nearly two \nyears after this, rye and Indian meal without yeast, potatoes, rice, a very little salt pork, \nmolasses, and salt; and my drink, water. It was fit that I should live on rice, mainly, who "}, {"pdfPage": 33, "text": "love so well the philosophy of India. To meet the objections of some inveterate cavillers, \nI may as well state, that if I dined out occasionally, as I always had done, and I trust shall \nhave opportunities to do again, it was frequently to the detriment of my domestic \narrangements. But the dining out, being, as I have stated, a constant element, does not in \nthe least affect a comparative statement like this. \nI learned from my two years’ experience that it would cost incredibly little trouble to \nobtain one’s necessary food, even in this latitude; that a man may use as simple a diet as \nthe animals, and yet retain health and strength. I have made a satisfactory dinner, \nsatisfactory on several accounts, simply off a dish of purslane (Portulaca oleracea) \nwhich I gathered in my cornfield, boiled and salted. I give the Latin on account of the \nsavoriness of the trivial name. And pray what more can a reasonable man desire, in \npeaceful times, in ordinary noons, than a sufficient number of ears of green sweet corn \nboiled, with the addition of salt? Even the little variety which I used was a yielding to the \ndemands of appetite, and not of health. Yet men have come to such a pass that they \nfrequently starve, not for want of necessaries, but for want of luxuries; and I know a \ngood woman who thinks that her son lost his life because he took to drinking water \nonly. \nThe reader will perceive that I am treating the subject rather from an economic than a \ndietetic point of view, and he will not venture to put my abstemiousness to the test \nunless he has a well-stocked larder. \nBread I at first made of pure Indian meal and salt, genuine hoe-cakes, which I baked \nbefore my fire out of doors on a shingle or the end of a stick of timber sawed off in \nbuilding my house; but it was wont to get smoked and to have a piny flavor, I tried flour \nalso; but have at last found a mixture of rye and Indian meal most convenient and \nagreeable. In cold weather it was no little amusement to bake several small loaves of \nthis in succession, tending and turning them as carefully as an Egyptian his hatching \neggs. They were a real cereal fruit which I ripened, and they had to my senses a \nfragrance like that of other noble fruits, which I kept in as long as possible by wrapping \nthem in cloths. I made a study of the ancient and indispensable art of bread-making, \nconsulting such authorities as offered, going back to the primitive days and first \ninvention of the unleavened kind, when from the wildness of nuts and meats men first \nreached the mildness and refinement of this diet, and travelling gradually down in my \nstudies through that accidental souring of the dough which, it is supposed, taught the \nleavening process, and through the various fermentations thereafter, till I came to \n“good, sweet, wholesome bread,” the staff of life. Leaven, which some deem the soul of \nbread, the spiritus which fills its cellular tissue, which is religiously preserved like the \nvestal fire — some precious bottleful, I suppose, first brought over in the Mayflower, did \nthe business for America, and its influence is still rising, swelling, spreading, in cerealian \nbillows over the land — this seed I regularly and faithfully procured from the village, till \nat length one morning I forgot the rules, and scalded my yeast; by which accident I \ndiscovered that even this was not indispensable — for my discoveries were not by the \nsynthetic but analytic process — and I have gladly omitted it since, though most \nhousewives earnestly assured me that safe and wholesome bread without yeast might \nnot be, and elderly people prophesied a speedy decay of the vital forces. Yet I find it not \nto be an essential ingredient, and after going without it for a year am still in the land of \nthe living; and I am glad to escape the trivialness of carrying a bottleful in my pocket, \nwhich would sometimes pop and discharge its contents to my discomfiture. It is simpler \nand more respectable to omit it. Man is an animal who more than any other can adapt "}, {"pdfPage": 34, "text": "himself to all climates and circumstances. Neither did I put any sal-soda, or other acid or \nalkali, into my bread. It would seem that I made it according to the recipe which Marcus \nPorcius Cato gave about two centuries before Christ. “Panem depsticium sic facito. \nManus mortariumque bene lavato. Farinam in mortarium indito, aquae paulatim addito, \nsubigitoque pulchre. Ubi bene subegeris, defingito, coquitoque sub testu.” Which I take \nto mean, — “Make kneaded bread thus. Wash your hands and trough well. Put the meal \ninto the trough, add water gradually, and knead it thoroughly. When you have kneaded \nit well, mould it, and bake it under a cover,” that is, in a baking kettle. Not a word about \nleaven. But I did not always use this staff of life. At one time, owing to the emptiness of \nmy purse, I saw none of it for more than a month. \nEvery New Englander might easily raise all his own breadstuffs in this land of rye and \nIndian corn, and not depend on distant and fluctuating markets for them. Yet so far are \nwe from simplicity and independence that, in Concord, fresh and sweet meal is rarely \nsold in the shops, and hominy and corn in a still coarser form are hardly used by any. \nFor the most part the farmer gives to his cattle and hogs the grain of his own producing, \nand buys flour, which is at least no more wholesome, at a greater cost, at the store. I saw \nthat I could easily raise my bushel or two of rye and Indian corn, for the former will \ngrow on the poorest land, and the latter does not require the best, and grind them in a \nhand-mill, and so do without rice and pork; and if I must have some concentrated sweet, \nI found by experiment that I could make a very good molasses either of pumpkins or \nbeets, and I knew that I needed only to set out a few maples to obtain it more easily still, \nand while these were growing I could use various substitutes beside those which I have \nnamed. “For,” as the Forefathers sang — \n“we can make liquor to sweeten our lips \nOf pumpkins and parsnips and walnut-tree chips.” \nFinally, as for salt, that grossest of groceries, to obtain this might be a fit occasion for a \nvisit to the seashore, or, if I did without it altogether, I should probably drink the less \nwater. I do not learn that the Indians ever troubled themselves to go after it. \nThus I could avoid all trade and barter, so far as my food was concerned, and having a \nshelter already, it would only remain to get clothing and fuel. The pantaloons which I \nnow wear were woven in a farmer’s family — thank Heaven there is so much virtue still \nin man; for I think the fall from the farmer to the operative as great and memorable as \nthat from the man to the farmer; — and in a new country, fuel is an encumbrance. As for \na habitat, if I were not permitted still to squat, I might purchase one acre at the same \nprice for which the land I cultivated was sold — namely, eight dollars and eight cents. \nBut as it was, I considered that I enhanced the value of the land by squatting on it. \nThere is a certain class of unbelievers who sometimes ask me such questions as, if I \nthink that I can live on vegetable food alone; and to strike at the root of the matter at \nonce — for the root is faith — I am accustomed to answer such, that I can live on board \nnails. If they cannot understand that, they cannot understand much that I have to say. \nFor my part, I am glad to bear of experiments of this kind being tried; as that a young \nman tried for a fortnight to live on hard, raw corn on the ear, using his teeth for all \nmortar. The squirrel tribe tried the same and succeeded. The human race is interested \nin these experiments, though a few old women who are incapacitated for them, or who \nown their thirds in mills, may be alarmed. \nMy furniture, part of which I made myself — and the rest cost me nothing of which I \nhave not rendered an account — consisted of a bed, a table, a desk, three chairs, a "}, {"pdfPage": 35, "text": "looking-glass three inches in diameter, a pair of tongs and andirons, a kettle, a skillet, \nand a frying-pan, a dipper, a wash-bowl, two knives and forks, three plates, one cup, one \nspoon, a jug for oil, a jug for molasses, and a japanned lamp. None is so poor that he \nneed sit on a pumpkin. That is shiftlessness. There is a plenty of such chairs as I like best \nin the village garrets to be had for taking them away. Furniture! Thank God, I can sit and \nI can stand without the aid of a furniture warehouse. What man but a philosopher \nwould not be ashamed to see his furniture packed in a cart and going up country \nexposed to the light of heaven and the eyes of men, a beggarly account of empty boxes? \nThat is Spaulding’s furniture. I could never tell from inspecting such a load whether it \nbelonged to a so-called rich man or a poor one; the owner always seemed poverty-\nstricken. Indeed, the more you have of such things the poorer you are. Each load looks \nas if it contained the contents of a dozen shanties; and if one shanty is poor, this is a \ndozen times as poor. Pray, for what do we move ever but to get rid of our furniture, our \nexuvioe: at last to go from this world to another newly furnished, and leave this to be \nburned? It is the same as if all these traps were buckled to a man’s belt, and he could not \nmove over the rough country where our lines are cast without dragging them — \ndragging his trap. He was a lucky fox that left his tail in the trap. The muskrat will gnaw \nhis third leg off to be free. No wonder man has lost his elasticity. How often he is at a \ndead set! “Sir, if I may be so bold, what do you mean by a dead set?” If you are a seer, \nwhenever you meet a man you will see all that he owns, ay, and much that he pretends \nto disown, behind him, even to his kitchen furniture and all the trumpery which he \nsaves and will not burn, and he will appear to be harnessed to it and making what \nheadway he can. I think that the man is at a dead set who has got through a knot-hole or \ngateway where his sledge load of furniture cannot follow him. I cannot but feel \ncompassion when I hear some trig, compact-looking man, seemingly free, all girded and \nready, speak of his “furniture,” as whether it is insured or not. “But what shall I do with \nmy furniture?” — My gay butterfly is entangled in a spider’s web then. Even those who \nseem for a long while not to have any, if you inquire more narrowly you will find have \nsome stored in somebody’s barn. I look upon England today as an old gentleman who is \ntravelling with a great deal of baggage, trumpery which has accumulated from long \nhousekeeping, which he has not the courage to burn; great trunk, little trunk, bandbox, \nand bundle. Throw away the first three at least. It would surpass the powers of a well \nman nowadays to take up his bed and walk, and I should certainly advise a sick one to \nlay down his bed and run. When I have met an immigrant tottering under a bundle \nwhich contained his all — looking like an enormous wen which had grown out of the \nnape of his neck — I have pitied him, not because that was his all, but because he had all \nthat to carry. If I have got to drag my trap, I will take care that it be a light one and do \nnot nip me in a vital part. But perchance it would be wisest never to put one’s paw into \nit. \nI would observe, by the way, that it costs me nothing for curtains, for I have no gazers to \nshut out but the sun and moon, and I am willing that they should look in. The moon will \nnot sour milk nor taint meat of mine, nor will the sun injure my furniture or fade my \ncarpet; and if he is sometimes too warm a friend, I find it still better economy to retreat \nbehind some curtain which nature has provided, than to add a single item to the details \nof housekeeping. A lady once offered me a mat, but as I had no room to spare within the \nhouse, nor time to spare within or without to shake it, I declined it, preferring to wipe \nmy feet on the sod before my door. It is best to avoid the beginnings of evil. "}, {"pdfPage": 36, "text": "Not long since I was present at the auction of a deacon’s effects, for his life had not been \nineffectual:— \n“The evil that men do lives after them.” \nAs usual, a great proportion was trumpery which had begun to accumulate in his \nfather’s day. Among the rest was a dried tapeworm. And now, after lying half a century \nin his garret and other dust holes, these things were not burned; instead of a bonfire, or \npurifying destruction of them, there was an auction, or increasing of them. The \nneighbors eagerly collected to view them, bought them all, and carefully transported \nthem to their garrets and dust holes, to lie there till their estates are settled, when they \nwill start again. When a man dies he kicks the dust. \nThe customs of some savage nations might, perchance, be profitably imitated by us, for \nthey at least go through the semblance of casting their slough annually; they have the \nidea of the thing, whether they have the reality or not. Would it not be well if we were to \ncelebrate such a “busk,” or “feast of first fruits,” as Bartram describes to have been the \ncustom of the Mucclasse Indians? “When a town celebrates the busk,” says he, “having \npreviously provided themselves with new clothes, new pots, pans, and other household \nutensils and furniture, they collect all their worn out clothes and other despicable \nthings, sweep and cleanse their houses, squares, and the whole town of their filth, which \nwith all the remaining grain and other old provisions they cast together into one \ncommon heap, and consume it with fire. After having taken medicine, and fasted for \nthree days, all the fire in the town is extinguished. During this fast they abstain from the \ngratification of every appetite and passion whatever. A general amnesty is proclaimed; \nall malefactors may return to their town.” \n“On the fourth morning, the high priest, by rubbing dry wood together, produces new \nfire in the public square, from whence every habitation in the town is supplied with the \nnew and pure flame.” \nThey then feast on the new corn and fruits, and dance and sing for three days, “and the \nfour following days they receive visits and rejoice with their friends from neighboring \ntowns who have in like manner purified and prepared themselves.” \nThe Mexicans also practised a similar purification at the end of every fifty-two years, in \nthe belief that it was time for the world to come to an end. \nI have scarcely heard of a truer sacrament, that is, as the dictionary defines it, “outward \nand visible sign of an inward and spiritual grace,” than this, and I have no doubt that \nthey were originally inspired directly from Heaven to do thus, though they have no \nBiblical record of the revelation. \nFor more than five years I maintained myself thus solely by the labor of my hands, and I \nfound that, by working about six weeks in a year, I could meet all the expenses of living. \nThe whole of my winters, as well as most of my summers, I had free and clear for study. \nI have thoroughly tried school-keeping, and found that my expenses were in proportion, \nor rather out of proportion, to my income, for I was obliged to dress and train, not to say \nthink and believe, accordingly, and I lost my time into the bargain. As I did not teach for \nthe good of my fellow-men, but simply for a livelihood, this was a failure. I have tried \ntrade but I found that it would take ten years to get under way in that, and that then I \nshould probably be on my way to the devil. I was actually afraid that I might by that \ntime be doing what is called a good business. When formerly I was looking about to see \nwhat I could do for a living, some sad experience in conforming to the wishes of friends "}, {"pdfPage": 37, "text": "being fresh in my mind to tax my ingenuity, I thought often and seriously of picking \nhuckleberries; that surely I could do, and its small profits might suffice — for my \ngreatest skill has been to want but little — so little capital it required, so little \ndistraction from my wonted moods, I foolishly thought. While my acquaintances went \nunhesitatingly into trade or the professions, I contemplated this occupation as most like \ntheirs; ranging the hills all summer to pick the berries which came in my way, and \nthereafter carelessly dispose of them; so, to keep the flocks of Admetus. I also dreamed \nthat I might gather the wild herbs, or carry evergreens to such villagers as loved to be \nreminded of the woods, even to the city, by hay-cart loads. But I have since learned that \ntrade curses everything it handles; and though you trade in messages from heaven, the \nwhole curse of trade attaches to the business. \nAs I preferred some things to others, and especially valued my freedom, as I could fare \nhard and yet succeed well, I did not wish to spend my time in earning rich carpets or \nother fine furniture, or delicate cookery, or a house in the Grecian or the Gothic style \njust yet. If there are any to whom it is no interruption to acquire these things, and who \nknow how to use them when acquired, I relinquish to them the pursuit. Some are \n“industrious,” and appear to love labor for its own sake, or perhaps because it keeps \nthem out of worse mischief; to such I have at present nothing to say. Those who would \nnot know what to do with more leisure than they now enjoy, I might advise to work \ntwice as hard as they do — work till they pay for themselves, and get their free papers. \nFor myself I found that the occupation of a day-laborer was the most independent of \nany, especially as it required only thirty or forty days in a year to support one. The \nlaborer’s day ends with the going down of the sun, and he is then free to devote himself \nto his chosen pursuit, independent of his labor; but his employer, who speculates from \nmonth to month, has no respite from one end of the year to the other. \nIn short, I am convinced, both by faith and experience, that to maintain one’s self on this \nearth is not a hardship but a pastime, if we will live simply and wisely; as the pursuits of \nthe simpler nations are still the sports of the more artificial. It is not necessary that a \nman should earn his living by the sweat of his brow, unless he sweats easier than I do. \nOne young man of my acquaintance, who has inherited some acres, told me that he \nthought he should live as I did, if he had the means. I would not have any one adopt my \nmode of living on any account; for, beside that before he has fairly learned it I may have \nfound out another for myself, I desire that there may be as many different persons in the \nworld as possible; but I would have each one be very careful to find out and pursue his \nown way, and not his father’s or his mother’s or his neighbor’s instead. The youth may \nbuild or plant or sail, only let him not be hindered from doing that which he tells me he \nwould like to do. It is by a mathematical point only that we are wise, as the sailor or the \nfugitive slave keeps the polestar in his eye; but that is sufficient guidance for all our life. \nWe may not arrive at our port within a calculable period, but we would preserve the \ntrue course. \nUndoubtedly, in this case, what is true for one is truer still for a thousand, as a large \nhouse is not proportionally more expensive than a small one, since one roof may cover, \none cellar underlie, and one wall separate several apartments. But for my part, I \npreferred the solitary dwelling. Moreover, it will commonly be cheaper to build the \nwhole yourself than to convince another of the advantage of the common wall; and \nwhen you have done this, the common partition, to be much cheaper, must be a thin \none, and that other may prove a bad neighbor, and also not keep his side in repair. The "}, {"pdfPage": 38, "text": "only co-operation which is commonly possible is exceedingly partial and superficial; \nand what little true co-operation there is, is as if it were not, being a harmony inaudible \nto men. If a man has faith, he will co-operate with equal faith everywhere; if he has not \nfaith, he will continue to live like the rest of the world, whatever company he is joined \nto. To co-operate in the highest as well as the lowest sense, means to get our living \ntogether. I heard it proposed lately that two young men should travel together over the \nworld, the one without money, earning his means as he went, before the mast and \nbehind the plow, the other carrying a bill of exchange in his pocket. It was easy to see \nthat they could not long be companions or co-operate, since one would not operate at \nall. They would part at the first interesting crisis in their adventures. Above all, as I have \nimplied, the man who goes alone can start today; but he who travels with another must \nwait till that other is ready, and it may be a long time before they get off. \nBut all this is very selfish, I have heard some of my townsmen say. I confess that I have \nhitherto indulged very little in philanthropic enterprises. I have made some sacrifices to \na sense of duty, and among others have sacrificed this pleasure also. There are those \nwho have used all their arts to persuade me to undertake the support of some poor \nfamily in the town; and if I had nothing to do — for the devil finds employment for the \nidle — I might try my hand at some such pastime as that. However, when I have thought \nto indulge myself in this respect, and lay their Heaven under an obligation by \nmaintaining certain poor persons in all respects as comfortably as I maintain myself, \nand have even ventured so far as to make them the offer, they have one and all \nunhesitatingly preferred to remain poor. While my townsmen and women are devoted \nin so many ways to the good of their fellows, I trust that one at least may be spared to \nother and less humane pursuits. You must have a genius for charity as well as for \nanything else. As for Doing-good, that is one of the professions which are full. Moreover, \nI have tried it fairly, and, strange as it may seem, am satisfied that it does not agree with \nmy constitution. Probably I should not consciously and deliberately forsake my \nparticular calling to do the good which society demands of me, to save the universe from \nannihilation; and I believe that a like but infinitely greater steadfastness elsewhere is all \nthat now preserves it. But I would not stand between any man and his genius; and to \nhim who does this work, which I decline, with his whole heart and soul and life, I would \nsay, Persevere, even if the world call it doing evil, as it is most likely they will. \nI am far from supposing that my case is a peculiar one; no doubt many of my readers \nwould make a similar defence. At doing something — I will not engage that my \nneighbors shall pronounce it good — I do not hesitate to say that I should be a capital \nfellow to hire; but what that is, it is for my employer to find out. What good I do, in the \ncommon sense of that word, must be aside from my main path, and for the most part \nwholly unintended. Men say, practically, Begin where you are and such as you are, \nwithout aiming mainly to become of more worth, and with kindness aforethought go \nabout doing good. If I were to preach at all in this strain, I should say rather, Set about \nbeing good. As if the sun should stop when he had kindled his fires up to the splendor of \na moon or a star of the sixth magnitude, and go about like a Robin Goodfellow, peeping \nin at every cottage window, inspiring lunatics, and tainting meats, and making darkness \nvisible, instead of steadily increasing his genial heat and beneficence till he is of such \nbrightness that no mortal can look him in the face, and then, and in the meanwhile too, \ngoing about the world in his own orbit, doing it good, or rather, as a truer philosophy \nhas discovered, the world going about him getting good. When Phaeton, wishing to \nprove his heavenly birth by his beneficence, had the sun’s chariot but one day, and "}, {"pdfPage": 39, "text": "drove out of the beaten track, he burned several blocks of houses in the lower streets of \nheaven, and scorched the surface of the earth, and dried up every spring, and made the \ngreat desert of Sahara, till at length Jupiter hurled him headlong to the earth with a \nthunderbolt, and the sun, through grief at his death, did not shine for a year. \nThere is no odor so bad as that which arises from goodness tainted. It is human, it is \ndivine, carrion. If I knew for a certainty that a man was coming to my house with the \nconscious design of doing me good, I should run for my life, as from that dry and \nparching wind of the African deserts called the simoom, which fills the mouth and nose \nand ears and eyes with dust till you are suffocated, for fear that I should get some of his \ngood done to me — some of its virus mingled with my blood. No — in this case I would \nrather suffer evil the natural way. A man is not a good man to me because he will feed \nme if I should be starving, or warm me if I should be freezing, or pull me out of a ditch if \nI should ever fall into one. I can find you a Newfoundland dog that will do as much. \nPhilanthropy is not love for one’s fellow-man in the broadest sense. Howard was no \ndoubt an exceedingly kind and worthy man in his way, and has his reward; but, \ncomparatively speaking, what are a hundred Howards to us, if their philanthropy do not \nhelp us in our best estate, when we are most worthy to be helped? I never heard of a \nphilanthropic meeting in which it was sincerely proposed to do any good to me, or the \nlike of me. \nThe Jesuits were quite balked by those Indians who, being burned at the stake, \nsuggested new modes of torture to their tormentors. Being superior to physical \nsuffering, it sometimes chanced that they were superior to any consolation which the \nmissionaries could offer; and the law to do as you would be done by fell with less \npersuasiveness on the ears of those who, for their part, did not care how they were done \nby, who loved their enemies after a new fashion, and came very near freely forgiving \nthem all they did. \nBe sure that you give the poor the aid they most need, though it be your example which \nleaves them far behind. If you give money, spend yourself with it, and do not merely \nabandon it to them. We make curious mistakes sometimes. Often the poor man is not so \ncold and hungry as he is dirty and ragged and gross. It is partly his taste, and not merely \nhis misfortune. If you give him money, he will perhaps buy more rags with it. I was wont \nto pity the clumsy Irish laborers who cut ice on the pond, in such mean and ragged \nclothes, while I shivered in my more tidy and somewhat more fashionable garments, till, \none bitter cold day, one who had slipped into the water came to my house to warm him, \nand I saw him strip off three pairs of pants and two pairs of stockings ere he got down \nto the skin, though they were dirty and ragged enough, it is true, and that he could \nafford to refuse the extra garments which I offered him, he had so many intra ones. This \nducking was the very thing he needed. Then I began to pity myself, and I saw that it \nwould be a greater charity to bestow on me a flannel shirt than a whole slop-shop on \nhim. There are a thousand hacking at the branches of evil to one who is striking at the \nroot, and it may be that he who bestows the largest amount of time and money on the \nneedy is doing the most by his mode of life to produce that misery which he strives in \nvain to relieve. It is the pious slave-breeder devoting the proceeds of every tenth slave \nto buy a Sunday’s liberty for the rest. Some show their kindness to the poor by \nemploying them in their kitchens. Would they not be kinder if they employed \nthemselves there? You boast of spending a tenth part of your income in charity; maybe \nyou should spend the nine tenths so, and done with it. Society recovers only a tenth part "}, {"pdfPage": 40, "text": "of the property then. Is this owing to the generosity of him in whose possession it is \nfound, or to the remissness of the officers of justice? \nPhilanthropy is almost the only virtue which is sufficiently appreciated by mankind. \nNay, it is greatly overrated; and it is our selfishness which overrates it. A robust poor \nman, one sunny day here in Concord, praised a fellow-townsman to me, because, as he \nsaid, he was kind to the poor; meaning himself. The kind uncles and aunts of the race \nare more esteemed than its true spiritual fathers and mothers. I once heard a reverend \nlecturer on England, a man of learning and intelligence, after enumerating her scientific, \nliterary, and political worthies, Shakespeare, Bacon, Cromwell, Milton, Newton, and \nothers, speak next of her Christian heroes, whom, as if his profession required it of him, \nhe elevated to a place far above all the rest, as the greatest of the great. They were Penn, \nHoward, and Mrs. Fry. Every one must feel the falsehood and cant of this. The last were \nnot England’s best men and women; only, perhaps, her best philanthropists. \nI would not subtract anything from the praise that is due to philanthropy, but merely \ndemand justice for all who by their lives and works are a blessing to mankind. I do not \nvalue chiefly a man’s uprightness and benevolence, which are, as it were, his stem and \nleaves. Those plants of whose greenness withered we make herb tea for the sick serve \nbut a humble use, and are most employed by quacks. I want the flower and fruit of a \nman; that some fragrance be wafted over from him to me, and some ripeness flavor our \nintercourse. His goodness must not be a partial and transitory act, but a constant \nsuperfluity, which costs him nothing and of which he is unconscious. This is a charity \nthat hides a multitude of sins. The philanthropist too often surrounds mankind with the \nremembrance of his own castoff griefs as an atmosphere, and calls it sympathy. We \nshould impart our courage, and not our despair, our health and ease, and not our \ndisease, and take care that this does not spread by contagion. From what southern \nplains comes up the voice of wailing? Under what latitudes reside the heathen to whom \nwe would send light? Who is that intemperate and brutal man whom we would redeem? \nIf anything ail a man, so that he does not perform his functions, if he have a pain in his \nbowels even — for that is the seat of sympathy — he forthwith sets about reforming — \nthe world. Being a microcosm himself, he discovers — and it is a true discovery, and he \nis the man to make it — that the world has been eating green apples; to his eyes, in fact, \nthe globe itself is a great green apple, which there is danger awful to think of that the \nchildren of men will nibble before it is ripe; and straightway his drastic philanthropy \nseeks out the Esquimau and the Patagonian, and embraces the populous Indian and \nChinese villages; and thus, by a few years of philanthropic activity, the powers in the \nmeanwhile using him for their own ends, no doubt, he cures himself of his dyspepsia, \nthe globe acquires a faint blush on one or both of its cheeks, as if it were beginning to be \nripe, and life loses its crudity and is once more sweet and wholesome to live. I never \ndreamed of any enormity greater than I have committed. I never knew, and never shall \nknow, a worse man than myself. \nI believe that what so saddens the reformer is not his sympathy with his fellows in \ndistress, but, though he be the holiest son of God, is his private ail. Let this be righted, let \nthe spring come to him, the morning rise over his couch, and he will forsake his \ngenerous companions without apology. My excuse for not lecturing against the use of \ntobacco is, that I never chewed it, that is a penalty which reformed tobacco-chewers \nhave to pay; though there are things enough I have chewed which I could lecture \nagainst. If you should ever be betrayed into any of these philanthropies, do not let your "}, {"pdfPage": 41, "text": "left hand know what your right hand does, for it is not worth knowing. Rescue the \ndrowning and tie your shoestrings. Take your time, and set about some free labor. \nOur manners have been corrupted by communication with the saints. Our hymn-books \nresound with a melodious cursing of God and enduring Him forever. One would say that \neven the prophets and redeemers had rather consoled the fears than confirmed the \nhopes of man. There is nowhere recorded a simple and irrepressible satisfaction with \nthe gift of life, any memorable praise of God. All health and success does me good, \nhowever far off and withdrawn it may appear; all disease and failure helps to make me \nsad and does me evil, however much sympathy it may have with me or I with it. If, then, \nwe would indeed restore mankind by truly Indian, botanic, magnetic, or natural means, \nlet us first be as simple and well as Nature ourselves, dispel the clouds which hang over \nour own brows, and take up a little life into our pores. Do not stay to be an overseer of \nthe poor, but endeavor to become one of the worthies of the world. \nI read in the Gulistan, or Flower Garden, of Sheik Sadi of Shiraz, that “they asked a wise \nman, saying: Of the many celebrated trees which the Most High God has created lofty \nand umbrageous, they call none azad, or free, excepting the cypress, which bears no \nfruit; what mystery is there in this? He replied, Each has its appropriate produce, and \nappointed season, during the continuance of which it is fresh and blooming, and during \ntheir absence dry and withered; to neither of which states is the cypress exposed, being \nalways flourishing; and of this nature are the azads, or religious independents. — Fix \nnot thy heart on that which is transitory; for the Dijlah, or Tigris, will continue to flow \nthrough Bagdad after the race of caliphs is extinct: if thy hand has plenty, be liberal as \nthe date tree; but if it affords nothing to give away, be an azad, or free man, like the \ncypress.” \nCOMPLEMENTAL VERSES \nThe Pretensions of Poverty \nThou dost presume too much, poor needy wretch, \nTo claim a station in the firmament \nBecause thy humble cottage, or thy tub, \nNurses some lazy or pedantic virtue \nIn the cheap sunshine or by shady springs, \nWith roots and pot-herbs; where thy right hand, \nTearing those humane passions from the mind, \nUpon whose stocks fair blooming virtues flourish, \nDegradeth nature, and benumbeth sense, \nAnd, Gorgon-like, turns active men to stone. \nWe not require the dull society \nOf your necessitated temperance, \nOr that unnatural stupidity \nThat knows nor joy nor sorrow; nor your forc’d \nFalsely exalted passive fortitude \nAbove the active. This low abject brood, \nThat fix their seats in mediocrity, \nBecome your servile minds; but we advance \nSuch virtues only as admit excess, \nBrave, bounteous acts, regal magnificence, \nAll-seeing prudence, magnanimity \nThat knows no bound, and that heroic virtue "}, {"pdfPage": 42, "text": "For which antiquity hath left no name, \nBut patterns only, such as Hercules, \nAchilles, Theseus. Back to thy loath’d cell; \nAnd when thou seest the new enlightened sphere, \nStudy to know but what those worthies were. \nT. CAREW "}, {"pdfPage": 43, "text": "Where I Lived, And What I Lived For \n \nAt a certain season of our life we are accustomed to consider every spot as the possible \nsite of a house. I have thus surveyed the country on every side within a dozen miles of \nwhere I live. In imagination I have bought all the farms in succession, for all were to be \nbought, and I knew their price. I walked over each farmer’s premises, tasted his wild \napples, discoursed on husbandry with him, took his farm at his price, at any price, \nmortgaging it to him in my mind; even put a higher price on it — took everything but a \ndeed of it — took his word for his deed, for I dearly love to talk — cultivated it, and him \ntoo to some extent, I trust, and withdrew when I had enjoyed it long enough, leaving \nhim to carry it on. This experience entitled me to be regarded as a sort of real-estate \nbroker by my friends. Wherever I sat, there I might live, and the landscape radiated \nfrom me accordingly. What is a house but a sedes, a seat? — better if a country seat. I \ndiscovered many a site for a house not likely to be soon improved, which some might \nhave thought too far from the village, but to my eyes the village was too far from it. Well, \nthere I might live, I said; and there I did live, for an hour, a summer and a winter life; \nsaw how I could let the years run off, buffet the winter through, and see the spring come \nin. The future inhabitants of this region, wherever they may place their houses, may be \nsure that they have been anticipated. An afternoon sufficed to lay out the land into \norchard, wood-lot, and pasture, and to decide what fine oaks or pines should be left to \nstand before the door, and whence each blasted tree could be seen to the best \nadvantage; and then I let it lie, fallow, perchance, for a man is rich in proportion to the \nnumber of things which he can afford to let alone. \nMy imagination carried me so far that I even had the refusal of several farms — the \nrefusal was all I wanted — but I never got my fingers burned by actual possession. The \nnearest that I came to actual possession was when I bought the Hollowell place, and had \nbegun to sort my seeds, and collected materials with which to make a wheelbarrow to \ncarry it on or off with; but before the owner gave me a deed of it, his wife — every man \nhas such a wife — changed her mind and wished to keep it, and he offered me ten \ndollars to release him. Now, to speak the truth, I had but ten cents in the world, and it \nsurpassed my arithmetic to tell, if I was that man who had ten cents, or who had a farm, \nor ten dollars, or all together. However, I let him keep the ten dollars and the farm too, \nfor I had carried it far enough; or rather, to be generous, I sold him the farm for just \nwhat I gave for it, and, as he was not a rich man, made him a present of ten dollars, and \nstill had my ten cents, and seeds, and materials for a wheelbarrow left. I found thus that \nI had been a rich man without any damage to my poverty. But I retained the landscape, \nand I have since annually carried off what it yielded without a wheelbarrow. With \nrespect to landscapes, \n“I am monarch of all I survey, \nMy right there is none to dispute.” \nI have frequently seen a poet withdraw, having enjoyed the most valuable part of a farm, \nwhile the crusty farmer supposed that he had got a few wild apples only. Why, the \nowner does not know it for many years when a poet has put his farm in rhyme, the most \nadmirable kind of invisible fence, has fairly impounded it, milked it, skimmed it, and got \nall the cream, and left the farmer only the skimmed milk. "}, {"pdfPage": 44, "text": "The real attractions of the Hollowell farm, to me, were: its complete retirement, being, \nabout two miles from the village, half a mile from the nearest neighbor, and separated \nfrom the highway by a broad field; its bounding on the river, which the owner said \nprotected it by its fogs from frosts in the spring, though that was nothing to me; the gray \ncolor and ruinous state of the house and barn, and the dilapidated fences, which put \nsuch an interval between me and the last occupant; the hollow and lichen-covered apple \ntrees, nawed by rabbits, showing what kind of neighbors I should have; but above all, \nthe recollection I had of it from my earliest voyages up the river, when the house was \nconcealed behind a dense grove of red maples, through which I heard the house-dog \nbark. I was in haste to buy it, before the proprietor finished getting out some rocks, \ncutting down the hollow apple trees, and grubbing up some young birches which had \nsprung up in the pasture, or, in short, had made any more of his improvements. To enjoy \nthese advantages I was ready to carry it on; like Atlas, to take the world on my \nshoulders — I never heard what compensation he received for that — and do all those \nthings which had no other motive or excuse but that I might pay for it and be \nunmolested in my possession of it; for I knew all the while that it would yield the most \nabundant crop of the kind I wanted, if I could only afford to let it alone. But it turned out \nas I have said. \nAll that I could say, then, with respect to farming on a large scale — I have always \ncultivated a garden — was, that I had had my seeds ready. Many think that seeds \nimprove with age. I have no doubt that time discriminates between the good and the \nbad; and when at last I shall plant, I shall be less likely to be disappointed. But I would \nsay to my fellows, once for all, As long as possible live free and uncommitted. It makes \nbut little difference whether you are committed to a farm or the county jail. \nOld Cato, whose “De Re Rustica” is my “Cultivator,” says — and the only translation I \nhave seen makes sheer nonsense of the passage — “When you think of getting a farm \nturn it thus in your mind, not to buy greedily; nor spare your pains to look at it, and do \nnot think it enough to go round it once. The oftener you go there the more it will please \nyou, if it is good.” I think I shall not buy greedily, but go round and round it as long as I \nlive, and be buried in it first, that it may please me the more at last. \nThe present was my next experiment of this kind, which I purpose to describe more at \nlength, for convenience putting the experience of two years into one. As I have said, I do \nnot propose to write an ode to dejection, but to brag as lustily as chanticleer in the \nmorning, standing on his roost, if only to wake my neighbors up. \nWhen first I took up my abode in the woods, that is, began to spend my nights as well as \ndays there, which, by accident, was on Independence Day, or the Fourth of July, 1845, \nmy house was not finished for winter, but was merely a defence against the rain, \nwithout plastering or chimney, the walls being of rough, weather-stained boards, with \nwide chinks, which made it cool at night. The upright white hewn studs and freshly \nplaned door and window casings gave it a clean and airy look, especially in the morning, \nwhen its timbers were saturated with dew, so that I fancied that by noon some sweet \ngum would exude from them. To my imagination it retained throughout the day more or \nless of this auroral character, reminding me of a certain house on a mountain which I \nhad visited a year before. This was an airy and unplastered cabin, fit to entertain a \ntravelling god, and where a goddess might trail her garments. The winds which passed \nover my dwelling were such as sweep over the ridges of mountains, bearing the broken \nstrains, or celestial parts only, of terrestrial music. The morning wind forever blows, the "}, {"pdfPage": 45, "text": "poem of creation is uninterrupted; but few are the ears that hear it. Olympus is but the \noutside of the earth everywhere. \nThe only house I had been the owner of before, if I except a boat, was a tent, which I \nused occasionally when making excursions in the summer, and this is still rolled up in \nmy garret; but the boat, after passing from hand to hand, has gone down the stream of \ntime. With this more substantial shelter about me, I had made some progress toward \nsettling in the world. This frame, so slightly clad, was a sort of crystallization around me, \nand reacted on the builder. It was suggestive somewhat as a picture in outlines. I did not \nneed to go outdoors to take the air, for the atmosphere within had lost none of its \nfreshness. It was not so much within doors as behind a door where I sat, even in the \nrainiest weather. The Harivansa says, “An abode without birds is like a meat without \nseasoning.” Such was not my abode, for I found myself suddenly neighbor to the birds; \nnot by having imprisoned one, but having caged myself near them. I was not only nearer \nto some of those which commonly frequent the garden and the orchard, but to those \nsmaller and more thrilling songsters of the forest which never, or rarely, serenade a \nvillager — the wood thrush, the veery, the scarlet tanager, the field sparrow, the whip-\npoor-will, and many others. \nI was seated by the shore of a small pond, about a mile and a half south of the village of \nConcord and somewhat higher than it, in the midst of an extensive wood between that \ntown and Lincoln, and about two miles south of that our only field known to fame, \nConcord Battle Ground; but I was so low in the woods that the opposite shore, half a \nmile off, like the rest, covered with wood, was my most distant horizon. For the first \nweek, whenever I looked out on the pond it impressed me like a tarn high up on the side \nof a mountain, its bottom far above the surface of other lakes, and, as the sun arose, I \nsaw it throwing off its nightly clothing of mist, and here and there, by degrees, its soft \nripples or its smooth reflecting surface was revealed, while the mists, like ghosts, were \nstealthily withdrawing in every direction into the woods, as at the breaking up of some \nnocturnal conventicle. The very dew seemed to hang upon the trees later into the day \nthan usual, as on the sides of mountains. \nThis small lake was of most value as a neighbor in the intervals of a gentle rain-storm in \nAugust, when, both air and water being perfectly still, but the sky overcast, mid-\nafternoon had all the serenity of evening, and the wood thrush sang around, and was \nheard from shore to shore. A lake like this is never smoother than at such a time; and \nthe clear portion of the air above it being, shallow and darkened by clouds, the water, \nfull of light and reflections, becomes a lower heaven itself so much the more important. \nFrom a hill-top near by, where the wood had been recently cut off, there was a pleasing \nvista southward across the pond, through a wide indentation in the hills which form the \nshore there, where their opposite sides sloping toward each other suggested a stream \nflowing out in that direction through a wooded valley, but stream there was none. That \nway I looked between and over the near green hills to some distant and higher ones in \nthe horizon, tinged with blue. Indeed, by standing on tiptoe I could catch a glimpse of \nsome of the peaks of the still bluer and more distant mountain ranges in the northwest, \nthose true-blue coins from heaven’s own mint, and also of some portion of the village. \nBut in other directions, even from this point, I could not see over or beyond the woods \nwhich surrounded me. It is well to have some water in your neighborhood, to give \nbuoyancy to and float the earth. One value even of the smallest well is, that when you \nlook into it you see that earth is not continent but insular. This is as important as that it \nkeeps butter cool. When I looked across the pond from this peak toward the Sudbury "}, {"pdfPage": 46, "text": "meadows, which in time of flood I distinguished elevated perhaps by a mirage in their \nseething valley, like a coin in a basin, all the earth beyond the pond appea
