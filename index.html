ter of the house was at home. The Great Snow! How cheerful it is \nto hear of! When the farmers could not get to the woods and swamps with their teams, \nand were obliged to cut down the shade trees before their houses, and, when the crust \nwas harder, cut off the trees in the swamps, ten feet from the ground, as it appeared the \nnext spring. \nIn the deepest snows, the path which I used from the highway to my house, about half a \nmile long, might have been represented by a meandering dotted line, with wide \nintervals between the dots. For a week of even weather I took exactly the same number \nof steps, and of the same length, coming and going, stepping deliberately and with the \nprecision of a pair of dividers in my own deep tracks — to such routine the winter \nreduces us — yet often they were filled with heaven’s own blue. But no weather \ninterfered fatally with my walks, or rather my going abroad, for I frequently tramped \neight or ten miles through the deepest snow to keep an appointment with a beech tree, \nor a yellow birch, or an old acquaintance among the pines; when the ice and snow \ncausing their limbs to droop, and so sharpening their tops, had changed the pines into \nfir trees; wading to the tops of the highest hills when the show was nearly two feet deep \non a level, and shaking down another snow-storm on my head at every step; or \nsometimes creeping and floundering thither on my hands and knees, when the hunters \nhad gone into winter quarters. One afternoon I amused myself by watching a barred owl \n(Strix nebulosa) sitting on one of the lower dead limbs of a white pine, close to the \ntrunk, in broad daylight, I standing within a rod of him. He could hear me when I moved \nand cronched the snow with my feet, but could not plainly see me. When I made most \nnoise he would stretch out his neck, and erect his neck feathers, and open his eyes wide; \nbut their lids soon fell again, and he began to nod. I too felt a slumberous influence after \nwatching him half an hour, as he sat thus with his eyes half open, like a cat, winged \nbrother of the cat. There was only a narrow slit left between their lids, by which be \npreserved a pennisular relation to me; thus, with half-shut eyes, looking out from the \nland of dreams, and endeavoring to realize me, vague object or mote that interrupted \nhis visions. At length, on some louder noise or my nearer approach, he would grow \nuneasy and sluggishly turn about on his perch, as if impatient at having his dreams \ndisturbed; and when he launched himself off and flapped through the pines, spreading \nhis wings to unexpected breadth, I could not hear the slightest sound from them. Thus, \nguided amid the pine boughs rather by a delicate sense of their neighborhood than by \nsight, feeling his twilight way, as it were, with his sensitive pinions, he found a new \nperch, where he might in peace await the dawning of his day. \nAs I walked over the long causeway made for the railroad through the meadows, I \nencountered many a blustering and nipping wind, for nowhere has it freer play; and \nwhen the frost had smitten me on one cheek, heathen as I was, I turned to it the other "}, {"pdfPage": 134, "text": "also. Nor was it much better by the carriage road from Brister’s Hill. For I came to town \nstill, like a friendly Indian, when the contents of the broad open fields were all piled up \nbetween the walls of the Walden road, and half an hour sufficed to obliterate the tracks \nof the last traveller. And when I returned new drifts would have formed, through which \nI floundered, where the busy northwest wind had been depositing the powdery snow \nround a sharp angle in the road, and not a rabbit’s track, nor even the fine print, the \nsmall type, of a meadow mouse was to be seen. Yet I rarely failed to find, even in \nmidwinter, some warm and springly swamp where the grass and the skunk-cabbage \nstill put forth with perennial verdure, and some hardier bird occasionally awaited the \nreturn of spring. \nSometimes, notwithstanding the snow, when I returned from my walk at evening I \ncrossed the deep tracks of a woodchopper leading from my door, and found his pile of \nwhittlings on the hearth, and my house filled with the odor of his pipe. Or on a Sunday \nafternoon, if I chanced to be at home, I heard the cronching of the snow made by the \nstep of a long-headed farmer, who from far through the woods sought my house, to have \na social “crack”; one of the few of his vocation who are “men on their farms”; who \ndonned a frock instead of a professor’s gown, and is as ready to extract the moral out of \nchurch or state as to haul a load of manure from his barn-yard. We talked of rude and \nsimple times, when men sat about large fires in cold, bracing weather, with clear heads; \nand when other dessert failed, we tried our teeth on many a nut which wise squirrels \nhave long since abandoned, for those which have the thickest shells are commonly \nempty. \nThe one who came from farthest to my lodge, through deepest snows and most dismal \ntempests, was a poet. A farmer, a hunter, a soldier, a reporter, even a philosopher, may \nbe daunted; but nothing can deter a poet, for he is actuated by pure love. Who can \npredict his comings and goings? His business calls him out at all hours, even when \ndoctors sleep. We made that small house ring with boisterous mirth and resound with \nthe murmur of much sober talk, making amends then to Walden vale for the long \nsilences. Broadway was still and deserted in comparison. At suitable intervals there \nwere regular salutes of laughter, which might have been referred indifferently to the \nlast-uttered or the forth-coming jest. We made many a “bran new” theory of life over a \nthin dish of gruel, which combined the advantages of conviviality with the clear-\nheadedness which philosophy requires. \nI should not forget that during my last winter at the pond there was another welcome \nvisitor, who at one time came through the village, through snow and rain and darkness, \ntill he saw my lamp through the trees, and shared with me some long winter evenings. \nOne of the last of the philosophers — Connecticut gave him to the world — he peddled \nfirst her wares, afterwards, as he declares, his brains. These he peddles still, prompting \nGod and disgracing man, bearing for fruit his brain only, like the nut its kernel. I think \nthat he must be the man of the most faith of any alive. His words and attitude always \nsuppose a better state of things than other men are acquainted with, and he will be the \nlast man to be disappointed as the ages revolve. He has no venture in the present. But \nthough comparatively disregarded now, when his day comes, laws unsuspected by most \nwill take effect, and masters of families and rulers will come to him for advice. \n“How blind that cannot see serenity!” \nA true friend of man; almost the only friend of human progress. An Old Mortality, say \nrather an Immortality, with unwearied patience and faith making plain the image "}, {"pdfPage": 135, "text": "engraven in men’s bodies, the God of whom they are but defaced and leaning \nmonuments. With his hospitable intellect he embraces children, beggars, insane, and \nscholars, and entertains the thought of all, adding to it commonly some breadth and \nelegance. I think that he should keep a caravansary on the world’s highway, where \nphilosophers of all nations might put up, and on his sign should be printed, \n“Entertainment for man, but not for his beast. Enter ye that have leisure and a quiet \nmind, who earnestly seek the right road.” He is perhaps the sanest man and has the \nfewest crotchets of any I chance to know; the same yesterday and tomorrow. Of yore we \nhad sauntered and talked, and effectually put the world behind us; for he was pledged to \nno institution in it, freeborn, ingenuus. Whichever way we turned, it seemed that the \nheavens and the earth had met together, since he enhanced the beauty of the landscape. \nA blue-robed man, whose fittest roof is the overarching sky which reflects his serenity. I \ndo not see how he can ever die; Nature cannot spare him. \nHaving each some shingles of thought well dried, we sat and whittled them, trying our \nknives, and admiring the clear yellowish grain of the pumpkin pine. We waded so gently \nand reverently, or we pulled together so smoothly, that the fishes of thought were not \nscared from the stream, nor feared any angler on the bank, but came and went grandly, \nlike the clouds which float through the western sky, and the mother-o’-pearl flocks \nwhich sometimes form and dissolve there. There we worked, revising mythology, \nrounding a fable here and there, and building castles in the air for which earth offered \nno worthy foundation. Great Looker! Great Expecter! to converse with whom was a New \nEngland Night’s Entertainment. Ah! such discourse we had, hermit and philosopher, and \nthe old settler I have spoken of — we three — it expanded and racked my little house; I \nshould not dare to say how many pounds’ weight there was above the atmospheric \npressure on every circular inch; it opened its seams so that they had to be calked with \nmuch dulness thereafter to stop the consequent leak; — but I had enough of that kind of \noakum already picked. \nThere was one other with whom I had “solid seasons,” long to be remembered, at his \nhouse in the village, and who looked in upon me from time to time; but I had no more \nfor society there. \nThere too, as everywhere, I sometimes expected the Visitor who never comes. The \nVishnu Purana says, “The house-holder is to remain at eventide in his courtyard as long \nas it takes to milk a cow, or longer if he pleases, to await the arrival of a guest.” I often \nperformed this duty of hospitality, waited long enough to milk a whole herd of cows, but \ndid not see the man approaching from the town. "}, {"pdfPage": 136, "text": "Winter Animals \n \nWhen the ponds were firmly frozen, they afforded not only new and shorter routes to \nmany points, but new views from their surfaces of the familiar landscape around them. \nWhen I crossed Flint’s Pond, after it was covered with snow, though I had often paddled \nabout and skated over it, it was so unexpectedly wide and so strange that I could think \nof nothing but Baffin’s Bay. The Lincoln hills rose up around me at the extremity of a \nsnowy plain, in which I did not remember to have stood before; and the fishermen, at an \nindeterminable distance over the ice, moving slowly about with their wolfish dogs, \npassed for sealers, or Esquimaux, or in misty weather loomed like fabulous creatures, \nand I did not know whether they were giants or pygmies. I took this course when I went \nto lecture in Lincoln in the evening, travelling in no road and passing no house between \nmy own hut and the lecture room. In Goose Pond, which lay in my way, a colony of \nmuskrats dwelt, and raised their cabins high above the ice, though none could be seen \nabroad when I crossed it. Walden, being like the rest usually bare of snow, or with only \nshallow and interrupted drifts on it, was my yard where I could walk freely when the \nsnow was nearly two feet deep on a level elsewhere and the villagers were confined to \ntheir streets. There, far from the village street, and except at very long intervals, from \nthe jingle of sleigh-bells, I slid and skated, as in a vast moose-yard well trodden, \noverhung by oak woods and solemn pines bent down with snow or bristling with icicles. \nFor sounds in winter nights, and often in winter days, I heard the forlorn but melodious \nnote of a hooting owl indefinitely far; such a sound as the frozen earth would yield if \nstruck with a suitable plectrum, the very lingua vernacula of Walden Wood, and quite \nfamiliar to me at last, though I never saw the bird while it was making it. I seldom \nopened my door in a winter evening without hearing it; Hoo hoo hoo, hoorer, hoo, \nsounded sonorously, and the first three syllables accented somewhat like how der do; or \nsometimes hoo, hoo only. One night in the beginning of winter, before the pond froze \nover, about nine o’clock, I was startled by the loud honking of a goose, and, stepping to \nthe door, heard the sound of their wings like a tempest in the woods as they flew low \nover my house. They passed over the pond toward Fair Haven, seemingly deterred from \nsettling by my light, their commodore honking all the while with a regular beat. \nSuddenly an unmistakable cat-owl from very near me, with the most harsh and \ntremendous voice I ever heard from any inhabitant of the woods, responded at regular \nintervals to the goose, as if determined to expose and disgrace this intruder from \nHudson’s Bay by exhibiting a greater compass and volume of voice in a native, and boo-\nhoo him out of Concord horizon. What do you mean by alarming the citadel at this time \nof night consecrated to me? Do you think I am ever caught napping at such an hour, and \nthat I have not got lungs and a larynx as well as yourself? Boo-hoo, boo-hoo, boo-hoo! It \nwas one of the most thrilling discords I ever heard. And yet, if you had a discriminating \near, there were in it the elements of a concord such as these plains never saw nor heard. \nI also heard the whooping of the ice in the pond, my great bed-fellow in that part of \nConcord, as if it were restless in its bed and would fain turn over, were troubled with \nflatulency and had dreams; or I was waked by the cracking of the ground by the frost, as \nif some one had driven a team against my door, and in the morning would find a crack in \nthe earth a quarter of a mile long and a third of an inch wide. "}, {"pdfPage": 137, "text": "Sometimes I heard the foxes as they ranged over the snow-crust, in moonlight nights, in \nsearch of a partridge or other game, barking raggedly and demoniacally like forest dogs, \nas if laboring with some anxiety, or seeking expression, struggling for light and to be \ndogs outright and run freely in the streets; for if we take the ages into our account, may \nthere not be a civilization going on among brutes as well as men? They seemed to me to \nbe rudimental, burrowing men, still standing on their defence, awaiting their \ntransformation. Sometimes one came near to my window, attracted by my light, barked \na vulpine curse at me, and then retreated. \nUsually the red squirrel (Sciurus Hudsonius) waked me in the dawn, coursing over the \nroof and up and down the sides of the house, as if sent out of the woods for this purpose. \nIn the course of the winter I threw out half a bushel of ears of sweet corn, which had not \ngot ripe, on to the snow-crust by my door, and was amused by watching the motions of \nthe various animals which were baited by it. In the twilight and the night the rabbits \ncame regularly and made a hearty meal. All day long the red squirrels came and went, \nand afforded me much entertainment by their manoeuvres. One would approach at first \nwarily through the shrub oaks, running over the snow-crust by fits and starts like a leaf \nblown by the wind, now a few paces this way, with wonderful speed and waste of \nenergy, making inconceivable haste with his “trotters,” as if it were for a wager, and now \nas many paces that way, but never getting on more than half a rod at a time; and then \nsuddenly pausing with a ludicrous expression and a gratuitous somerset, as if all the \neyes in the universe were eyed on him — for all the motions of a squirrel, even in the \nmost solitary recesses of the forest, imply spectators as much as those of a dancing girl \n— wasting more time in delay and circumspection than would have sufficed to walk the \nwhole distance — I never saw one walk — and then suddenly, before you could say Jack \nRobinson, he would be in the top of a young pitch pine, winding up his clock and chiding \nall imaginary spectators, soliloquizing and talking to all the universe at the same time — \nfor no reason that I could ever detect, or he himself was aware of, I suspect. At length he \nwould reach the corn, and selecting a suitable ear, frisk about in the same uncertain \ntrigonometrical way to the topmost stick of my wood-pile, before my window, where he \nlooked me in the face, and there sit for hours, supplying himself with a new ear from \ntime to time, nibbling at first voraciously and throwing the half-naked cobs about; till at \nlength he grew more dainty still and played with his food, tasting only the inside of the \nkernel, and the ear, which was held balanced over the stick by one paw, slipped from his \ncareless grasp and fell to the ground, when he would look over at it with a ludicrous \nexpression of uncertainty, as if suspecting that it had life, with a mind not made up \nwhether to get it again, or a new one, or be off; now thinking of corn, then listening to \nhear what was in the wind. So the little impudent fellow would waste many an ear in a \nforenoon; till at last, seizing some longer and plumper one, considerably bigger than \nhimself, and skilfully balancing it, he would set out with it to the woods, like a tiger with \na buffalo, by the same zig-zag course and frequent pauses, scratching along with it as if \nit were too heavy for him and falling all the while, making its fall a diagonal between a \nperpendicular and horizontal, being determined to put it through at any rate; — a \nsingularly frivolous and whimsical fellow; — and so he would get off with it to where he \nlived, perhaps carry it to the top of a pine tree forty or fifty rods distant, and I would \nafterwards find the cobs strewn about the woods in various directions. \nAt length the jays arrive, whose discordant screams were heard long before, as they \nwere warily making their approach an eighth of a mile off, and in a stealthy and \nsneaking manner they flit from tree to tree, nearer and nearer, and pick up the kernels "}, {"pdfPage": 138, "text": "which the squirrels have dropped. Then, sitting on a pitch pine bough, they attempt to \nswallow in their haste a kernel which is too big for their throats and chokes them; and \nafter great labor they disgorge it, and spend an hour in the endeavor to crack it by \nrepeated blows with their bills. They were manifestly thieves, and I had not much \nrespect for them; but the squirrels, though at first shy, went to work as if they were \ntaking what was their own. \nMeanwhile also came the chickadees in flocks, which, picking up the crumbs the \nsquirrels had dropped, flew to the nearest twig and, placing them under their claws, \nhammered away at them with their little bills, as if it were an insect in the bark, till they \nwere sufficiently reduced for their slender throats. A little flock of these titmice came \ndaily to pick a dinner out of my woodpile, or the crumbs at my door, with faint flitting \nlisping notes, like the tinkling of icicles in the grass, or else with sprightly day day day, \nor more rarely, in spring-like days, a wiry summery phe-be from the woodside. They \nwere so familiar that at length one alighted on an armful of wood which I was carrying \nin, and pecked at the sticks without fear. I once had a sparrow alight upon my shoulder \nfor a moment while I was hoeing in a village garden, and I felt that I was more \ndistinguished by that circumstance than I should have been by any epaulet I could have \nworn. The squirrels also grew at last to be quite familiar, and occasionally stepped upon \nmy shoe, when that was the nearest way. \nWhen the ground was not yet quite covered, and again near the end of winter, when the \nsnow was melted on my south hillside and about my wood-pile, the partridges came out \nof the woods morning and evening to feed there. Whichever side you walk in the woods \nthe partridge bursts away on whirring wings, jarring the snow from the dry leaves and \ntwigs on high, which comes sifting down in the sunbeams like golden dust, for this brave \nbird is not to be scared by winter. It is frequently covered up by drifts, and, it is said, \n“sometimes plunges from on wing into the soft snow, where it remains concealed for a \nday or two.” I used to start them in the open land also, where they had come out of the \nwoods at sunset to “bud” the wild apple trees. They will come regularly every evening to \nparticular trees, where the cunning sportsman lies in wait for them, and the distant \norchards next the woods suffer thus not a little. I am glad that the partridge gets fed, at \nany rate. It is Nature’s own bird which lives on buds and diet drink. \nIn dark winter mornings, or in short winter afternoons, I sometimes heard a pack of \nhounds threading all the woods with hounding cry and yelp, unable to resist the instinct \nof the chase, and the note of the hunting-horn at intervals, proving that man was in the \nrear. The woods ring again, and yet no fox bursts forth on to the open level of the pond, \nnor following pack pursuing their Actaeon. And perhaps at evening I see the hunters \nreturning with a single brush trailing from their sleigh for a trophy, seeking their inn. \nThey tell me that if the fox would remain in the bosom of the frozen earth he would be \nsafe, or if be would run in a straight line away no foxhound could overtake him; but, \nhaving left his pursuers far behind, he stops to rest and listen till they come up, and \nwhen he runs he circles round to his old haunts, where the hunters await him. \nSometimes, however, he will run upon a wall many rods, and then leap off far to one \nside, and he appears to know that water will not retain his scent. A hunter told me that \nhe once saw a fox pursued by hounds burst out on to Walden when the ice was covered \nwith shallow puddles, run part way across, and then return to the same shore. Ere long \nthe hounds arrived, but here they lost the scent. Sometimes a pack hunting by \nthemselves would pass my door, and circle round my house, and yelp and hound \nwithout regarding me, as if afflicted by a species of madness, so that nothing could "}, {"pdfPage": 139, "text": "divert them from the pursuit. Thus they circle until they fall upon the recent trail of a \nfox, for a wise hound will forsake everything else for this. One day a man came to my hut \nfrom Lexington to inquire after his hound that made a large track, and had been hunting \nfor a week by himself. But I fear that he was not the wiser for all I told him, for every \ntime I attempted to answer his questions he interrupted me by asking, “What do you do \nhere?” He had lost a dog, but found a man. \nOne old hunter who has a dry tongue, who used to come to bathe in Walden once every \nyear when the water was warmest, and at such times looked in upon me, told me that \nmany years ago he took his gun one afternoon and went out for a cruise in Walden \nWood; and as he walked the Wayland road he heard the cry of hounds approaching, and \nere long a fox leaped the wall into the road, and as quick as thought leaped the other \nwall out of the road, and his swift bullet had not touched him. Some way behind came an \nold hound and her three pups in full pursuit, hunting on their own account, and \ndisappeared again in the woods. Late in the afternoon, as he was resting in the thick \nwoods south of Walden, he heard the voice of the hounds far over toward Fair Haven \nstill pursuing the fox; and on they came, their hounding cry which made all the woods \nring sounding nearer and nearer, now from Well Meadow, now from the Baker Farm. \nFor a long time he stood still and listened to their music, so sweet to a hunter’s ear, \nwhen suddenly the fox appeared, threading the solemn aisles with an easy coursing \npace, whose sound was concealed by a sympathetic rustle of the leaves, swift and still, \nkeeping the round, leaving his pursuers far behind; and, leaping upon a rock amid the \nwoods, he sat erect and listening, with his back to the hunter. For a moment compassion \nrestrained the latter’s arm; but that was a short-lived mood, and as quick as thought can \nfollow thought his piece was levelled, and whang! — the fox, rolling over the rock, lay \ndead on the ground. The hunter still kept his place and listened to the hounds. Still on \nthey came, and now the near woods resounded through all their aisles with their \ndemoniac cry. At length the old hound burst into view with muzzle to the ground, and \nsnapping the air as if possessed, and ran directly to the rock; but, spying the dead fox, \nshe suddenly ceased her hounding as if struck dumb with amazement, and walked \nround and round him in silence; and one by one her pups arrived, and, like their mother, \nwere sobered into silence by the mystery. Then the hunter came forward and stood in \ntheir midst, and the mystery was solved. They waited in silence while he skinned the \nfox, then followed the brush a while, and at length turned off into the woods again. That \nevening a Weston squire came to the Concord hunter’s cottage to inquire for his hounds, \nand told how for a week they had been hunting on their own account from Weston \nwoods. The Concord hunter told him what he knew and offered him the skin; but the \nother declined it and departed. He did not find his hounds that night, but the next day \nlearned that they had crossed the river and put up at a farmhouse for the night, whence, \nhaving been well fed, they took their departure early in the morning. \nThe hunter who told me this could remember one Sam Nutting, who used to hunt bears \non Fair Haven Ledges, and exchange their skins for rum in Concord village; who told \nhim, even, that he had seen a moose there. Nutting had a famous foxhound named \nBurgoyne — he pronounced it Bugine — which my informant used to borrow. In the \n“Wast Book” of an old trader of this town, who was also a captain, town-clerk, and \nrepresentative, I find the following entry. Jan. 18th, 1742–3, “John Melven Cr. by 1 Grey \nFox 0 — 2 — 3”; they are not now found here; and in his ledger, Feb, 7th, 1743, \nHezekiah Stratton has credit “by 1/2 a Catt skin 0 — 1 — 4+”; of course, a wild-cat, for \nStratton was a sergeant in the old French war, and would not have got credit for hunting "}, {"pdfPage": 140, "text": "less noble game. Credit is given for deerskins also, and they were daily sold. One man \nstill preserves the horns of the last deer that was killed in this vicinity, and another has \ntold me the particulars of the hunt in which his uncle was engaged. The hunters were \nformerly a numerous and merry crew here. I remember well one gaunt Nimrod who \nwould catch up a leaf by the roadside and play a strain on it wilder and more melodious, \nif my memory serves me, than any hunting-horn. \nAt midnight, when there was a moon, I sometimes met with hounds in my path prowling \nabout the woods, which would skulk out of my way, as if afraid, and stand silent amid \nthe bushes till I had passed. \nSquirrels and wild mice disputed for my store of nuts. There were scores of pitch pines \naround my house, from one to four inches in diameter, which had been gnawed by mice \nthe previous winter — a Norwegian winter for them, for the snow lay long and deep, \nand they were obliged to mix a large proportion of pine bark with their other diet. These \ntrees were alive and apparently flourishing at midsummer, and many of them had \ngrown a foot, though completely girdled; but after another winter such were without \nexception dead. It is remarkable that a single mouse should thus be allowed a whole \npine tree for its dinner, gnawing round instead of up and down it; but perhaps it is \nnecessary in order to thin these trees, which are wont to grow up densely. \nThe hares (Lepus Americanus) were very familiar. One had her form under my house all \nwinter, separated from me only by the flooring, and she startled me each morning by \nher hasty departure when I began to stir — thump, thump, thump, striking her head \nagainst the floor timbers in her hurry. They used to come round my door at dusk to \nnibble the potato parings which I had thrown out, and were so nearly the color of the \nground that they could hardly be distinguished when still. Sometimes in the twilight I \nalternately lost and recovered sight of one sitting motionless under my window. When I \nopened my door in the evening, off they would go with a squeak and a bounce. Near at \nhand they only excited my pity. One evening one sat by my door two paces from me, at \nfirst trembling with fear, yet unwilling to move; a poor wee thing, lean and bony, with \nragged ears and sharp nose, scant tail and slender paws. It looked as if Nature no longer \ncontained the breed of nobler bloods, but stood on her last toes. Its large eyes appeared \nyoung and unhealthy, almost dropsical. I took a step, and lo, away it scud with an elastic \nspring over the snow-crust, straightening its body and its limbs into graceful length, and \nsoon put the forest between me and itself — the wild free venison, asserting its vigor \nand the dignity of Nature. Not without reason was its slenderness. Such then was its \nnature. (Lepus, levipes, light-foot, some think.) \nWhat is a country without rabbits and partridges? They are among the most simple and \nindigenous animal products; ancient and venerable families known to antiquity as to \nmodern times; of the very hue and substance of Nature, nearest allied to leaves and to \nthe ground — and to one another; it is either winged or it is legged. It is hardly as if you \nhad seen a wild creature when a rabbit or a partridge bursts away, only a natural one, as \nmuch to be expected as rustling leaves. The partridge and the rabbit are still sure to \nthrive, like true natives of the soil, whatever revolutions occur. If the forest is cut off, the \nsprouts and bushes which spring up afford them concealment, and they become more \nnumerous than ever. That must be a poor country indeed that does not support a hare. \nOur woods teem with them both, and around every swamp may be seen the partridge or \nrabbit walk, beset with twiggy fences and horse-hair snares, which some cow-boy tends. "}, {"pdfPage": 141, "text": "The Pond In Winter \n \nAfter a still winter night I awoke with the impression that some question had been put \nto me, which I had been endeavoring in vain to answer in my sleep, as what — how — \nwhen — where? But there was dawning Nature, in whom all creatures live, looking in at \nmy broad windows with serene and satisfied face, and no question on her lips. I awoke \nto an answered question, to Nature and daylight. The snow lying deep on the earth \ndotted with young pines, and the very slope of the hill on which my house is placed, \nseemed to say, Forward! Nature puts no question and answers none which we mortals \nask. She has long ago taken her resolution. “O Prince, our eyes contemplate with \nadmiration and transmit to the soul the wonderful and varied spectacle of this universe. \nThe night veils without doubt a part of this glorious creation; but day comes to reveal to \nus this great work, which extends from earth even into the plains of the ether.” \nThen to my morning work. First I take an axe and pail and go in search of water, if that \nbe not a dream. After a cold and snowy night it needed a divining-rod to find it. Every \nwinter the liquid and trembling surface of the pond, which was so sensitive to every \nbreath, and reflected every light and shadow, becomes solid to the depth of a foot or a \nfoot and a half, so that it will support the heaviest teams, and perchance the snow \ncovers it to an equal depth, and it is not to be distinguished from any level field. Like the \nmarmots in the surrounding hills, it closes its eyelids and becomes dormant for three \nmonths or more. Standing on the snow-covered plain, as if in a pasture amid the hills, I \ncut my way first through a foot of snow, and then a foot of ice, and open a window under \nmy feet, where, kneeling to drink, I look down into the quiet parlor of the fishes, \npervaded by a softened light as through a window of ground glass, with its bright \nsanded floor the same as in summer; there a perennial waveless serenity reigns as in \nthe amber twilight sky, corresponding to the cool and even temperament of the \ninhabitants. Heaven is under our feet is well as over our heads. \nEarly in the morning, while all things are crisp with frost, men come with fishing-reels \nand slender lunch, and let down their fine lines through the snowy field to take pickerel \nand perch; wild men, who instinctively follow other fashions and trust other authorities \nthan their townsmen, and by their goings and comings stitch towns together in parts \nwhere else they would be ripped. They sit and eat their luncheon in stout fear-naughts \non the dry oak leaves on the shore, as wise in natural lore as the citizen is in artificial. \nThey never consulted with books, and know and can tell much less than they have done. \nThe things which they practice are said not yet to be known. Here is one fishing for \npickerel with grown perch for bait. You look into his pail with wonder as into a summer \npond, as if he kept summer locked up at home, or knew where she had retreated. How, \npray, did he get these in midwinter? Oh, he got worms out of rotten logs since the \nground froze, and so he caught them. His life itself passes deeper in nature than the \nstudies of the naturalist penetrate; himself a subject for the naturalist. The latter raises \nthe moss and bark gently with his knife in search of insects; the former lays open logs to \ntheir core with his axe, and moss and bark fly far and wide. He gets his living by barking \ntrees. Such a man has some right to fish, and I love to see nature carried out in him. The \nperch swallows the grub-worm, the pickerel swallows the perch, and the fisher-man \nswallows the pickerel; and so all the chinks in the scale of being are filled. "}, {"pdfPage": 142, "text": "When I strolled around the pond in misty weather I was sometimes amused by the \nprimitive mode which some ruder fisherman had adopted. He would perhaps have \nplaced alder branches over the narrow holes in the ice, which were four or five rods \napart and an equal distance from the shore, and having fastened the end of the line to a \nstick to prevent its being pulled through, have passed the slack line over a twig of the \nalder, a foot or more above the ice, and tied a dry oak leaf to it, which, being pulled \ndown, would show when he had a bite. These alders loomed through the mist at regular \nintervals as you walked half way round the pond. \nAh, the pickerel of Walden! when I see them lying on the ice, or in the well which the \nfisherman cuts in the ice, making a little hole to admit the water, I am always surprised \nby their rare beauty, as if they were fabulous fishes, they are so foreign to the streets, \neven to the woods, foreign as Arabia to our Concord life. They possess a quite dazzling \nand transcendent beauty which separates them by a wide interval from the cadaverous \ncod and haddock whose fame is trumpeted in our streets. They are not green like the \npines, nor gray like the stones, nor blue like the sky; but they have, to my eyes, if \npossible, yet rarer colors, like flowers and precious stones, as if they were the pearls, the \nanimalized nuclei or crystals of the Walden water. They, of course, are Walden all over \nand all through; are themselves small Waldens in the animal kingdom, Waldenses. It is \nsurprising that they are caught here — that in this deep and capacious spring, far \nbeneath the rattling teams and chaises and tinkling sleighs that travel the Walden road, \nthis great gold and emerald fish swims. I never chanced to see its kind in any market; it \nwould be the cynosure of all eyes there. Easily, with a few convulsive quirks, they give \nup their watery ghosts, like a mortal translated before his time to the thin air of heaven. \nAs I was desirous to recover the long lost bottom of Walden Pond, I surveyed it \ncarefully, before the ice broke up, early in ‘46, with compass and chain and sounding \nline. There have been many stories told about the bottom, or rather no bottom, of this \npond, which certainly had no foundation for themselves. It is remarkable how long men \nwill believe in the bottomlessness of a pond without taking the trouble to sound it. I \nhave visited two such Bottomless Ponds in one walk in this neighborhood. Many have \nbelieved that Walden reached quite through to the other side of the globe. Some who \nhave lain flat on the ice for a long time, looking down through the illusive medium, \nperchance with watery eyes into the bargain, and driven to hasty conclusions by the \nfear of catching cold in their breasts, have seen vast holes “into which a load of hay \nmight be driven,” if there were anybody to drive it, the undoubted source of the Styx \nand entrance to the Infernal Regions from these parts. Others have gone down from the \nvillage with a “fifty-six” and a wagon load of inch rope, but yet have failed to find any \nbottom; for while the “fifty-six” was resting by the way, they were paying out the rope in \nthe vain attempt to fathom their truly immeasurable capacity for marvellousness. But I \ncan assure my readers that Walden has a reasonably tight bottom at a not unreasonable, \nthough at an unusual, depth. I fathomed it easily with a cod-line and a stone weighing \nabout a pound and a half, and could tell accurately when the stone left the bottom, by \nhaving to pull so much harder before the water got underneath to help me. The greatest \ndepth was exactly one hundred and two feet; to which may be added the five feet which \nit has risen since, making one hundred and seven. This is a remarkable depth for so \nsmall an area; yet not an inch of it can be spared by the imagination. What if all ponds \nwere shallow? Would it not react on the minds of men? I am thankful that this pond was \nmade deep and pure for a symbol. While men believe in the infinite some ponds will be \nthought to be bottomless. "}, {"pdfPage": 143, "text": "A factory-owner, hearing what depth I had found, thought that it could not be true, for, \njudging from his acquaintance with dams, sand would not lie at so steep an angle. But \nthe deepest ponds are not so deep in proportion to their area as most suppose, and, if \ndrained, would not leave very remarkable valleys. They are not like cups between the \nhills; for this one, which is so unusually deep for its area, appears in a vertical section \nthrough its centre not deeper than a shallow plate. Most ponds, emptied, would leave a \nmeadow no more hollow than we frequently see. William Gilpin, who is so admirable in \nall that relates to landscapes, and usually so correct, standing at the head of Loch Fyne, \nin Scotland, which he describes as “a bay of salt water, sixty or seventy fathoms deep, \nfour miles in breadth,” and about fifty miles long, surrounded by mountains, observes, \n“If we could have seen it immediately after the diluvian crash, or whatever convulsion of \nnature occasioned it, before the waters gushed in, what a horrid chasm must it have \nappeared! \n“So high as heaved the tumid hills, so low \nDown sunk a hollow bottom broad and deep, \nCapacious bed of waters.” \nBut if, using the shortest diameter of Loch Fyne, we apply these proportions to Walden, \nwhich, as we have seen, appears already in a vertical section only like a shallow plate, it \nwill appear four times as shallow. So much for the increased horrors of the chasm of \nLoch Fyne when emptied. No doubt many a smiling valley with its stretching cornfields \noccupies exactly such a “horrid chasm,” from which the waters have receded, though it \nrequires the insight and the far sight of the geologist to convince the unsuspecting \ninhabitants of this fact. Often an inquisitive eye may detect the shores of a primitive lake \nin the low horizon hills, and no subsequent elevation of the plain have been necessary to \nconceal their history. But it is easiest, as they who work on the highways know, to find \nthe hollows by the puddles after a shower. The amount of it is, the imagination give it \nthe least license, dives deeper and soars higher than Nature goes. So, probably, the \ndepth of the ocean will be found to be very inconsiderable compared with its breadth. \nAs I sounded through the ice I could determine the shape of the bottom with greater \naccuracy than is possible in surveying harbors which do not freeze over, and I was \nsurprised at its general regularity. In the deepest part there are several acres more level \nthan almost any field which is exposed to the sun, wind, and plow. In one instance, on a \nline arbitrarily chosen, the depth did not vary more than one foot in thirty rods; and \ngenerally, near the middle, I could calculate the variation for each one hundred feet in \nany direction beforehand within three or four inches. Some are accustomed to speak of \ndeep and dangerous holes even in quiet sandy ponds like this, but the effect of water \nunder these circumstances is to level all inequalities. The regularity of the bottom and \nits conformity to the shores and the range of the neighboring hills were so perfect that a \ndistant promontory betrayed itself in the soundings quite across the pond, and its \ndirection could be determined by observing the opposite shore. Cape becomes bar, and \nplain shoal, and valley and gorge deep water and channel. \nWhen I had mapped the pond by the scale of ten rods to an inch, and put down the \nsoundings, more than a hundred in all, I observed this remarkable coincidence. Having \nnoticed that the number indicating the greatest depth was apparently in the centre of \nthe map, I laid a rule on the map lengthwise, and then breadthwise, and found, to my \nsurprise, that the line of greatest length intersected the line of greatest breadth exactly \nat the point of greatest depth, notwithstanding that the middle is so nearly level, the "}, {"pdfPage": 144, "text": "outline of the pond far from regular, and the extreme length and breadth were got by \nmeasuring into the coves; and I said to myself, Who knows but this hint would conduct \nto the deepest part of the ocean as well as of a pond or puddle? Is not this the rule also \nfor the height of mountains, regarded as the opposite of valleys? We know that a hill is \nnot highest at its narrowest part. \nOf five coves, three, or all which had been sounded, were observed to have a bar quite \nacross their mouths and deeper water within, so that the bay tended to be an expansion \nof water within the land not only horizontally but vertically, and to form a basin or \nindependent pond, the direction of the two capes showing the course of the bar. Every \nharbor on the sea-coast, also, has its bar at its entrance. In proportion as the mouth of \nthe cove was wider compared with its length, the water over the bar was deeper \ncompared with that in the basin. Given, then, the length and breadth of the cove, and the \ncharacter of the surrounding shore, and you have almost elements enough to make out a \nformula for all cases. \nIn order to see how nearly I could guess, with this experience, at the deepest point in a \npond, by observing the outlines of a surface and the character of its shores alone, I made \na plan of White Pond, which contains about forty-one acres, and, like this, has no island \nin it, nor any visible inlet or outlet; and as the line of greatest breadth fell very near the \nline of least breadth, where two opposite capes approached each other and two \nopposite bays receded, I ventured to mark a point a short distance from the latter line, \nbut still on the line of greatest length, as the deepest. The deepest part was found to be \nwithin one hundred feet of this, still farther in the direction to which I had inclined, and \nwas only one foot deeper, namely, sixty feet. Of course, a stream running through, or an \nisland in the pond, would make the problem much more complicated. \nIf we knew all the laws of Nature, we should need only one fact, or the description of \none actual phenomenon, to infer all the particular results at that point. Now we know \nonly a few laws, and our result is vitiated, not, of course, by any confusion or irregularity \nin Nature, but by our ignorance of essential elements in the calculation. Our notions of \nlaw and harmony are commonly confined to those instances which we detect; but the \nharmony which results from a far greater number of seemingly conflicting, but really \nconcurring, laws, which we have not detected, is still more wonderful. The particular \nlaws are as our points of view, as, to the traveller, a mountain outline varies with every \nstep, and it has an infinite number of profiles, though absolutely but one form. Even \nwhen cleft or bored through it is not comprehended in its entireness. \nWhat I have observed of the pond is no less true in ethics. It is the law of average. Such a \nrule of the two diameters not only guides us toward the sun in the system and the heart \nin man, but draws lines through the length and breadth of the aggregate of a man’s \nparticular daily behaviors and waves of life into his coves and inlets, and where they \nintersect will be the height or depth of his character. Perhaps we need only to know \nhow his shores trend and his adjacent country or circumstances, to infer his depth and \nconcealed bottom. If he is surrounded by mountainous circumstances, an Achillean \nshore, whose peaks overshadow and are reflected in his bosom, they suggest a \ncorresponding depth in him. But a low and smooth shore proves him shallow on that \nside. In our bodies, a bold projecting brow falls off to and indicates a corresponding \ndepth of thought. Also there is a bar across the entrance of our every cove, or particular \ninclination; each is our harbor for a season, in which we are detained and partially land-\nlocked. These inclinations are not whimsical usually, but their form, size, and direction "}, {"pdfPage": 145, "text": "are determined by the promontories of the shore, the ancient axes of elevation. When \nthis bar is gradually increased by storms, tides, or currents, or there is a subsidence of \nthe waters, so that it reaches to the surface, that which was at first but an inclination in \nthe shore in which a thought was harbored becomes an individual lake, cut off from the \nocean, wherein the thought secures its own conditions — changes, perhaps, from salt to \nfresh, becomes a sweet sea, dead sea, or a marsh. At the advent of each individual into \nthis life, may we not suppose that such a bar has risen to the surface somewhere? It is \ntrue, we are such poor navigators that our thoughts, for the most part, stand off and on \nupon a harborless coast, are conversant only with the bights of the bays of poesy, or \nsteer for the public ports of entry, and go into the dry docks of science, where they \nmerely refit for this world, and no natural currents concur to individualize them. \nAs for the inlet or outlet of Walden, I have not discovered any but rain and snow and \nevaporation, though perhaps, with a thermometer and a line, such places may be found, \nfor where the water flows into the pond it will probably be coldest in summer and \nwarmest in winter. When the ice-men were at work here in ‘46–7, the cakes sent to the \nshore were one day rejected by those who were stacking them up there, not being thick \nenough to lie side by side with the rest; and the cutters thus discovered that the ice over \na small space was two or three inches thinner than elsewhere, which made them think \nthat there was an inlet there. They also showed me in another place what they thought \nwas a “leach-hole,” through which the pond leaked out under a hill into a neighboring \nmeadow, pushing me out on a cake of ice to see it. It was a small cavity under ten feet of \nwater; but I think that I can warrant the pond not to need soldering till they find a worse \nleak than that. One has suggested, that if such a “leach-hole” should be found, its \nconnection with the meadow, if any existed, might be proved by conveying some, \ncolored powder or sawdust to the mouth of the hole, and then putting a strainer over \nthe spring in the meadow, which would catch some of the particles carried through by \nthe current. \nWhile I was surveying, the ice, which was sixteen inches thick, undulated under a slight \nwind like water. It is well known that a level cannot be used on ice. At one rod from the \nshore its greatest fluctuation, when observed by means of a level on land directed \ntoward a graduated staff on the ice, was three quarters of an inch, though the ice \nappeared firmly attached to the shore. It was probably greater in the middle. Who \nknows but if our instruments were delicate enough we might detect an undulation in \nthe crust of the earth? When two legs of my level were on the shore and the third on the \nice, and the sights were directed over the latter, a rise or fall of the ice of an almost \ninfinitesimal amount made a difference of several feet on a tree across the pond. When I \nbegan to cut holes for sounding there were three or four inches of water on the ice \nunder a deep snow which had sunk it thus far; but the water began immediately to run \ninto these holes, and continued to run for two days in deep streams, which wore away \nthe ice on every side, and contributed essentially, if not mainly, to dry the surface of the \npond; for, as the water ran in, it raised and floated the ice. This was somewhat like \ncutting a hole in the bottom of a ship to let the water out. When such holes freeze, and a \nrain succeeds, and finally a new freezing forms a fresh smooth ice over all, it is \nbeautifully mottled internally by dark figures, shaped somewhat like a spider’s web, \nwhat you may call ice rosettes, produced by the channels worn by the water flowing \nfrom all sides to a centre. Sometimes, also, when the ice was covered with shallow \npuddles, I saw a double shadow of myself, one standing on the head of the other, one on \nthe ice, the other on the trees or hillside. "}, {"pdfPage": 146, "text": "While yet it is cold January, and snow and ice are thick and solid, the prudent landlord \ncomes from the village to get ice to cool his summer drink; impressively, even \npathetically, wise, to foresee the heat and thirst of July now in January — wearing a \nthick coat and mittens! when so many things are not provided for. It may be that he lays \nup no treasures in this world which will cool his summer drink in the next. He cuts and \nsaws the solid pond, unroofs the house of fishes, and carts off their very element and air, \nheld fast by chains and stakes like corded wood, through the favoring winter air, to \nwintry cellars, to underlie the summer there. It looks like solidified azure, as, far off, it is \ndrawn through the streets. These ice-cutters are a merry race, full of jest and sport, and \nwhen I went among them they were wont to invite me to saw pit-fashion with them, I \nstanding underneath. \nIn the winter of ‘46–7 there came a hundred men of Hyperborean extraction swoop \ndown on to our pond one morning, with many carloads of ungainly-looking farming \ntools — sleds, plows, drill-barrows, turf-knives, spades, saws, rakes, and each man was \narmed with a double-pointed pike-staff, such as is not described in the New–England \nFarmer or the Cultivator. I did not know whether they had come to sow a crop of winter \nrye, or some other kind of grain recently introduced from Iceland. As I saw no manure, I \njudged that they meant to skim the land, as I had done, thinking the soil was deep and \nhad lain fallow long enough. They said that a gentleman farmer, who was behind the \nscenes, wanted to double his money, which, as I understood, amounted to half a million \nalready; but in order to cover each one of his dollars with another, he took off the only \ncoat, ay, the skin itself, of Walden Pond in the midst of a hard winter. They went to work \nat once, plowing, barrowing, rolling, furrowing, in admirable order, as if they were bent \non making this a model farm; but when I was looking sharp to see what kind of seed \nthey dropped into the furrow, a gang of fellows by my side suddenly began to hook up \nthe virgin mould itself, with a peculiar jerk, clean down to the sand, or rather the water \n— for it was a very springy soil — indeed all the terra firma there was — and haul it \naway on sleds, and then I guessed that they must be cutting peat in a bog. So they came \nand went every day, with a peculiar shriek from the locomotive, from and to some point \nof the polar regions, as it seemed to me, like a flock of arctic snow-birds. But sometimes \nSquaw Walden had her revenge, and a hired man, walking behind his team, slipped \nthrough a crack in the ground down toward Tartarus, and he who was so brave before \nsuddenly became but the ninth part of a man, almost gave up his animal heat, and was \nglad to take refuge in my house, and acknowledged that there was some virtue in a \nstove; or sometimes the frozen soil took a piece of steel out of a plowshare, or a plow \ngot set in the furrow and had to be cut out. \nTo speak literally, a hundred Irishmen, with Yankee overseers, came from Cambridge \nevery day to get out the ice. They divided it into cakes by methods too well known to \nrequire description, and these, being sledded to the shore, were rapidly hauled off on to \nan ice platform, and raised by grappling irons and block and tackle, worked by horses, \non to a stack, as surely as so many barrels of flour, and there placed evenly side by side, \nand row upon row, as if they formed the solid base of an obelisk designed to pierce the \nclouds. They told me that in a good day they could get out a thousand tons, which was \nthe yield of about one acre. Deep ruts and “cradle-holes” were worn in the ice, as on \nterra firma, by the passage of the sleds over the same track, and the horses invariably \nate their oats out of cakes of ice hollowed out like buckets. They stacked up the cakes \nthus in the open air in a pile thirty-five feet high on one side and six or seven rods \nsquare, putting hay between the outside layers to exclude the air; for when the wind, "}, {"pdfPage": 147, "text": "though never so cold, finds a passage through, it will wear large cavities, leaving slight \nsupports or studs only here and there, and finally topple it down. At first it looked like a \nvast blue fort or Valhalla; but when they began to tuck the coarse meadow hay into the \ncrevices, and this became covered with rime and icicles, it looked like a venerable moss-\ngrown and hoary ruin, built of azure-tinted marble, the abode of Winter, that old man \nwe see in the almanac — his shanty, as if he had a design to estivate with us. They \ncalculated that not twenty-five per cent of this would reach its destination, and that two \nor three per cent would be wasted in the cars. However, a still greater part of this heap \nhad a different destiny from what was intended; for, either because the ice was found \nnot to keep so well as was expected, containing more air than usual, or for some other \nreason, it never got to market. This heap, made in the winter of ‘46–7 and estimated to \ncontain ten thousand tons, was finally covered with hay and boards; and though it was \nunroofed the following July, and a part of it carried off, the rest remaining exposed to \nthe sun, it stood over that summer and the next winter, and was not quite melted till \nSeptember, 1848. Thus the pond recovered the greater part. \nLike the water, the Walden ice, seen near at hand, has a green tint, but at a distance is \nbeautifully blue, and you can easily tell it from the white ice of the river, or the merely \ngreenish ice of some ponds, a quarter of a mile off. Sometimes one of those great cakes \nslips from the ice-man’s sled into the village street, and lies there for a week like a great \nemerald, an object of interest to all passers. I have noticed that a portion of Walden \nwhich in the state of water was green will often, when frozen, appear from the same \npoint of view blue. So the hollows about this pond will, sometimes, in the winter, be \nfilled with a greenish water somewhat like its own, but the next day will have frozen \nblue. Perhaps the blue color of water and ice is due to the light and air they contain, and \nthe most transparent is the bluest. Ice is an interesting subject for contemplation. They \ntold me that they had some in the ice-houses at Fresh Pond five years old which was as \ngood as ever. Why is it that a bucket of water soon becomes putrid, but frozen remains \nsweet forever? It is commonly said that this is the difference between the affections and \nthe intellect. \nThus for sixteen days I saw from my window a hundred men at work like busy \nhusbandmen, with teams and horses and apparently all the implements of farming, such \na picture as we see on the first page of the almanac; and as often as I looked out I was \nreminded of the fable of the lark and the reapers, or the parable of the sower, and the \nlike; and now they are all gone, and in thirty days more, probably, I shall look from the \nsame window on the pure sea-green Walden water there, reflecting the clouds and the \ntrees, and sending up its evaporations in solitude, and no traces will appear that a man \nhas ever stood there. Perhaps I shall hear a solitary loon laugh as he dives and plumes \nhimself, or shall see a lonely fisher in his boat, like a floating leaf, beholding his form \nreflected in the waves, where lately a hundred men securely labored. \nThus it appears that the sweltering inhabitants of Charleston and New Orleans, of \nMadras and Bombay and Calcutta, drink at my well. In the morning I bathe my intellect \nin the stupendous and cosmogonal philosophy of the Bhagvat–Geeta, since whose \ncomposition years of the gods have elapsed, and in comparison with which our modern \nworld and its literature seem puny and trivial; and I doubt if that philosophy is not to be \nreferred to a previous state of existence, so remote is its sublimity from our \nconceptions. I lay down the book and go to my well for water, and lo! there I meet the \nservant of the Bramin, priest of Brahma and Vishnu and Indra, who still sits in his \ntemple on the Ganges reading the Vedas, or dwells at the root of a tree with his crust "}, {"pdfPage": 148, "text": "and water jug. I meet his servant come to draw water for his master, and our buckets as \nit were grate together in the same well. The pure Walden water is mingled with the \nsacred water of the Ganges. With favoring winds it is wafted past the site of the fabulous \nislands of Atlantis and the Hesperides, makes the periplus of Hanno, and, floating by \nTernate and Tidore and the mouth of the Persian Gulf, melts in the tropic gales of the \nIndian seas, and is landed in ports of which Alexander only heard the names. "}, {"pdfPage": 149, "text": "Spring \n \nThe opening of large tracts by the ice-cutters commonly causes a pond to break up \nearlier; for the water, agitated by the wind, even in cold weather, wears away the \nsurrounding ice. But such was not the effect on Walden that year, for she had soon got a \nthick new garment to take the place of the old. This pond never breaks up so soon as the \nothers in this neighborhood, on account both of its greater depth and its having no \nstream passing through it to melt or wear away the ice. I never knew it to open in the \ncourse of a winter, not excepting that of ‘52–3, which gave the ponds so severe a trial. It \ncommonly opens about the first of April, a week or ten days later than Flint’s Pond and \nFair Haven, beginning to melt on the north side and in the shallower parts where it \nbegan to freeze. It indicates better than any water hereabouts the absolute progress of \nthe season, being least affected by transient changes of temperature. A severe cold of a \nfew days duration in March may very much retard the opening of the former ponds, \nwhile the temperature of Walden increases almost uninterruptedly. A thermometer \nthrust into the middle of Walden on the 6th of March, 1847, stood at 32x, or freezing \npoint; near the shore at 33x; in the middle of Flint’s Pond, the same day, at 32+x; at a \ndozen rods from the shore, in shallow water, under ice a foot thick, at 36x. This \ndifference of three and a half degrees between the temperature of the deep water and \nthe shallow in the latter pond, and the fact that a great proportion of it is comparatively \nshallow, show why it should break up so much sooner than Walden. The ice in the \nshallowest part was at this time several inches thinner than in the middle. In midwinter \nthe middle had been the warmest and the ice thinnest there. So, also, every one who has \nwaded about the shores of the pond in summer must have perceived how much warmer \nthe water is close to the shore, where only three or four inches deep, than a little \ndistance out, and on the surface where it is deep, than near the bottom. In spring the sun \nnot only exerts an influence through the increased temperature of the air and earth, but \nits heat passes through ice a foot or more thick, and is reflected from the bottom in \nshallow water, and so also warms the water and melts the under side of the ice, at the \nsame time that it is melting it more directly above, making it uneven, and causing the air \nbubbles which it contains to extend themselves upward and downward until it is \ncompletely honeycombed, and at last disappears suddenly in a single spring rain. Ice has \nits grain as well as wood, and when a cake begins to rot or “comb,” that is, assume the \nappearance of honeycomb, whatever may be its position, the air cells are at right angles \nwith what was the water surface. Where there is a rock or a log rising near to the \nsurface the ice over it is much thinner, and is frequently quite dissolved by this reflected \nheat; and I have been told that in the experiment at Cambridge to freeze water in a \nshallow wooden pond, though the cold air circulated underneath, and so had access to \nboth sides, the reflection of the sun from the bottom more than counterbalanced this \nadvantage. When a warm rain in the middle of the winter melts off the snow-ice from \nWalden, and leaves a hard dark or transparent ice on the middle, there will be a strip of \nrotten though thicker white ice, a rod or more wide, about the shores, created by this \nreflected heat. Also, as I have said, the bubbles themselves within the ice operate as \nburning-glasses to melt the ice beneath. \nThe phenomena of the year take place every day in a pond on a small scale. Every \nmorning, generally speaking, the shallow water is being warmed more rapidly than the "}, {"pdfPage": 150, "text": "deep, though it may not be made so warm after all, and every evening it is being cooled \nmore rapidly until the morning. The day is an epitome of the year. The night is the \nwinter, the morning and evening are the spring and fall, and the noon is the summer. \nThe cracking and booming of the ice indicate a change of temperature. One pleasant \nmorning after a cold night, February 24th, 1850, having gone to Flint’s Pond to spend \nthe day, I noticed with surprise, that when I struck the ice with the head of my axe, it \nresounded like a gong for many rods around, or as if I had struck on a tight drum-head. \nThe pond began to boom about an hour after sunrise, when it felt the influence of the \nsun’s rays slanted upon it from over the hills; it stretched itself and yawned like a \nwaking man with a gradually increasing tumult, which was kept up three or four hours. \nIt took a short siesta at noon, and boomed once more toward night, as the sun was \nwithdrawing his influence. In the right stage of the weather a pond fires its evening gun \nwith great regularity. But in the middle of the day, being full of cracks, and the air also \nbeing less elastic, it had completely lost its resonance, and probably fishes and muskrats \ncould not then have been stunned by a blow on it. The fishermen say that the \n“thundering of the pond” scares the fishes and prevents their biting. The pond does not \nthunder every evening, and I cannot tell surely when to expect its thundering; but \nthough I may perceive no difference in the weather, it does. Who would have suspected \nso large and cold and thick-skinned a thing to be so sensitive? Yet it has its law to which \nit thunders obedience when it should as surely as the buds expand in the spring. The \nearth is all alive and covered with papillae. The largest pond is as sensitive to \natmospheric changes as the globule of mercury in its tube. \nOne attraction in coming to the woods to live was that I should have leisure and \nopportunity to see the Spring come in. The ice in the pond at length begins to be \nhoneycombed, and I can set my heel in it as I walk. Fogs and rains and warmer suns are \ngradually melting the snow; the days have grown sensibly longer; and I see how I shall \nget through the winter without adding to my wood-pile, for large fires are no longer \nnecessary. I am on the alert for the first signs of spring, to hear the chance note of some \narriving bird, or the striped squirrel’s chirp, for his stores must be now nearly \nexhausted, or see the woodchuck venture out of his winter quarters. On the 13th of \nMarch, after I had heard the bluebird, song sparrow, and red-wing, the ice was still \nnearly a foot thick. As the weather grew warmer it was not sensibly worn away by the \nwater, nor broken up and floated off as in rivers, but, though it was completely melted \nfor half a rod in width about the shore, the middle was merely honeycombed and \nsaturated with water, so that you could put your foot through it when six inches thick; \nbut by the next day evening, perhaps, after a warm rain followed by fog, it would have \nwholly disappeared, all gone off with the fog, spirited away. One year I went across the \nmiddle only five days before it disappeared entirely. In 1845 Walden was first \ncompletely open on the 1st of April; in ‘46, the 25th of March; in ‘47, the 8th of April; in \n‘51, the 28th of March; in ‘52, the 18th of April; in ‘53, the 23d of March; in ‘54, about the \n7th of April. \nEvery incident connected with the breaking up of the rivers and ponds and the settling \nof the weather is particularly interesting to us who live in a climate of so great extremes. \nWhen the warmer days come, they who dwell near the river hear the ice crack at night \nwith a startling whoop as loud as artillery, as if its icy fetters were rent from end to end, \nand within a few days see it rapidly going out. So the alligator comes out of the mud \nwith quakings of the earth. One old man, who has been a close observer of Nature, and \nseems as thoroughly wise in regard to all her operations as if she had been put upon the "}, {"pdfPage": 151, "text": "stocks when he was a boy, and he had helped to lay her keel — who has come to his \ngrowth, and can hardly acquire more of natural lore if he should live to the age of \nMethuselah — told me — and I was surprised to hear him express wonder at any of \nNature’s operations, for I thought that there were no secrets between them — that one \nspring day he took his gun and boat, and thought that he would have a little sport with \nthe ducks. There was ice still on the meadows, but it was all gone out of the river, and he \ndropped down without obstruction from Sudbury, where he lived, to Fair Haven Pond, \nwhich he found, unexpectedly, covered for the most part with a firm field of ice. It was a \nwarm day, and he was surprised to see so great a body of ice remaining. Not seeing any \nducks, he hid his boat on the north or back side of an island in the pond, and then \nconcealed himself in the bushes on the south side, to await them. The ice was melted for \nthree or four rods from the shore, and there was a smooth and warm sheet of water, \nwith a muddy bottom, such as the ducks love, within, and he thought it likely that some \nwould be along pretty soon. After he had lain still there about an hour he heard a low \nand seemingly very distant sound, but singularly grand and impressive, unlike anything \nhe had ever heard, gradually swelling and increasing as if it would have a universal and \nmemorable ending, a sullen rush and roar, which seemed to him all at once like the \nsound of a vast body of fowl coming in to settle there, and, seizing his gun, he started up \nin haste and excited; but he found, to his surprise, that the whole body of the ice had \nstarted while he lay there, and drifted in to the shore, and the sound he had heard was \nmade by its edge grating on the shore — at first gently nibbled and crumbled off, but at \nlength heaving up and scattering its wrecks along the island to a considerable height \nbefore it came to a standstill. \nAt length the sun’s rays have attained the right angle, and warm winds blow up mist and \nrain and melt the snowbanks, and the sun, dispersing the mist, smiles on a checkered \nlandscape of russet and white smoking with incense, through which the traveller picks \nhis way from islet to islet, cheered by the music of a thousand tinkling rills and rivulets \nwhose veins are filled with the blood of winter which they are bearing off. \nFew phenomena gave me more delight than to observe the forms which thawing sand \nand clay assume in flowing down the sides of a deep cut on the railroad through which I \npassed on my way to the village, a phenomenon not very common on so large a scale, \nthough the number of freshly exposed banks of the right material must have been \ngreatly multiplied since railroads were invented. The material was sand of every degree \nof fineness and of various rich colors, commonly mixed with a little clay. When the frost \ncomes out in the spring, and even in a thawing day in the winter, the sand begins to flow \ndown the slopes like lava, sometimes bursting out through the snow and overflowing it \nwhere no sand was to be seen before. Innumerable little streams overlap and interlace \none with another, exhibiting a sort of hybrid product, which obeys half way the law of \ncurrents, and half way that of vegetation. As it flows it takes the forms of sappy leaves or \nvines, making heaps of pulpy sprays a foot or more in depth, and resembling, as you \nlook down on them, the laciniated, lobed, and imbricated thalluses of some lichens; or \nyou are reminded of coral, of leopard’s paws or birds’ feet, of brains or lungs or bowels, \nand excrements of all kinds. It is a truly grotesque vegetation, whose forms and color we \nsee imitated in bronze, a sort of architectural foliage more ancient and typical than \nacanthus, chiccory, ivy, vine, or any vegetable leaves; destined perhaps, under some \ncircumstances, to become a puzzle to future geologists. The whole cut impressed me as \nif it were a cave with its stalactites laid open to the light. The various shades of the sand \nare singularly rich and agreeable, embracing the different iron colors, brown, gray, "}, {"pdfPage": 152, "text": "yellowish, and reddish. When the flowing mass reaches the drain at the foot of the bank \nit spreads out flatter into strands, the separate streams losing their semi-cylindrical \nform and gradually becoming more flat and broad, running together as they are more \nmoist, till they form an almost flat sand, still variously and beautifully shaded, but in \nwhich you can trace the original forms of vegetation; till at length, in the water itself, \nthey are converted into banks, like those formed off the mouths of rivers, and the forms \nof vegetation are lost in the ripple marks on the bottom. \nThe whole bank, which is from twenty to forty feet high, is sometimes overlaid with a \nmass of this kind of foliage, or sandy rupture, for a quarter of a mile on one or both \nsides, the produce of one spring day. What makes this sand foliage remarkable is its \nspringing into existence thus suddenly. When I see on the one side the inert bank — for \nthe sun acts on one side first — and on the other this luxuriant foliage, the creation of an \nhour, I am affected as if in a peculiar sense I stood in the laboratory of the Artist who \nmade the world and me — had come to where he was still at work, sporting on this \nbank, and with excess of energy strewing his fresh designs about. I feel as if I were \nnearer to the vitals of the globe, for this sandy overflow is something such a foliaceous \nmass as the vitals of the animal body. You find thus in the very sands an anticipation of \nthe vegetable leaf. No wonder that the earth expresses itself outwardly in leaves, it so \nlabors with the idea inwardly. The atoms have already learned this law, and are \npregnant by it. The overhanging leaf sees here its prototype. Internally, whether in the \nglobe or animal body, it is a moist thick lobe, a word especially applicable to the liver \nand lungs and the leaves of fat (jnai, labor, lapsus, to flow or slip downward, a lapsing; \njiais, globus, lobe, globe; also lap, flap, and many other words); externally a dry thin leaf, \neven as the f and v are a pressed and dried b. The radicals of lobe are lb, the soft mass of \nthe b (single lobed, or B, double lobed), with the liquid l behind it pressing it forward. In \nglobe, glb, the guttural g adds to the meaning the capacity of the throat. The feathers and \nwings of birds are still drier and thinner leaves. Thus, also, you pass from the lumpish \ngrub in the earth to the airy and fluttering butterfly. The very globe continually \ntranscends and translates itself, and becomes winged in its orbit. Even ice begins with \ndelicate crystal leaves, as if it had flowed into moulds which the fronds of waterplants \nhave impressed on the watery mirror. The whole tree itself is but one leaf, and rivers \nare still vaster leaves whose pulp is intervening earth, and towns and cities are the ova \nof insects in their axils. \nWhen the sun withdraws the sand ceases to flow, but in the morning the streams will \nstart once more and branch and branch again into a myriad of others. You here see \nperchance how blood-vessels are formed. If you look closely you observe that first there \npushes forward from the thawing mass a stream of softened sand with a drop-like point, \nlike the ball of the finger, feeling its way slowly and blindly downward, until at last with \nmore heat and moisture, as the sun gets higher, the most fluid portion, in its effort to \nobey the law to which the most inert also yields, separates from the latter and forms for \nitself a meandering channel or artery within that, in which is seen a little silvery stream \nglancing like lightning from one stage of pulpy leaves or branches to another, and ever \nand anon swallowed up in the sand. It is wonderful how rapidly yet perfectly the sand \norganizes itself as it flows, using the best material its mass affords to form the sharp \nedges of its channel. Such are the sources of rivers. In the silicious matter which the \nwater deposits is perhaps the bony system, and in the still finer soil and organic matter \nthe fleshy fibre or cellular tissue. What is man but a mass of thawing clay? The ball of \nthe human finger is but a drop congealed. The fingers and toes flow to their extent from "}, {"pdfPage": 153, "text": "the thawing mass of the body. Who knows what the human body would expand and \nflow out to under a more genial heaven? Is not the hand a spreading palm leaf with its \nlobes and veins? The ear may be regarded, fancifully, as a lichen, umbilicaria, on the side \nof the head, with its lobe or drop. The lip — labium, from labor (?) — laps or lapses from \nthe sides of the cavernous mouth. The nose is a manifest congealed drop or stalactite. \nThe chin is a still larger drop, the confluent dripping of the face. The cheeks are a slide \nfrom the brows into the valley of the face, opposed and diffused by the cheek bones. \nEach rounded lobe of the vegetable leaf, too, is a thick and now loitering drop, larger or \nsmaller; the lobes are the fingers of the leaf; and as many lobes as it has, in so many \ndirections it tends to flow, and more heat or other genial influences would have caused \nit to flow yet farther. \nThus it seemed that this one hillside illustrated the principle of all the operations of \nNature. The Maker of this earth but patented a leaf. What Champollion will decipher this \nhieroglyphic for us, that we may turn over a new leaf at last? This phenomenon is more \nexhilarating to me than the luxuriance and fertility of vineyards. True, it is somewhat \nexcrementitious in its character, and there is no end to the heaps of liver, lights, and \nbowels, as if the globe were turned wrong side outward; but this suggests at least that \nNature has some bowels, and there again is mother of humanity. This is the frost coming \nout of the ground; this is Spring. It precedes the green and flowery spring, as mythology \nprecedes regular poetry. I know of nothing more purgative of winter fumes and \nindigestions. It convinces me that Earth is still in her swaddling-clothes, and stretches \nforth baby fingers on every side. Fresh curls spring from the baldest brow. There is \nnothing inorganic. These foliaceous heaps lie along the bank like the slag of a furnace, \nshowing that Nature is “in full blast” within. The earth is not a mere fragment of dead \nhistory, stratum upon stratum like the leaves of a book, to be studied by geologists and \nantiquaries chiefly, but living poetry like the leaves of a tree, which precede flowers and \nfruit — not a fossil earth, but a living earth; compared with whose great central life all \nanimal and vegetable life is merely parasitic. Its throes will heave our exuviae from their \ngraves. You may melt your metals and cast them into the most beautiful moulds you \ncan; they will never excite me like the forms which this molten earth flows out into. And \nnot only it, but the institutions upon it are plastic like clay in the hands of the potter. \nEre long, not only on these banks, but on every hill and plain and in every hollow, the \nfrost comes out of the ground like a dormant quadruped from its burrow, and seeks the \nsea with music, or migrates to other climes in clouds. Thaw with his gentle persuasion is \nmore powerful than Thor with his hammer. The one melts, the other but breaks in \npieces. \nWhen the ground was partially bare of snow, and a few warm days had dried its surface \nsomewhat, it was pleasant to compare the first tender signs of the infant year just \npeeping forth with the stately beauty of the withered vegetation which had withstood \nthe winter — life-everlasting, goldenrods, pinweeds, and graceful wild grasses, more \nobvious and interesting frequently than in summer even, as if their beauty was not ripe \ntill then; even cotton-grass, cat-tails, mulleins, johnswort, hard-hack, meadow-sweet, \nand other strong-stemmed plants, those unexhausted granaries which entertain the \nearliest birds — decent weeds, at least, which widowed Nature wears. I am particularly \nattracted by the arching and sheaf-like top of the wool-grass; it brings back the summer \nto our winter memories, and is among the forms which art loves to copy, and which, in \nthe vegetable kingd
