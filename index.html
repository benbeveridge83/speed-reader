red like a thin \ncrust insulated and floated even by this small sheet of interverting water, and I was \nreminded that this on which I dwelt was but dry land. \nThough the view from my door was still more contracted, I did not feel crowded or \nconfined in the least. There was pasture enough for my imagination. The low shrub oak \nplateau to which the opposite shore arose stretched away toward the prairies of the \nWest and the steppes of Tartary, affording ample room for all the roving families of men. \n“There are none happy in the world but beings who enjoy freely a vast horizon” — said \nDamodara, when his herds required new and larger pastures. \nBoth place and time were changed, and I dwelt nearer to those parts of the universe and \nto those eras in history which had most attracted me. Where I lived was as far off as \nmany a region viewed nightly by astronomers. We are wont to imagine rare and \ndelectable places in some remote and more celestial corner of the system, behind the \nconstellation of Cassiopeia’s Chair, far from noise and disturbance. I discovered that my \nhouse actually had its site in such a withdrawn, but forever new and unprofaned, part of \nthe universe. If it were worth the while to settle in those parts near to the Pleiades or \nthe Hyades, to Aldebaran or Altair, then I was really there, or at an equal remoteness \nfrom the life which I had left behind, dwindled and twinkling with as fine a ray to my \nnearest neighbor, and to be seen only in moonless nights by him. Such was that part of \ncreation where I had squatted; \n“There was a shepherd that did live, \nAnd held his thoughts as high \nAs were the mounts whereon his flocks \nDid hourly feed him by.” \nWhat should we think of the shepherd’s life if his flocks always wandered to higher \npastures than his thoughts? \nEvery morning was a cheerful invitation to make my life of equal simplicity, and I may \nsay innocence, with Nature herself. I have been as sincere a worshipper of Aurora as the \nGreeks. I got up early and bathed in the pond; that was a religious exercise, and one of \nthe best things which I did. They say that characters were engraven on the bathing tub \nof King Tchingthang to this effect: “Renew thyself completely each day; do it again, and \nagain, and forever again.” I can understand that. Morning brings back the heroic ages. I \nwas as much affected by the faint hum of a mosquito making its invisible and \nunimaginable tour through my apartment at earliest dawn, when I was sitting with door \nand windows open, as I could be by any trumpet that ever sang of fame. It was Homer’s \nrequiem; itself an Iliad and Odyssey in the air, singing its own wrath and wanderings. \nThere was something cosmical about it; a standing advertisement, till forbidden, of the \neverlasting vigor and fertility of the world. The morning, which is the most memorable \nseason of the day, is the awakening hour. Then there is least somnolence in us; and for \nan hour, at least, some part of us awakes which slumbers all the rest of the day and \nnight. Little is to be expected of that day, if it can be called a day, to which we are not \nawakened by our Genius, but by the mechanical nudgings of some servitor, are not \nawakened by our own newly acquired force and aspirations from within, accompanied \nby the undulations of celestial music, instead of factory bells, and a fragrance filling the \nair — to a higher life than we fell asleep from; and thus the darkness bear its fruit, and \nprove itself to be good, no less than the light. That man who does not believe that each "}, {"pdfPage": 47, "text": "day contains an earlier, more sacred, and auroral hour than he has yet profaned, has \ndespaired of life, and is pursuing a descending and darkening way. After a partial \ncessation of his sensuous life, the soul of man, or its organs rather, are reinvigorated \neach day, and his Genius tries again what noble life it can make. All memorable events, I \nshould say, transpire in morning time and in a morning atmosphere. The Vedas say, “All \nintelligences awake with the morning.” Poetry and art, and the fairest and most \nmemorable of the actions of men, date from such an hour. All poets and heroes, like \nMemnon, are the children of Aurora, and emit their music at sunrise. To him whose \nelastic and vigorous thought keeps pace with the sun, the day is a perpetual morning. It \nmatters not what the clocks say or the attitudes and labors of men. Morning is when I \nam awake and there is a dawn in me. Moral reform is the effort to throw off sleep. Why \nis it that men give so poor an account of their day if they have not been slumbering? \nThey are not such poor calculators. If they had not been overcome with drowsiness, \nthey would have performed something. The millions are awake enough for physical \nlabor; but only one in a million is awake enough for effective intellectual exertion, only \none in a hundred millions to a poetic or divine life. To be awake is to be alive. I have \nnever yet met a man who was quite awake. How could I have looked him in the face? \nWe must learn to reawaken and keep ourselves awake, not by mechanical aids, but by \nan infinite expectation of the dawn, which does not forsake us in our soundest sleep. I \nknow of no more encouraging fact than the unquestionable ability of man to elevate his \nlife by a conscious endeavor. It is something to be able to paint a particular picture, or to \ncarve a statue, and so to make a few objects beautiful; but it is far more glorious to carve \nand paint the very atmosphere and medium through which we look, which morally we \ncan do. To affect the quality of the day, that is the highest of arts. Every man is tasked to \nmake his life, even in its details, worthy of the contemplation of his most elevated and \ncritical hour. If we refused, or rather used up, such paltry information as we get, the \noracles would distinctly inform us how this might be done. \nI went to the woods because I wished to live deliberately, to front only the essential \nfacts of life, and see if I could not learn what it had to teach, and not, when I came to die, \ndiscover that I had not lived. I did not wish to live what was not life, living is so dear; nor \ndid I wish to practise resignation, unless it was quite necessary. I wanted to live deep \nand suck out all the marrow of life, to live so sturdily and Spartan-like as to put to rout \nall that was not life, to cut a broad swath and shave close, to drive life into a corner, and \nreduce it to its lowest terms, and, if it proved to be mean, why then to get the whole and \ngenuine meanness of it, and publish its meanness to the world; or if it were sublime, to \nknow it by experience, and be able to give a true account of it in my next excursion. For \nmost men, it appears to me, are in a strange uncertainty about it, whether it is of the \ndevil or of God, and have somewhat hastily concluded that it is the chief end of man here \nto “glorify God and enjoy him forever.” \nStill we live meanly, like ants; though the fable tells us that we were long ago changed \ninto men; like pygmies we fight with cranes; it is error upon error, and clout upon clout, \nand our best virtue has for its occasion a superfluous and evitable wretchedness. Our \nlife is frittered away by detail. An honest man has hardly need to count more than his \nten fingers, or in extreme cases he may add his ten toes, and lump the rest. Simplicity, \nsimplicity, simplicity! I say, let your affairs be as two or three, and not a hundred or a \nthousand; instead of a million count half a dozen, and keep your accounts on your \nthumb-nail. In the midst of this chopping sea of civilized life, such are the clouds and \nstorms and quicksands and thousand-and-one items to be allowed for, that a man has to "}, {"pdfPage": 48, "text": "live, if he would not founder and go to the bottom and not make his port at all, by dead \nreckoning, and he must be a great calculator indeed who succeeds. Simplify, simplify. \nInstead of three meals a day, if it be necessary eat but one; instead of a hundred dishes, \nfive; and reduce other things in proportion. Our life is like a German Confederacy, made \nup of petty states, with its boundary forever fluctuating, so that even a German cannot \ntell you how it is bounded at any moment. The nation itself, with all its so-called internal \nimprovements, which, by the way are all external and superficial, is just such an \nunwieldy and overgrown establishment, cluttered with furniture and tripped up by its \nown traps, ruined by luxury and heedless expense, by want of calculation and a worthy \naim, as the million households in the land; and the only cure for it, as for them, is in a \nrigid economy, a stern and more than Spartan simplicity of life and elevation of purpose. \nIt lives too fast. Men think that it is essential that the Nation have commerce, and export \nice, and talk through a telegraph, and ride thirty miles an hour, without a doubt, \nwhether they do or not; but whether we should live like baboons or like men, is a little \nuncertain. If we do not get out sleepers, and forge rails, and devote days and nights to \nthe work, but go to tinkering upon our lives to improve them, who will build railroads? \nAnd if railroads are not built, how shall we get to heaven in season? But if we stay at \nhome and mind our business, who will want railroads? We do not ride on the railroad; it \nrides upon us. Did you ever think what those sleepers are that underlie the railroad? \nEach one is a man, an Irishman, or a Yankee man. The rails are laid on them, and they \nare covered with sand, and the cars run smoothly over them. They are sound sleepers, I \nassure you. And every few years a new lot is laid down and run over; so that, if some \nhave the pleasure of riding on a rail, others have the misfortune to be ridden upon. And \nwhen they run over a man that is walking in his sleep, a supernumerary sleeper in the \nwrong position, and wake him up, they suddenly stop the cars, and make a hue and cry \nabout it, as if this were an exception. I am glad to know that it takes a gang of men for \nevery five miles to keep the sleepers down and level in their beds as it is, for this is a \nsign that they may sometime get up again. \nWhy should we live with such hurry and waste of life? We are determined to be starved \nbefore we are hungry. Men say that a stitch in time saves nine, and so they take a \nthousand stitches today to save nine tomorrow. As for work, we haven’t any of any \nconsequence. We have the Saint Vitus’ dance, and cannot possibly keep our heads still. If \nI should only give a few pulls at the parish bell-rope, as for a fire, that is, without setting \nthe bell, there is hardly a man on his farm in the outskirts of Concord, notwithstanding \nthat press of engagements which was his excuse so many times this morning, nor a boy, \nnor a woman, I might almost say, but would forsake all and follow that sound, not \nmainly to save property from the flames, but, if we will confess the truth, much more to \nsee it burn, since burn it must, and we, be it known, did not set it on fire — or to see it \nput out, and have a hand in it, if that is done as handsomely; yes, even if it were the \nparish church itself. Hardly a man takes a half-hour’s nap after dinner, but when he \nwakes he holds up his head and asks, “What’s the news?” as if the rest of mankind had \nstood his sentinels. Some give directions to be waked every half-hour, doubtless for no \nother purpose; and then, to pay for it, they tell what they have dreamed. After a night’s \nsleep the news is as indispensable as the breakfast. “Pray tell me anything new that has \nhappened to a man anywhere on this globe” — and he reads it over his coffee and rolls, \nthat a man has had his eyes gouged out this morning on the Wachito River; never \ndreaming the while that he lives in the dark unfathomed mammoth cave of this world, \nand has but the rudiment of an eye himself. "}, {"pdfPage": 49, "text": "For my part, I could easily do without the post-office. I think that there are very few \nimportant communications made through it. To speak critically, I never received more \nthan one or two letters in my life — I wrote this some years ago — that were worth the \npostage. The penny-post is, commonly, an institution through which you seriously offer \na man that penny for his thoughts which is so often safely offered in jest. And I am sure \nthat I never read any memorable news in a newspaper. If we read of one man robbed, or \nmurdered, or killed by accident, or one house burned, or one vessel wrecked, or one \nsteamboat blown up, or one cow run over on the Western Railroad, or one mad dog \nkilled, or one lot of grasshoppers in the winter — we never need read of another. One is \nenough. If you are acquainted with the principle, what do you care for a myriad \ninstances and applications? To a philosopher all news, as it is called, is gossip, and they \nwho edit and read it are old women over their tea. Yet not a few are greedy after this \ngossip. There was such a rush, as I hear, the other day at one of the offices to learn the \nforeign news by the last arrival, that several large squares of plate glass belonging to the \nestablishment were broken by the pressure — news which I seriously think a ready wit \nmight write a twelve-month, or twelve years, beforehand with sufficient accuracy. As for \nSpain, for instance, if you know how to throw in Don Carlos and the Infanta, and Don \nPedro and Seville and Granada, from time to time in the right proportions — they may \nhave changed the names a little since I saw the papers — and serve up a bull-fight when \nother entertainments fail, it will be true to the letter, and give us as good an idea of the \nexact state or ruin of things in Spain as the most succinct and lucid reports under this \nhead in the newspapers: and as for England, almost the last significant scrap of news \nfrom that quarter was the revolution of 1649; and if you have learned the history of her \ncrops for an average year, you never need attend to that thing again, unless your \nspeculations are of a merely pecuniary character. If one may judge who rarely looks into \nthe newspapers, nothing new does ever happen in foreign parts, a French revolution not \nexcepted. \nWhat news! how much more important to know what that is which was never old! \n“Kieou-he-yu (great dignitary of the state of Wei) sent a man to Khoung-tseu to know \nhis news. Khoung-tseu caused the messenger to be seated near him, and questioned him \nin these terms: What is your master doing? The messenger answered with respect: My \nmaster desires to diminish the number of his faults, but he cannot come to the end of \nthem. The messenger being gone, the philosopher remarked: What a worthy messenger! \nWhat a worthy messenger!” The preacher, instead of vexing the ears of drowsy farmers \non their day of rest at the end of the week — for Sunday is the fit conclusion of an ill-\nspent week, and not the fresh and brave beginning of a new one — with this one other \ndraggle-tail of a sermon, should shout with thundering voice, “Pause! Avast! Why so \nseeming fast, but deadly slow?” \nShams and delusions are esteemed for soundest truths, while reality is fabulous. If men \nwould steadily observe realities only, and not allow themselves to be deluded, life, to \ncompare it with such things as we know, would be like a fairy tale and the Arabian \nNights’ Entertainments. If we respected only what is inevitable and has a right to be, \nmusic and poetry would resound along the streets. When we are unhurried and wise, \nwe perceive that only great and worthy things have any permanent and absolute \nexistence, that petty fears and petty pleasures are but the shadow of the reality. This is \nalways exhilarating and sublime. By closing the eyes and slumbering, and consenting to \nbe deceived by shows, men establish and confirm their daily life of routine and habit \neverywhere, which still is built on purely illusory foundations. Children, who play life, "}, {"pdfPage": 50, "text": "discern its true law and relations more clearly than men, who fail to live it worthily, but \nwho think that they are wiser by experience, that is, by failure. I have read in a Hindoo \nbook, that “there was a king’s son, who, being expelled in infancy from his native city, \nwas brought up by a forester, and, growing up to maturity in that state, imagined \nhimself to belong to the barbarous race with which he lived. One of his father’s \nministers having discovered him, revealed to him what he was, and the misconception \nof his character was removed, and he knew himself to be a prince. So soul,” continues \nthe Hindoo philosopher, “from the circumstances in which it is placed, mistakes its own \ncharacter, until the truth is revealed to it by some holy teacher, and then it knows itself \nto be Brahme.” I perceive that we inhabitants of New England live this mean life that we \ndo because our vision does not penetrate the surface of things. We think that that is \nwhich appears to be. If a man should walk through this town and see only the reality, \nwhere, think you, would the “Mill-dam” go to? If he should give us an account of the \nrealities he beheld there, we should not recognize the place in his description. Look at a \nmeeting-house, or a court-house, or a jail, or a shop, or a dwelling-house, and say what \nthat thing really is before a true gaze, and they would all go to pieces in your account of \nthem. Men esteem truth remote, in the outskirts of the system, behind the farthest star, \nbefore Adam and after the last man. In eternity there is indeed something true and \nsublime. But all these times and places and occasions are now and here. God himself \nculminates in the present moment, and will never be more divine in the lapse of all the \nages. And we are enabled to apprehend at all what is sublime and noble only by the \nperpetual instilling and drenching of the reality that surrounds us. The universe \nconstantly and obediently answers to our conceptions; whether we travel fast or slow, \nthe track is laid for us. Let us spend our lives in conceiving then. The poet or the artist \nnever yet had so fair and noble a design but some of his posterity at least could \naccomplish it. \nLet us spend one day as deliberately as Nature, and not be thrown off the track by every \nnutshell and mosquito’s wing that falls on the rails. Let us rise early and fast, or break \nfast, gently and without perturbation; let company come and let company go, let the \nbells ring and the children cry — determined to make a day of it. Why should we knock \nunder and go with the stream? Let us not be upset and overwhelmed in that terrible \nrapid and whirlpool called a dinner, situated in the meridian shallows. Weather this \ndanger and you are safe, for the rest of the way is down hill. With unrelaxed nerves, \nwith morning vigor, sail by it, looking another way, tied to the mast like Ulysses. If the \nengine whistles, let it whistle till it is hoarse for its pains. If the bell rings, why should we \nrun? We will consider what kind of music they are like. Let us settle ourselves, and work \nand wedge our feet downward through the mud and slush of opinion, and prejudice, and \ntradition, and delusion, and appearance, that alluvion which covers the globe, through \nParis and London, through New York and Boston and Concord, through Church and \nState, through poetry and philosophy and religion, till we come to a hard bottom and \nrocks in place, which we can call reality, and say, This is, and no mistake; and then begin, \nhaving a point d’appui, below freshet and frost and fire, a place where you might found a \nwall or a state, or set a lamp-post safely, or perhaps a gauge, not a Nilometer, but a \nRealometer, that future ages might know how deep a freshet of shams and appearances \nhad gathered from time to time. If you stand right fronting and face to face to a fact, you \nwill see the sun glimmer on both its surfaces, as if it were a cimeter, and feel its sweet \nedge dividing you through the heart and marrow, and so you will happily conclude your \nmortal career. Be it life or death, we crave only reality. If we are really dying, let us hear "}, {"pdfPage": 51, "text": "the rattle in our throats and feel cold in the extremities; if we are alive, let us go about \nour business. \nTime is but the stream I go a-fishing in. I drink at it; but while I drink I see the sandy \nbottom and detect how shallow it is. Its thin current slides away, but eternity remains. I \nwould drink deeper; fish in the sky, whose bottom is pebbly with stars. I cannot count \none. I know not the first letter of the alphabet. I have always been regretting that I was \nnot as wise as the day I was born. The intellect is a cleaver; it discerns and rifts its way \ninto the secret of things. I do not wish to be any more busy with my hands than is \nnecessary. My head is hands and feet. I feel all my best faculties concentrated in it. My \ninstinct tells me that my head is an organ for burrowing, as some creatures use their \nsnout and fore paws, and with it I would mine and burrow my way through these hills. I \nthink that the richest vein is somewhere hereabouts; so by the divining-rod and thin \nrising vapors I judge; and here I will begin to mine. "}, {"pdfPage": 52, "text": "Reading \n \nWith a little more deliberation in the choice of their pursuits, all men would perhaps \nbecome essentially students and observers, for certainly their nature and destiny are \ninteresting to all alike. In accumulating property for ourselves or our posterity, in \nfounding a family or a state, or acquiring fame even, we are mortal; but in dealing with \ntruth we are immortal, and need fear no change nor accident. The oldest Egyptian or \nHindoo philosopher raised a corner of the veil from the statue of the divinity; and still \nthe trembling robe remains raised, and I gaze upon as fresh a glory as he did, since it \nwas I in him that was then so bold, and it is he in me that now reviews the vision. No \ndust has settled on that robe; no time has elapsed since that divinity was revealed. That \ntime which we really improve, or which is improvable, is neither past, present, nor \nfuture. \nMy residence was more favorable, not only to thought, but to serious reading, than a \nuniversity; and though I was beyond the range of the ordinary circulating library, I had \nmore than ever come within the influence of those books which circulate round the \nworld, whose sentences were first written on bark, and are now merely copied from \ntime to time on to linen paper. Says the poet Mr Udd, “Being seated, to run through the \nregion of the spiritual world; I have had this advantage in books. To be intoxicated by a \nsingle glass of wine; I have experienced this pleasure when I have drunk the liquor of \nthe esoteric doctrines.” I kept Homer’s Iliad on my table through the summer, though I \nlooked at his page only now and then. Incessant labor with my hands, at first, for I had \nmy house to finish and my beans to hoe at the same time, made more study impossible. \nYet I sustained myself by the prospect of such reading in future. I read one or two \nshallow books of travel in the intervals of my work, till that employment made me \nashamed of myself, and I asked where it was then that I lived. \nThe student may read Homer or AEschylus in the Greek without danger of dissipation \nor luxuriousness, for it implies that he in some measure emulate their heroes, and \nconsecrate morning hours to their pages. The heroic books, even if printed in the \ncharacter of our mother tongue, will always be in a language dead to degenerate times; \nand we must laboriously seek the meaning of each word and line, conjecturing a larger \nsense than common use permits out of what wisdom and valor and generosity we have. \nThe modern cheap and fertile press, with all its translations, has done little to bring us \nnearer to the heroic writers of antiquity. They seem as solitary, and the letter in which \nthey are printed as rare and curious, as ever. It is worth the expense of youthful days \nand costly hours, if you learn only some words of an ancient language, which are raised \nout of the trivialness of the street, to be perpetual suggestions and provocations. It is not \nin vain that the farmer remembers and repeats the few Latin words which he has heard. \nMen sometimes speak as if the study of the classics would at length make way for more \nmodern and practical studies; but the adventurous student will always study classics, in \nwhatever language they may be written and however ancient they may be. For what are \nthe classics but the noblest recorded thoughts of man? They are the only oracles which \nare not decayed, and there are such answers to the most modern inquiry in them as \nDelphi and Dodona never gave. We might as well omit to study Nature because she is \nold. To read well, that is, to read true books in a true spirit, is a noble exercise, and one \nthat will task the reader more than any exercise which the customs of the day esteem. It "}, {"pdfPage": 53, "text": "requires a training such as the athletes underwent, the steady intention almost of the \nwhole life to this object. Books must be read as deliberately and reservedly as they were \nwritten. It is not enough even to be able to speak the language of that nation by which \nthey are written, for there is a memorable interval between the spoken and the written \nlanguage, the language heard and the language read. The one is commonly transitory, a \nsound, a tongue, a dialect merely, almost brutish, and we learn it unconsciously, like the \nbrutes, of our mothers. The other is the maturity and experience of that; if that is our \nmother tongue, this is our father tongue, a reserved and select expression, too \nsignificant to be heard by the ear, which we must be born again in order to speak. The \ncrowds of men who merely spoke the Greek and Latin tongues in the Middle Ages were \nnot entitled by the accident of birth to read the works of genius written in those \nlanguages; for these were not written in that Greek or Latin which they knew, but in the \nselect language of literature. They had not learned the nobler dialects of Greece and \nRome, but the very materials on which they were written were waste paper to them, \nand they prized instead a cheap contemporary literature. But when the several nations \nof Europe had acquired distinct though rude written languages of their own, sufficient \nfor the purposes of their rising literatures, then first learning revived, and scholars were \nenabled to discern from that remoteness the treasures of antiquity. What the Roman \nand Grecian multitude could not hear, after the lapse of ages a few scholars read, and a \nfew scholars only are still reading it. \nHowever much we may admire the orator’s occasional bursts of eloquence, the noblest \nwritten words are commonly as far behind or above the fleeting spoken language as the \nfirmament with its stars is behind the clouds. There are the stars, and they who can may \nread them. The astronomers forever comment on and observe them. They are not \nexhalations like our daily colloquies and vaporous breath. What is called eloquence in \nthe forum is commonly found to be rhetoric in the study. The orator yields to the \ninspiration of a transient occasion, and speaks to the mob before him, to those who can \nhear him; but the writer, whose more equable life is his occasion, and who would be \ndistracted by the event and the crowd which inspire the orator, speaks to the intellect \nand health of mankind, to all in any age who can understand him. \nNo wonder that Alexander carried the Iliad with him on his expeditions in a precious \ncasket. A written word is the choicest of relics. It is something at once more intimate \nwith us and more universal than any other work of art. It is the work of art nearest to \nlife itself. It may be translated into every language, and not only be read but actually \nbreathed from all human lips; — not be represented on canvas or in marble only, but be \ncarved out of the breath of life itself. The symbol of an ancient man’s thought becomes a \nmodern man’s speech. Two thousand summers have imparted to the monuments of \nGrecian literature, as to her marbles, only a maturer golden and autumnal tint, for they \nhave carried their own serene and celestial atmosphere into all lands to protect them \nagainst the corrosion of time. Books are the treasured wealth of the world and the fit \ninheritance of generations and nations. Books, the oldest and the best, stand naturally \nand rightfully on the shelves of every cottage. They have no cause of their own to plead, \nbut while they enlighten and sustain the reader his common sense will not refuse them. \nTheir authors are a natural and irresistible aristocracy in every society, and, more than \nkings or emperors, exert an influence on mankind. When the illiterate and perhaps \nscornful trader has earned by enterprise and industry his coveted leisure and \nindependence, and is admitted to the circles of wealth and fashion, he turns inevitably at \nlast to those still higher but yet inaccessible circles of intellect and genius, and is "}, {"pdfPage": 54, "text": "sensible only of the imperfection of his culture and the vanity and insufficiency of all his \nriches, and further proves his good sense by the pains which be takes to secure for his \nchildren that intellectual culture whose want he so keenly feels; and thus it is that he \nbecomes the founder of a family. \nThose who have not learned to read the ancient classics in the language in which they \nwere written must have a very imperfect knowledge of the history of the human race; \nfor it is remarkable that no transcript of them has ever been made into any modern \ntongue, unless our civilization itself may be regarded as such a transcript. Homer has \nnever yet been printed in English, nor AEschylus, nor Virgil even — works as refined, as \nsolidly done, and as beautiful almost as the morning itself; for later writers, say what we \nwill of their genius, have rarely, if ever, equalled the elaborate beauty and finish and the \nlifelong and heroic literary labors of the ancients. They only talk of forgetting them who \nnever knew them. It will be soon enough to forget them when we have the learning and \nthe genius which will enable us to attend to and appreciate them. That age will be rich \nindeed when those relics which we call Classics, and the still older and more than classic \nbut even less known Scriptures of the nations, shall have still further accumulated, \nwhen the Vaticans shall be filled with Vedas and Zendavestas and Bibles, with Homers \nand Dantes and Shakespeares, and all the centuries to come shall have successively \ndeposited their trophies in the forum of the world. By such a pile we may hope to scale \nheaven at last. \nThe works of the great poets have never yet been read by mankind, for only great poets \ncan read them. They have only been read as the multitude read the stars, at most \nastrologically, not astronomically. Most men have learned to read to serve a paltry \nconvenience, as they have learned to cipher in order to keep accounts and not be \ncheated in trade; but of reading as a noble intellectual exercise they know little or \nnothing; yet this only is reading, in a high sense, not that which lulls us as a luxury and \nsuffers the nobler faculties to sleep the while, but what we have to stand on tip-toe to \nread and devote our most alert and wakeful hours to. \nI think that having learned our letters we should read the best that is in literature, and \nnot be forever repeating our a-b-abs, and words of one syllable, in the fourth or fifth \nclasses, sitting on the lowest and foremost form all our lives. Most men are satisfied if \nthey read or hear read, and perchance have been convicted by the wisdom of one good \nbook, the Bible, and for the rest of their lives vegetate and dissipate their faculties in \nwhat is called easy reading. There is a work in several volumes in our Circulating \nLibrary entitled “Little Reading,” which I thought referred to a town of that name which \nI had not been to. There are those who, like cormorants and ostriches, can digest all \nsorts of this, even after the fullest dinner of meats and vegetables, for they suffer \nnothing to be wasted. If others are the machines to provide this provender, they are the \nmachines to read it. They read the nine thousandth tale about Zebulon and Sophronia, \nand how they loved as none had ever loved before, and neither did the course of their \ntrue love run smooth — at any rate, how it did run and stumble, and get up again and go \non! how some poor unfortunate got up on to a steeple, who had better never have gone \nup as far as the belfry; and then, having needlessly got him up there, the happy novelist \nrings the bell for all the world to come together and hear, O dear! how he did get down \nagain! For my part, I think that they had better metamorphose all such aspiring heroes \nof universal noveldom into man weather-cocks, as they used to put heroes among the \nconstellations, and let them swing round there till they are rusty, and not come down at \nall to bother honest men with their pranks. The next time the novelist rings the bell I "}, {"pdfPage": 55, "text": "will not stir though the meeting-house burn down. “The Skip of the Tip–Toe-Hop, a \nRomance of the Middle Ages, by the celebrated author of ‘Tittle–Tol-Tan,’ to appear in \nmonthly parts; a great rush; don’t all come together.” All this they read with saucer eyes, \nand erect and primitive curiosity, and with unwearied gizzard, whose corrugations even \nyet need no sharpening, just as some little four-year-old bencher his two-cent gilt-\ncovered edition of Cinderella — without any improvement, that I can see, in the \npronunciation, or accent, or emphasis, or any more skill in extracting or inserting the \nmoral. The result is dulness of sight, a stagnation of the vital circulations, and a general \ndeliquium and sloughing off of all the intellectual faculties. This sort of gingerbread is \nbaked daily and more sedulously than pure wheat or rye-and-Indian in almost every \noven, and finds a surer market. \nThe best books are not read even by those who are called good readers. What does our \nConcord culture amount to? There is in this town, with a very few exceptions, no taste \nfor the best or for very good books even in English literature, whose words all can read \nand spell. Even the college-bred and so-called liberally educated men here and \nelsewhere have really little or no acquaintance with the English classics; and as for the \nrecorded wisdom of mankind, the ancient classics and Bibles, which are accessible to all \nwho will know of them, there are the feeblest efforts anywhere made to become \nacquainted with them. I know a woodchopper, of middle age, who takes a French paper, \nnot for news as he says, for he is above that, but to “keep himself in practice,” he being a \nCanadian by birth; and when I ask him what he considers the best thing he can do in this \nworld, he says, beside this, to keep up and add to his English. This is about as much as \nthe college-bred generally do or aspire to do, and they take an English paper for the \npurpose. One who has just come from reading perhaps one of the best English books \nwill find how many with whom he can converse about it? Or suppose he comes from \nreading a Greek or Latin classic in the original, whose praises are familiar even to the \nso-called illiterate; he will find nobody at all to speak to, but must keep silence about it. \nIndeed, there is hardly the professor in our colleges, who, if he has mastered the \ndifficulties of the language, has proportionally mastered the difficulties of the wit and \npoetry of a Greek poet, and has any sympathy to impart to the alert and heroic reader; \nand as for the sacred Scriptures, or Bibles of mankind, who in this town can tell me even \ntheir titles? Most men do not know that any nation but the Hebrews have had a \nscripture. A man, any man, will go considerably out of his way to pick up a silver dollar; \nbut here are golden words, which the wisest men of antiquity have uttered, and whose \nworth the wise of every succeeding age have assured us of; — and yet we learn to read \nonly as far as Easy Reading, the primers and class-books, and when we leave school, the \n“Little Reading,” and story-books, which are for boys and beginners; and our reading, \nour conversation and thinking, are all on a very low level, worthy only of pygmies and \nmanikins. \nI aspire to be acquainted with wiser men than this our Concord soil has produced, \nwhose names are hardly known here. Or shall I hear the name of Plato and never read \nhis book? As if Plato were my townsman and I never saw him — my next neighbor and I \nnever heard him speak or attended to the wisdom of his words. But how actually is it? \nHis Dialogues, which contain what was immortal in him, lie on the next shelf, and yet I \nnever read them. We are underbred and low-lived and illiterate; and in this respect I \nconfess I do not make any very broad distinction between the illiterateness of my \ntownsman who cannot read at all and the illiterateness of him who has learned to read \nonly what is for children and feeble intellects. We should be as good as the worthies of "}, {"pdfPage": 56, "text": "antiquity, but partly by first knowing how good they were. We are a race of tit-men, and \nsoar but little higher in our intellectual flights than the columns of the daily paper. \nIt is not all books that are as dull as their readers. There are probably words addressed \nto our condition exactly, which, if we could really hear and understand, would be more \nsalutary than the morning or the spring to our lives, and possibly put a new aspect on \nthe face of things for us. How many a man has dated a new era in his life from the \nreading of a book! The book exists for us, perchance, which will explain our miracles \nand reveal new ones. The at present unutterable things we may find somewhere \nuttered. These same questions that disturb and puzzle and confound us have in their \nturn occurred to all the wise men; not one has been omitted; and each has answered \nthem, according to his ability, by his words and his life. Moreover, with wisdom we shall \nlearn liberality. The solitary hired man on a farm in the outskirts of Concord, who has \nhad his second birth and peculiar religious experience, and is driven as he believes into \nthe silent gravity and exclusiveness by his faith, may think it is not true; but Zoroaster, \nthousands of years ago, travelled the same road and had the same experience; but he, \nbeing wise, knew it to be universal, and treated his neighbors accordingly, and is even \nsaid to have invented and established worship among men. Let him humbly commune \nwith Zoroaster then, and through the liberalizing influence of all the worthies, with \nJesus Christ himself, and let “our church” go by the board. \nWe boast that we belong to the Nineteenth Century and are making the most rapid \nstrides of any nation. But consider how little this village does for its own culture. I do \nnot wish to flatter my townsmen, nor to be flattered by them, for that will not advance \neither of us. We need to be provoked — goaded like oxen, as we are, into a trot. We have \na comparatively decent system of common schools, schools for infants only; but \nexcepting the half-starved Lyceum in the winter, and latterly the puny beginning of a \nlibrary suggested by the State, no school for ourselves. We spend more on almost any \narticle of bodily aliment or ailment than on our mental aliment. It is time that we had \nuncommon schools, that we did not leave off our education when we begin to be men \nand women. It is time that villages were universities, and their elder inhabitants the \nfellows of universities, with leisure — if they are, indeed, so well off — to pursue liberal \nstudies the rest of their lives. Shall the world be confined to one Paris or one Oxford \nforever? Cannot students be boarded here and get a liberal education under the skies of \nConcord? Can we not hire some Abelard to lecture to us? Alas! what with foddering the \ncattle and tending the store, we are kept from school too long, and our education is \nsadly neglected. In this country, the village should in some respects take the place of the \nnobleman of Europe. It should be the patron of the fine arts. It is rich enough. It wants \nonly the magnanimity and refinement. It can spend money enough on such things as \nfarmers and traders value, but it is thought Utopian to propose spending money for \nthings which more intelligent men know to be of far more worth. This town has spent \nseventeen thousand dollars on a town-house, thank fortune or politics, but probably it \nwill not spend so much on living wit, the true meat to put into that shell, in a hundred \nyears. The one hundred and twenty-five dollars annually subscribed for a Lyceum in the \nwinter is better spent than any other equal sum raised in the town. If we live in the \nNineteenth Century, why should we not enjoy the advantages which the Nineteenth \nCentury offers? Why should our life be in any respect provincial? If we will read \nnewspapers, why not skip the gossip of Boston and take the best newspaper in the \nworld at once? — not be sucking the pap of “neutral family” papers, or browsing “Olive \nBranches” here in New England. Let the reports of all the learned societies come to us, "}, {"pdfPage": 57, "text": "and we will see if they know anything. Why should we leave it to Harper & Brothers and \nRedding & Co. to select our reading? As the nobleman of cultivated taste surrounds \nhimself with whatever conduces to his culture — genius — learning — wit — books — \npaintings — statuary — music — philosophical instruments, and the like; so let the \nvillage do — not stop short at a pedagogue, a parson, a sexton, a parish library, and \nthree selectmen, because our Pilgrim forefathers got through a cold winter once on a \nbleak rock with these. To act collectively is according to the spirit of our institutions; \nand I am confident that, as our circumstances are more flourishing, our means are \ngreater than the nobleman’s. New England can hire all the wise men in the world to \ncome and teach her, and board them round the while, and not be provincial at all. That \nis the uncommon school we want. Instead of noblemen, let us have noble villages of \nmen. If it is necessary, omit one bridge over the river, go round a little there, and throw \none arch at least over the darker gulf of ignorance which surrounds us. "}, {"pdfPage": 58, "text": "Sounds \n \nBut while we are confined to books, though the most select and classic, and read only \nparticular written languages, which are themselves but dialects and provincial, we are \nin danger of forgetting the language which all things and events speak without \nmetaphor, which alone is copious and standard. Much is published, but little printed. \nThe rays which stream through the shutter will be no longer remembered when the \nshutter is wholly removed. No method nor discipline can supersede the necessity of \nbeing forever on the alert. What is a course of history or philosophy, or poetry, no \nmatter how well selected, or the best society, or the most admirable routine of life, \ncompared with the discipline of looking always at what is to be seen? Will you be a \nreader, a student merely, or a seer? Read your fate, see what is before you, and walk on \ninto futurity. \nI did not read books the first summer; I hoed beans. Nay, I often did better than this. \nThere were times when I could not afford to sacrifice the bloom of the present moment \nto any work, whether of the head or hands. I love a broad margin to my life. Sometimes, \nin a summer morning, having taken my accustomed bath, I sat in my sunny doorway \nfrom sunrise till noon, rapt in a revery, amidst the pines and hickories and sumachs, in \nundisturbed solitude and stillness, while the birds sing around or flitted noiseless \nthrough the house, until by the sun falling in at my west window, or the noise of some \ntraveller’s wagon on the distant highway, I was reminded of the lapse of time. I grew in \nthose seasons like corn in the night, and they were far better than any work of the hands \nwould have been. They were not time subtracted from my life, but so much over and \nabove my usual allowance. I realized what the Orientals mean by contemplation and the \nforsaking of works. For the most part, I minded not how the hours went. The day \nadvanced as if to light some work of mine; it was morning, and lo, now it is evening, and \nnothing memorable is accomplished. Instead of singing like the birds, I silently smiled at \nmy incessant good fortune. As the sparrow had its trill, sitting on the hickory before my \ndoor, so had I my chuckle or suppressed warble which he might hear out of my nest. My \ndays were not days of the week, bearing the stamp of any heathen deity, nor were they \nminced into hours and fretted by the ticking of a clock; for I lived like the Puri Indians, of \nwhom it is said that “for yesterday, today, and tomorrow they have only one word, and \nthey express the variety of meaning by pointing backward for yesterday forward for \ntomorrow, and overhead for the passing day.” This was sheer idleness to my fellow-\ntownsmen, no doubt; but if the birds and flowers had tried me by their standard, I \nshould not have been found wanting. A man must find his occasions in himself, it is true. \nThe natural day is very calm, and will hardly reprove his indolence. \nI had this advantage, at least, in my mode of life, over those who were obliged to look \nabroad for amusement, to society and the theatre, that my life itself was become my \namusement and never ceased to be novel. It was a drama of many scenes and without \nan end. If we were always, indeed, getting our living, and regulating our lives according \nto the last and best mode we had learned, we should never be troubled with ennui. \nFollow your genius closely enough, and it will not fail to show you a fresh prospect \nevery hour. Housework was a pleasant pastime. When my floor was dirty, I rose early, \nand, setting all my furniture out of doors on the grass, bed and bedstead making but one \nbudget, dashed water on the floor, and sprinkled white sand from the pond on it, and "}, {"pdfPage": 59, "text": "then with a broom scrubbed it clean and white; and by the time the villagers had broken \ntheir fast the morning sun had dried my house sufficiently to allow me to move in again, \nand my meditations were almost uninterupted. It was pleasant to see my whole \nhousehold effects out on the grass, making a little pile like a gypsy’s pack, and my three-\nlegged table, from which I did not remove the books and pen and ink, standing amid the \npines and hickories. They seemed glad to get out themselves, and as if unwilling to be \nbrought in. I was sometimes tempted to stretch an awning over them and take my seat \nthere. It was worth the while to see the sun shine on these things, and hear the free \nwind blow on them; so much more interesting most familiar objects look out of doors \nthan in the house. A bird sits on the next bough, life-everlasting grows under the table, \nand blackberry vines run round its legs; pine cones, chestnut burs, and strawberry \nleaves are strewn about. It looked as if this was the way these forms came to be \ntransferred to our furniture, to tables, chairs, and bedsteads — because they once stood \nin their midst. \nMy house was on the side of a hill, immediately on the edge of the larger wood, in the \nmidst of a young forest of pitch pines and hickories, and half a dozen rods from the \npond, to which a narrow footpath led down the hill. In my front yard grew the \nstrawberry, blackberry, and life-everlasting, johnswort and goldenrod, shrub oaks and \nsand cherry, blueberry and groundnut. Near the end of May, the sand cherry (Cerasus \npumila) adorned the sides of the path with its delicate flowers arranged in umbels \ncylindrically about its short stems, which last, in the fall, weighed down with goodsized \nand handsome cherries, fell over in wreaths like rays on every side. I tasted them out of \ncompliment to Nature, though they were scarcely palatable. The sumach (Rhus glabra) \ngrew luxuriantly about the house, pushing up through the embankment which I had \nmade, and growing five or six feet the first season. Its broad pinnate tropical leaf was \npleasant though strange to look on. The large buds, suddenly pushing out late in the \nspring from dry sticks which had seemed to be dead, developed themselves as by magic \ninto graceful green and tender boughs, an inch in diameter; and sometimes, as I sat at \nmy window, so heedlessly did they grow and tax their weak joints, I heard a fresh and \ntender bough suddenly fall like a fan to the ground, when there was not a breath of air \nstirring, broken off by its own weight. In August, the large masses of berries, which, \nwhen in flower, had attracted many wild bees, gradually assumed their bright velvety \ncrimson hue, and by their weight again bent down and broke the tender limbs. \nAs I sit at my window this summer afternoon, hawks are circling about my clearing; the \ntantivy of wild pigeons, flying by two and threes athwart my view, or perching restless \non the white pine boughs behind my house, gives a voice to the air; a fish hawk dimples \nthe glassy surface of the pond and brings up a fish; a mink steals out of the marsh before \nmy door and seizes a frog by the shore; the sedge is bending under the weight of the \nreed-birds flitting hither and thither; and for the last half-hour I have heard the rattle of \nrailroad cars, now dying away and then reviving like the beat of a partridge, conveying \ntravellers from Boston to the country. For I did not live so out of the world as that boy \nwho, as I hear, was put out to a farmer in the east part of the town, but ere long ran \naway and came home again, quite down at the heel and homesick. He had never seen \nsuch a dull and out-of-the-way place; the folks were all gone off; why, you couldn’t even \nhear the whistle! I doubt if there is such a place in Massachusetts now:— \n“In truth, our village has become a butt \nFor one of those fleet railroad shafts, and o’er \nOur peaceful plain its soothing sound is — Concord.” "}, {"pdfPage": 60, "text": "The Fitchburg Railroad touches the pond about a hundred rods south of where I dwell. I \nusually go to the village along its causeway, and am, as it were, related to society by this \nlink. The men on the freight trains, who go over the whole length of the road, bow to me \nas to an old acquaintance, they pass me so often, and apparently they take me for an \nemployee; and so I am. I too would fain be a track-repairer somewhere in the orbit of \nthe earth. \nThe whistle of the locomotive penetrates my woods summer and winter, sounding like \nthe scream of a hawk sailing over some farmer’s yard, informing me that many restless \ncity merchants are arriving within the circle of the town, or adventurous country \ntraders from the other side. As they come under one horizon, they shout their warning \nto get off the track to the other, heard sometimes through the circles of two towns. Here \ncome your groceries, country; your rations, countrymen! Nor is there any man so \nindependent on his farm that he can say them nay. And here’s your pay for them! \nscreams the countryman’s whistle; timber like long battering-rams going twenty miles \nan hour against the city’s walls, and chairs enough to seat all the weary and heavy-laden \nthat dwell within them. With such huge and lumbering civility the country hands a chair \nto the city. All the Indian huckleberry hills are stripped, all the cranberry meadows are \nraked into the city. Up comes the cotton, down goes the woven cloth; up comes the silk, \ndown goes the woollen; up come the books, but down goes the wit that writes them. \nWhen I meet the engine with its train of cars moving off with planetary motion — or, \nrather, like a comet, for the beholder knows not if with that velocity and with that \ndirection it will ever revisit this system, since its orbit does not look like a returning \ncurve — with its steam cloud like a banner streaming behind in golden and silver \nwreaths, like many a downy cloud which I have seen, high in the heavens, unfolding its \nmasses to the light — as if this traveling demigod, this cloud-compeller, would ere long \ntake the sunset sky for the livery of his train; when I hear the iron horse make the hills \necho with his snort like thunder, shaking the earth with his feet, and breathing fire and \nsmoke from his nostrils (what kind of winged horse or fiery dragon they will put into \nthe new Mythology I don’t know), it seems as if the earth had got a race now worthy to \ninhabit it. If all were as it seems, and men made the elements their servants for noble \nends! If the cloud that hangs over the engine were the perspiration of heroic deeds, or as \nbeneficent as that which floats over the farmer’s fields, then the elements and Nature \nherself would cheerfully accompany men on their errands and be their escort. \nI watch the passage of the morning cars with the same feeling that I do the rising of the \nsun, which is hardly more regular. Their train of clouds stretching far behind and rising \nhigher and higher, going to heaven while the cars are going to Boston, conceals the sun \nfor a minute and casts my distant field into the shade, a celestial train beside which the \npetty train of cars which hugs the earth is but the barb of the spear. The stabler of the \niron horse was up early this winter morning by the light of the stars amid the \nmountains, to fodder and harness his steed. Fire, too, was awakened thus early to put \nthe vital heat in him and get him off. If the enterprise were as innocent as it is early! If \nthe snow lies deep, they strap on his snowshoes, and, with the giant plow, plow a furrow \nfrom the mountains to the seaboard, in which the cars, like a following drill-barrow, \nsprinkle all the restless men and floating merchandise in the country for seed. All day \nthe fire-steed flies over the country, stopping only that his master may rest, and I am \nawakened by his tramp and defiant snort at midnight, when in some remote glen in the \nwoods he fronts the elements incased in ice and snow; and he will reach his stall only \nwith the morning star, to start once more on his travels without rest or slumber. Or "}, {"pdfPage": 61, "text": "perchance, at evening, I hear him in his stable blowing off the superfluous energy of the \nday, that he may calm his nerves and cool his liver and brain for a few hours of iron \nslumber. If the enterprise were as heroic and commanding as it is protracted and \nunwearied! \nFar through unfrequented woods on the confines of towns, where once only the hunter \npenetrated by day, in the darkest night dart these bright saloons without the knowledge \nof their inhabitants; this moment stopping at some brilliant station-house in town or \ncity, where a social crowd is gathered, the next in the Dismal Swamp, scaring the owl \nand fox. The startings and arrivals of the cars are now the epochs in the village day. \nThey go and come with such regularity and precision, and their whistle can be heard so \nfar, that the farmers set their clocks by them, and thus one well-conducted institution \nregulates a whole country. Have not men improved somewhat in punctuality since the \nrailroad was invented? Do they not talk and think faster in the depot than they did in the \nstage-office? There is something electrifying in the atmosphere of the former place. I \nhave been astonished at the miracles it has wrought; that some of my neighbors, who, I \nshould have prophesied, once for all, would never get to Boston by so prompt a \nconveyance, are on hand when the bell rings. To do things “railroad fashion” is now the \nbyword; and it is worth the while to be warned so often and so sincerely by any power \nto get off its track. There is no stopping to read the riot act, no firing over the heads of \nthe mob, in this case. We have constructed a fate, an Atropos, that never turns aside. \n(Let that be the name of your engine.) Men are advertised that at a certain hour and \nminute these bolts will be shot toward particular points of the compass; yet it interferes \nwith no man’s business, and the children go to school on the other track. We live the \nsteadier for it. We are all educated thus to be sons of Tell. The air is full of invisible bolts. \nEvery path but your own is the path of fate. Keep on your own track, then. \nWhat recommends commerce to me is its enterprise and bravery. It does not clasp its \nhands and pray to Jupiter. I see these men every day go about their business with more \nor less courage and content, doing more even than they suspect, and perchance better \nemployed than they could have consciously devised. I am less affected by their heroism \nwho stood up for half an hour in the front line at Buena Vista, than by the steady and \ncheerful valor of the men who inhabit the snowplow for their winter quarters; who have \nnot merely the three-o’-clock-in-the-morning courage, which Bonaparte thought was \nthe rarest, but whose courage does not go to rest so early, who go to sleep only when \nthe storm sleeps or the sinews of their iron steed are frozen. On this morning of the \nGreat Snow, perchance, which is still raging and chilling men’s blood, I bear the muffled \ntone of their engine bell from out the fog bank of their chilled breath, which announces \nthat the cars are coming, without long delay, notwithstanding the veto of a New England \nnortheast snow-storm, and I behold the plowmen covered with snow and rime, their \nheads peering, above the mould-board which is turning down other than daisies and the \nnests of field mice, like bowlders of the Sierra Nevada, that occupy an outside place in \nthe universe. \nCommerce is unexpectedly confident and serene, alert, adventurous, and unwearied. It \nis very natural in its methods withal, far more so than many fantastic enterprises and \nsentimental experiments, and hence its singular success. I am refreshed and expanded \nwhen the freight train rattles past me, and I smell the stores which go dispensing their \nodors all the way from Long Wharf to Lake Champlain, reminding me of foreign parts, of \ncoral reefs, and Indian oceans, and tropical climes, and the extent of the globe. I feel \nmore like a citizen of the world at the sight of the palm-leaf which will cover so many "}, {"pdfPage": 62, "text": "flaxen New England heads the next summer, the Manilla hemp and cocoanut husks, the \nold junk, gunny bags, scrap iron, and rusty nails. This carload of torn sails is more \nlegible and interesting now than if they should be wrought into paper and printed \nbooks. Who can write so graphically the history of the storms they have weathered as \nthese rents have done? They are proof-sheets which need no correction. Here goes \nlumber from the Maine woods, which did not go out to sea in the last freshet, risen four \ndollars on the thousand because of what did go out or was split up; pine, spruce, cedar \n— first, second, third, and fourth qualities, so lately all of one quality, to wave over the \nbear, and moose, and caribou. Next rolls Thomaston lime, a prime lot, which will get far \namong the hills before it gets slacked. These rags in bales, of all hues and qualities, the \nlowest condition to which cotton and linen descend, the final result of dress — of \npatterns which are now no longer cried up, unless it be in Milwaukee, as those splendid \narticles, English, French, or American prints, ginghams, muslins, etc., gathered from all \nquarters both of fashion and poverty, going to become paper of one color or a few \nshades only, on which, forsooth, will be written tales of real life, high and low, and \nfounded on fact! This closed car smells of salt fish, the strong New England and \ncommercial scent, reminding me of the Grand Banks and the fisheries. Who has not seen \na salt fish, thoroughly cured for this world, so that nothing can spoil it, and putting, the \nperseverance of the saints to the blush? with which you may sweep or pave the streets, \nand split your kindlings, and the teamster shelter himself and his lading against sun, \nwind, and rain behind it — and the trader, as a Concord trader once did, hang it up by \nhis door for a sign when he commences business, until at last his oldest customer \ncannot tell surely whether it be animal, vegetable, or mineral, and yet it shall be as pure \nas a snowflake, and if it be put into a pot and boiled, will come out an excellent dun-fish \nfor a Saturday’s dinner. Next Spanish hides, with the tails still preserving their twist and \nthe angle of elevation they had when the oxen that wore them were careering over the \npampas of the Spanish Main — a type of all obstinacy, and evincing how almost \nhopeless and incurable are all constitutional vices. I confess, that practically speaking, \nwhen I have learned a man’s real disposition, I have no hopes of changing it for the \nbetter or worse in this state of existence. As the Orientals say, “A cur’s tail may be \nwarmed, and pressed, and bound round with ligatures, and after a twelve years’ labor \nbestowed upon it, still it will retain its natural form.” The only effectual cure for such \ninveteracies as these tails exhibit is to make glue of them, which I believe is what is \nusually done with them, and then they will stay put and stick. Here is a hogshead of \nmolasses or of brandy directed to John Smith, Cuttingsville, Vermont, some trader \namong the Green Mountains, who imports for the farmers near his clearing, and now \nperchance stands over his bulkhead and thinks of the last arrivals on the coast, how \nthey may affect the price for him, telling his customers this moment, as he has told them \ntwenty times before this morning, that he expects some by the next train of prime \nquality. It is advertised in the Cuttingsville Times. \nWhile these things go up other things come down. Warned by the whizzing sound, I look \nup from my book and see some tall pine, hewn on far northern hills, which has winged \nits way over the Green Mountains and the Connecticut, shot like an arrow through the \ntownship within ten minutes, and scarce another eye beholds it; going \n“to be the mast \nOf some great ammiral.” \nAnd hark! here comes the cattle-train bearing the cattle of a thousand hills, sheepcots, \nstables, and cow-yards in the air, drovers with their sticks, and shepherd boys in the "}, {"pdfPage": 63, "text": "midst of their flocks, all but the mountain pastures, whirled along like leaves blown \nfrom the mountains by the September gales. The air is filled with the bleating of calves \nand sheep, and the hustling of oxen, as if a pastoral valley were going by. When the old \nbell-wether at the head rattles his bell, the mountains do indeed skip like rams and the \nlittle hills like lambs. A carload of drovers, too, in the midst, on a level with their droves \nnow, their vocation gone, but still clinging to their useless sticks as their badge of office. \nBut their dogs, where are they? It is a stampede to them; they are quite thrown out; they \nhave lost the scent. Methinks I hear them barking behind the Peterboro’ Hills, or panting \nup the western slope of the Green Mountains. They will not be in at the death. Their \nvocation, too, is gone. Their fidelity and sagacity are below par now. They will slink back \nto their kennels in disgrace, or perchance run wild and strike a league with the wolf and \nthe fox. So is your pastoral life whirled past and away. But the bell rings, and I must get \noff the track and let the cars go by; — \nWhat’s the railroad to me? \nI never go to see \nWhere it ends. \nIt fills a few hollows, \nAnd makes banks for the swallows, \nIt sets the sand a-blowing, \nAnd the blackberries a-growing, \nbut I cross it like a cart-path in the woods. I will not have my eyes put out and my ears \nspoiled by its smoke and steam and hissing. \nNow that the cars are gone by and all the restless world with them, and the fishes in the \npond no longer feel their rumbling, I am more alone than ever. For the rest of the long \nafternoon, perhaps, my meditations are interrupted only by the faint rattle of a carriage \nor team along the distant highway. \nSometimes, on Sundays, I heard the bells, the Lincoln, Acton, Bedford, or Concord bell, \nwhen the wind was favorable, a faint, sweet, and, as it were, natural melody, worth \nimporting into the wilderness. At a sufficient distance over the woods this sound \nacquires a certain vibratory hum, as if the pine needles in the horizon were the strings \nof a harp which it swept. All sound heard at the greatest possible distance produces one \nand the same effect, a vibration of the universal lyre, just as the intervening atmosphere \nmakes a distant ridge of earth interesting to our eyes by the azure tint it imparts to it. \nThere came to me in this case a melody which the air had strained, and which had \nconversed with every leaf and needle of the wood, that portion of the sound which the \nelements had taken up and modulated and echoed from vale to vale. The echo is, to \nsome extent, an original sound, and therein is the magic and charm of it. It is not merely \na repetition of what was worth repeating in the bell, but partly the voice of the wood; \nthe same trivial words and notes sung by a wood-nymph. \nAt evening, the distant lowing of some cow in the horizon beyond the woods sounded \nsweet and melodious, and at first I would mistake it for the voices of certain minstrels \nby whom I was sometimes serenaded, who might be straying over hill and dale; but \nsoon I was not unpleasantly disappointed when it was prolonged into the cheap and \nnatural music of the cow. I do not mean to be satirical, but to express my appreciation of \nthose youths’ singing, when I state that I perceived clearly that it was akin to the music \nof the cow, and they were at length one articulation of Nature. "}, {"pdfPage": 64, "text": "Regularly at half-past seven, in one part of the summer, after the evening train had gone \nby, the whip-poor-wills chanted their vespers for half an hour, sitting on a stump by my \ndoor, or upon the ridge-pole of the house. They would begin to sing almost with as much \nprecision as a clock, within five minutes of a particular time, referred to the setting of \nthe sun, every evening. I had a rare opportunity to become acquainted with their habits. \nSometimes I heard four or five at once in different parts of the wood, by accident one a \nbar behind another, and so near me that I distinguished not only the cluck after each \nnote, but often that singular buzzing sound like a fly in a spider’s web, only \nproportionally louder. Sometimes one would circle round and round me in the woods a \nfew feet distant as if tethered by a string, when probably I was near its eggs. They sang \nat intervals throughout the night, and were again as musical as ever just before and \nabout dawn. \nWhen other birds are still, the screech owls take up the strain, like mourning women \ntheir ancient u-lu-lu. Their dismal scream is truly Ben Jonsonian. Wise midnight hags! It \nis no honest and blunt tu-whit tu-who of the poets, but, without jesting, a most solemn \ngraveyard ditty, the mutual consolations of suicide lovers remembering the pangs and \nthe delights of supernal love in the infernal groves. Yet I love to hear their wailing, their \ndoleful responses, trilled along the woodside; reminding me sometimes of music and \nsinging birds; as if it were the dark and tearful side of music, the regrets and sighs that \nwould fain be sung. They are the spirits, the low spirits and melancholy forebodings, of \nfallen souls that once in human shape night-walked the earth and did the deeds of \ndarkness, now expiating their sins with their wailing hymns or threnodies in the \nscenery of their transgressions. They give me a new sense of the variety and capacity of \nthat nature which is our common dwelling. Oh-o-o-o-o that I never had been bor-r-r-r-n! \nsighs one on this side of the pond, and circles with the restlessness of despair to some \nnew perch on the gray oaks. Then — that I never had been bor-r-r-r-n! echoes another \non the farther side with tremulous sincerity, and — bor-r-r-r-n! comes faintly from far \nin the Lincoln woods. \nI was also serenaded by a hooting owl. Near at hand you could fancy it the most \nmelancholy sound in Nature, as if she meant by this to stereotype and make permanent \nin her choir the dying moans of a human being — some poor weak relic of mortality \nwho has left hope behind, and howls like an animal, yet with human sobs, on entering \nthe dark valley, made more awful by a certain gurgling melodiousness — I find myself \nbeginning with the letters gl when I try to imitate it — expressive of a mind which has \nreached the gelatinous, mildewy stage in the mortification of all healthy and courageous \nthought. It reminded me of ghouls and idiots and insane howlings. But now one answers \nfrom far woods in a strain made really melodious by distance — Hoo hoo hoo, hoorer \nhoo; and indeed for the most part it suggested only pleasing associations, whether \nheard by day or night, summer or winter. \nI rejoice that there are owls. Let them do the idiotic and maniacal hooting for men. It is a \nsound admirably suited to swamps and twilight woods which no day illustrates, \nsuggesting a vast and undeveloped nature which men have not recognized. They \nrepresent the stark twilight and unsatisfied thoughts which all have. All day the sun has \nshone on the surface of some savage swamp, where the single spruce stands hung with \nusnea lichens, and small hawks circulate above, and the chickadee lisps amid the \nevergreens, and the partridge and rabbit skulk beneath; but now a more dismal and \nfitting day dawns, and a different race of creatures awakes to express the meaning of \nNature there. "}, {"pdfPage": 65, "text": "Late in the evening I heard the distant rumbling of wagons over bridges — a sound \nheard farther than almost any other at night — the baying of dogs, and sometimes again \nthe lowing of some disconsolate cow in a distant barn-yard. In the mean-while all the \nshore rang with the trump of bullfrogs, the sturdy spirits of ancient wine-bibbers and \nwassailers, still unrepentant, trying to sing a catch in their Stygian lake — if the Walden \nnymphs will pardon the comparison, for though there are almost no weeds, there are \nfrogs there — who would fain keep up the hilarious rules of their old festal tables, \nthough their voices have waxed hoarse and solemnly grave, mocking at mirth, and the \nwine has lost its flavor, and become only liquor to distend their paunches, and sweet \nintoxication never comes to drown the memory of the past, but mere saturation and \nwaterloggedness and distention. The most aldermanic, with his chin upon a heart-leaf, \nwhich serves for a napkin to his drooling chaps, under this northern shore quaffs a deep \ndraught of the once scorned water, and passes round the cup with the ejaculation tr-r-r-\noonk, tr-r-r — oonk, tr-r-r-oonk! and straightway comes over the water from some \ndistant cove the same password repeated, where the next in seniority and girth has \ngulped down to his mark; and when this observance has made the circuit of the shores, \nthen ejaculates the master of ceremonies, with satisfaction, tr-r-r-oonk! and each in his \nturn repeats the same down to the least distended, leakiest, and flabbiest paunched, that \nthere be no mistake; and then the howl goes round again and again, until the sun \ndisperses the morning mist, and only the patriarch is not under the pond, but vainly \nbellowing troonk from time to time, and pausing for a reply. \nI am not sure that I ever heard the sound of cock-crowing from my clearing, and I \nthought that it might be worth the while to keep a cockerel for his music merely, as a \nsinging bird. The note of this once wild Indian pheasant is certainly the most \nremarkable of any bird’s, and if they could be naturalized without being domesticated, it \nwould soon become the most famous sound in our woods, surpassing the clangor of the \ngoose and the hooting of the owl; and then imagine the cackling of the hens to fill the \npauses when their lords’ clarions rested! No wonder that man added this bird to his \ntame stock — to say nothing of the eggs and drumsticks. To walk in a winter morning in \na wood where these birds abounded, their native woods, and hear the wild cockerels \ncrow on the trees, clear and shrill for miles over the resounding earth, drowning the \nfeebler notes of other birds — think of it! It would put nations on the alert. Who would \nnot be early to rise, and rise earlier and earlier every successive day of his life, till he \nbecame unspeakably healthy, wealthy, and wise? This foreign bird’s note is celebrated \nby the poets of all countries along with the notes of their native songsters. All climates \nagree with brave Chanticleer. He is more indigenous even than the natives. His health is \never good, his lungs are sound, his spirits never flag. Even the sailor on the Atlantic and \nPacific is awakened by his voice; but its shrill sound never roused me from my \nslumbers. I kept neither dog, cat, cow, pig, nor hens, so that you would have said there \nwas a deficiency of domestic sounds; neither the churn, nor the spinning-wheel, nor \neven the singing of the kettle, nor the hissing of the urn, nor children crying, to comfort \none. An old-fashioned man would have lost his senses or died of ennui before this. Not \neven rats in the wall, for they were starved out, or rather were never baited in — only \nsquirrels on the roof and under the floor, a whip-poor-will on the ridge-pole, a blue jay \nscreaming beneath the window, a hare or woodchuck under the house, a screech owl or \na cat owl behind it, a flock of wild geese or a laughing loon on the pond, and a fox to bark \nin the night. Not even a lark or an oriole, those mild plantation birds, ever visited my \nclearing. No cockerels to crow nor hens to cackle in the yard. No yard! but unfenced \nnature reaching up to your very sills. A young forest growing up under your meadows, "}, {"pdfPage": 66, "text": "and wild sumachs and blackberry vines breaking through into your cellar; sturdy pitch \npines rubbing and creaking against the shingles for want of room, their roots reaching \nquite under the house. Instead of a scuttle or a blind blown off in the gale — a pine tree \nsnapped off or torn up by the roots behind your house for fuel. Instead of no path to the \nfront-yard gate in the Great Snow — no gate — no front-yard — and no path to the \ncivilized world. "}, {"pdfPage": 67, "text": "Solitude \n \nThis is a delicious evening, when the whole body is one sense, and imbibes delight \nthrough every pore. I go and come with a strange liberty in Nature, a part of herself. As I \nwalk along the stony shore of the pond in my shirt-sleeves, though it is cool as well as \ncloudy and windy, and I see nothing special to attract me, all the elements are unusually \ncongenial to me. The bullfrogs trump to usher in the night, and the note of the whip-\npoor-will is borne on the rippling wind from over the water. Sympathy with the \nfluttering alder and poplar leaves almost takes away my breath; yet, like the lake, my \nserenity is rippled but not ruffled. These small waves raised by the evening wind are as \nremote from storm as the smooth reflecting surface. Though it is now dark, the wind \nstill blows and roars in the wood, the waves still dash, and some creatures lull the rest \nwith their notes. The repose is never complete. The wildest animals do not repose, but \nseek their prey now; the fox, and skunk, and rabbit, now roam the fields and woods \nwithout fear. They are Nature’s watchmen — links which connect the days of animated \nlife. \nWhen I return to my house I find that visitors have been there and left their cards, either \na bunch of flowers, or a wreath of evergreen, or a name in pencil on a yellow walnut leaf \nor a chip. They who come rarely to the woods take some little piece of the forest into \ntheir hands to play with by the way, which they leave, either intentionally or \naccidentally. One has peeled a willow wand, woven it into a ring, and dropped it on my \ntable. I could always tell if visitors had called in my absence, either by the bended twigs \nor grass, or the print of their shoes, and generally of what sex or age or quality they \nwere by some slight trace left, as a flower dropped, or a bunch of grass plucked and \nthrown away, even as far off as the railroad, half a mile distant, or by the lingering odor \nof a cigar or pipe. Nay, I was frequently notified of the passage of a traveller along the \nhighway sixty rods off by the scent of his pipe. \nThere is commonly sufficient space about us. Our horizon is never quite at our elbows. \nThe thick wood is not just at our door, nor the pond, but somewhat is always clearing, \nfamiliar and worn by us, appropriated and fenced in some way, and reclaimed from \nNature. For what reason have I this vast range and circuit, some square miles of \nunfrequented forest, for my privacy, abandoned to me by men? My nearest neighbor is a \nmile distant, and no house is visible from any place but the hill-tops within half a mile of \nmy own. I have my horizon bounded by woods all to myself; a distant view of the \nrailroad where it touches the pond on the one hand, and of the fence which skirts the \nwoodland road on the other. But for the most part it is as solitary where I live as on the \nprairies. It is as much Asia or Africa as New England. I have, as it were, my own sun and \nmoon and stars, and a little world all to myself. At night there was never a traveller \npassed my house, or knocked at my door, more than if I were the first or last man; \nunless it were in the spring, when at long intervals some came from the village to fish \nfor pouts — they plainly fished much more in the Walden Pond of their own natures, \nand baited their hooks with darkness — but they soon retreated, usually with light \nbaskets, and left “the world to darkness and to me,” and the black kernel of the night \nwas never profaned by any human neighborhood. I believe that men are generally still a \nlittle afraid of the dark, though the witches are all hung, and Christianity and candles \nhave been introduced. "}, {"pdfPage": 68, "text": "Yet I experienced sometimes that the most sweet and tender, the most innocent and \nencouraging society may be found in any natural object, even for the poor misanthrope \nand most melancholy man. There can be no very black melancholy to him who lives in \nthe
