<script>
const BOOK={"title": "Walden", "author": "Henry David Thoreau", "pages": [{"pdfPage": 1, "text": ""}, {"pdfPage": 2, "text": ""}, {"pdfPage": 3, "text": "Walden by Henry David Thoreau. \nFirst published in 1854. \nThis ebook edition was created and published by Global Grey on the 18th October \n2021. \nThe artwork used for the cover is ‘The Concord Meadow’  \npainted by Childe Hassam. \nThis book can be found on the site here: \nglobalgreyebooks.com/walden-ebook.html \n©Global Grey 2021 \nglobalgreyebooks.com"}, {"pdfPage": 4, "text": "Contents \n \nEconomy \nWhere I Lived, And What I Lived For \nReading \nSounds \nSolitude \nVisitors \nThe Bean–Field \nThe Village \nThe Ponds \nBaker Farm \nHigher Laws \nBrute Neighbors \nHouse–Warming \nFormer Inhabitants And Winter Visitors \nWinter Animals \nThe Pond In Winter \nSpring \nConclusion"}, {"pdfPage": 5, "text": "Economy \nWhen I wrote the following pages, or rather the bulk of them, I lived alone, in the woods, \na mile from any neighbor, in a house which I had built myself, on the shore of Walden \nPond, in Concord, Massachusetts, and earned my living by the labor of my hands only. I \nlived there two years and two months. At present I am a sojourner in civilized life again. \nI should not obtrude my affairs so much on the notice of my readers if very particular \ninquiries had not been made by my townsmen concerning my mode of life, which some \nwould call impertinent, though they do not appear to me at all impertinent, but, \nconsidering the circumstances, very natural and pertinent. Some have asked what I got \nto eat; if I did not feel lonesome; if I was not afraid; and the like. Others have been \ncurious to learn what portion of my income I devoted to charitable purposes; and some, \nwho have large families, how many poor children I maintained. I will therefore ask \nthose of my readers who feel no particular interest in me to pardon me if I undertake to \nanswer some of these questions in this book. In most books, the I, or first person, is \nomitted; in this it will be retained; that, in respect to egotism, is the main difference. We \ncommonly do not remember that it is, after all, always the first person that is speaking. I \nshould not talk so much about myself if there were anybody else whom I knew as well. \nUnfortunately, I am confined to this theme by the narrowness of my experience. \nMoreover, I, on my side, require of every writer, first or last, a simple and sincere \naccount of his own life, and not merely what he has heard of other men’s lives; some \nsuch account as he would send to his kindred from a distant land; for if he has lived \nsincerely, it must have been in a distant land to me. Perhaps these pages are more \nparticularly addressed to poor students. As for the rest of my readers, they will accept \nsuch portions as apply to them. I trust that none will stretch the seams in putting on the \ncoat, for it may do good service to him whom it fits. \nI would fain say something, not so much concerning the Chinese and Sandwich Islanders \nas you who read these pages, who are said to live in New England; something about \nyour condition, especially your outward condition or circumstances in this world, in this \ntown, what it is, whether it is necessary that it be as bad as it is, whether it cannot be \nimproved as well as not. I have travelled a good deal in Concord; and everywhere, in \nshops, and offices, and fields, the inhabitants have appeared to me to be doing penance \nin a thousand remarkable ways. What I have heard of Bramins sitting exposed to four \nfires and looking in the face of the sun; or hanging suspended, with their heads \ndownward, over flames; or looking at the heavens over their shoulders “until it becomes \nimpossible for them to resume their natural position, while from the twist of the neck \nnothing but liquids can pass into the stomach”; or dwelling, chained for life, at the foot \nof a tree; or measuring with their bodies, like caterpillars, the breadth of vast empires; \nor standing on one leg on the tops of pillars — even these forms of conscious penance \nare hardly more incredible and astonishing than the scenes which I daily witness. The \ntwelve labors of Hercules were trifling in comparison with those which my neighbors \nhave undertaken; for they were only twelve, and had an end; but I could never see that \nthese men slew or captured any monster or finished any labor. They have no friend "}, {"pdfPage": 6, "text": "Iolaus to burn with a hot iron the root of the hydra’s head, but as soon as one head is \ncrushed, two spring up. \nI see young men, my townsmen, whose misfortune it is to have inherited farms, houses, \nbarns, cattle, and farming tools; for these are more easily acquired than got rid of. Better \nif they had been born in the open pasture and suckled by a wolf, that they might have \nseen with clearer eyes what field they were called to labor in. Who made them serfs of \nthe soil? Why should they eat their sixty acres, when man is condemned to eat only his \npeck of dirt? Why should they begin digging their graves as soon as they are born? They \nhave got to live a man’s life, pushing all these things before them, and get on as well as \nthey can. How many a poor immortal soul have I met well-nigh crushed and smothered \nunder its load, creeping down the road of life, pushing before it a barn seventy-five feet \nby forty, its Augean stables never cleansed, and one hundred acres of land, tillage, \nmowing, pasture, and woodlot! The portionless, who struggle with no such unnecessary \ninherited encumbrances, find it labor enough to subdue and cultivate a few cubic feet of \nflesh. \nBut men labor under a mistake. The better part of the man is soon plowed into the soil \nfor compost. By a seeming fate, commonly called necessity, they are employed, as it says \nin an old book, laying up treasures which moth and rust will corrupt and thieves break \nthrough and steal. It is a fool’s life, as they will find when they get to the end of it, if not \nbefore. It is said that Deucalion and Pyrrha created men by throwing stones over their \nheads behind them:— \nInde genus durum sumus, experiensque laborum, \nEt documenta damus qua simus origine nati. \nOr, as Raleigh rhymes it in his sonorous way — \n“From thence our kind hard-hearted is, enduring pain and care, \nApproving that our bodies of a stony nature are.” \nSo much for a blind obedience to a blundering oracle, throwing the stones over their \nheads behind them, and not seeing where they fell. \nMost men, even in this comparatively free country, through mere ignorance and \nmistake, are so occupied with the factitious cares and superfluously coarse labors of life \nthat its finer fruits cannot be plucked by them. Their fingers, from excessive toil, are too \nclumsy and tremble too much for that. Actually, the laboring man has not leisure for a \ntrue integrity day by day; he cannot afford to sustain the manliest relations to men; his \nlabor would be depreciated in the market. He has no time to be anything but a machine. \nHow can he remember well his ignorance — which his growth requires — who has so \noften to use his knowledge? We should feed and clothe him gratuitously sometimes, and \nrecruit him with our cordials, before we judge of him. The finest qualities of our nature, \nlike the bloom on fruits, can be preserved only by the most delicate handling. Yet we do \nnot treat ourselves nor one another thus tenderly. \nSome of you, we all know, are poor, find it hard to live, are sometimes, as it were, \ngasping for breath. I have no doubt that some of you who read this book are unable to \npay for all the dinners which you have actually eaten, or for the coats and shoes which \nare fast wearing or are already worn out, and have come to this page to spend borrowed \nor stolen time, robbing your creditors of an hour. It is very evident what mean and \nsneaking lives many of you live, for my sight has been whetted by experience; always on \nthe limits, trying to get into business and trying to get out of debt, a very ancient slough, "}, {"pdfPage": 7, "text": "called by the Latins aes alienum, another’s brass, for some of their coins were made of \nbrass; still living, and dying, and buried by this other’s brass; always promising to pay, \npromising to pay, tomorrow, and dying today, insolvent; seeking to curry favor, to get \ncustom, by how many modes, only not state-prison offenses; lying, flattering, voting, \ncontracting yourselves into a nutshell of civility or dilating into an atmosphere of thin \nand vaporous generosity, that you may persuade your neighbor to let you make his \nshoes, or his hat, or his coat, or his carriage, or import his groceries for him; making \nyourselves sick, that you may lay up something against a sick day, something to be \ntucked away in an old chest, or in a stocking behind the plastering, or, more safely, in \nthe brick bank; no matter where, no matter how much or how little. \nI sometimes wonder that we can be so frivolous, I may almost say, as to attend to the \ngross but somewhat foreign form of servitude called Negro Slavery, there are so many \nkeen and subtle masters that enslave both North and South. It is hard to have a \nSouthern overseer; it is worse to have a Northern one; but worst of all when you are the \nslave-driver of yourself. Talk of a divinity in man! Look at the teamster on the highway, \nwending to market by day or night; does any divinity stir within him? His highest duty \nto fodder and water his horses! What is his destiny to him compared with the shipping \ninterests? Does not he drive for Squire Make-a-stir? How godlike, how immortal, is he? \nSee how he cowers and sneaks, how vaguely all the day he fears, not being immortal nor \ndivine, but the slave and prisoner of his own opinion of himself, a fame won by his own \ndeeds. Public opinion is a weak tyrant compared with our own private opinion. What a \nman thinks of himself, that it is which determines, or rather indicates, his fate. Self-\nemancipation even in the West Indian provinces of the fancy and imagination — what \nWilberforce is there to bring that about? Think, also, of the ladies of the land weaving \ntoilet cushions against the last day, not to betray too green an interest in their fates! As \nif you could kill time without injuring eternity. \nThe mass of men lead lives of quiet desperation. What is called resignation is confirmed \ndesperation. From the desperate city you go into the desperate country, and have to \nconsole yourself with the bravery of minks and muskrats. A stereotyped but \nunconscious despair is concealed even under what are called the games and \namusements of mankind. There is no play in them, for this comes after work. But it is a \ncharacteristic of wisdom not to do desperate things. \nWhen we consider what, to use the words of the catechism, is the chief end of man, and \nwhat are the true necessaries and means of life, it appears as if men had deliberately \nchosen the common mode of living because they preferred it to any other. Yet they \nhonestly think there is no choice left. But alert and healthy natures remember that the \nsun rose clear. It is never too late to give up our prejudices. No way of thinking or doing, \nhowever ancient, can be trusted without proof. What everybody echoes or in silence \npasses by as true to-day may turn out to be falsehood to-morrow, mere smoke of \nopinion, which some had trusted for a cloud that would sprinkle fertilizing rain on their \nfields. What old people say you cannot do, you try and find that you can. Old deeds for \nold people, and new deeds for new. Old people did not know enough once, perchance, to \nfetch fresh fuel to keep the fire a-going; new people put a little dry wood under a pot, \nand are whirled round the globe with the speed of birds, in a way to kill old people, as \nthe phrase is. Age is no better, hardly so well, qualified for an instructor as youth, for it \nhas not profited so much as it has lost. One may almost doubt if the wisest man has \nlearned anything of absolute value by living. Practically, the old have no very important \nadvice to give the young, their own experience has been so partial, and their lives have "}, {"pdfPage": 8, "text": "been such miserable failures, for private reasons, as they must believe; and it may be \nthat they have some faith left which belies that experience, and they are only less young \nthan they were. I have lived some thirty years on this planet, and I have yet to hear the \nfirst syllable of valuable or even earnest advice from my seniors. They have told me \nnothing, and probably cannot tell me anything to the purpose. Here is life, an \nexperiment to a great extent untried by me; but it does not avail me that they have tried \nit. If I have any experience which I think valuable, I am sure to reflect that this my \nMentors said nothing about. \nOne farmer says to me, “You cannot live on vegetable food solely, for it furnishes \nnothing to make bones with”; and so he religiously devotes a part of his day to supplying \nhis system with the raw material of bones; walking all the while he talks behind his \noxen, which, with vegetable-made bones, jerk him and his lumbering plow along in spite \nof every obstacle. Some things are really necessaries of life in some circles, the most \nhelpless and diseased, which in others are luxuries merely, and in others still are \nentirely unknown. \nThe whole ground of human life seems to some to have been gone over by their \npredecessors, both the heights and the valleys, and all things to have been cared for. \nAccording to Evelyn, “the wise Solomon prescribed ordinances for the very distances of \ntrees; and the Roman praetors have decided how often you may go into your neighbor’s \nland to gather the acorns which fall on it without trespass, and what share belongs to \nthat neighbor.” Hippocrates has even left directions how we should cut our nails; that is, \neven with the ends of the fingers, neither shorter nor longer. Undoubtedly the very \ntedium and ennui which presume to have exhausted the variety and the joys of life are \nas old as Adam. But man’s capacities have never been measured; nor are we to judge of \nwhat he can do by any precedents, so little has been tried. Whatever have been thy \nfailures hitherto, “be not afflicted, my child, for who shall assign to thee what thou hast \nleft undone?” \nWe might try our lives by a thousand simple tests; as, for instance, that the same sun \nwhich ripens my beans illumines at once a system of earths like ours. If I had \nremembered this it would have prevented some mistakes. This was not the light in \nwhich I hoed them. The stars are the apexes of what wonderful triangles! What distant \nand different beings in the various mansions of the universe are contemplating the same \none at the same moment! Nature and human life are as various as our several \nconstitutions. Who shall say what prospect life offers to another? Could a greater \nmiracle take place than for us to look through each other’s eyes for an instant? We \nshould live in all the ages of the world in an hour; ay, in all the worlds of the ages. \nHistory, Poetry, Mythology! — I know of no reading of another’s experience so startling \nand informing as this would be. \nThe greater part of what my neighbors call good I believe in my soul to be bad, and if I \nrepent of anything, it is very likely to be my good behavior. What demon possessed me \nthat I behaved so well? You may say the wisest thing you can, old man — you who have \nlived seventy years, not without honor of a kind — I hear an irresistible voice which \ninvites me away from all that. One generation abandons the enterprises of another like \nstranded vessels. \nI think that we may safely trust a good deal more than we do. We may waive just so \nmuch care of ourselves as we honestly bestow elsewhere. Nature is as well adapted to \nour weakness as to our strength. The incessant anxiety and strain of some is a well-nigh "}, {"pdfPage": 9, "text": "incurable form of disease. We are made to exaggerate the importance of what work we \ndo; and yet how much is not done by us! or, what if we had been taken sick? How \nvigilant we are! determined not to live by faith if we can avoid it; all the day long on the \nalert, at night we unwillingly say our prayers and commit ourselves to uncertainties. So \nthoroughly and sincerely are we compelled to live, reverencing our life, and denying the \npossibility of change. This is the only way, we say; but there are as many ways as there \ncan be drawn radii from one centre. All change is a miracle to contemplate; but it is a \nmiracle which is taking place every instant. Confucius said, “To know that we know \nwhat we know, and that we do not know what we do not know, that is true knowledge.” \nWhen one man has reduced a fact of the imagination to be a fact to his understanding, I \nforesee that all men at length establish their lives on that basis. \nLet us consider for a moment what most of the trouble and anxiety which I have \nreferred to is about, and how much it is necessary that we be troubled, or at least \ncareful. It would be some advantage to live a primitive and frontier life, though in the \nmidst of an outward civilization, if only to learn what are the gross necessaries of life \nand what methods have been taken to obtain them; or even to look over the old day-\nbooks of the merchants, to see what it was that men most commonly bought at the \nstores, what they stored, that is, what are the grossest groceries. For the improvements \nof ages have had but little influence on the essential laws of man’s existence; as our \nskeletons, probably, are not to be distinguished from those of our ancestors. \nBy the words, necessary of life, I mean whatever, of all that man obtains by his own \nexertions, has been from the first, or from long use has become, so important to human \nlife that few, if any, whether from savageness, or poverty, or philosophy, ever attempt to \ndo without it. To many creatures there is in this sense but one necessary of life, Food. To \nthe bison of the prairie it is a few inches of palatable grass, with water to drink; unless \nhe seeks the Shelter of the forest or the mountain’s shadow. None of the brute creation \nrequires more than Food and Shelter. The necessaries of life for man in this climate may, \naccurately enough, be distributed under the several heads of Food, Shelter, Clothing, \nand Fuel; for not till we have secured these are we prepared to entertain the true \nproblems of life with freedom and a prospect of success. Man has invented, not only \nhouses, but clothes and cooked food; and possibly from the accidental discovery of the \nwarmth of fire, and the consequent use of it, at first a luxury, arose the present necessity \nto sit by it. We observe cats and dogs acquiring the same second nature. By proper \nShelter and Clothing we legitimately retain our own internal heat; but with an excess of \nthese, or of Fuel, that is, with an external heat greater than our own internal, may not \ncookery properly be said to begin? Darwin, the naturalist, says of the inhabitants of \nTierra del Fuego, that while his own party, who were well clothed and sitting close to a \nfire, were far from too warm, these naked savages, who were farther off, were observed, \nto his great surprise, “to be streaming with perspiration at undergoing such a roasting.” \nSo, we are told, the New Hollander goes naked with impunity, while the European \nshivers in his clothes. Is it impossible to combine the hardiness of these savages with \nthe intellectualness of the civilized man? According to Liebig, man’s body is a stove, and \nfood the fuel which keeps up the internal combustion in the lungs. In cold weather we \neat more, in warm less. The animal heat is the result of a slow combustion, and disease \nand death take place when this is too rapid; or for want of fuel, or from some defect in \nthe draught, the fire goes out. Of course the vital heat is not to be confounded with fire; \nbut so much for analogy. It appears, therefore, from the above list, that the expression, \nanimal life, is nearly synonymous with the expression, animal heat; for while Food may "}, {"pdfPage": 10, "text": "be regarded as the Fuel which keeps up the fire within us — and Fuel serves only to \nprepare that Food or to increase the warmth of our bodies by addition from without — \nShelter and Clothing also serve only to retain the heat thus generated and absorbed. \nThe grand necessity, then, for our bodies, is to keep warm, to keep the vital heat in us. \nWhat pains we accordingly take, not only with our Food, and Clothing, and Shelter, but \nwith our beds, which are our night-clothes, robbing the nests and breasts of birds to \nprepare this shelter within a shelter, as the mole has its bed of grass and leaves at the \nend of its burrow! The poor man is wont to complain that this is a cold world; and to \ncold, no less physical than social, we refer directly a great part of our ails. The summer, \nin some climates, makes possible to man a sort of Elysian life. Fuel, except to cook his \nFood, is then unnecessary; the sun is his fire, and many of the fruits are sufficiently \ncooked by its rays; while Food generally is more various, and more easily obtained, and \nClothing and Shelter are wholly or half unnecessary. At the present day, and in this \ncountry, as I find by my own experience, a few implements, a knife, an axe, a spade, a \nwheelbarrow, etc., and for the studious, lamplight, stationery, and access to a few books, \nrank next to necessaries, and can all be obtained at a trifling cost. Yet some, not wise, go \nto the other side of the globe, to barbarous and unhealthy regions, and devote \nthemselves to trade for ten or twenty years, in order that they may live — that is, keep \ncomfortably warm — and die in New England at last. The luxuriously rich are not \nsimply kept comfortably warm, but unnaturally hot; as I implied before, they are \ncooked, of course a la mode. \nMost of the luxuries, and many of the so-called comforts of life, are not only not \nindispensable, but positive hindrances to the elevation of mankind. With respect to \nluxuries and comforts, the wisest have ever lived a more simple and meagre life than the \npoor. The ancient philosophers, Chinese, Hindoo, Persian, and Greek, were a class than \nwhich none has been poorer in outward riches, none so rich in inward. We know not \nmuch about them. It is remarkable that we know so much of them as we do. The same is \ntrue of the more modern reformers and benefactors of their race. None can be an \nimpartial or wise observer of human life but from the vantage ground of what we \nshould call voluntary poverty. Of a life of luxury the fruit is luxury, whether in \nagriculture, or commerce, or literature, or art. There are nowadays professors of \nphilosophy, but not philosophers. Yet it is admirable to profess because it was once \nadmirable to live. To be a philosopher is not merely to have subtle thoughts, nor even to \nfound a school, but so to love wisdom as to live according to its dictates, a life of \nsimplicity, independence, magnanimity, and trust. It is to solve some of the problems of \nlife, not only theoretically, but practically. The success of great scholars and thinkers is \ncommonly a courtier-like success, not kingly, not manly. They make shift to live merely \nby conformity, practically as their fathers did, and are in no sense the progenitors of a \nnoble race of men. But why do men degenerate ever? What makes families run out? \nWhat is the nature of the luxury which enervates and destroys nations? Are we sure that \nthere is none of it in our own lives? The philosopher is in advance of his age even in the \noutward form of his life. He is not fed, sheltered, clothed, warmed, like his \ncontemporaries. How can a man be a philosopher and not maintain his vital heat by \nbetter methods than other men? \nWhen a man is warmed by the several modes which I have described, what does he \nwant next? Surely not more warmth of the same kind, as more and richer food, larger \nand more splendid houses, finer and more abundant clothing, more numerous, \nincessant, and hotter fires, and the like. When he has obtained those things which are "}, {"pdfPage": 11, "text": "necessary to life, there is another alternative than to obtain the superfluities; and that is, \nto adventure on life now, his vacation from humbler toil having commenced. The soil, it \nappears, is suited to the seed, for it has sent its radicle downward, and it may now send \nits shoot upward also with confidence. Why has man rooted himself thus firmly in the \nearth, but that he may rise in the same proportion into the heavens above? — for the \nnobler plants are valued for the fruit they bear at last in the air and light, far from the \nground, and are not treated like the humbler esculents, which, though they may be \nbiennials, are cultivated only till they have perfected their root, and often cut down at \ntop for this purpose, so that most would not know them in their flowering season. \nI do not mean to prescribe rules to strong and valiant natures, who will mind their own \naffairs whether in heaven or hell, and perchance build more magnificently and spend \nmore lavishly than the richest, without ever impoverishing themselves, not knowing \nhow they live — if, indeed, there are any such, as has been dreamed; nor to those who \nfind their encouragement and inspiration in precisely the present condition of things, \nand cherish it with the fondness and enthusiasm of lovers — and, to some extent, I \nreckon myself in this number; I do not speak to those who are well employed, in \nwhatever circumstances, and they know whether they are well employed or not; — but \nmainly to the mass of men who are discontented, and idly complaining of the hardness \nof their lot or of the times, when they might improve them. There are some who \ncomplain most energetically and inconsolably of any, because they are, as they say, \ndoing their duty. I also have in my mind that seemingly wealthy, but most terribly \nimpoverished class of all, who have accumulated dross, but know not how to use it, or \nget rid of it, and thus have forged their own golden or silver fetters. \nIf I should attempt to tell how I have desired to spend my life in years past, it would \nprobably surprise those of my readers who are somewhat acquainted with its actual \nhistory; it would certainly astonish those who know nothing about it. I will only hint at \nsome of the enterprises which I have cherished. \nIn any weather, at any hour of the day or night, I have been anxious to improve the nick \nof time, and notch it on my stick too; to stand on the meeting of two eternities, the past \nand future, which is precisely the present moment; to toe that line. You will pardon \nsome obscurities, for there are more secrets in my trade than in most men’s, and yet not \nvoluntarily kept, but inseparable from its very nature. I would gladly tell all that I know \nabout it, and never paint “No Admittance” on my gate. \nI long ago lost a hound, a bay horse, and a turtle dove, and am still on their trail. Many \nare the travellers I have spoken concerning them, describing their tracks and what calls \nthey answered to. I have met one or two who had heard the hound, and the tramp of the \nhorse, and even seen the dove disappear behind a cloud, and they seemed as anxious to \nrecover them as if they had lost them themselves. \nTo anticipate, not the sunrise and the dawn merely, but, if possible, Nature herself! How \nmany mornings, summer and winter, before yet any neighbor was stirring about his \nbusiness, have I been about mine! No doubt, many of my townsmen have met me \nreturning from this enterprise, farmers starting for Boston in the twilight, or \nwoodchoppers going to their work. It is true, I never assisted the sun materially in his \nrising, but, doubt not, it was of the last importance only to be present at it. \nSo many autumn, ay, and winter days, spent outside the town, trying to hear what was \nin the wind, to hear and carry it express! I well-nigh sunk all my capital in it, and lost my \nown breath into the bargain, running in the face of it. If it had concerned either of the "}, {"pdfPage": 12, "text": "political parties, depend upon it, it would have appeared in the Gazette with the earliest \nintelligence. At other times watching from the observatory of some cliff or tree, to \ntelegraph any new arrival; or waiting at evening on the hill-tops for the sky to fall, that I \nmight catch something, though I never caught much, and that, manna-wise, would \ndissolve again in the sun. \nFor a long time I was reporter to a journal, of no very wide circulation, whose editor has \nnever yet seen fit to print the bulk of my contributions, and, as is too common with \nwriters, I got only my labor for my pains. However, in this case my pains were their own \nreward. \nFor many years I was self-appointed inspector of snow-storms and rain-storms, and did \nmy duty faithfully; surveyor, if not of highways, then of forest paths and all across-lot \nroutes, keeping them open, and ravines bridged and passable at all seasons, where the \npublic heel had testified to their utility. \nI have looked after the wild stock of the town, which give a faithful herdsman a good \ndeal of trouble by leaping fences; and I have had an eye to the unfrequented nooks and \ncorners of the farm; though I did not always know whether Jonas or Solomon worked in \na particular field to-day; that was none of my business. I have watered the red \nhuckleberry, the sand cherry and the nettle-tree, the red pine and the black ash, the \nwhite grape and the yellow violet, which might have withered else in dry seasons. \nIn short, I went on thus for a long time (I may say it without boasting), faithfully \nminding my business, till it became more and more evident that my townsmen would \nnot after all admit me into the list of town officers, nor make my place a sinecure with a \nmoderate allowance. My accounts, which I can swear to have kept faithfully, I have, \nindeed, never got audited, still less accepted, still less paid and settled. However, I have \nnot set my heart on that. \nNot long since, a strolling Indian went to sell baskets at the house of a well-known \nlawyer in my neighborhood. “Do you wish to buy any baskets?” he asked. “No, we do not \nwant any,” was the reply. “What!” exclaimed the Indian as he went out the gate, “do you \nmean to starve us?” Having seen his industrious white neighbors so well off — that the \nlawyer had only to weave arguments, and, by some magic, wealth and standing followed \n— he had said to himself: I will go into business; I will weave baskets; it is a thing which \nI can do. Thinking that when he had made the baskets he would have done his part, and \nthen it would be the white man’s to buy them. He had not discovered that it was \nnecessary for him to make it worth the other’s while to buy them, or at least make him \nthink that it was so, or to make something else which it would be worth his while to buy. \nI too had woven a kind of basket of a delicate texture, but I had not made it worth any \none’s while to buy them. Yet not the less, in my case, did I think it worth my while to \nweave them, and instead of studying how to make it worth men’s while to buy my \nbaskets, I studied rather how to avoid the necessity of selling them. The life which men \npraise and regard as successful is but one kind. Why should we exaggerate any one kind \nat the expense of the others? \nFinding that my fellow-citizens were not likely to offer me any room in the court house, \nor any curacy or living anywhere else, but I must shift for myself, I turned my face more \nexclusively than ever to the woods, where I was better known. I determined to go into \nbusiness at once, and not wait to acquire the usual capital, using such slender means as I \nhad already got. My purpose in going to Walden Pond was not to live cheaply nor to live \ndearly there, but to transact some private business with the fewest obstacles; to be "}, {"pdfPage": 13, "text": "hindered from accomplishing which for want of a little common sense, a little enterprise \nand business talent, appeared not so sad as foolish. \nI have always endeavored to acquire strict business habits; they are indispensable to \nevery man. If your trade is with the Celestial Empire, then some small counting house on \nthe coast, in some Salem harbor, will be fixture enough. You will export such articles as \nthe country affords, purely native products, much ice and pine timber and a little \ngranite, always in native bottoms. These will be good ventures. To oversee all the details \nyourself in person; to be at once pilot and captain, and owner and underwriter; to buy \nand sell and keep the accounts; to read every letter received, and write or read every \nletter sent; to superintend the discharge of imports night and day; to be upon many \nparts of the coast almost at the same time — often the richest freight will be discharged \nupon a Jersey shore; — to be your own telegraph, unweariedly sweeping the horizon, \nspeaking all passing vessels bound coastwise; to keep up a steady despatch of \ncommodities, for the supply of such a distant and exorbitant market; to keep yourself \ninformed of the state of the markets, prospects of war and peace everywhere, and \nanticipate the tendencies of trade and civilization — taking advantage of the results of \nall exploring expeditions, using new passages and all improvements in navigation; — \ncharts to be studied, the position of reefs and new lights and buoys to be ascertained, \nand ever, and ever, the logarithmic tables to be corrected, for by the error of some \ncalculator the vessel often splits upon a rock that should have reached a friendly pier — \nthere is the untold fate of La Prouse; — universal science to be kept pace with, studying \nthe lives of all great discoverers and navigators, great adventurers and merchants, from \nHanno and the Phoenicians down to our day; in fine, account of stock to be taken from \ntime to time, to know how you stand. It is a labor to task the faculties of a man — such \nproblems of profit and loss, of interest, of tare and tret, and gauging of all kinds in it, as \ndemand a universal knowledge. \nI have thought that Walden Pond would be a good place for business, not solely on \naccount of the railroad and the ice trade; it offers advantages which it may not be good \npolicy to divulge; it is a good port and a good foundation. No Neva marshes to be filled; \nthough you must everywhere build on piles of your own driving. It is said that a flood-\ntide, with a westerly wind, and ice in the Neva, would sweep St. Petersburg from the \nface of the earth. \nAs this business was to be entered into without the usual capital, it may not be easy to \nconjecture where those means, that will still be indispensable to every such \nundertaking, were to be obtained. As for Clothing, to come at once to the practical part \nof the question, perhaps we are led oftener by the love of novelty and a regard for the \nopinions of men, in procuring it, than by a true utility. Let him who has work to do \nrecollect that the object of clothing is, first, to retain the vital heat, and secondly, in this \nstate of society, to cover nakedness, and he may judge how much of any necessary or \nimportant work may be accomplished without adding to his wardrobe. Kings and \nqueens who wear a suit but once, though made by some tailor or dressmaker to their \nmajesties, cannot know the comfort of wearing a suit that fits. They are no better than \nwooden horses to hang the clean clothes on. Every day our garments become more \nassimilated to ourselves, receiving the impress of the wearer’s character, until we \nhesitate to lay them aside without such delay and medical appliances and some such \nsolemnity even as our bodies. No man ever stood the lower in my estimation for having \na patch in his clothes; yet I am sure that there is greater anxiety, commonly, to have \nfashionable, or at least clean and unpatched clothes, than to have a sound conscience. "}, {"pdfPage": 14, "text": "But even if the rent is not mended, perhaps the worst vice betrayed is improvidence. I \nsometimes try my acquaintances by such tests as this — Who could wear a patch, or two \nextra seams only, over the knee? Most behave as if they believed that their prospects for \nlife would be ruined if they should do it. It would be easier for them to hobble to town \nwith a broken leg than with a broken pantaloon. Often if an accident happens to a \ngentleman’s legs, they can be mended; but if a similar accident happens to the legs of his \npantaloons, there is no help for it; for he considers, not what is truly respectable, but \nwhat is respected. We know but few men, a great many coats and breeches. Dress a \nscarecrow in your last shift, you standing shiftless by, who would not soonest salute the \nscarecrow? Passing a cornfield the other day, close by a hat and coat on a stake, I \nrecognized the owner of the farm. He was only a little more weather-beaten than when I \nsaw him last. I have heard of a dog that barked at every stranger who approached his \nmaster’s premises with clothes on, but was easily quieted by a naked thief. It is an \ninteresting question how far men would retain their relative rank if they were divested \nof their clothes. Could you, in such a case, tell surely of any company of civilized men \nwhich belonged to the most respected class? When Madam Pfeiffer, in her adventurous \ntravels round the world, from east to west, had got so near home as Asiatic Russia, she \nsays that she felt the necessity of wearing other than a travelling dress, when she went \nto meet the authorities, for she “was now in a civilized country, where . . . people are \njudged of by their clothes.” Even in our democratic New England towns the accidental \npossession of wealth, and its manifestation in dress and equipage alone, obtain for the \npossessor almost universal respect. But they yield such respect, numerous as they are, \nare so far heathen, and need to have a missionary sent to them. Beside, clothes \nintroduced sewing, a kind of work which you may call endless; a woman’s dress, at least, \nis never done. \nA man who has at length found something to do will not need to get a new suit to do it \nin; for him the old will do, that has lain dusty in the garret for an indeterminate period. \nOld shoes will serve a hero longer than they have served his valet — if a hero ever has a \nvalet — bare feet are older than shoes, and he can make them do. Only they who go to \nsoires and legislative balls must have new coats, coats to change as often as the man \nchanges in them. But if my jacket and trousers, my hat and shoes, are fit to worship God \nin, they will do; will they not? Who ever saw his old clothes — his old coat, actually \nworn out, resolved into its primitive elements, so that it was not a deed of charity to \nbestow it on some poor boy, by him perchance to be bestowed on some poorer still, or \nshall we say richer, who could do with less? I say, beware of all enterprises that require \nnew clothes, and not rather a new wearer of clothes. If there is not a new man, how can \nthe new clothes be made to fit? If you have any enterprise before you, try it in your old \nclothes. All men want, not something to do with, but something to do, or rather \nsomething to be. Perhaps we should never procure a new suit, however ragged or dirty \nthe old, until we have so conducted, so enterprised or sailed in some way, that we feel \nlike new men in the old, and that to retain it would be like keeping new wine in old \nbottles. Our moulting season, like that of the fowls, must be a crisis in our lives. The loon \nretires to solitary ponds to spend it. Thus also the snake casts its slough, and the \ncaterpillar its wormy coat, by an internal industry and expansion; for clothes are but \nour outmost cuticle and mortal coil. Otherwise we shall be found sailing under false \ncolors, and be inevitably cashiered at last by our own opinion, as well as that of \nmankind. "}, {"pdfPage": 15, "text": "We don garment after garment, as if we grew like exogenous plants by addition without. \nOur outside and often thin and fanciful clothes are our epidermis, or false skin, which \npartakes not of our life, and may be stripped off here and there without fatal injury; our \nthicker garments, constantly worn, are our cellular integument, or cortex; but our shirts \nare our liber, or true bark, which cannot be removed without girdling and so destroying \nthe man. I believe that all races at some seasons wear something equivalent to the shirt. \nIt is desirable that a man be clad so simply that he can lay his hands on himself in the \ndark, and that he live in all respects so compactly and preparedly that, if an enemy take \nthe town, he can, like the old philosopher, walk out the gate empty-handed without \nanxiety. While one thick garment is, for most purposes, as good as three thin ones, and \ncheap clothing can be obtained at prices really to suit customers; while a thick coat can \nbe bought for five dollars, which will last as many years, thick pantaloons for two \ndollars, cowhide boots for a dollar and a half a pair, a summer hat for a quarter of a \ndollar, and a winter cap for sixty-two and a half cents, or a better be made at home at a \nnominal cost, where is he so poor that, clad in such a suit, of his own earning, there will \nnot be found wise men to do him reverence? \nWhen I ask for a garment of a particular form, my tailoress tells me gravely, “They do \nnot make them so now,” not emphasizing the “They” at all, as if she quoted an authority \nas impersonal as the Fates, and I find it difficult to get made what I want, simply because \nshe cannot believe that I mean what I say, that I am so rash. When I hear this oracular \nsentence, I am for a moment absorbed in thought, emphasizing to myself each word \nseparately that I may come at the meaning of it, that I may find out by what degree of \nconsanguinity They are related to me, and what authority they may have in an affair \nwhich affects me so nearly; and, finally, I am inclined to answer her with equal mystery, \nand without any more emphasis of the “they” — “It is true, they did not make them so \nrecently, but they do now.” Of what use this measuring of me if she does not measure \nmy character, but only the breadth of my shoulders, as it were a peg to bang the coat on? \nWe worship not the Graces, nor the Parcae, but Fashion. She spins and weaves and cuts \nwith full authority. The head monkey at Paris puts on a traveller’s cap, and all the \nmonkeys in America do the same. I sometimes despair of getting anything quite simple \nand honest done in this world by the help of men. They would have to be passed \nthrough a powerful press first, to squeeze their old notions out of them, so that they \nwould not soon get upon their legs again; and then there would be some one in the \ncompany with a maggot in his head, hatched from an egg deposited there nobody knows \nwhen, for not even fire kills these things, and you would have lost your labor. \nNevertheless, we will not forget that some Egyptian wheat was handed down to us by a \nmummy. \nOn the whole, I think that it cannot be maintained that dressing has in this or any \ncountry risen to the dignity of an art. At present men make shift to wear what they can \nget. Like shipwrecked sailors, they put on what they can find on the beach, and at a little \ndistance, whether of space or time, laugh at each other’s masquerade. Every generation \nlaughs at the old fashions, but follows religiously the new. We are amused at beholding \nthe costume of Henry VIII, or Queen Elizabeth, as much as if it was that of the King and \nQueen of the Cannibal Islands. All costume off a man is pitiful or grotesque. It is only the \nserious eye peering from and the sincere life passed within it which restrain laughter \nand consecrate the costume of any people. Let Harlequin be taken with a fit of the colic \nand his trappings will have to serve that mood too. When the soldier is hit by a \ncannonball, rags are as becoming as purple. "}, {"pdfPage": 16, "text": "The childish and savage taste of men and women for new patterns keeps how many \nshaking and squinting through kaleidoscopes that they may discover the particular \nfigure which this generation requires today. The manufacturers have learned that this \ntaste is merely whimsical. Of two patterns which differ only by a few threads more or \nless of a particular color, the one will be sold readily, the other lie on the shelf, though it \nfrequently happens that after the lapse of a season the latter becomes the most \nfashionable. Comparatively, tattooing is not the hideous custom which it is called. It is \nnot barbarous merely because the printing is skin-deep and unalterable. \nI cannot believe that our factory system is the best mode by which men may get \nclothing. The condition of the operatives is becoming every day more like that of the \nEnglish; and it cannot be wondered at, since, as far as I have heard or observed, the \nprincipal object is, not that mankind may be well and honestly clad, but, unquestionably, \nthat corporations may be enriched. In the long run men hit only what they aim at. \nTherefore, though they should fail immediately, they had better aim at something high. \nAs for a Shelter, I will not deny that this is now a necessary of life, though there are \ninstances of men having done without it for long periods in colder countries than this. \nSamuel Laing says that “the Laplander in his skin dress, and in a skin bag which he puts \nover his head and shoulders, will sleep night after night on the snow . . . in a degree of \ncold which would extinguish the life of one exposed to it in any woollen clothing.” He \nhad seen them asleep thus. Yet he adds, “They are not hardier than other people.” But, \nprobably, man did not live long on the earth without discovering the convenience which \nthere is in a house, the domestic comforts, which phrase may have originally signified \nthe satisfactions of the house more than of the family; though these must be extremely \npartial and occasional in those climates where the house is associated in our thoughts \nwith winter or the rainy season chiefly, and two thirds of the year, except for a parasol, \nis unnecessary. In our climate, in the summer, it was formerly almost solely a covering \nat night. In the Indian gazettes a wigwam was the symbol of a day’s march, and a row of \nthem cut or painted on the bark of a tree signified that so many times they had camped. \nMan was not made so large limbed and robust but that he must seek to narrow his \nworld and wall in a space such as fitted him. He was at first bare and out of doors; but \nthough this was pleasant enough in serene and warm weather, by daylight, the rainy \nseason and the winter, to say nothing of the torrid sun, would perhaps have nipped his \nrace in the bud if he had not made haste to clothe himself with the shelter of a house. \nAdam and Eve, according to the fable, wore the bower before other clothes. Man wanted \na home, a place of warmth, or comfort, first of warmth, then the warmth of the \naffections. \nWe may imagine a time when, in the infancy of the human race, some enterprising \nmortal crept into a hollow in a rock for shelter. Every child begins the world again, to \nsome extent, and loves to stay outdoors, even in wet and cold. It plays house, as well as \nhorse, having an instinct for it. Who does not remember the interest with which, when \nyoung, he looked at shelving rocks, or any approach to a cave? It was the natural \nyearning of that portion, any portion of our most primitive ancestor which still survived \nin us. From the cave we have advanced to roofs of palm leaves, of bark and boughs, of \nlinen woven and stretched, of grass and straw, of boards and shingles, of stones and \ntiles. At last, we know not what it is to live in the open air, and our lives are domestic in \nmore senses than we think. From the hearth the field is a great distance. It would be \nwell, perhaps, if we were to spend more of our days and nights without any obstruction \nbetween us and the celestial bodies, if the poet did not speak so much from under a roof, "}, {"pdfPage": 17, "text": "or the saint dwell there so long. Birds do not sing in caves, nor do doves cherish their \ninnocence in dovecots. \nHowever, if one designs to construct a dwelling-house, it behooves him to exercise a \nlittle Yankee shrewdness, lest after all he find himself in a workhouse, a labyrinth \nwithout a clue, a museum, an almshouse, a prison, or a splendid mausoleum instead. \nConsider first how slight a shelter is absolutely necessary. I have seen Penobscot \nIndians, in this town, living in tents of thin cotton cloth, while the snow was nearly a \nfoot deep around them, and I thought that they would be glad to have it deeper to keep \nout the wind. Formerly, when how to get my living honestly, with freedom left for my \nproper pursuits, was a question which vexed me even more than it does now, for \nunfortunately I am become somewhat callous, I used to see a large box by the railroad, \nsix feet long by three wide, in which the laborers locked up their tools at night; and it \nsuggested to me that every man who was hard pushed might get such a one for a dollar, \nand, having bored a few auger holes in it, to admit the air at least, get into it when it \nrained and at night, and hook down the lid, and so have freedom in his love, and in his \nsoul be free. This did not appear the worst, nor by any means a despicable alternative. \nYou could sit up as late as you pleased, and, whenever you got up, go abroad without \nany landlord or house-lord dogging you for rent. Many a man is harassed to death to pay \nthe rent of a larger and more luxurious box who would not have frozen to death in such \na box as this. I am far from jesting. Economy is a subject which admits of being treated \nwith levity, but it cannot so be disposed of. A comfortable house for a rude and hardy \nrace, that lived mostly out of doors, was once made here almost entirely of such \nmaterials as Nature furnished ready to their hands. Gookin, who was superintendent of \nthe Indians subject to the Massachusetts Colony, writing in 1674, says, “The best of their \nhouses are covered very neatly, tight and warm, with barks of trees, slipped from their \nbodies at those seasons when the sap is up, and made into great flakes, with pressure of \nweighty timber, when they are green. . . . The meaner sort are covered with mats which \nthey make of a kind of bulrush, and are also indifferently tight and warm, but not so \ngood as the former. . . . Some I have seen, sixty or a hundred feet long and thirty feet \nbroad. . . . I have often lodged in their wigwams, and found them as warm as the best \nEnglish houses.” He adds that they were commonly carpeted and lined within with well-\nwrought embroidered mats, and were furnished with various utensils. The Indians had \nadvanced so far as to regulate the effect of the wind by a mat suspended over the hole in \nthe roof and moved by a string. Such a lodge was in the first instance constructed in a \nday or two at most, and taken down and put up in a few hours; and every family owned \none, or its apartment in one. \nIn the savage state every family owns a shelter as good as the best, and sufficient for its \ncoarser and simpler wants; but I think that I speak within bounds when I say that, \nthough the birds of the air have their nests, and the foxes their holes, and the savages \ntheir wigwams, in modern civilized society not more than one half the families own a \nshelter. In the large towns and cities, where civilization especially prevails, the number \nof those who own a shelter is a very small fraction of the whole. The rest pay an annual \ntax for this outside garment of all, become indispensable summer and winter, which \nwould buy a village of Indian wigwams, but now helps to keep them poor as long as they \nlive. I do not mean to insist here on the disadvantage of hiring compared with owning, \nbut it is evident that the savage owns his shelter because it costs so little, while the \ncivilized man hires his commonly because he cannot afford to own it; nor can he, in the \nlong run, any better afford to hire. But, answers one, by merely paying this tax, the poor "}, {"pdfPage": 18, "text": "civilized man secures an abode which is a palace compared with the savage’s. An annual \nrent of from twenty-five to a hundred dollars (these are the country rates) entitles him \nto the benefit of the improvements of centuries, spacious apartments, clean paint and \npaper, Rumford fire-place, back plastering, Venetian blinds, copper pump, spring lock, a \ncommodious cellar, and many other things. But how happens it that he who is said to \nenjoy these things is so commonly a poor civilized man, while the savage, who has them \nnot, is rich as a savage? If it is asserted that civilization is a real advance in the condition \nof man — and I think that it is, though only the wise improve their advantages — it must \nbe shown that it has produced better dwellings without making them more costly; and \nthe cost of a thing is the amount of what I will call life which is required to be exchanged \nfor it, immediately or in the long run. An average house in this neighborhood costs \nperhaps eight hundred dollars, and to lay up this sum will take from ten to fifteen years \nof the laborer’s life, even if he is not encumbered with a family — estimating the \npecuniary value of every man’s labor at one dollar a day, for if some receive more, \nothers receive less; — so that he must have spent more than half his life commonly \nbefore his wigwam will be earned. If we suppose him to pay a rent instead, this is but a \ndoubtful choice of evils. Would the savage have been wise to exchange his wigwam for a \npalace on these terms? \nIt may be guessed that I reduce almost the whole advantage of holding this superfluous \nproperty as a fund in store against the future, so far as the individual is concerned, \nmainly to the defraying of funeral expenses. But perhaps a man is not required to bury \nhimself. Nevertheless this points to an important distinction between the civilized man \nand the savage; and, no doubt, they have designs on us for our benefit, in making the life \nof a civilized people an institution, in which the life of the individual is to a great extent \nabsorbed, in order to preserve and perfect that of the race. But I wish to show at what a \nsacrifice this advantage is at present obtained, and to suggest that we may possibly so \nlive as to secure all the advantage without suffering any of the disadvantage. What mean \nye by saying that the poor ye have always with you, or that the fathers have eaten sour \ngrapes, and the children’s teeth are set on edge? \n“As I live, saith the Lord God, ye shall not have occasion any more to use this proverb in \nIsrael. \n“Behold all souls are mine; as the soul of the father, so also the soul of the son is mine: \nthe soul that sinneth, it shall die.” \nWhen I consider my neighbors, the farmers of Concord, who are at least as well off as \nthe other classes, I find that for the most part they have been toiling twenty, thirty, or \nforty years, that they may become the real owners of their farms, which commonly they \nhave inherited with encumbrances, or else bought with hired money — and we may \nregard one third of that toil as the cost of their houses — but commonly they have not \npaid for them yet. It is true, the encumbrances sometimes outweigh the value of the \nfarm, so that the farm itself becomes one great encumbrance, and still a man is found to \ninherit it, being well acquainted with it, as he says. On applying to the assessors, I am \nsurprised to learn that they cannot at once name a dozen in the town who own their \nfarms free and clear. If you would know the history of these homesteads, inquire at the \nbank where they are mortgaged. The man who has actually paid for his farm with labor \non it is so rare that every neighbor can point to him. I doubt if there are three such men \nin Concord. What has been said of the merchants, that a very large majority, even \nninety-seven in a hundred, are sure to fail, is equally true of the farmers. With regard to "}, {"pdfPage": 19, "text": "the merchants, however, one of them says pertinently that a great part of their failures \nare not genuine pecuniary failures, but merely failures to fulfil their engagements, \nbecause it is inconvenient; that is, it is the moral character that breaks down. But this \nputs an infinitely worse face on the matter, and suggests, beside, that probably not even \nthe other three succeed in saving their souls, but are perchance bankrupt in a worse \nsense than they who fail honestly. Bankruptcy and repudiation are the springboards \nfrom which much of our civilization vaults and turns its somersets, but the savage \nstands on the unelastic plank of famine. Yet the Middlesex Cattle Show goes off here \nwith eclat annually, as if all the joints of the agricultural machine were suent. \nThe farmer is endeavoring to solve the problem of a livelihood by a formula more \ncomplicated than the problem itself. To get his shoestrings he speculates in herds of \ncattle. With consummate skill he has set his trap with a hair spring to catch comfort and \nindependence, and then, as he turned away, got his own leg into it. This is the reason he \nis poor; and for a similar reason we are all poor in respect to a thousand savage \ncomforts, though surrounded by luxuries. As Chapman sings, \n“The false society of men — \n— for earthly greatness \nAll heavenly comforts rarefies to air.” \nAnd when the farmer has got his house, he may not be the richer but the poorer for it, \nand it be the house that has got him. As I understand it, that was a valid objection urged \nby Momus against the house which Minerva made, that she “had not made it movable, \nby which means a bad neighborhood might be avoided”; and it may still be urged, for \nour houses are such unwieldy property that we are often imprisoned rather than \nhoused in them; and the bad neighborhood to be avoided is our own scurvy selves. I \nknow one or two families, at least, in this town, who, for nearly a generation, have been \nwishing to sell their houses in the outskirts and move into the village, but have not been \nable to accomplish it, and only death will set them free. \nGranted that the majority are able at last either to own or hire the modern house with \nall its improvements. While civilization has been improving our houses, it has not \nequally improved the men who are to inhabit them. It has created palaces, but it was not \nso easy to create noblemen and kings. And if the civilized man’s pursuits are no \nworthier than the savage’s, if he is employed the greater part of his life in obtaining \ngross necessaries and comforts merely, why should he have a better dwelling than the \nformer? \nBut how do the poor minority fare? Perhaps it will be found that just in proportion as \nsome have been placed in outward circumstances above the savage, others have been \ndegraded below him. The luxury of one class is counterbalanced by the indigence of \nanother. On the one side is the palace, on the other are the almshouse and “silent poor.” \nThe myriads who built the pyramids to be the tombs of the Pharaohs were fed on garlic, \nand it may be were not decently buried themselves. The mason who finishes the cornice \nof the palace returns at night perchance to a hut not so good as a wigwam. It is a mistake \nto suppose that, in a country where the usual evidences of civilization exist, the \ncondition of a very large body of the inhabitants may not be as degraded as that of \nsavages. I refer to the degraded poor, not now to the degraded rich. To know this I \nshould not need to look farther than to the shanties which everywhere border our \nrailroads, that last improvement in civilization; where I see in my daily walks human \nbeings living in sties, and all winter with an open door, for the sake of light, without any "}, {"pdfPage": 20, "text": "visible, often imaginable, wood-pile, and the forms of both old and young are \npermanently contracted by the long habit of shrinking from cold and misery, and the \ndevelopment of all their limbs and faculties is checked. It certainly is fair to look at that \nclass by whose labor the works which distinguish this generation are accomplished. \nSuch too, to a greater or less extent, is the condition of the operatives of every \ndenomination in England, which is the great workhouse of the world. Or I could refer \nyou to Ireland, which is marked as one of the white or enlightened spots on the map. \nContrast the physical condition of the Irish with that of the North American Indian, or \nthe South Sea Islander, or any other savage race before it was degraded by contact with \nthe civilized man. Yet I have no doubt that that people’s rulers are as wise as the average \nof civilized rulers. Their condition only proves what squalidness may consist with \ncivilization. I hardly need refer now to the laborers in our Southern States who produce \nthe staple exports of this country, and are themselves a staple production of the South. \nBut to confine myself to those who are said to be in moderate circumstances. \nMost men appear never to have considered what a house is, and are actually though \nneedlessly poor all their lives because they think that they must have such a one as their \nneighbors have. As if one were to wear any sort of coat which the tailor might cut out for \nhim, or, gradually leaving off palm-leaf hat or cap of woodchuck skin, complain of hard \ntimes because he could not afford to buy him a crown! It is possible to invent a house \nstill more convenient and luxurious than we have, which yet all would admit that man \ncould not afford to pay for. Shall we always study to obtain more of these things, and not \nsometimes to be content with less? Shall the respectable citizen thus gravely teach, by \nprecept and example, the necessity of the young man’s providing a certain number of \nsuperfluous glow-shoes, and umbrellas, and empty guest chambers for empty guests, \nbefore he dies? Why should not our furniture be as simple as the Arab’s or the Indian’s? \nWhen I think of the benefactors of the race, whom we have apotheosized as messengers \nfrom heaven, bearers of divine gifts to man, I do not see in my mind any retinue at their \nheels, any carload of fashionable furniture. Or what if I were to allow — would it not be \na singular allowance? — that our furniture should be more complex than the Arab’s, in \nproportion as we are morally and intellectually his superiors! At present our houses are \ncluttered and defiled with it, and a good housewife would sweep out the greater part \ninto the dust hole, and not leave her morning’s work undone. Morning work! By the \nblushes of Aurora and the music of Memnon, what should be man’s morning work in \nthis world? I had three pieces of limestone on my desk, but I was terrified to find that \nthey required to be dusted daily, when the furniture of my mind was all undusted still, \nand threw them out the window in disgust. How, then, could I have a furnished house? I \nwould rather sit in the open air, for no dust gathers on the grass, unless where man has \nbroken ground. \nIt is the luxurious and dissipated who set the fashions which the herd so diligently \nfollow. The traveller who stops at the best houses, so called, soon discovers this, for the \npublicans presume him to be a Sardanapalus, and if he resigned himself to their tender \nmercies he would soon be completely emasculated. I think that in the railroad car we \nare inclined to spend more on luxury than on safety and convenience, and it threatens \nwithout attaining these to become no better than a modern drawing-room, with its \ndivans, and ottomans, and sun-shades, and a hundred other oriental things, which we \nare taking west with us, invented for the ladies of the harem and the effeminate natives \nof the Celestial Empire, which Jonathan should be ashamed to know the names of. I \nwould rather sit on a pumpkin and have it all to myself than be crowded on a velvet "}, {"pdfPage": 21, "text": "cushion. I would rather ride on earth in an ox cart, with a free circulation, than go to \nheaven in the fancy car of an excursion train and breathe a malaria all the way. \nThe very simplicity and nakedness of man’s life in the primitive ages imply this \nadvantage, at least, that they left him still but a sojourner in nature. When he was \nrefreshed with food and sleep, he contemplated his journey again. He dwelt, as it were, \nin a tent in this world, and was either threading the valleys, or crossing the plains, or \nclimbing the mountain-tops. But lo! men have become the tools of their tools. The man \nwho independently plucked the fruits when he was hungry is become a farmer; and he \nwho stood under a tree for shelter, a housekeeper. We now no longer camp as for a \nnight, but have settled down on earth and forgotten heaven. We have adopted \nChristianity merely as an improved method of agri-culture. We have built for this world \na family mansion, and for the next a family tomb. The best works of art are the \nexpression of man’s struggle to free himself from this condition, but the effect of our art \nis merely to make this low state comfortable and that higher state to be forgotten. There \nis actually no place in this village for a work of fine art, if any had come down to us, to \nstand, for our lives, our houses and streets, furnish no proper pedestal for it. There is \nnot a nail to hang a picture on, nor a shelf to receive the bust of a hero or a saint. When I \nconsider how our houses are built and paid for, or not paid for, and their internal \neconomy managed and sustained, I wonder that the floor does not give way under the \nvisitor while he is admiring the gewgaws upon the mantelpiece, and let him through \ninto the cellar, to some solid and honest though earthy foundation. I cannot but perceive \nthat this so-called rich and refined life is a thing jumped at, and I do not get on in the \nenjoyment of the fine arts which adorn it, my attention being wholly occupied with the \njump; for I remember that the greatest genuine leap, due to human muscles alone, on \nrecord, is that of certain wandering Arabs, who are said to have cleared twenty-five feet \non level ground. Without factitious support, man is sure to come to earth again beyond \nthat distance. The first question which I am tempted to put to the proprietor of such \ngreat impropriety is, Who bolsters you? Are you one of the ninety-seven who fail, or the \nthree who succeed? Answer me these questions, and then perhaps I may look at your \nbawbles and find them ornamental. The cart before the horse is neither beautiful nor \nuseful. Before we can adorn our houses with beautiful objects the walls must be \nstripped, and our lives must be stripped, and beautiful housekeeping and beautiful \nliving be laid for a foundation: now, a taste for the beautiful is most cultivated out of \ndoors, where there is no house and no housekeeper. \nOld Johnson, in his “Wonder–Working Providence,” speaking of the first settlers of this \ntown, with whom he was contemporary, tells us that “they burrow themselves in the \nearth for their first shelter under some hillside, and, casting the soil aloft upon timber, \nthey make a smoky fire against the earth, at the highest side.” They did not “provide \nthem houses,” says he, “till the earth, by the Lord’s blessing, brought forth bread to feed \nthem,” and the first year’s crop was so light that “they were forced to cut their bread \nvery thin for a long season.” The secretary of the Province of New Netherland, writing in \nDutch, in 1650, for the information of those who wished to take up land there, states \nmore particularly that “those in New Netherland, and especially in New England, who \nhave no means to build farmhouses at first according to their wishes, dig a square pit in \nthe ground, cellar fashion, six or seven feet deep, as long and as broad as they think \nproper, case the earth inside with wood all round the wall, and line the wood with the \nbark of trees or something else to prevent the caving in of the earth; floor this cellar \nwith plank, and wainscot it overhead for a ceiling, raise a roof of spars clear up, and "}, {"pdfPage": 22, "text": "cover the spars with bark or green sods, so that they can live dry and warm in these \nhouses with their entire families for two, three, and four years, it being understood that \npartitions are run through those cellars which are adapted to the size of the family. The \nwealthy and principal men in New England, in the beginning of the colonies, \ncommenced their first dwelling-houses in this fashion for two reasons: firstly, in order \nnot to waste time in building, and not to want food the next season; secondly, in order \nnot to discourage poor laboring people whom they brought over in numbers from \nFatherland. In the course of three or four years, when the country became adapted to \nagriculture, they built themselves handsome houses, spending on them several \nthousands.” \nIn this course which our ancestors took there was a show of prudence at least, as if their \nprinciple were to satisfy the more pressing wants first. But are the more pressing wants \nsatisfied now? When I think of acquiring for myself one of our luxurious dwellings, I am \ndeterred, for, so to speak, the country is not yet adapted to human culture, and we are \nstill forced to cut our spiritual bread far thinner than our forefathers did their wheaten. \nNot that all architectural ornament is to be neglected even in the rudest periods; but let \nour houses first be lined with beauty, where they come in contact with our lives, like the \ntenement of the shellfish, and not overlaid with it. But, alas! I have been inside one or \ntwo of them, and know what they are lined with. \nThough we are not so degenerate but that we might possibly live in a cave or a wigwam \nor wear skins today, it certainly is better to accept the advantages, though so dearly \nbought, which the invention and industry of mankind offer. In such a neighborhood as \nthis, boards and shingles, lime and bricks, are cheaper and more easily obtained than \nsuitable caves, or whole logs, or bark in sufficient quantities, or even well-tempered clay \nor flat stones. I speak understandingly on this subject, for I have made myself \nacquainted with it both theoretically and practically. With a little more wit we might use \nthese materials so as to become richer than the richest now are, and make our \ncivilization a blessing. The civilized man is a more experienced and wiser savage. But to \nmake haste to my own experiment. \nNear the end of March, 1845, I borrowed an axe and went down to the woods by \nWalden Pond, nearest to where I intended to build my house, and began to cut down \nsome tall, arrowy white pines, still in their youth, for timber. It is difficult to begin \nwithout borrowing, but perhaps it is the most generous course thus to permit your \nfellow-men to have an interest in your enterprise. The owner of the axe, as he released \nhis hold on it, said that it was the apple of his eye; but I returned it sharper than I \nreceived it. It was a pleasant hillside where I worked, covered with pine woods, through \nwhich I looked out on the pond, and a small open field in the woods where pines and \nhickories were springing up. The ice in the pond was not yet dissolved, though there \nwere some open spaces, and it was all dark-colored and saturated with water. There \nwere some slight flurries of snow during the days that I worked there; but for the most \npart when I came out on to the railroad, on my way home, its yellow sand heap \nstretched away gleaming in the hazy atmosphere, and the rails shone in the spring sun, \nand I heard the lark and pewee and other birds already come to commence another year \nwith us. They were pleasant spring days, in which the winter of man’s discontent was \nthawing as well as the earth, and the life that had lain torpid began to stretch itself. One \nday, when my axe had come off and I had cut a green hickory for a wedge, driving it with \na stone, and had placed the whole to soak in a pond-hole in order to swell the wood, I \nsaw a striped snake run into the water, and he lay on the bottom, apparently without "}, {"pdfPage": 23, "text": "inconvenience, as long as I stayed there, or more than a quarter of an hour; perhaps \nbecause he had not yet fairly come out of the torpid state. It appeared to me that for a \nlike reason men remain in their present low and primitive condition; but if they should \nfeel the influence of the spring of springs arousing them, they would of necessity rise to \na higher and more ethereal life. I had previously seen the snakes in frosty mornings in \nmy path with portions of their bodies still numb and inflexible, waiting for the sun to \nthaw them. On the 1st of April it rained and melted the ice, and in the early part of the \nday, which was very foggy, I heard a stray goose groping about over the pond and \ncackling as if lost, or like the spirit of the fog. \nSo I went on for some days cutting and hewing timber, and also studs and rafters, all \nwith my narrow axe, not having many communicable or scholar-like thoughts, singing \nto myself, — \nMen say they know many things; \nBut lo! they have taken wings — \nThe arts and sciences, \nAnd a thousand appliances; \nThe wind that blows \nIs all that any body knows. \nI hewed the main timbers six inches square, most of the studs on two sides only, and the \nrafters and floor timbers on one side, leaving the rest of the bark on, so that they were \njust as straight and much stronger than sawed ones. Each stick was carefully mortised \nor tenoned by its stump, for I had borrowed other tools by this time. My days in the \nwoods were not very long ones; yet I usually carried my dinner of bread and butter, and \nread the newspaper in which it was wrapped, at noon, sitting amid the green pine \nboughs which I had cut off, and to my bread was imparted some of their fragrance, for \nmy hands were covered with a thick coat of pitch. Before I had done I was more the \nfriend than the foe of the pine tree, though I had cut down some of them, having become \nbetter acquainted with it. Sometimes a rambler in the wood was attracted by the sound \nof my axe, and we chatted pleasantly over the chips which I had made. \nBy the middle of April, for I made no haste in my work, but rather made the most of it, \nmy house was framed and ready for the raising. I had already bought the shanty of \nJames Collins, an Irishman who worked on the Fitchburg Railroad, for boards. James \nCollins’ shanty was considered an uncommonly fine one. When I called to see it he was \nnot at home. I walked about the outside, at first unobserved from within, the window \nwas so deep and high. It was of small dimensions, with a peaked cottage roof, and not \nmuch else to be seen, the dirt being raised five feet all around as if it were a compost \nheap. The roof was the soundest part, though a good deal warped and made brittle by \nthe sun. Doorsill there was none, but a perennial passage for the hens under the door \nboard. Mrs. C. came to the door and asked me to view it from the inside. The hens were \ndriven in by my approach. It was dark, and had a dirt floor for the most part, dank, \nclammy, and aguish, only here a board and there a board which would not bear removal. \nShe lighted a lamp to show me the inside of the roof and the walls, and also that the \nboard floor extended under the bed, warning me not to step into the cellar, a sort of dust \nhole two feet deep. In her own words, they were “good boards overhead, good boards \nall around, and a good window” — of two whole squares originally, only the cat had \npassed out that way lately. There was a stove, a bed, and a place to sit, an infant in the \nhouse where it was born, a silk parasol, gilt-framed looking-glass, and a patent new "}, {"pdfPage": 24, "text": "coffee-mill nailed to an oak sapling, all told. The bargain was soon concluded, for James \nhad in the meanwhile returned. I to pay four dollars and twenty-five cents tonight, he to \nvacate at five tomorrow morning, selling to nobody else meanwhile: I to take possession \nat six. It were well, he said, to be there early, and anticipate certain indistinct but wholly \nunjust claims on the score of ground rent and fuel. This he assured me was the only \nencumbrance. At six I passed him and his family on the road. One large bundle held their \nall — bed, coffee-mill, looking-glass, hens — all but the cat; she took to the woods and \nbecame a wild cat, and, as I learned afterward, trod in a trap
